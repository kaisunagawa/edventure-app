<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JIROKU COACH</title>
  <meta name="theme-color" content="#FAFAF9" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#101417" media="(prefers-color-scheme: dark)" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/htm/dist/htm.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FAFAF9; --card: #FFFFFF; --border: #E7E5E4;
      --text: #1C1917; --sub: #78716C;
      --accent: #0891B2; --accent-l: #ECFEFF;
      --green: #16A34A; --amber: #D97706; --red: #DC2626;
      --hero1: #0891B2; --hero2: #0e7490;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101417; --card: #1A2025; --border: #2A3138;
        --text: #F2F0EF; --sub: #9CA3AF;
        --accent: #22B8D4; --accent-l: #103240;
        --hero1: #0B4A5A; --hero2: #093642;
      }
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'DM Sans', -apple-system, "Hiragino Sans", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
    .card-label { font-size: 12px; font-weight: 600; color: var(--sub); margin-bottom: 12px; letter-spacing: .02em; text-transform: uppercase; }
    .btn { display: inline-block; padding: 10px 18px; border: none; border-radius: 10px; background: var(--accent); color: #fff; font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn:disabled { opacity: .5; cursor: default; }
    .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .inp, .txa, select.inp { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 9px; background: var(--bg); color: var(--text); font-size: 13.5px; font-family: inherit; outline: none; }
    .inp:focus, .txa:focus { border-color: var(--accent); }
    .txa { resize: vertical; min-height: 70px; line-height: 1.6; }
    .lbl { display: block; font-size: 11.5px; font-weight: 600; color: var(--sub); margin-bottom: 5px; }
    .spin { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tab { padding: 8px 14px; border-radius: 8px; border: none; background: none; color: var(--sub); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .tab.on { background: var(--accent-l); color: var(--accent); }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const html = htm.bind(React.createElement);
const { useState, useEffect, useRef, useMemo } = React;

const GAS_URL = "https://script.google.com/macros/s/AKfycbzJ-QEpPVnmp-LFU5Jxww4VFP1qaseMtwCrzKxAA6ZULr1y3h_UeKzVdhHnl5ze57U/exec";
const GOOGLE_CLIENT_ID = "476804060858-n3afj7ipmc81vq8cq71u0u3jdpolshea.apps.googleusercontent.com";

let COACH_EMAIL = localStorage.getItem("jiroku_coach_email") || null;

async function api(action, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set("action", action);
  url.searchParams.set("coachEmail", COACH_EMAIL || "");
  Object.entries(params).forEach(([k, v]) => { if (v != null) url.searchParams.set(k, String(v)); });
  try { const r = await fetch(url.toString(), { redirect: "follow" }); return await r.json(); }
  catch { return { ok: false, error: "network" }; }
}
// POSTはボディが大きくなり得る操作（ファイルアップロード等）用。
// GAS未対応環境の負荷を避けるためtext/plainで送る
async function apiPost(action, body = {}) {
  try {
    const r = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action, coachEmail: COACH_EMAIL, ...body })
    });
    return await r.json();
  } catch { return { ok: false, error: "network" }; }
}
const fileToBase64 = file => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => resolve(reader.result.split(",")[1]);
  reader.onerror = reject;
  reader.readAsDataURL(file);
});

const fmtDate = d => {
  const dt = new Date(String(d).substring(0,10) + "T00:00:00");
  return isNaN(dt) ? String(d) : dt.toLocaleDateString("ja-JP", { month: "numeric", day: "numeric", weekday: "short" });
};
const daysAgo = d => {
  if (!d) return null;
  return Math.floor((new Date() - new Date(String(d).substring(0,10) + "T00:00:00")) / 86400000);
};

// 「要フォロー」の自動ピックアップ: 記録が数日途絶えている／スコアが下降傾向／
// レポートスコアが低いままの生徒を、コーチが毎回全員分を目視確認しなくても
// 気づけるようにする
function getFollowupReason(s) {
  if (!s.joinedJiroku) return null;
  const ago = daysAgo(s.lastLogDate);
  if (ago === null) return "まだ一度も記録がありません";
  if (ago >= 3) return `${ago}日間記録がありません`;
  if (s.latestReport && s.prevReportScore !== null && s.prevReportScore - s.latestReport.score >= 15) {
    return `スコアが下降傾向です（${s.prevReportScore}→${s.latestReport.score}点）`;
  }
  if (s.latestReport && s.latestReport.score < 50) return `直近のレポートスコアが${s.latestReport.score}点と低めです`;
  return null;
}

function loginWithGoogle(onEmail, onError) {
  if (!window.google?.accounts?.oauth2) { onError("Googleログインの読み込み中です。少し待ってからもう一度お試しください"); return; }
  try {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: "openid email profile",
      callback: async (t) => {
        if (t.error || !t.access_token) { onError("ログインに失敗しました"); return; }
        try {
          const info = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", { headers: { Authorization: "Bearer " + t.access_token } }).then(r => r.json());
          if (info.email) onEmail(info.email);
          else onError("メールアドレスを取得できませんでした");
        } catch { onError("ログインに失敗しました"); }
      },
      error_callback: () => onError("ログインがキャンセルされました"),
    });
    client.requestAccessToken();
  } catch { onError("ログインに失敗しました"); }
}

function LoginScreen({ onLogin }) {
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const signIn = () => {
    setLoading(true); setError("");
    loginWithGoogle(async (email) => {
      COACH_EMAIL = email;
      const r = await api("coachGetStudents");
      if (r.ok) {
        localStorage.setItem("jiroku_coach_email", email);
        onLogin(email, r.data, r.isAdmin);
      } else {
        COACH_EMAIL = null;
        setError(r.error === "not a coach" ? "このアカウントはコーチとして登録されていません" : "確認に失敗しました。もう一度お試しください");
      }
      setLoading(false);
    }, (msg) => { setError(msg); setLoading(false); });
  };
  return html`
    <div style=${{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16}}>
      <svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg"><circle cx="36" cy="36" r="36" fill="#0891B2"/><circle cx="36" cy="36" r="25" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4.5"/><path d="M36 11 A25 25 0 1 1 14.5 50" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/><circle cx="36" cy="36" r="15" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/><line x1="36" y1="36" x2="36" y2="25" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><line x1="36" y1="36" x2="43" y2="41" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="36" cy="36" r="2" fill="#fff"/></svg>
      <div style=${{fontSize:24,fontWeight:700,letterSpacing:"-.3px"}}>JIROKU <span style=${{color:"var(--accent)"}}>COACH</span></div>
      <div style=${{fontSize:13,color:"var(--sub)"}}>コーチ専用の管理画面です</div>
      ${loading
        ? html`<div class="spin"/>`
        : html`<button onClick=${signIn} style=${{display:"flex",alignItems:"center",gap:10,padding:"10px 20px",borderRadius:8,border:"1px solid #dadce0",background:"#fff",cursor:"pointer",fontSize:15,fontWeight:500,color:"#3c4043",width:280,justifyContent:"center"}}>
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18"/>
            Googleでサインイン
          </button>`}
      ${error && html`<div style=${{color:"var(--red)",fontSize:13,textAlign:"center"}}>${error}</div>`}
    </div>
  `;
}

// ── サイドバー: 生徒一覧（検索・要フォロー順） ──
function Sidebar({ students, selectedEmail, onSelect, onLogout, coach, onAddClient, onOpenChatworkImport, isAdmin, showAdmin, onShowAdmin, showSessions, onShowSessions }) {
  const [q, setQ] = useState("");
  const [adding, setAdding] = useState(false);
  const [newName, setNewName] = useState("");
  const [newEmail, setNewEmail] = useState("");
  const [addMsg, setAddMsg] = useState("");
  const [showFollowup, setShowFollowup] = useState(false);
  const followupList = useMemo(() =>
    students.map(s => ({ s, reason: getFollowupReason(s) })).filter(x => x.reason),
  [students]);
  const filtered = useMemo(() => {
    const query = q.trim().toLowerCase();
    if (!query) return students;
    return students.filter(s => (s.name||"").toLowerCase().includes(query) || (s.nickname||"").toLowerCase().includes(query) || (s.goal||"").toLowerCase().includes(query));
  }, [students, q]);

  const submitAdd = async () => {
    if (!newName.trim() || !newEmail.trim()) return;
    const r = await onAddClient(newEmail.trim(), newName.trim());
    if (r.ok) {
      setAdding(false); setNewName(""); setNewEmail(""); setAddMsg("");
    } else {
      setAddMsg(r.error || "追加に失敗しました");
    }
  };

  return html`
    <aside style=${{width:300,flexShrink:0,borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",height:"100%",background:"var(--card)"}}>
      <div style=${{padding:"18px 16px 14px",borderBottom:"1px solid var(--border)"}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style=${{fontSize:16,fontWeight:700,letterSpacing:"-.2px"}}>JIROKU <span style=${{color:"var(--accent)"}}>COACH</span></div>
          <button onClick=${onLogout} title="ログアウト" style=${{background:"none",border:"none",color:"var(--sub)",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>ログアウト</button>
        </div>
        <div style=${{fontSize:11,color:"var(--sub)",marginBottom:10}}>${coach}</div>
        ${followupList.length > 0 && html`
          <div style=${{border:"1px solid #F59E0B55",background:"#F59E0B14",borderRadius:10,marginBottom:10,overflow:"hidden"}}>
            <button onClick=${()=>setShowFollowup(!showFollowup)}
              style=${{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",background:"none",border:"none",padding:"9px 11px",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
              <span style=${{fontSize:12,fontWeight:700,color:"#B45309"}}>⚠️ 要フォロー ${followupList.length}人</span>
              <span style=${{fontSize:11,color:"#B45309"}}>${showFollowup?"▲":"▼"}</span>
            </button>
            ${showFollowup && html`
              <div style=${{padding:"0 8px 8px"}}>
                ${followupList.map(({s,reason}) => html`
                  <button key=${s.email} onClick=${()=>onSelect(s)}
                    style=${{display:"block",width:"100%",textAlign:"left",background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,padding:"7px 10px",marginBottom:5,cursor:"pointer",fontFamily:"inherit"}}>
                    <div style=${{fontSize:12,fontWeight:600,color:"var(--text)"}}>${s.nickname||s.name}</div>
                    <div style=${{fontSize:10.5,color:"#B45309",marginTop:1}}>${reason}</div>
                  </button>
                `)}
              </div>
            `}
          </div>
        `}
        <input class="inp" placeholder="生徒名・目標で検索" value=${q} onInput=${e=>setQ(e.target.value)} style=${{marginBottom:8}}/>
        ${!adding
          ? html`<button class="btn" style=${{width:"100%",fontSize:12.5}} onClick=${()=>setAdding(true)}>＋ 新しいクライアントを追加</button>`
          : html`
            <div style=${{border:"1px solid var(--border)",borderRadius:10,padding:10}}>
              <input class="inp" placeholder="名前" value=${newName} onChange=${e=>setNewName(e.target.value)} style=${{marginBottom:8,fontSize:12.5}}/>
              <input class="inp" placeholder="メールアドレス" value=${newEmail} onChange=${e=>setNewEmail(e.target.value)} style=${{marginBottom:8,fontSize:12.5}}/>
              ${addMsg && html`<div style=${{fontSize:11,color:"var(--red)",marginBottom:8}}>${addMsg}</div>`}
              <div style=${{display:"flex",gap:6}}>
                <button class="btn" style=${{flex:1,fontSize:12}} onClick=${submitAdd}>追加</button>
                <button style=${{flex:1,fontSize:12,background:"none",border:"1px solid var(--border)",borderRadius:8,cursor:"pointer",fontFamily:"inherit"}} onClick=${()=>{setAdding(false);setAddMsg("");}}>キャンセル</button>
              </div>
            </div>
          `}
        <button style=${{fontSize:12.5,background:"none",border:"1px solid var(--border)",borderRadius:8,padding:"8px 0",cursor:"pointer",fontFamily:"inherit",width:"100%",marginTop:6}} onClick=${onOpenChatworkImport}>Chatworkから取り込む</button>
        <button onClick=${onShowSessions}
          style=${{fontSize:12.5,border:"1px solid var(--border)",borderRadius:8,padding:"8px 0",cursor:"pointer",fontFamily:"inherit",width:"100%",marginTop:6,background:showSessions?"var(--accent-l)":"none",color:showSessions?"var(--accent)":"var(--text)",fontWeight:600}}>
          🗓 セッション管理
        </button>
        ${isAdmin && html`
          <button onClick=${onShowAdmin}
            style=${{fontSize:12.5,border:"1px solid var(--border)",borderRadius:8,padding:"8px 0",cursor:"pointer",fontFamily:"inherit",width:"100%",marginTop:6,background:showAdmin?"var(--accent-l)":"none",color:showAdmin?"var(--accent)":"var(--text)",fontWeight:600}}>
            管理者ダッシュボード
          </button>
        `}
      </div>
      <div style=${{overflowY:"auto",flex:1}}>
        <div style=${{padding:"10px 16px 4px",fontSize:11,color:"var(--sub)",fontWeight:600}}>担当生徒 ${filtered.length}人</div>
        ${filtered.map(s => {
          const ago = daysAgo(s.lastLogDate);
          const agoColor = !s.joinedJiroku ? "var(--sub)" : ago === null ? "var(--red)" : ago <= 1 ? "var(--green)" : ago <= 3 ? "var(--amber)" : "var(--red)";
          const agoText = !s.joinedJiroku ? "JIROKU未登録" : ago === null ? "記録なし" : ago === 0 ? "今日記録あり" : ago + "日前が最終";
          const active = s.email === selectedEmail;
          return html`
            <button key=${s.email} onClick=${() => onSelect(s)}
              style=${{display:"block",width:"100%",padding:"12px 16px",border:"none",borderLeft:active?"3px solid var(--accent)":"3px solid transparent",background:active?"var(--accent-l)":"transparent",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
              <div style=${{display:"flex",alignItems:"center",gap:10}}>
                <div style=${{width:32,height:32,borderRadius:"50%",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>${s.avatar}</div>
                <div style=${{flex:1,minWidth:0}}>
                  <div style=${{display:"flex",alignItems:"center",gap:6,minWidth:0}}>
                    <span style=${{fontSize:13.5,fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${s.nickname||s.name}</span>
                    ${s.cohort&&html`<span title=${s.cohort} style=${{flexShrink:0,fontSize:9.5,fontWeight:700,color:"var(--accent)",background:"var(--accent-l)",borderRadius:20,padding:"1px 6px"}}>🎓${s.cohort}</span>`}
                  </div>
                  <div style=${{fontSize:11,fontWeight:600,color:agoColor}}>${agoText}</div>
                </div>
                ${s.contractDaysLeft !== null && s.contractDaysLeft <= 30 && html`
                  <div title="契約終了まで残り少ない" style=${{fontSize:9,fontWeight:600,color:"#fff",background:"var(--red)",borderRadius:20,padding:"2px 6px",flexShrink:0}}>残${s.contractDaysLeft}日</div>
                `}
              </div>
            </button>
          `;
        })}
        ${filtered.length === 0 && html`<div style=${{padding:20,fontSize:12,color:"var(--sub)",textAlign:"center"}}>該当する生徒がいません</div>`}
      </div>
    </aside>
  `;
}

// ── メイン: 選択中の生徒の詳細（タブ切り替え） ──
function StudentMain({ student, onNoteSaved }) {
  const [tab, setTab] = useState("overview"); // overview | history | notes | profile
  const [detail, setDetail] = useState(null);
  const [prep, setPrep] = useState(null);
  const [prepLoading, setPrepLoading] = useState(false);
  const [content, setContent] = useState("");
  const [nextTheme, setNextTheme] = useState("");
  const [promises, setPromises] = useState("");
  const [noteDate, setNoteDate] = useState(() => new Date().toISOString().substring(0,10));
  const [saving, setSaving] = useState(false);
  const [savedMsg, setSavedMsg] = useState("");
  const [sessionMode, setSessionMode] = useState(false);
  const [suggestions, setSuggestions] = useState([]);
  const [suggestLoading, setSuggestLoading] = useState(false);
  const [suggestedOnce, setSuggestedOnce] = useState(false);
  const [transcript, setTranscript] = useState("");
  const [summarizing, setSummarizing] = useState(false);
  const [summarizeMsg, setSummarizeMsg] = useState("");
  const [importOpen, setImportOpen] = useState(false);
  const [importRows, setImportRows] = useState([{ date: "", content: "", next_theme: "", promises: "" }]);
  const [importing, setImporting] = useState(false);
  const [importMsg, setImportMsg] = useState("");
  const [syncingChatwork, setSyncingChatwork] = useState(false);
  const [chatworkSyncMsg, setChatworkSyncMsg] = useState("");

  const reloadDetail = () => api("coachGetStudentDetail", { targetEmail: student.email }).then(r => { if (r.ok) setDetail(r.data); });
  const deleteNote = (noteId) => {
    if (!confirm("このコーチングログを削除しますか？")) return;
    apiPost("coachDeleteNote", { targetEmail: student.email, note_id: noteId }).then(r => { if (r.ok) reloadDetail(); });
  };
  const verifyNote = (noteId) => {
    api("coachVerifyNote", { note_id: noteId }).then(r => { if (r.ok) reloadDetail(); });
  };
  // セッション後に生徒へ送るメッセージの生成・送信
  const [genMsg, setGenMsg] = useState("");
  const [genMsgLoading, setGenMsgLoading] = useState(false);
  const [genMsgSending, setGenMsgSending] = useState(false);
  const [genMsgResult, setGenMsgResult] = useState("");
  const [genMsgLineLinked, setGenMsgLineLinked] = useState(true);
  const generateStudentMessage = async () => {
    setGenMsgLoading(true); setGenMsgResult("");
    const r = await apiPost("coachGenerateStudentMessage", { targetEmail: student.email });
    setGenMsgLoading(false);
    if (r.ok) { setGenMsg(r.data.message); setGenMsgLineLinked(r.data.lineLinked); }
    else setGenMsgResult(r.error || "生成に失敗しました");
  };
  const sendStudentMessage = async () => {
    if (!genMsg.trim()) return;
    if (!confirm(student.name + " さんにこのメッセージを送信しますか？（LINEとアプリに届きます）")) return;
    setGenMsgSending(true); setGenMsgResult("");
    const r = await apiPost("coachSendStudentMessage", { targetEmail: student.email, message: genMsg.trim() });
    setGenMsgSending(false);
    if (r.ok) { setGenMsgResult(r.lineSent ? "送信しました（LINE＋アプリ）" : "アプリに送信しました（LINE未連携）"); setGenMsg(""); }
    else setGenMsgResult(r.error || "送信に失敗しました");
  };
  const copyStudentMessage = async () => {
    try { await navigator.clipboard.writeText(genMsg); setGenMsgResult("コピーしました"); setTimeout(()=>setGenMsgResult(""),2000); } catch (e) { setGenMsgResult("コピーに失敗しました"); }
  };
  // 記録が滞っている生徒への定期的な声かけメッセージの生成
  const [nudgeMsg, setNudgeMsg] = useState("");
  const [nudgeLoading, setNudgeLoading] = useState(false);
  const [nudgeSending, setNudgeSending] = useState(false);
  const [nudgeResult, setNudgeResult] = useState("");
  const [nudgeInfo, setNudgeInfo] = useState(null);
  const [nudgeLineLinked, setNudgeLineLinked] = useState(true);
  const generateNudgeMessage = async () => {
    setNudgeLoading(true); setNudgeResult("");
    const r = await apiPost("coachGenerateNudgeMessage", { targetEmail: student.email });
    setNudgeLoading(false);
    if (r.ok) { setNudgeMsg(r.data.message); setNudgeInfo(r.data); setNudgeLineLinked(r.data.lineLinked); }
    else setNudgeResult(r.error || "生成に失敗しました");
  };
  const sendNudgeMessage = async () => {
    if (!nudgeMsg.trim()) return;
    if (!confirm(student.name + " さんにこのメッセージを送信しますか？（LINEとアプリに届きます）")) return;
    setNudgeSending(true); setNudgeResult("");
    const r = await apiPost("coachSendStudentMessage", { targetEmail: student.email, message: nudgeMsg.trim() });
    setNudgeSending(false);

          <!-- セッション後: 生徒へ送るフォローアップメッセージを生成 -->
          <div class="card" style=${{marginTop:20,border:"1.5px solid var(--accent)"}}>
            <div class="card-label">💬 生徒へ送るメッセージを生成</div>
            <div style=${{fontSize:11.5,color:"var(--sub)",marginBottom:12}}>今日のセッション記録と${student.name}さんの状況をもとに、セッション後に送るフォローアップメッセージをAIが作ります。内容を確認・編集してから送ってください。</div>
            <button class="btn" onClick=${generateStudentMessage} disabled=${genMsgLoading}>${genMsgLoading?"生成中…":(genMsg?"作り直す":"メッセージを生成する")}</button>
            ${genMsg && html`
              <div style=${{marginTop:12}}>
                <textarea class="txa" value=${genMsg} onChange=${e=>setGenMsg(e.target.value)} style=${{minHeight:120,fontSize:13.5,lineHeight:1.7}}/>
                ${!genMsgLineLinked && html`<div style=${{fontSize:11.5,color:"var(--amber, #B45309)",marginBottom:8}}>⚠️ この生徒はLINE未連携です。送信するとアプリの受信箱にのみ届きます。</div>`}
                <div style=${{display:"flex",gap:8,marginTop:4}}>
                  <button class="btn" onClick=${sendStudentMessage} disabled=${genMsgSending||!genMsg.trim()}>${genMsgSending?"送信中…":"この内容で送信"}</button>

          <!-- 定期フォロー: 記録が滞っている生徒への声かけを生成 -->

            <div class="card-label">🌱 定期フォローのメッセージを生成</div>
            <div style=${{fontSize:11.5,color:"var(--sub)",marginBottom:10}}>セッションとは別に、折を見て送る声かけを作ります。記録が止まっている生徒には、責めずに再開を後押しする文面をAIが状況に合わせて生成します。</div>
            ${student.lastLogDate
              ? html`<div style=${{fontSize:11.5,color:"var(--sub)",marginBottom:12}}>最後の記録: ${student.lastLogDate}</div>`
              : html`<div style=${{fontSize:11.5,color:"var(--brass, #A9803F)",marginBottom:12}}>まだ記録がありません</div>`}
            <button class="btn" onClick=${generateNudgeMessage} disabled=${nudgeLoading}>${nudgeLoading?"生成中…":(nudgeMsg?"作り直す":"声かけを生成する")}</button>
            ${nudgeMsg && html`
              <div style=${{marginTop:12}}>
                ${nudgeInfo && nudgeInfo.daysSince!=null && nudgeInfo.daysSince>=3 && html`<div style=${{fontSize:11.5,color:"var(--sub)",marginBottom:6}}>最後の記録から約${nudgeInfo.daysSince}日空いています。</div>`}
                <textarea class="txa" value=${nudgeMsg} onChange=${e=>setNudgeMsg(e.target.value)} style=${{minHeight:120,fontSize:13.5,lineHeight:1.7}}/>
                ${!nudgeLineLinked && html`<div style=${{fontSize:11.5,color:"var(--amber, #B45309)",marginBottom:8}}>⚠️ この生徒はLINE未連携です。送信するとアプリの受信箱にのみ届きます。</div>`}
                <div style=${{display:"flex",gap:8,marginTop:4}}>
                  <button class="btn" onClick=${sendNudgeMessage} disabled=${nudgeSending||!nudgeMsg.trim()}>${nudgeSending?"送信中…":"この内容で送信"}</button>

        ${detail && tab==="profile" && html`<${ProfileTab} student=${student} detail=${detail} onReload=${reloadDetail}/>`}
      </div>
    </div>
  `;
}

// ── プロフィール・契約タブ ──
const PAYMENT_TYPES = [{v:"lump",l:"一括払い"},{v:"card_installment",l:"クレカ分割"},{v:"transfer_installment",l:"振込分割"}];
const GENDER_TYPES = [{v:"",l:"未設定"},{v:"male",l:"男性"},{v:"female",l:"女性"},{v:"other",l:"その他"}];

function ProfileTab({ student, detail, onReload }) {
  const p = detail.profile || {};
  const [form, setForm] = useState({
    name: p.name || student.name || "", birthdate: p.birthdate || "", gender: p.gender || "", family: p.family || "",
    address: p.address || "", phone: p.phone || "",
    occupation: p.occupation || "", profile_notes: p.profile_notes || "",
    instagram: p.instagram || "", tiktok: p.tiktok || "",
    contract_start: p.contract_start || "", contract_end: p.contract_end || "",
    payment_type: p.payment_type || "lump", contract_amount: p.contract_amount || "",
    installment_count: p.installment_count || "", stripe_email: p.stripe_email || ""
  });
  const [saving, setSaving] = useState(false);
  const [savedMsg, setSavedMsg] = useState("");
  const [uploading, setUploading] = useState(false);
  const [extracting, setExtracting] = useState(false);
  const [extractMsg, setExtractMsg] = useState("");
  const [fileNote, setFileNote] = useState("");
  const [syncingStripe, setSyncingStripe] = useState(false);
  const [stripeMsg, setStripeMsg] = useState("");
  const [showInCommunity, setShowInCommunity] = useState(student.showInCommunity !== false);
  const [savingCommunity, setSavingCommunity] = useState(false);
  const fileInputRef = useRef(null);

  // Stripeの決済リンクは一度作れば全クライアント共通で使い回すため、
  // このブラウザ（コーチの端末）にだけ保存しておく。GAS変更不要の軽い作り。
  // アプリのみ／コーチング付きの2本を登録でき、各クライアント画面でワンタップコピーできる
  const [payLinkApp, setPayLinkApp] = useState(() => localStorage.getItem("jiroku_paylink_app") || "");
  const [payLinkCoaching, setPayLinkCoaching] = useState(() => localStorage.getItem("jiroku_paylink_coaching") || "");
  const [payLinkEditing, setPayLinkEditing] = useState(false);
  const [copiedMsg, setCopiedMsg] = useState("");
  const savePayLinks = () => {
    localStorage.setItem("jiroku_paylink_app", payLinkApp.trim());
    localStorage.setItem("jiroku_paylink_coaching", payLinkCoaching.trim());
    setPayLinkEditing(false);
  };
  const copyLink = async (url, label) => {
    if (!url) return;
    try { await navigator.clipboard.writeText(url); setCopiedMsg(label + "のリンクをコピーしました"); }
    catch { setCopiedMsg("コピーに失敗しました"); }
    setTimeout(() => setCopiedMsg(""), 2500);
  };

  useEffect(() => {
    setForm({
      name: p.name || student.name || "", birthdate: p.birthdate || "", gender: p.gender || "", family: p.family || "",
      address: p.address || "", phone: p.phone || "",
      occupation: p.occupation || "", profile_notes: p.profile_notes || "",
      contract_start: p.contract_start || "", contract_end: p.contract_end || "",
      payment_type: p.payment_type || "lump", contract_amount: p.contract_amount || "",
      installment_count: p.installment_count || "", stripe_email: p.stripe_email || ""
    });
    setShowInCommunity(student.showInCommunity !== false);
  }, [student.email]);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const toggleShowInCommunity = async () => {
    const next = !showInCommunity;
    setShowInCommunity(next); // 楽観的更新
    setSavingCommunity(true);
    const r = await api("coachSetShowInCommunity", { targetEmail: student.email, show: next });
    if (!r.ok) setShowInCommunity(!next); // 失敗したら戻す
    setSavingCommunity(false);
  };

  const save = async () => {
    setSaving(true);
    const r = await apiPost("coachSaveProfile", { targetEmail: student.email, ...form });
    setSavedMsg(r.ok ? "保存しました" : "保存に失敗しました");
    if (r.ok) onReload();
    setSaving(false);
    setTimeout(() => setSavedMsg(""), 2500);
  };

  const age = form.birthdate ? Math.floor((Date.now() - new Date(form.birthdate)) / (365.25*86400000)) : null;
  const contractDaysLeft = form.contract_end ? Math.ceil((new Date(form.contract_end) - new Date()) / 86400000) : null;

  const applyExtracted = (ex) => {
    setForm(f => ({
      ...f,
      name: ex.name || f.name, birthdate: ex.birthdate || f.birthdate,
      address: ex.address || f.address, phone: ex.phone || f.phone,
      contract_start: ex.contract_start || f.contract_start, contract_end: ex.contract_end || f.contract_end,
      payment_type: ex.payment_type || f.payment_type,
      contract_amount: ex.contract_amount || f.contract_amount,
      installment_count: ex.installment_count || f.installment_count
    }));
  };

  const onFileChosen = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 15 * 1024 * 1024) { alert("15MBまでのファイルに対応しています"); return; }
    setUploading(true);
    try {
      const base64 = await fileToBase64(file);
      const r = await apiPost("coachUploadFile", { targetEmail: student.email, fileName: file.name, mimeType: file.type, fileData: base64, note: fileNote.trim() });
      if (r.ok) {
        setFileNote(""); onReload();
        if (file.type === "application/pdf") {
          setExtracting(true);
          setExtractMsg("");
          const er = await apiPost("coachExtractContractInfo", { targetEmail: student.email, fileData: base64, mimeType: file.type });
          if (er.ok) {
            applyExtracted(er.data);
            setExtractMsg("AIが契約書から読み取った内容をフォームに反映しました。内容を確認してから保存してください");
          } else {
            setExtractMsg("契約書の自動読み取りに失敗しました（手動で入力してください）");
          }
          setExtracting(false);
        }
      }
      else alert("アップロードに失敗しました: " + (r.error || ""));
    } catch (err) { alert("アップロードに失敗しました"); }
    setUploading(false);
    if (fileInputRef.current) fileInputRef.current.value = "";
  };

  const extractFromExisting = async (fileId) => {
    setExtracting(true);
    setExtractMsg("");
    const er = await apiPost("coachExtractFromExistingFile", { targetEmail: student.email, file_id: fileId });
    if (er.ok) {
      applyExtracted(er.data);
      setExtractMsg("AIが契約書から読み取った内容をフォームに反映しました。内容を確認してから保存してください");
    } else {
      setExtractMsg("契約書の読み取りに失敗しました: " + (er.error || ""));
    }
    setExtracting(false);
  };

  const deleteFile = async (fileId) => {
    if (!confirm("このファイルを削除しますか？")) return;
    const r = await apiPost("coachDeleteFile", { targetEmail: student.email, file_id: fileId });
    if (r.ok) onReload();
  };

  const syncStripe = async () => {
    setSyncingStripe(true);
    setStripeMsg("");
    // 「Stripe連携用メールアドレス」欄に入力しただけで保存ボタンを押していないと、
    // サーバー側には古い(空の)値のまま残り、生徒のログインメールで検索されて
    // 見つからなくなる。同期の前に必ず現在のフォーム内容を保存しておく
    await apiPost("coachSaveProfile", { targetEmail: student.email, ...form });
    const r = await api("coachSyncStripeOne", { targetEmail: student.email });
    setStripeMsg(r.ok ? "更新しました" : "同期に失敗しました: " + (r.error || ""));
    if (r.ok) onReload();
    setSyncingStripe(false);
    setTimeout(() => setStripeMsg(""), 3000);
  };

  return html`
    <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,alignItems:"start"}}>
      <div class="card">
        <div class="card-label">プロフィール</div>
        <label class="lbl">名前</label>
        <input class="inp" value=${form.name} onChange=${e=>set("name", e.target.value)} placeholder="例：山田太郎" style=${{marginBottom:12}}/>
        <label class="lbl">生年月日${age !== null && html` <span style=${{color:"var(--accent)",fontWeight:600}}>（${age}歳）</span>`}</label>
        <input type="date" class="inp" value=${form.birthdate} onChange=${e=>set("birthdate", e.target.value)} style=${{marginBottom:12}}/>
        <label class="lbl">性別</label>
        <select class="inp" value=${form.gender} onChange=${e=>set("gender", e.target.value)} style=${{marginBottom:12}}>
          ${GENDER_TYPES.map(t => html`<option key=${t.v} value=${t.v}>${t.l}</option>`)}
        </select>
        <label class="lbl">家族構成</label>
        <input class="inp" value=${form.family} onChange=${e=>set("family", e.target.value)} placeholder="例：配偶者・子2人" style=${{marginBottom:12}}/>
        <label class="lbl">お住まい</label>
        <input class="inp" value=${form.address} onChange=${e=>set("address", e.target.value)} placeholder="例：東京都〇〇区" style=${{marginBottom:12}}/>
        <label class="lbl">電話番号</label>
        <input class="inp" value=${form.phone} onChange=${e=>set("phone", e.target.value)} placeholder="例：090-1234-5678" style=${{marginBottom:12}}/>
        <label class="lbl">職業</label>
        <input class="inp" value=${form.occupation} onChange=${e=>set("occupation", e.target.value)} placeholder="例：会社員、経営者、学生など" style=${{marginBottom:12}}/>
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div>
            <label class="lbl">Instagram</label>
            <input class="inp" value=${form.instagram} onChange=${e=>set("instagram", e.target.value)} placeholder="@handle または URL"/>
          </div>
          <div>
            <label class="lbl">TikTok</label>
            <input class="inp" value=${form.tiktok} onChange=${e=>set("tiktok", e.target.value)} placeholder="@handle または URL"/>
          </div>
        </div>
        <label class="lbl">プロフィールメモ（性格・背景など自由記述）</label>
        <textarea class="txa" value=${form.profile_notes} onChange=${e=>set("profile_notes", e.target.value)} placeholder="コーチングに役立つ背景情報を自由に" style=${{marginBottom:0}}/>
      </div>

      <div>
        <div class="card">
          <div class="card-label">契約情報</div>
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <div>
              <label class="lbl">契約開始日</label>
              <input type="date" class="inp" value=${form.contract_start} onChange=${e=>set("contract_start", e.target.value)}/>
            </div>
            <div>
              <label class="lbl">契約終了日${contractDaysLeft !== null && html`
                <span style=${{color:contractDaysLeft<=30?"var(--red)":contractDaysLeft<=60?"var(--amber)":"var(--sub)",fontWeight:600}}> （残り${contractDaysLeft}日）</span>
              `}</label>
              <input type="date" class="inp" value=${form.contract_end} onChange=${e=>set("contract_end", e.target.value)}/>
            </div>
          </div>
          <label class="lbl">支払い方法</label>
          <select class="inp" value=${form.payment_type} onChange=${e=>set("payment_type", e.target.value)} style=${{marginBottom:12}}>
            ${PAYMENT_TYPES.map(t => html`<option key=${t.v} value=${t.v}>${t.l}</option>`)}
          </select>
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            <div>
              <label class="lbl">契約金額（円）</label>
              <input class="inp" type="number" value=${form.contract_amount} onChange=${e=>set("contract_amount", e.target.value)} placeholder="例：480000"/>
            </div>
            ${form.payment_type !== "lump" && html`
              <div>
                <label class="lbl">分割回数</label>
                <input class="inp" type="number" value=${form.installment_count} onChange=${e=>set("installment_count", e.target.value)} placeholder="例：12"/>
              </div>
            `}
          </div>
          <button class="btn" onClick=${save} disabled=${saving}>${saving ? "保存中..." : "保存する"}</button>
          ${savedMsg && html`<span style=${{fontSize:12,color:"var(--green)",marginLeft:10}}>${savedMsg}</span>`}
        </div>

        <div class="card">
          <div class="card-label">Stripe決済状況</div>
          ${p.stripe_synced_at ? html`
            <div style=${{fontSize:26,fontWeight:700,marginBottom:4}}>
              ${Number(p.stripe_total_paid || 0).toLocaleString()}<span style=${{fontSize:13,color:"var(--sub)",fontWeight:600}}> ${(p.stripe_currency||"jpy").toUpperCase()} 支払い済み</span>
            </div>
            <div style=${{fontSize:11,color:"var(--sub)",marginBottom:12}}>最終同期: ${p.stripe_synced_at}</div>
          ` : html`
            <div style=${{fontSize:13,color:"var(--sub)",marginBottom:12}}>まだ同期されていません</div>
          `}
          <button class="btn" onClick=${syncStripe} disabled=${syncingStripe}>${syncingStripe ? "同期中..." : "今すぐ同期"}</button>
          ${stripeMsg && html`<span style=${{fontSize:12,color:"var(--accent)",marginLeft:10}}>${stripeMsg}</span>`}
          <label class="lbl" style=${{marginTop:14}}>Stripe連携用メールアドレス（Stripe側の登録名・メールが違う場合のみ入力）</label>
          <input class="inp" value=${form.stripe_email} onChange=${e=>set("stripe_email", e.target.value)} placeholder="未入力なら生徒のメールアドレスで検索します"/>
        </div>

        <div class="card">
          <div class="card-label">決済リンク（この場でLINEに送る用）</div>
          ${!payLinkEditing && (payLinkApp || payLinkCoaching) ? html`
            <div style=${{display:"flex",flexDirection:"column",gap:8,marginBottom:10}}>
              ${payLinkApp && html`
                <button class="btn" style=${{textAlign:"left"}} onClick=${()=>copyLink(payLinkApp,"アプリのみ")}>
                  📋 アプリのみプランのリンクをコピー
                </button>`}
              ${payLinkCoaching && html`
                <button class="btn" style=${{textAlign:"left"}} onClick=${()=>copyLink(payLinkCoaching,"コーチング付き")}>
                  📋 コーチング付きプランのリンクをコピー
                </button>`}
            </div>
            ${copiedMsg && html`<div style=${{fontSize:12,color:"var(--green)",marginBottom:8}}>${copiedMsg}</div>`}
            <button style=${{fontSize:11.5,background:"none",border:"1px solid var(--border)",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit"}} onClick=${()=>setPayLinkEditing(true)}>リンクを編集</button>
          ` : html`
            <div style=${{fontSize:11.5,color:"var(--sub)",marginBottom:12}}>Stripeで作った決済リンクを一度登録すると、以降どのクライアント画面でもワンタップでコピーしてLINEに貼れます。</div>
            <label class="lbl">アプリのみプランのリンク（例：月額のPayment Link）</label>
            <input class="inp" value=${payLinkApp} onChange=${e=>setPayLinkApp(e.target.value)} placeholder="https://buy.stripe.com/..." style=${{marginBottom:10}}/>
            <label class="lbl">コーチング付きプランのリンク</label>
            <input class="inp" value=${payLinkCoaching} onChange=${e=>setPayLinkCoaching(e.target.value)} placeholder="https://buy.stripe.com/..." style=${{marginBottom:12}}/>
            <button class="btn" onClick=${savePayLinks}>リンクを保存</button>
          `}
        </div>

        <div class="card">
          <div class="card-label">契約書ファイル</div>
          <input class="inp" value=${fileNote} onChange=${e=>setFileNote(e.target.value)} placeholder="ファイルのメモ（任意・例：初回契約書）" style=${{marginBottom:10}}/>
          <input ref=${fileInputRef} type="file" onChange=${onFileChosen} disabled=${uploading} style=${{fontSize:12.5,marginBottom:14}}/>
          ${uploading && html`<div style=${{fontSize:12,color:"var(--sub)"}}>アップロード中...</div>`}
          ${extracting && html`<div style=${{fontSize:12,color:"var(--sub)"}}>AIが契約書の内容を読み取り中...</div>`}
          ${extractMsg && !extracting && html`<div style=${{fontSize:12,color:"var(--accent)",marginBottom:8}}>${extractMsg}</div>`}
          ${detail.files.length === 0 && html`<div style=${{fontSize:13,color:"var(--sub)"}}>まだファイルがありません</div>`}
          ${detail.files.map((f,i) => html`
            <div key=${f.file_id} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:i<detail.files.length-1?"1px solid var(--border)":"none"}}>
              <div style=${{minWidth:0}}>
                <a href=${f.file_url} target="_blank" style=${{fontSize:13,color:"var(--accent)",fontWeight:600,textDecoration:"none"}}>${f.file_name}</a>
                <div style=${{fontSize:11,color:"var(--sub)",marginTop:2}}>${f.note ? f.note + " · " : ""}${f.uploaded_at}</div>
              </div>
              <div style=${{display:"flex",gap:10,flexShrink:0,alignItems:"center"}}>
                ${/\.pdf$/i.test(f.file_name) && html`
                  <button onClick=${()=>extractFromExisting(f.file_id)} disabled=${extracting} style=${{background:"none",border:"none",color:"var(--accent)",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>AIに読み取らせる</button>
                `}
                <button onClick=${()=>deleteFile(f.file_id)} style=${{background:"none",border:"none",color:"var(--red)",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>削除</button>
              </div>
            </div>
          `)}
        </div>

        <div class="card">
          <div class="card-label">みんなの頑張り（コミュニティランキング）</div>
          <div style=${{fontSize:12.5,color:"var(--sub)",marginBottom:12}}>他の生徒と一緒にランキングに表示するかどうかを設定できます。オフにすると、この生徒はランキングに表示されなくなります（本人の記録・レポートには影響しません）。</div>
          <label style=${{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
            <input type="checkbox" checked=${showInCommunity} onChange=${toggleShowInCommunity} disabled=${savingCommunity} style=${{width:18,height:18}}/>
            <span style=${{fontSize:13,fontWeight:600}}>${showInCommunity ? "表示する" : "表示しない"}</span>
            ${savingCommunity && html`<span style=${{fontSize:11,color:"var(--sub)"}}>保存中...</span>`}
          </label>
        </div>
      </div>
    </div>
  `;
}

// Chatworkの連絡先一覧から、まだCRMに取り込んでいない相手を選んで取り込む。
// Chatwork APIはメールアドレスを返さないため、生徒ごとにメールアドレスだけ手入力する
function ChatworkImportModal({ onClose, onAddClient }) {
  const [contacts, setContacts] = useState(null);
  const [error, setError] = useState("");
  const [emails, setEmails] = useState({});
  const [addingId, setAddingId] = useState(null);
  const [addedIds, setAddedIds] = useState(() => new Set());

  useEffect(() => {
    api("coachListChatworkContacts").then(r => {
      if (r.ok) setContacts(r.data);
      else setError(r.error || "取得に失敗しました");
    });
  }, []);

  const setEmail = (id, v) => setEmails(e => ({ ...e, [id]: v }));

  const addOne = async (c) => {
    const email = (emails[c.chatwork_id] || "").trim();
    if (!email) return;
    setAddingId(c.chatwork_id);
    const r = await onAddClient(email, c.name, { chatwork_id: c.chatwork_id, chatwork_room_id: c.room_id });
    if (r.ok) setAddedIds(s => new Set([...s, c.chatwork_id]));
    else setError(r.error || "追加に失敗しました");
    setAddingId(null);
  };

  return html`
    <div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick=${onClose}>
      <div style=${{background:"var(--card)",borderRadius:14,width:560,maxHeight:"80vh",display:"flex",flexDirection:"column",padding:20}} onClick=${e=>e.stopPropagation()}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style=${{fontSize:15,fontWeight:700}}>Chatworkから取り込む</div>
          <button onClick=${onClose} style=${{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"var(--sub)"}}>×</button>
        </div>
        <div style=${{fontSize:11.5,color:"var(--sub)",marginBottom:14}}>Chatwork側にメールアドレスの情報がないため、生徒ごとにメールアドレスを入力してから追加してください。既に取り込み済みの相手は表示されません。</div>
        ${!contacts && !error && html`<div style=${{display:"flex",justifyContent:"center",padding:30}}><div class="spin"/></div>`}
        ${error && html`<div style=${{fontSize:12,color:"var(--red)",marginBottom:10}}>${error}</div>`}
        ${contacts && contacts.length === 0 && html`<div style=${{fontSize:13,color:"var(--sub)"}}>取り込める新しい連絡先はありません</div>`}
        <div style=${{overflowY:"auto",flex:1}}>
          ${contacts && contacts.map(c => html`
            <div key=${c.chatwork_id} style=${{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
              <div style=${{flex:"0 0 120px",fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title=${c.name}>${c.name}</div>
              <input class="inp" placeholder="メールアドレス" value=${emails[c.chatwork_id]||""} onChange=${e=>setEmail(c.chatwork_id, e.target.value)} disabled=${addedIds.has(c.chatwork_id)} style=${{flex:1,fontSize:12.5}}/>
              <button class="btn" style=${{fontSize:11.5,padding:"6px 12px",flexShrink:0}}
                onClick=${()=>addOne(c)}
                disabled=${addingId===c.chatwork_id || addedIds.has(c.chatwork_id) || !(emails[c.chatwork_id]||"").trim()}>
                ${addedIds.has(c.chatwork_id) ? "追加済み" : (addingId===c.chatwork_id ? "追加中..." : "追加")}
              </button>
            </div>
          `)}
        </div>
      </div>
    </div>
  `;
}

  ],
  "コーチング": [
    { id: "co_support",  q: "伴走者がいたら何が変わりそう？", hint: "本人の口から「サポートの価値」を言語化させる（自分で言った価値は否定できない）" },
    { id: "co_schedule", q: "週1の面談時間は確保できる？", hint: "現実的な受講イメージの確認。曜日・時間帯まで仮決めできると成約後スムーズ" },
    { id: "co_period",   q: "3ヶ月・6ヶ月・1年、どのイメージ？", hint: "期間の相場観を先に作る。目標の大きさと期間を紐付けて話す" },
  ],
  "経営者": [
    { id: "ex_team",     q: "チーム・会社の規模は？", hint: "従業員数・事業内容。時間経営の効果が波及する範囲を把握" },
    { id: "ex_hourly",   q: "ご自身の時給換算だといくらぐらい？", hint: "「その時給の時間が◯時間、△△に消えている」という提案の土台になる" },
    { id: "ex_delegate", q: "本当は手放したいのに手放せていない業務は？", hint: "委譲できない理由（暗黙知・属人化）→記録が資産になる話につなげる" },
  ],
};

const LEAD_STATUSES = ["予約前", "LINE登録", "予約済", "実施済", "アプリのみ", "コーチング", "見送り"];
const LEAD_STATUS_COLOR = {
  "予約前": "#9CA3AF", "LINE登録": "#06C755", "予約済": "#0891B2", "実施済": "#8B5CF6",
  "アプリのみ": "#22C55E", "コーチング": "#F59E0B", "見送り": "#EF4444"
};
function SessionManager() {
  const [leads, setLeads] = useState(null);
  const [editing, setEditing] = useState(null); // lead object being edited, or {} for new
  const [saving, setSaving] = useState(false);

  const reload = () => api("coachListLeads").then(r => { if (r.ok) setLeads(r.data); });
  useEffect(() => { reload(); }, []);

  const blank = () => ({ lead_id: "", name: "", contact: "", status: "予約前", memo: "", answersObj: {} });
  // シートのanswers列（JSON文字列）とsales_talk列を編集用オブジェクトに展開してから開く
  const openLead = (l) => {
    let answersObj = {};
    try { if (l.answers) answersObj = JSON.parse(l.answers); } catch (e) {}
    let salesTalk = null;
    try { if (l.sales_talk) salesTalk = JSON.parse(l.sales_talk); } catch (e) {}
    setEditing({ ...l, answersObj, salesTalk });
  };

  // ヒアリング回答（共通＋タイプ別）をQ&Aテキストに組み立ててAIに渡し、
  // この相手専用のセールストーク台本を生成する
  const [genLoading, setGenLoading] = useState(false);
  const [genError, setGenError] = useState("");
  const genTalk = async () => {
    const a = editing.answersObj || {};
    const type = a.lead_type || "未判定";
    const qaLines = [];
    SESSION_QUESTIONS.forEach(sec => sec.items.forEach(item => {
      if (a[item.id] && String(a[item.id]).trim()) qaLines.push("Q: " + item.q + "\nA: " + a[item.id]);
    }));
    (TYPE_QUESTIONS[type] || []).forEach(item => {
      if (a[item.id] && String(a[item.id]).trim()) qaLines.push("Q: " + item.q + "\nA: " + a[item.id]);
    });
    if (qaLines.length === 0) { setGenError("先にヒアリングの回答を1つ以上入力してください"); return; }
    setGenLoading(true); setGenError("");
    // 生成前に現在の回答を保存しておく（生成中に閉じても回答が消えないように）
    const payload = { ...editing, answers: JSON.stringify(a) };
    delete payload.answersObj; delete payload.salesTalk;
    const saved = await apiPost("coachSaveLead", payload);
    const leadId = editing.lead_id || (saved.ok ? saved.lead_id : "");
    if (leadId && !editing.lead_id) setField("lead_id", leadId);
    const r = await apiPost("coachGenerateSalesTalk", { lead_id: leadId, name: editing.name, type, qa: qaLines.join("\n\n") });
    setGenLoading(false);
    if (r.ok) setEditing(e => ({ ...e, salesTalk: r.data }));
    else setGenError(r.error || "生成に失敗しました");
  };
  const save = async () => {
    if (!editing.name.trim()) return;
    setSaving(true);
    const payload = { ...editing, answers: JSON.stringify(editing.answersObj || {}) };
    delete payload.answersObj;
    const r = await apiPost("coachSaveLead", payload);
    setSaving(false);
    if (r.ok) { setEditing(null); reload(); }
  };
  const setAnswer = (id, v) => setEditing(e => ({ ...e, answersObj: { ...(e.answersObj || {}), [id]: v } }));
  const answeredCount = (l) => {
    try { const a = JSON.parse(l.answers || "{}"); return Object.entries(a).filter(([k, v]) => k !== "lead_type" && String(v).trim()).length; } catch (e) { return 0; }
  };
  const typeOf = (l) => {
    try { return JSON.parse(l.answers || "{}").lead_type || null; } catch (e) { return null; }
  };
  const totalQuestions = SESSION_QUESTIONS.reduce((n, s) => n + s.items.length, 0);
  const del = async (lead) => {
    if (!confirm(lead.name + " さんをセッション管理から削除しますか？")) return;
    const r = await apiPost("coachDeleteLead", { lead_id: lead.lead_id });
    if (r.ok) reload();
  };

  const setField = (k, v) => setEditing(e => ({ ...e, [k]: v }));

  return html`
    <div style=${{height:"100%",overflowY:"auto",padding:"24px 28px"}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <div style=${{fontSize:20,fontWeight:800}}>🗓 セッション管理</div>
        <button class="btn" onClick=${()=>setEditing(blank())}>＋ 新規リードを追加</button>
      </div>
      <div style=${{fontSize:13,color:"var(--sub)",marginBottom:20}}>SNSで反応してくれた見込み客を、予約→実施→仕分けまで管理します。成約したら「新しいクライアントを追加」で正式登録してください。</div>

      ${editing && html`
        <div class="card" style=${{marginBottom:20,border:"1.5px solid var(--accent)"}}>
          <div class="card-label">${editing.lead_id ? "リードを編集" : "新規リード"}</div>
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <div><label class="lbl">名前</label><input class="inp" value=${editing.name} onChange=${e=>setField("name",e.target.value)} placeholder="例：山田太郎"/></div>
            <div><label class="lbl">連絡先（LINE名・メール等）</label><input class="inp" value=${editing.contact} onChange=${e=>setField("contact",e.target.value)} placeholder="任意"/></div>
          </div>
          <label class="lbl">ステータス</label>
          <div style=${{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
            ${LEAD_STATUSES.map(s=>html`
              <button key=${s} onClick=${()=>setField("status",s)}
                style=${{padding:"6px 12px",borderRadius:20,border:`1.5px solid ${editing.status===s?LEAD_STATUS_COLOR[s]:"var(--border)"}`,background:editing.status===s?LEAD_STATUS_COLOR[s]:"transparent",color:editing.status===s?"#fff":"var(--sub)",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>${s}</button>
            `)}
          </div>
          <label class="lbl">見込みタイプ（ヒアリングしながら仕分ける。タイプ別の質問とセールストークが変わります）</label>
          <div style=${{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
            ${LEAD_TYPES.map(t=>html`
              <button key=${t} onClick=${()=>setAnswer("lead_type",t)}
                style=${{padding:"6px 12px",borderRadius:20,border:`1.5px solid ${(editing.answersObj||{}).lead_type===t||(!((editing.answersObj||{}).lead_type)&&t==="未判定")?LEAD_TYPE_COLOR[t]:"var(--border)"}`,background:(editing.answersObj||{}).lead_type===t||(!((editing.answersObj||{}).lead_type)&&t==="未判定")?LEAD_TYPE_COLOR[t]:"transparent",color:(editing.answersObj||{}).lead_type===t||(!((editing.answersObj||{}).lead_type)&&t==="未判定")?"#fff":"var(--sub)",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>${t}</button>
            `)}
          </div>
          <div class="card-label" style=${{marginTop:6}}>ヒアリングシート（上から順に聞けばセッションの流れになります）</div>
          ${SESSION_QUESTIONS.map(sec => html`
            <div key=${sec.section} style=${{marginBottom:14}}>
              <div style=${{fontSize:12.5,fontWeight:800,color:"var(--accent)",marginBottom:8,paddingBottom:4,borderBottom:"1px solid var(--border)"}}>${sec.section}</div>
              ${sec.items.map(item => html`
                <div key=${item.id} style=${{marginBottom:10}}>
                  <label class="lbl">${item.q}</label>
                  <div style=${{fontSize:11,color:"var(--sub)",marginBottom:4}}>💡 ${item.hint}</div>
                  <textarea class="txa" rows="2" value=${(editing.answersObj||{})[item.id]||""}
                    onChange=${e=>setAnswer(item.id, e.target.value)} style=${{minHeight:44}}/>
                </div>
              `)}
            </div>
          `)}
          ${(() => {
            const type = (editing.answersObj||{}).lead_type || "未判定";
            const extras = TYPE_QUESTIONS[type];
            if (!extras) return null;
            return html`
              <div style=${{marginBottom:14}}>
                <div style=${{fontSize:12.5,fontWeight:800,color:LEAD_TYPE_COLOR[type],marginBottom:8,paddingBottom:4,borderBottom:"1px solid var(--border)"}}>＋ ${type}タイプの深掘り質問</div>
                ${extras.map(item => html`
                  <div key=${item.id} style=${{marginBottom:10}}>
                    <label class="lbl">${item.q}</label>
                    <div style=${{fontSize:11,color:"var(--sub)",marginBottom:4}}>💡 ${item.hint}</div>
                    <textarea class="txa" rows="2" value=${(editing.answersObj||{})[item.id]||""}
                      onChange=${e=>setAnswer(item.id, e.target.value)} style=${{minHeight:44}}/>
                  </div>
                `)}
              </div>
            `;
          })()}
          <label class="lbl">フリーメモ（質問に収まらない所感など）</label>
          <textarea class="txa" value=${editing.memo} onChange=${e=>setField("memo",e.target.value)} placeholder="セッションの所感・人柄・次回に向けた作戦など" style=${{marginBottom:12}}/>

          <!-- ヒアリング内容からこの相手専用のセールストークをAIが生成 -->
          <div style=${{background:"var(--bg)",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
              <div>
                <div style=${{fontSize:13,fontWeight:800}}>💬 セールストークを生成</div>
                <div style=${{fontSize:11.5,color:"var(--sub)",marginTop:2}}>ヒアリング回答とタイプをもとに、この方専用のトーク台本をAIが作ります（回答は自動保存されます）</div>
              </div>
              <button class="btn" style=${{flexShrink:0,fontSize:12}} onClick=${genTalk} disabled=${genLoading}>${genLoading?"生成中…(30秒ほど)":editing.salesTalk?"作り直す":"生成する"}</button>
            </div>
            ${genError && html`<div style=${{fontSize:12,color:"var(--red)",marginTop:8}}>${genError}</div>`}
            ${editing.salesTalk && html`
              <div style=${{marginTop:12,borderTop:"1px solid var(--border)",paddingTop:12}}>
                ${editing.salesTalk.judged_type && html`<div style=${{fontSize:12,marginBottom:10}}><b>🎯 判定タイプ:</b> ${editing.salesTalk.judged_type}</div>`}
                ${[["① 入り方（共感と課題の要約）",editing.salesTalk.opening],["② 橋渡し（放置コスト→理想）",editing.salesTalk.bridge],["③ プラン提示",editing.salesTalk.pitch]].map(([label,text])=>text&&html`
                  <div key=${label} style=${{marginBottom:10}}>
                    <div style=${{fontSize:11.5,fontWeight:700,color:"var(--accent)",marginBottom:3}}>${label}</div>
                    <div style=${{fontSize:13,lineHeight:1.8,whiteSpace:"pre-wrap"}}>${text}</div>
                  </div>
                `)}
                ${Array.isArray(editing.salesTalk.objections)&&editing.salesTalk.objections.length>0&&html`
                  <div style=${{marginBottom:10}}>
                    <div style=${{fontSize:11.5,fontWeight:700,color:"var(--accent)",marginBottom:3}}>④ 想定される反論と切り返し</div>
                    ${editing.salesTalk.objections.map((o,i)=>html`
                      <div key=${i} style=${{fontSize:13,lineHeight:1.7,marginBottom:6}}>
                        <div style=${{fontWeight:600}}>「${o.objection}」</div>
                        <div style=${{color:"var(--sub)"}}>→ ${o.response}</div>
                      </div>
                    `)}
                  </div>
                `}
                ${editing.salesTalk.closing && html`
                  <div style=${{marginBottom:10}}>
                    <div style=${{fontSize:11.5,fontWeight:700,color:"var(--accent)",marginBottom:3}}>⑤ クロージング</div>
                    <div style=${{fontSize:13,lineHeight:1.8,whiteSpace:"pre-wrap"}}>${editing.salesTalk.closing}</div>
                  </div>
                `}
                ${editing.salesTalk.caution && html`
                  <div style=${{fontSize:12,color:"#B45309",background:"#FFFBEB",borderRadius:8,padding:"8px 10px"}}>⚠️ ${editing.salesTalk.caution}</div>
                `}
              </div>
            `}
          </div>

          <div style=${{display:"flex",gap:8}}>
            <button class="btn" onClick=${save} disabled=${saving||!editing.name.trim()}>${saving?"保存中...":"保存する"}</button>
            <button style=${{background:"none",border:"1px solid var(--border)",borderRadius:8,padding:"0 16px",cursor:"pointer",fontFamily:"inherit"}} onClick=${()=>setEditing(null)}>キャンセル</button>
          </div>
        </div>
      `}

      ${leads === null && html`<div style=${{display:"flex",justifyContent:"center",padding:40}}><div class="spin"/></div>`}
      ${leads && leads.length === 0 && !editing && html`<div style=${{fontSize:14,color:"var(--sub)",textAlign:"center",padding:40}}>まだリードがありません。「＋新規リードを追加」から始めましょう。</div>`}

      ${leads && LEAD_STATUSES.map(status => {
        const group = leads.filter(l => l.status === status);
        if (group.length === 0) return null;
        return html`
          <div key=${status} style=${{marginBottom:22}}>
            <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <span style=${{width:9,height:9,borderRadius:"50%",background:LEAD_STATUS_COLOR[status]}}></span>
              <span style=${{fontSize:13,fontWeight:700}}>${status}</span>
              <span style=${{fontSize:12,color:"var(--sub)"}}>${group.length}件</span>
            </div>
            ${group.map(l => html`
              <div key=${l.lead_id} class="card" style=${{marginBottom:8,cursor:"pointer"}} onClick=${()=>openLead(l)}>
                <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
                  <div style=${{flex:1}}>
                    <div style=${{fontSize:15,fontWeight:700,marginBottom:2}}>
                      ${l.name}${l.contact?html`<span style=${{fontSize:12,color:"var(--sub)",fontWeight:400,marginLeft:8}}>${l.contact}</span>`:""}
                      <span style=${{fontSize:11,fontWeight:600,marginLeft:8,padding:"2px 8px",borderRadius:10,background:answeredCount(l)>=totalQuestions?"#DCFCE7":"var(--bg)",color:answeredCount(l)>=totalQuestions?"#16A34A":"var(--sub)"}}>ヒアリング ${answeredCount(l)}/${totalQuestions}</span>
                      ${typeOf(l)&&typeOf(l)!=="未判定"&&html`<span style=${{fontSize:11,fontWeight:700,marginLeft:6,padding:"2px 8px",borderRadius:10,background:LEAD_TYPE_COLOR[typeOf(l)],color:"#fff"}}>${typeOf(l)}</span>`}
                      ${l.sales_talk&&html`<span style=${{fontSize:11,fontWeight:600,marginLeft:6,padding:"2px 8px",borderRadius:10,background:"var(--accent-l, #CFFAFE)",color:"var(--accent)"}}>💬 トーク済</span>`}
                    </div>
                    ${l.memo && html`<div style=${{fontSize:13,color:"var(--sub)",lineHeight:1.6,whiteSpace:"pre-wrap"}}>${l.memo}</div>`}
                  </div>
                  <button onClick=${e=>{e.stopPropagation();del(l);}} style=${{background:"none",border:"none",color:"var(--sub)",fontSize:11.5,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>削除</button>
                </div>
              </div>
            `)}
          </div>
        `;
      })}
    </div>
  `;
}

// ── 管理者ダッシュボード: 全コーチ・全生徒を横断した数字 ──
function AdminOverview() {
  const [data, setData] = useState(null);
  const [error, setError] = useState("");
  const [backfilling, setBackfilling] = useState(false);
  const [backfillMsg, setBackfillMsg] = useState("");
  const [health, setHealth] = useState(null);
  const [healthLoading, setHealthLoading] = useState(false);
  const runHealth = async () => {
    setHealthLoading(true);
    const r = await api("adminSystemHealth", { deep: "1" });
    if (r.ok) setHealth(r.data); else setHealth({ overall: "fail", checks: [{ name: "実行", status: "fail", detail: r.error || "失敗" }] });
    setHealthLoading(false);
  };

  useEffect(() => {
    api("adminGetOverview").then(r => {
      if (r.ok) setData(r.data);
      else setError(r.error || "取得に失敗しました");
    });
  }, []);

  const runBackfill = async () => {
    setBackfilling(true);
    setBackfillMsg("");
    const r = await api("adminBackfillReportReasons");
    if (r.ok) {
      setBackfillMsg(`${r.data.updated}件にコメントを追加しました（内訳なしでスキップ${r.data.skippedNoBreakdown}件、エラー${r.data.skippedError}件）`);
    } else {
      setBackfillMsg(r.error || "失敗しました");
    }
    setBackfilling(false);
  };

  if (error) return html`<div style=${{padding:28,color:"var(--red)",fontSize:13}}>${error}</div>`;
  if (!data) return html`<div style=${{display:"flex",justifyContent:"center",padding:60}}><div class="spin"/></div>`;

  return html`
    <div style=${{height:"100%",overflowY:"auto",padding:"20px 28px"}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style=${{fontSize:17,fontWeight:700}}>管理者ダッシュボード</div>
        <div style=${{display:"flex",alignItems:"center",gap:10}}>
          ${backfillMsg && html`<span style=${{fontSize:11.5,color:"var(--sub)"}}>${backfillMsg}</span>`}
          <button class="btn" style=${{fontSize:12}} onClick=${runBackfill} disabled=${backfilling}>${backfilling ? "処理中..." : "過去レポートに採点コメントを追加"}</button>
        </div>
      </div>

      <div style=${{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:16,marginBottom:20}}>
        <div class="card">
          <div class="card-label">累計売上</div>
          <div style=${{fontSize:22,fontWeight:700}}>${data.totalRevenue.toLocaleString()}<span style=${{fontSize:12,color:"var(--sub)"}}> ${data.revenueCurrency.toUpperCase()}</span></div>
        </div>
        <div class="card">
          <div class="card-label">アクティブ生徒数</div>
          <div style=${{fontSize:22,fontWeight:700}}>${data.activeCount !== undefined ? data.activeCount : data.activeStudentCount}<span style=${{fontSize:12,color:"var(--sub)"}}> 人</span></div>
          ${data.untethered && data.untethered.count > 0 && html`<div style=${{fontSize:11,color:"var(--sub)",marginTop:2}}>+ 登録のみ ${data.untethered.count}人（未定着）</div>`}
        </div>
        <div class="card">
          <div class="card-label">コーチ数</div>
          <div style=${{fontSize:22,fontWeight:700}}>${data.coachCount}<span style=${{fontSize:12,color:"var(--sub)"}}> 人</span></div>
        </div>
        <div class="card">
          <div class="card-label">平均レポートスコア</div>
          <div style=${{fontSize:22,fontWeight:700}}>${data.avgScore !== null ? data.avgScore : "―"}<span style=${{fontSize:12,color:"var(--sub)"}}> / 100</span></div>
        </div>
      </div>

      <div class="card" style=${{marginBottom:20}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:health?10:0}}>
          <div>
            <div class="card-label" style=${{marginBottom:2}}>システム診断（アプリ全体のヘルスチェック）</div>
            <div style=${{fontSize:11.5,color:"var(--sub)"}}>バックエンド・シート・API鍵・LINE・トリガー・フロント配信・データ鮮度を点検します</div>
          </div>
          <button class="btn" style=${{fontSize:12,flexShrink:0}} onClick=${runHealth} disabled=${healthLoading}>${healthLoading?"診断中...":"診断する"}</button>
        </div>
        ${health && html`
          <div style=${{fontSize:13,fontWeight:700,marginBottom:8,color:health.overall==="ok"?"var(--green,#3aa675)":health.overall==="fail"?"var(--red)":"#c98500"}}>
            ${health.overall==="ok"?"✅ 異常なし":health.overall==="fail"?"🔴 異常あり":"🟡 要注意"}
            ${health.failCount!==undefined?html` <span style=${{fontWeight:400,color:"var(--sub)"}}>（失敗${health.failCount}・注意${health.warnCount}）</span>`:""}
          </div>
          ${health.checks.map((c,i)=>html`
            <div key=${i} style=${{display:"flex",gap:8,alignItems:"flex-start",padding:"5px 0",borderTop:i>0?"1px solid var(--border)":"none",fontSize:12.5}}>
              <span style=${{flexShrink:0}}>${c.status==="ok"?"🟢":c.status==="fail"?"🔴":"🟡"}</span>
              <span style=${{flexShrink:0,fontWeight:600,minWidth:120}}>${c.name}</span>
              <span style=${{color:"var(--sub)"}}>${c.detail}</span>
            </div>
          `)}
        `}
      </div>
      ${data.ops && html`
        <div style=${{fontSize:13,fontWeight:700,color:"var(--sub)",margin:"4px 0 10px"}}>運営メトリクス</div>`}
      ${data.ops && html`
        <div style=${{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:16,marginBottom:16}}>
          <div class="card">
            <div class="card-label">満足度（直近90日）</div>
            <div style=${{fontSize:22,fontWeight:700}}>${data.ops.survey.avgSatisfaction !== null ? data.ops.survey.avgSatisfaction : "―"}<span style=${{fontSize:12,color:"var(--sub)"}}> / 5（${data.ops.survey.count90d}件）</span></div>
          </div>
          <div class="card">
            <div class="card-label">直近7日の記録</div>
            <div style=${{fontSize:22,fontWeight:700}}>${data.ops.weeklyLogCount}<span style=${{fontSize:12,color:"var(--sub)"}}> 件 / ${data.ops.weeklyLoggers}人</span></div>
          </div>
          <div class="card">
            <div class="card-label">LINE連携率</div>
            <div style=${{fontSize:22,fontWeight:700}}>${data.ops.segments.core.lineLinked + data.ops.segments.student.lineLinked}<span style=${{fontSize:12,color:"var(--sub)"}}> / ${data.ops.segments.core.registered + data.ops.segments.student.registered}人</span></div>
          </div>
          <div class="card">
            <div class="card-label">レポート欠落（7日）</div>
            <div style=${{fontSize:22,fontWeight:700,color:data.ops.missingReports7d>0?"var(--red)":"inherit"}}>${data.ops.missingReports7d}<span style=${{fontSize:12,color:"var(--sub)"}}> 件</span></div>
          </div>
        </div>
        <div class="card" style=${{marginBottom:16}}>
          <div class="card-label">セグメント別の獲得・継続</div>
          <table style=${{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
            <thead>
              <tr style=${{textAlign:"left",color:"var(--sub)",fontSize:11}}>
                <th style=${{padding:"6px 8px",fontWeight:600}}>セグメント</th>
                <th style=${{padding:"6px 8px",fontWeight:600}}>登録</th>
                <th style=${{padding:"6px 8px",fontWeight:600}}>記録経験あり</th>
                <th style=${{padding:"6px 8px",fontWeight:600}}>未記録</th>
                <th style=${{padding:"6px 8px",fontWeight:600}}>3日以内</th>
                <th style=${{padding:"6px 8px",fontWeight:600}}>7日以内</th>
                <th style=${{padding:"6px 8px",fontWeight:600}}>LINE連携</th>
              </tr>
            </thead>
            <tbody>
              ${[["コーチング（core）",data.ops.segments.core],["学生（for Student）",data.ops.segments.student]].map(([label,s])=>html`
                <tr key=${label} style=${{borderTop:"1px solid var(--border)"}}>
                  <td style=${{padding:"8px"}}>${label}</td>
                  <td style=${{padding:"8px"}}>${s.registered}人</td>
                  <td style=${{padding:"8px"}}>${s.everLogged}人（${s.registered?Math.round(s.everLogged/s.registered*100):0}%）</td>
                  <td style=${{padding:"8px",color:s.neverLogged>0?"var(--red)":"var(--sub)"}}>${s.neverLogged}人</td>
                  <td style=${{padding:"8px"}}>${s.active3}人</td>
                  <td style=${{padding:"8px"}}>${s.active7}人（${s.everLogged?Math.round(s.active7/s.everLogged*100):0}%）</td>
                  <td style=${{padding:"8px"}}>${s.lineLinked}人（${s.registered?Math.round(s.lineLinked/s.registered*100):0}%）</td>
                </tr>
              `)}
            </tbody>
          </table>
        </div>
        <div class="card" style=${{marginBottom:20}}>
          <div class="card-label">アンケートの声（直近）</div>
          ${data.ops.survey.comments.length===0
            ? html`<div style=${{fontSize:12.5,color:"var(--sub)"}}>まだ回答がありません。アプリ側で月1回のアンケートが表示されます。</div>`
            : data.ops.survey.comments.map((c,i)=>html`
              <div key=${i} style=${{padding:"8px 0",borderTop:i>0?"1px solid var(--border)":"none",fontSize:12.5}}>
                <span style=${{color:"var(--sub)"}}>${c.date} ・ ${c.name} ・ ${"★".repeat(c.satisfaction||0)}</span>
                <div style=${{marginTop:2}}>${c.comment}</div>
              </div>
            `)}
        </div>
      `}
      <div class="card" style=${{marginBottom:20}}>
        <div class="card-label">順調な生徒の割合（参考値）</div>
        <div style=${{fontSize:11.5,color:"var(--sub)",marginBottom:10}}>アプリに「目標達成」を直接記録する仕組みがないため、直近レポートスコア75点以上を「順調」の目安として計算しています。厳密な達成率ではありません。</div>
        <div style=${{fontSize:22,fontWeight:700}}>${data.onTrackRate !== null ? data.onTrackRate + "%" : "―"}
          <span style=${{fontSize:12,color:"var(--sub)",fontWeight:400}}> (${data.onTrackCount}/${data.scoredCount}人)</span>
        </div>
      </div>

      <div class="card" style=${{marginBottom:20}}>
        <div class="card-label">コーチ別の状況</div>
        ${data.coachStats.length === 0 && html`<div style=${{fontSize:13,color:"var(--sub)"}}>コーチが登録されていません</div>`}
        <table style=${{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
          <thead>
            <tr style=${{textAlign:"left",color:"var(--sub)",fontSize:11}}>
              <th style=${{padding:"6px 8px",fontWeight:600}}>コーチ</th>
              <th style=${{padding:"6px 8px",fontWeight:600}}>担当生徒数</th>
              <th style=${{padding:"6px 8px",fontWeight:600}}>平均スコア</th>
              <th style=${{padding:"6px 8px",fontWeight:600}}>売上</th>
              <th style=${{padding:"6px 8px",fontWeight:600}}>最終コーチングログ</th>
            </tr>
          </thead>
          <tbody>
            ${data.coachStats.map(c => html`
              <tr key=${c.coachEmail} style=${{borderTop:"1px solid var(--border)"}}>
                <td style=${{padding:"8px"}}>${c.coachName}</td>
                <td style=${{padding:"8px"}}>${c.studentCount}人</td>
                <td style=${{padding:"8px"}}>${c.avgScore !== null ? c.avgScore + "点" : "―"}</td>
                <td style=${{padding:"8px"}}>${c.revenue.toLocaleString()}円</td>
                <td style=${{padding:"8px",color:"var(--sub)"}}>${c.lastCoachingDate ? fmtDate(c.lastCoachingDate) : "なし"}</td>
              </tr>
            `)}
          </tbody>
        </table>
      </div>

      <div class="card">
        <div class="card-label">生徒別の状況（アクティブのみ・ステータススコア順）</div>
        <table style=${{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
          <thead>
            <tr style=${{textAlign:"left",color:"var(--sub)",fontSize:11}}>
              <th style=${{padding:"6px 8px",fontWeight:600}}>生徒</th>
              <th style=${{padding:"6px 8px",fontWeight:600}}>担当コーチ</th>
              <th style=${{padding:"6px 8px",fontWeight:600}}>ステータス</th>
              <th style=${{padding:"6px 8px",fontWeight:600}}>直近スコア</th>
              <th style=${{padding:"6px 8px",fontWeight:600}}>最終記録</th>
              <th style=${{padding:"6px 8px",fontWeight:600}}>支払い済み</th>
            </tr>
          </thead>
          <tbody>
            ${data.students.map(s => html`
              <tr key=${s.email} style=${{borderTop:"1px solid var(--border)"}}>
                <td style=${{padding:"8px"}}>${s.name}</td>
                <td style=${{padding:"8px",color:"var(--sub)"}}>${s.coachEmail || "未割当"}</td>
                <td style=${{padding:"8px"}}>${s.statusScore}/100</td>
                <td style=${{padding:"8px"}}>${s.latestScore !== null ? s.latestScore + "点" : "―"}</td>
                <td style=${{padding:"8px",color:"var(--sub)"}}>${s.lastLogDate ? fmtDate(s.lastLogDate) : "記録なし"}</td>
                <td style=${{padding:"8px"}}>${s.stripeTotalPaid.toLocaleString()}円</td>
              </tr>
            `)}
          </tbody>
        </table>
        ${data.untethered && data.untethered.count > 0 && html`
          <details style=${{marginTop:12,fontSize:12}}>
            <summary style=${{cursor:"pointer",color:"var(--sub)"}}>登録のみ・未定着 ${data.untethered.count}人（うち学生${data.untethered.studentCount}人）— 記録もLINE連携もなし</summary>
            <div style=${{marginTop:8,color:"var(--sub)",lineHeight:1.8}}>
              ${data.untethered.names.map(n => (n.cohort ? "🎓" : "💼") + n.name).join(" / ")}
            </div>
          </details>
        `}
      </div>
    </div>
  `;
}

function App() {
  const [coach, setCoach] = useState(COACH_EMAIL);
  const [students, setStudents] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const [selected, setSelected] = useState(null);
  const [showAdmin, setShowAdmin] = useState(false);
  const [showSessions, setShowSessions] = useState(false);
  const [chatworkImportOpen, setChatworkImportOpen] = useState(false);

  const refreshStudents = () => api("coachGetStudents").then(r => { if (r.ok) { setStudents(r.data); setIsAdmin(!!r.isAdmin); } });

  useEffect(() => {
    if (!COACH_EMAIL) return;
    refreshStudents().then(() => {}).catch(()=>{});
  }, []);

  const logout = () => {
    localStorage.removeItem("jiroku_coach_email");
    COACH_EMAIL = null; setCoach(null); setStudents(null); setSelected(null);
  };

  const addClient = async (email, name, extra) => {
    const r = await api("coachAddClient", { email, name, ...(extra || {}) });
    if (r.ok) await refreshStudents();
    return r;
  };

  if (!coach) return html`<${LoginScreen} onLogin=${(email, list, admin) => { setCoach(email); setStudents(list); setIsAdmin(!!admin); }}/>`;
  if (!students) return html`<div style=${{display:"flex",justifyContent:"center",alignItems:"center",height:"100%"}}><div class="spin"/></div>`;

  return html`
    <div style=${{display:"flex",height:"100%"}}>
      <${Sidebar} students=${students} selectedEmail=${selected?.email}
        onSelect=${(s)=>{setSelected(s); setShowAdmin(false); setShowSessions(false);}} onLogout=${logout} coach=${coach}
        onAddClient=${addClient} onOpenChatworkImport=${()=>setChatworkImportOpen(true)}
        isAdmin=${isAdmin} showAdmin=${showAdmin} onShowAdmin=${()=>{setShowAdmin(true); setShowSessions(false); setSelected(null);}}
        showSessions=${showSessions} onShowSessions=${()=>{setShowSessions(true); setShowAdmin(false); setSelected(null);}}/>
      <main style=${{flex:1,overflow:"hidden",background:"var(--bg)"}}>
        ${showSessions
          ? html`<${SessionManager}/>`
          : showAdmin
          ? html`<${AdminOverview}/>`
          : selected
            ? html`<${StudentMain} key=${selected.email} student=${selected} onNoteSaved=${refreshStudents}/>`
            : html`<div style=${{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"var(--sub)",fontSize:14}}>左の一覧から生徒を選択してください</div>`}
      </main>
      ${chatworkImportOpen && html`<${ChatworkImportModal} onClose=${()=>setChatworkImportOpen(false)} onAddClient=${addClient}/>`}
    </div>
  `;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
