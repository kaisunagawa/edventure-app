<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JIROKU COACH</title>
  <meta name="theme-color" content="#FAFAF9" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#101417" media="(prefers-color-scheme: dark)" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/htm/dist/htm.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FAFAF9; --card: #FFFFFF; --border: #E7E5E4;
      --text: #1C1917; --sub: #78716C;
      --accent: #0891B2; --accent-l: #ECFEFF;
      --green: #16A34A; --amber: #D97706; --red: #DC2626;
      --hero1: #0891B2; --hero2: #0e7490;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101417; --card: #1A2025; --border: #2A3138;
        --text: #F2F0EF; --sub: #9CA3AF;
        --accent: #22B8D4; --accent-l: #103240;
        --hero1: #0B4A5A; --hero2: #093642;
      }
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'DM Sans', -apple-system, "Hiragino Sans", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
    .card-label { font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 12px; letter-spacing: .02em; text-transform: uppercase; }
    .btn { display: inline-block; padding: 10px 18px; border: none; border-radius: 10px; background: var(--accent); color: #fff; font-size: 13.5px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn:disabled { opacity: .5; cursor: default; }
    .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .inp, .txa, select.inp { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 9px; background: var(--bg); color: var(--text); font-size: 13.5px; font-family: inherit; outline: none; }
    .inp:focus, .txa:focus { border-color: var(--accent); }
    .txa { resize: vertical; min-height: 70px; line-height: 1.6; }
    .lbl { display: block; font-size: 11.5px; font-weight: 600; color: var(--sub); margin-bottom: 5px; }
    .spin { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tab { padding: 8px 14px; border-radius: 8px; border: none; background: none; color: var(--sub); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .tab.on { background: var(--accent-l); color: var(--accent); }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const html = htm.bind(React.createElement);
const { useState, useEffect, useRef, useMemo } = React;

const GAS_URL = "https://script.google.com/macros/s/AKfycbzJ-QEpPVnmp-LFU5Jxww4VFP1qaseMtwCrzKxAA6ZULr1y3h_UeKzVdhHnl5ze57U/exec";
const GOOGLE_CLIENT_ID = "476804060858-n3afj7ipmc81vq8cq71u0u3jdpolshea.apps.googleusercontent.com";

let COACH_EMAIL = localStorage.getItem("jiroku_coach_email") || null;

async function api(action, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set("action", action);
  url.searchParams.set("coachEmail", COACH_EMAIL || "");
  Object.entries(params).forEach(([k, v]) => { if (v != null) url.searchParams.set(k, String(v)); });
  try { const r = await fetch(url.toString(), { redirect: "follow" }); return await r.json(); }
  catch { return { ok: false, error: "network" }; }
}
// POSTはボディが大きくなり得る操作（ファイルアップロード等）用。
// GAS未対応環境の負荷を避けるためtext/plainで送る
async function apiPost(action, body = {}) {
  try {
    const r = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action, coachEmail: COACH_EMAIL, ...body })
    });
    return await r.json();
  } catch { return { ok: false, error: "network" }; }
}
const fileToBase64 = file => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => resolve(reader.result.split(",")[1]);
  reader.onerror = reject;
  reader.readAsDataURL(file);
});

const fmtDate = d => {
  const dt = new Date(String(d).substring(0,10) + "T00:00:00");
  return isNaN(dt) ? String(d) : dt.toLocaleDateString("ja-JP", { month: "numeric", day: "numeric", weekday: "short" });
};
const daysAgo = d => {
  if (!d) return null;
  return Math.floor((new Date() - new Date(String(d).substring(0,10) + "T00:00:00")) / 86400000);
};

function loginWithGoogle(onEmail, onError) {
  if (!window.google?.accounts?.oauth2) { onError("Googleログインの読み込み中です。少し待ってからもう一度お試しください"); return; }
  try {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: "openid email profile",
      callback: async (t) => {
        if (t.error || !t.access_token) { onError("ログインに失敗しました"); return; }
        try {
          const info = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", { headers: { Authorization: "Bearer " + t.access_token } }).then(r => r.json());
          if (info.email) onEmail(info.email);
          else onError("メールアドレスを取得できませんでした");
        } catch { onError("ログインに失敗しました"); }
      },
      error_callback: () => onError("ログインがキャンセルされました"),
    });
    client.requestAccessToken();
  } catch { onError("ログインに失敗しました"); }
}

function LoginScreen({ onLogin }) {
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const signIn = () => {
    setLoading(true); setError("");
    loginWithGoogle(async (email) => {
      COACH_EMAIL = email;
      const r = await api("coachGetStudents");
      if (r.ok) {
        localStorage.setItem("jiroku_coach_email", email);
        onLogin(email, r.data);
      } else {
        COACH_EMAIL = null;
        setError(r.error === "not a coach" ? "このアカウントはコーチとして登録されていません" : "確認に失敗しました。もう一度お試しください");
      }
      setLoading(false);
    }, (msg) => { setError(msg); setLoading(false); });
  };
  return html`
    <div style=${{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16}}>
      <svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg"><circle cx="36" cy="36" r="36" fill="#0891B2"/><circle cx="36" cy="36" r="25" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4.5"/><path d="M36 11 A25 25 0 1 1 14.5 50" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/><circle cx="36" cy="36" r="15" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/><line x1="36" y1="36" x2="36" y2="25" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><line x1="36" y1="36" x2="43" y2="41" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="36" cy="36" r="2" fill="#fff"/></svg>
      <div style=${{fontSize:24,fontWeight:800,letterSpacing:"-.3px"}}>JIROKU <span style=${{color:"var(--accent)"}}>COACH</span></div>
      <div style=${{fontSize:13,color:"var(--sub)"}}>コーチ専用の管理画面です</div>
      ${loading
        ? html`<div class="spin"/>`
        : html`<button onClick=${signIn} style=${{display:"flex",alignItems:"center",gap:10,padding:"10px 20px",borderRadius:8,border:"1px solid #dadce0",background:"#fff",cursor:"pointer",fontSize:15,fontWeight:500,color:"#3c4043",width:280,justifyContent:"center"}}>
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18"/>
            Googleでサインイン
          </button>`}
      ${error && html`<div style=${{color:"var(--red)",fontSize:13,textAlign:"center"}}>${error}</div>`}
    </div>
  `;
}

// ── サイドバー: 生徒一覧（検索・要フォロー順） ──
function Sidebar({ students, selectedEmail, onSelect, onLogout, coach, onAddClient }) {
  const [q, setQ] = useState("");
  const [adding, setAdding] = useState(false);
  const [newName, setNewName] = useState("");
  const [newEmail, setNewEmail] = useState("");
  const [addMsg, setAddMsg] = useState("");
  const filtered = useMemo(() => {
    const query = q.trim().toLowerCase();
    if (!query) return students;
    return students.filter(s => (s.name||"").toLowerCase().includes(query) || (s.nickname||"").toLowerCase().includes(query) || (s.goal||"").toLowerCase().includes(query));
  }, [students, q]);

  const submitAdd = async () => {
    if (!newName.trim() || !newEmail.trim()) return;
    const r = await onAddClient(newEmail.trim(), newName.trim());
    if (r.ok) {
      setAdding(false); setNewName(""); setNewEmail(""); setAddMsg("");
    } else {
      setAddMsg(r.error || "追加に失敗しました");
    }
  };

  return html`
    <aside style=${{width:300,flexShrink:0,borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",height:"100%",background:"var(--card)"}}>
      <div style=${{padding:"18px 16px 14px",borderBottom:"1px solid var(--border)"}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style=${{fontSize:16,fontWeight:800,letterSpacing:"-.2px"}}>JIROKU <span style=${{color:"var(--accent)"}}>COACH</span></div>
          <button onClick=${onLogout} title="ログアウト" style=${{background:"none",border:"none",color:"var(--sub)",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>ログアウト</button>
        </div>
        <div style=${{fontSize:11,color:"var(--sub)",marginBottom:10}}>${coach}</div>
        <input class="inp" placeholder="生徒名・目標で検索" value=${q} onInput=${e=>setQ(e.target.value)} style=${{marginBottom:8}}/>
        ${!adding
          ? html`<button class="btn" style=${{width:"100%",fontSize:12.5}} onClick=${()=>setAdding(true)}>＋ 新しいクライアントを追加</button>`
          : html`
            <div style=${{border:"1px solid var(--border)",borderRadius:10,padding:10}}>
              <input class="inp" placeholder="名前" value=${newName} onChange=${e=>setNewName(e.target.value)} style=${{marginBottom:8,fontSize:12.5}}/>
              <input class="inp" placeholder="メールアドレス" value=${newEmail} onChange=${e=>setNewEmail(e.target.value)} style=${{marginBottom:8,fontSize:12.5}}/>
              ${addMsg && html`<div style=${{fontSize:11,color:"var(--red)",marginBottom:8}}>${addMsg}</div>`}
              <div style=${{display:"flex",gap:6}}>
                <button class="btn" style=${{flex:1,fontSize:12}} onClick=${submitAdd}>追加</button>
                <button style=${{flex:1,fontSize:12,background:"none",border:"1px solid var(--border)",borderRadius:8,cursor:"pointer",fontFamily:"inherit"}} onClick=${()=>{setAdding(false);setAddMsg("");}}>キャンセル</button>
              </div>
            </div>
          `}
      </div>
      <div style=${{overflowY:"auto",flex:1}}>
        <div style=${{padding:"10px 16px 4px",fontSize:11,color:"var(--sub)",fontWeight:600}}>担当生徒 ${filtered.length}人</div>
        ${filtered.map(s => {
          const ago = daysAgo(s.lastLogDate);
          const agoColor = !s.joinedJiroku ? "var(--sub)" : ago === null ? "var(--red)" : ago <= 1 ? "var(--green)" : ago <= 3 ? "var(--amber)" : "var(--red)";
          const agoText = !s.joinedJiroku ? "JIROKU未登録" : ago === null ? "記録なし" : ago === 0 ? "今日記録あり" : ago + "日前が最終";
          const active = s.email === selectedEmail;
          return html`
            <button key=${s.email} onClick=${() => onSelect(s)}
              style=${{display:"block",width:"100%",padding:"12px 16px",border:"none",borderLeft:active?"3px solid var(--accent)":"3px solid transparent",background:active?"var(--accent-l)":"transparent",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
              <div style=${{display:"flex",alignItems:"center",gap:10}}>
                <div style=${{width:32,height:32,borderRadius:"50%",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>${s.avatar}</div>
                <div style=${{flex:1,minWidth:0}}>
                  <div style=${{fontSize:13.5,fontWeight:700,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${s.nickname||s.name}</div>
                  <div style=${{fontSize:11,fontWeight:600,color:agoColor}}>${agoText}</div>
                </div>
                ${s.contractDaysLeft !== null && s.contractDaysLeft <= 30 && html`
                  <div title="契約終了まで残り少ない" style=${{fontSize:9,fontWeight:700,color:"#fff",background:"var(--red)",borderRadius:20,padding:"2px 6px",flexShrink:0}}>残${s.contractDaysLeft}日</div>
                `}
              </div>
            </button>
          `;
        })}
        ${filtered.length === 0 && html`<div style=${{padding:20,fontSize:12,color:"var(--sub)",textAlign:"center"}}>該当する生徒がいません</div>`}
      </div>
    </aside>
  `;
}

// ── メイン: 選択中の生徒の詳細（タブ切り替え） ──
function StudentMain({ student, onNoteSaved }) {
  const [tab, setTab] = useState("overview"); // overview | history | notes | profile
  const [detail, setDetail] = useState(null);
  const [prep, setPrep] = useState(null);
  const [prepLoading, setPrepLoading] = useState(false);
  const [content, setContent] = useState("");
  const [nextTheme, setNextTheme] = useState("");
  const [promises, setPromises] = useState("");
  const [noteDate, setNoteDate] = useState(() => new Date().toISOString().substring(0,10));
  const [saving, setSaving] = useState(false);
  const [savedMsg, setSavedMsg] = useState("");

  const reloadDetail = () => api("coachGetStudentDetail", { targetEmail: student.email }).then(r => { if (r.ok) setDetail(r.data); });

  useEffect(() => {
    setDetail(null); setPrep(null); setTab("overview");
    reloadDetail();
  }, [student.email]);

  const loadPrep = () => {
    setPrepLoading(true);
    api("coachPrepSummary", { targetEmail: student.email }).then(r => {
      setPrep(r.ok ? r.data.summary : "生成に失敗しました。もう一度お試しください");
      setPrepLoading(false);
    });
  };

  const saveNote = async () => {
    if (!content.trim()) return;
    setSaving(true);
    const r = await api("coachSaveNote", { targetEmail: student.email, date: noteDate, content: content.trim(), next_theme: nextTheme.trim(), promises: promises.trim() });
    if (r.ok) {
      setSavedMsg("保存しました。AIコーチにも反映されます");
      setContent(""); setNextTheme(""); setPromises("");
      api("coachGetStudentDetail", { targetEmail: student.email }).then(rr => { if (rr.ok) setDetail(rr.data); });
      onNoteSaved && onNoteSaved(student.email, noteDate);
      setTimeout(() => setSavedMsg(""), 3000);
    } else {
      setSavedMsg("保存に失敗しました");
      setTimeout(() => setSavedMsg(""), 3000);
    }
    setSaving(false);
  };

  return html`
    <div style=${{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style=${{padding:"18px 28px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style=${{display:"flex",alignItems:"center",gap:12}}>
          <div style=${{width:40,height:40,borderRadius:"50%",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:21}}>${student.avatar}</div>
          <div>
            <div style=${{fontSize:17,fontWeight:800}}>${student.name}</div>
            <div style=${{fontSize:11.5,color:"var(--sub)"}}>${student.email}</div>
          </div>
        </div>
        <div style=${{display:"flex",gap:4}}>
          <button class=${"tab"+(tab==="overview"?" on":"")} onClick=${()=>setTab("overview")}>概要</button>
          <button class=${"tab"+(tab==="history"?" on":"")} onClick=${()=>setTab("history")}>記録・レポート履歴</button>
          <button class=${"tab"+(tab==="notes"?" on":"")} onClick=${()=>setTab("notes")}>コーチングログ</button>
          <button class=${"tab"+(tab==="profile"?" on":"")} onClick=${()=>setTab("profile")}>プロフィール・契約</button>
        </div>
      </div>

      <div style=${{flex:1,overflowY:"auto",padding:"20px 28px"}}>
        ${!detail && html`<div style=${{display:"flex",justifyContent:"center",padding:40}}><div class="spin"/></div>`}

        ${detail && tab==="overview" && html`
          <div style=${{display:"grid",gridTemplateColumns:"1.3fr 1fr",gap:20,alignItems:"start"}}>
            <div>
              <div class="card" style=${{border:"1.5px solid var(--accent)"}}>
                <div class="card-label">🤖 AI予習サマリー</div>
                ${prep === null && !prepLoading && html`<button class="btn" onClick=${loadPrep}>前回からの変化を1分で把握する</button>`}
                ${prepLoading && html`<div style=${{display:"flex",justifyContent:"center",padding:16}}><div class="spin"/></div>`}
                ${prep !== null && !prepLoading && html`<div style=${{fontSize:13.5,lineHeight:1.8,whiteSpace:"pre-wrap"}}>${prep}</div>`}
              </div>

              <div class="card">
                <div class="card-label">📊 直近のレポート</div>
                ${detail.reports.length === 0 && html`<div style=${{fontSize:13,color:"var(--sub)"}}>まだありません</div>`}
                ${detail.reports.slice(0,3).map((r, i) => html`
                  <div key=${r.date} style=${{padding:"10px 0",borderBottom:i < Math.min(3,detail.reports.length)-1 ? "1px solid var(--border)" : "none"}}>
                    <div style=${{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style=${{fontSize:12,fontWeight:700,color:"var(--accent)"}}>${fmtDate(r.date)}</span>
                      <span style=${{fontSize:14,fontWeight:800,color:r.score>=75?"var(--green)":r.score>=50?"var(--amber)":"var(--red)"}}>${r.score}点</span>
                    </div>
                    <div style=${{fontSize:12.5,lineHeight:1.7}}>${r.feedback}</div>
                  </div>
                `)}
              </div>

              ${detail.diaries.length > 0 && html`
                <div class="card">
                  <div class="card-label">✍️ 直近の日記</div>
                  ${detail.diaries.slice(0,3).map((d, i) => html`
                    <div key=${d.date} style=${{padding:"10px 0",borderBottom:i < Math.min(3,detail.diaries.length)-1 ? "1px solid var(--border)" : "none"}}>
                      <div style=${{fontSize:12,fontWeight:700,color:"var(--accent)",marginBottom:4}}>${fmtDate(d.date)}</div>
                      <div style=${{fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}}>${d.diary}</div>
                    </div>
                  `)}
                </div>
              `}
            </div>

            <div>
              <div class="card">
                <div class="card-label">🎯 目標</div>
                ${detail.goals.length === 0 && html`<div style=${{fontSize:13,color:"var(--sub)"}}>未設定</div>`}
                ${detail.goals.map((g, i) => html`
                  <div key=${i} style=${{fontSize:13,lineHeight:1.7,marginBottom:8}}>
                    ${g.goal}${g.deadline && html`<div style=${{color:"var(--sub)",fontSize:11.5}}>期限 ${g.deadline}</div>`}
                  </div>
                `)}
              </div>

              ${detail.status && html`
                <div class="card">
                  <div class="card-label">📈 ステータス</div>
                  <div style=${{fontSize:26,fontWeight:800,marginBottom:10}}>${detail.status.score}<span style=${{fontSize:13,color:"var(--sub)",fontWeight:600}}> / 100</span></div>
                  ${Object.entries({records:"記録",memo:"メモ",focus:"集中",goal:"目標",consistency:"継続"}).map(([k,label]) => html`
                    <div key=${k} style=${{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5}}>
                      <span style=${{color:"var(--sub)"}}>${label}</span><span style=${{fontWeight:700}}>${detail.status.breakdown[k]}/20</span>
                    </div>
                  `)}
                </div>
              `}

              <div class="card">
                <div class="card-label">🔥 継続</div>
                <div style=${{fontSize:13,lineHeight:1.8}}>
                  連続記録 ${student.streak}日<br/>
                  入会日: ${detail.joined_at || "不明"}
                </div>
              </div>
            </div>
          </div>
        `}

        ${detail && tab==="history" && html`
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <div class="card">
              <div class="card-label">📊 レポート全履歴</div>
              ${detail.reports.length === 0 && html`<div style=${{fontSize:13,color:"var(--sub)"}}>まだありません</div>`}
              ${detail.reports.map((r, i) => html`
                <div key=${r.date} style=${{padding:"10px 0",borderBottom:i < detail.reports.length-1 ? "1px solid var(--border)" : "none"}}>
                  <div style=${{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style=${{fontSize:12,fontWeight:700,color:"var(--accent)"}}>${fmtDate(r.date)}</span>
                    <span style=${{fontSize:14,fontWeight:800,color:r.score>=75?"var(--green)":r.score>=50?"var(--amber)":"var(--red)"}}>${r.score}点</span>
                  </div>
                  <div style=${{fontSize:12.5,lineHeight:1.7,marginBottom:4}}>${r.feedback}</div>
                  ${r.improvement && html`<div style=${{fontSize:11.5,color:"var(--sub)"}}>改善: ${r.improvement}</div>`}
                </div>
              `)}
            </div>
            <div class="card">
              <div class="card-label">🗓 直近14日の記録とメモ</div>
              ${detail.dailySummary.length === 0 && html`<div style=${{fontSize:13,color:"var(--sub)"}}>記録なし</div>`}
              ${detail.dailySummary.map((d, i) => html`
                <div key=${d.date} style=${{padding:"8px 0",borderBottom:i < detail.dailySummary.length-1 ? "1px solid var(--border)" : "none"}}>
                  <div style=${{fontSize:12.5,fontWeight:700}}>${fmtDate(d.date)} <span style=${{color:"var(--sub)",fontWeight:400}}>· ${d.blocks}記録（目標関連${d.goalBlocks}）</span></div>
                  ${d.memos.map((m, j) => html`<div key=${j} style=${{fontSize:11.5,color:"var(--sub)",marginTop:3,lineHeight:1.6}}>💭 ${m}</div>`)}
                </div>
              `)}
            </div>
          </div>
        `}

        ${detail && tab==="notes" && html`
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,alignItems:"start"}}>
            <div class="card">
              <div class="card-label">📝 コーチングログを記録</div>
              <label class="lbl">実施日</label>
              <input type="date" class="inp" value=${noteDate} onChange=${e => setNoteDate(e.target.value)} style=${{marginBottom:12}}/>
              <label class="lbl">話した内容・深掘りした内容</label>
              <textarea class="txa" value=${content} onChange=${e => setContent(e.target.value)} placeholder="今日のコーチングで話したこと、気づいたこと" style=${{marginBottom:12}}/>
              <label class="lbl">約束事項（AIコーチが日々フォローアップします）</label>
              <input class="inp" value=${promises} onChange=${e => setPromises(e.target.value)} placeholder="例：テレアポを週4日、毎朝インスタ1投稿" style=${{marginBottom:12}}/>
              <label class="lbl">次回のテーマ</label>
              <input class="inp" value=${nextTheme} onChange=${e => setNextTheme(e.target.value)} placeholder="例：朝時間の設計を見直す" style=${{marginBottom:14}}/>
              <button class="btn" onClick=${saveNote} disabled=${saving || !content.trim()}>${saving ? "保存中..." : "保存する"}</button>
              ${savedMsg && html`<div style=${{fontSize:12,color:"var(--green)",marginTop:8}}>${savedMsg}</div>`}
            </div>
            <div class="card">
              <div class="card-label">🗂 コーチング履歴</div>
              ${detail.notes.length === 0 && html`<div style=${{fontSize:13,color:"var(--sub)"}}>まだ記録がありません</div>`}
              ${detail.notes.map((n, i) => html`
                <div key=${n.note_id} style=${{padding:"10px 0",borderBottom:i < detail.notes.length-1 ? "1px solid var(--border)" : "none"}}>
                  <div style=${{fontSize:12,fontWeight:700,color:"var(--accent)",marginBottom:4}}>${fmtDate(n.date)}</div>
                  <div style=${{fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap",marginBottom:4}}>${n.content}</div>
                  ${n.promises && html`<div style=${{fontSize:11.5,color:"var(--sub)"}}>🤝 約束: ${n.promises}</div>`}
                  ${n.next_theme && html`<div style=${{fontSize:11.5,color:"var(--sub)"}}>▶ 次回: ${n.next_theme}</div>`}
                </div>
              `)}
            </div>
          </div>
        `}

        ${detail && tab==="profile" && html`<${ProfileTab} student=${student} detail=${detail} onReload=${reloadDetail}/>`}
      </div>
    </div>
  `;
}

// ── プロフィール・契約タブ ──
const PAYMENT_TYPES = [{v:"lump",l:"一括払い"},{v:"card_installment",l:"クレカ分割"},{v:"transfer_installment",l:"振込分割"}];
const GENDER_TYPES = [{v:"",l:"未設定"},{v:"male",l:"男性"},{v:"female",l:"女性"},{v:"other",l:"その他"}];

function ProfileTab({ student, detail, onReload }) {
  const p = detail.profile || {};
  const [form, setForm] = useState({
    name: p.name || student.name || "", birthdate: p.birthdate || "", gender: p.gender || "", family: p.family || "",
    address: p.address || "", phone: p.phone || "",
    occupation: p.occupation || "", profile_notes: p.profile_notes || "",
    contract_start: p.contract_start || "", contract_end: p.contract_end || "",
    payment_type: p.payment_type || "lump", contract_amount: p.contract_amount || "",
    installment_count: p.installment_count || "", stripe_email: p.stripe_email || ""
  });
  const [saving, setSaving] = useState(false);
  const [savedMsg, setSavedMsg] = useState("");
  const [uploading, setUploading] = useState(false);
  const [extracting, setExtracting] = useState(false);
  const [extractMsg, setExtractMsg] = useState("");
  const [fileNote, setFileNote] = useState("");
  const [syncingStripe, setSyncingStripe] = useState(false);
  const [stripeMsg, setStripeMsg] = useState("");
  const fileInputRef = useRef(null);

  useEffect(() => {
    setForm({
      name: p.name || student.name || "", birthdate: p.birthdate || "", gender: p.gender || "", family: p.family || "",
      address: p.address || "", phone: p.phone || "",
      occupation: p.occupation || "", profile_notes: p.profile_notes || "",
      contract_start: p.contract_start || "", contract_end: p.contract_end || "",
      payment_type: p.payment_type || "lump", contract_amount: p.contract_amount || "",
      installment_count: p.installment_count || "", stripe_email: p.stripe_email || ""
    });
  }, [student.email]);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const save = async () => {
    setSaving(true);
    const r = await apiPost("coachSaveProfile", { targetEmail: student.email, ...form });
    setSavedMsg(r.ok ? "保存しました" : "保存に失敗しました");
    if (r.ok) onReload();
    setSaving(false);
    setTimeout(() => setSavedMsg(""), 2500);
  };

  const age = form.birthdate ? Math.floor((Date.now() - new Date(form.birthdate)) / (365.25*86400000)) : null;
  const contractDaysLeft = form.contract_end ? Math.ceil((new Date(form.contract_end) - new Date()) / 86400000) : null;

  const onFileChosen = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 15 * 1024 * 1024) { alert("15MBまでのファイルに対応しています"); return; }
    setUploading(true);
    try {
      const base64 = await fileToBase64(file);
      const r = await apiPost("coachUploadFile", { targetEmail: student.email, fileName: file.name, mimeType: file.type, fileData: base64, note: fileNote.trim() });
      if (r.ok) {
        setFileNote(""); onReload();
        if (file.type === "application/pdf") {
          setExtracting(true);
          setExtractMsg("");
          const er = await apiPost("coachExtractContractInfo", { targetEmail: student.email, fileData: base64, mimeType: file.type });
          if (er.ok) {
            const ex = er.data;
            setForm(f => ({
              ...f,
              name: ex.name || f.name, birthdate: ex.birthdate || f.birthdate,
              address: ex.address || f.address, phone: ex.phone || f.phone,
              contract_start: ex.contract_start || f.contract_start, contract_end: ex.contract_end || f.contract_end,
              payment_type: ex.payment_type || f.payment_type,
              contract_amount: ex.contract_amount || f.contract_amount,
              installment_count: ex.installment_count || f.installment_count
            }));
            setExtractMsg("AIが契約書から読み取った内容をフォームに反映しました。内容を確認してから保存してください");
          } else {
            setExtractMsg("契約書の自動読み取りに失敗しました（手動で入力してください）");
          }
          setExtracting(false);
        }
      }
      else alert("アップロードに失敗しました: " + (r.error || ""));
    } catch (err) { alert("アップロードに失敗しました"); }
    setUploading(false);
    if (fileInputRef.current) fileInputRef.current.value = "";
  };

  const deleteFile = async (fileId) => {
    if (!confirm("このファイルを削除しますか？")) return;
    const r = await apiPost("coachDeleteFile", { targetEmail: student.email, file_id: fileId });
    if (r.ok) onReload();
  };

  const syncStripe = async () => {
    setSyncingStripe(true);
    setStripeMsg("");
    const r = await api("coachSyncStripeOne", { targetEmail: student.email });
    setStripeMsg(r.ok ? "更新しました" : "同期に失敗しました: " + (r.error || ""));
    if (r.ok) onReload();
    setSyncingStripe(false);
    setTimeout(() => setStripeMsg(""), 3000);
  };

  return html`
    <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,alignItems:"start"}}>
      <div class="card">
        <div class="card-label">👤 プロフィール</div>
        <label class="lbl">名前</label>
        <input class="inp" value=${form.name} onChange=${e=>set("name", e.target.value)} placeholder="例：山田太郎" style=${{marginBottom:12}}/>
        <label class="lbl">生年月日${age !== null && html` <span style=${{color:"var(--accent)",fontWeight:700}}>（${age}歳）</span>`}</label>
        <input type="date" class="inp" value=${form.birthdate} onChange=${e=>set("birthdate", e.target.value)} style=${{marginBottom:12}}/>
        <label class="lbl">性別</label>
        <select class="inp" value=${form.gender} onChange=${e=>set("gender", e.target.value)} style=${{marginBottom:12}}>
          ${GENDER_TYPES.map(t => html`<option key=${t.v} value=${t.v}>${t.l}</option>`)}
        </select>
        <label class="lbl">家族構成</label>
        <input class="inp" value=${form.family} onChange=${e=>set("family", e.target.value)} placeholder="例：配偶者・子2人" style=${{marginBottom:12}}/>
        <label class="lbl">お住まい</label>
        <input class="inp" value=${form.address} onChange=${e=>set("address", e.target.value)} placeholder="例：東京都〇〇区" style=${{marginBottom:12}}/>
        <label class="lbl">電話番号</label>
        <input class="inp" value=${form.phone} onChange=${e=>set("phone", e.target.value)} placeholder="例：090-1234-5678" style=${{marginBottom:12}}/>
        <label class="lbl">職業</label>
        <input class="inp" value=${form.occupation} onChange=${e=>set("occupation", e.target.value)} placeholder="例：会社員、経営者、学生など" style=${{marginBottom:12}}/>
        <label class="lbl">プロフィールメモ（性格・背景など自由記述）</label>
        <textarea class="txa" value=${form.profile_notes} onChange=${e=>set("profile_notes", e.target.value)} placeholder="コーチングに役立つ背景情報を自由に" style=${{marginBottom:0}}/>
      </div>

      <div>
        <div class="card">
          <div class="card-label">📄 契約情報</div>
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <div>
              <label class="lbl">契約開始日</label>
              <input type="date" class="inp" value=${form.contract_start} onChange=${e=>set("contract_start", e.target.value)}/>
            </div>
            <div>
              <label class="lbl">契約終了日${contractDaysLeft !== null && html`
                <span style=${{color:contractDaysLeft<=30?"var(--red)":contractDaysLeft<=60?"var(--amber)":"var(--sub)",fontWeight:700}}> （残り${contractDaysLeft}日）</span>
              `}</label>
              <input type="date" class="inp" value=${form.contract_end} onChange=${e=>set("contract_end", e.target.value)}/>
            </div>
          </div>
          <label class="lbl">支払い方法</label>
          <select class="inp" value=${form.payment_type} onChange=${e=>set("payment_type", e.target.value)} style=${{marginBottom:12}}>
            ${PAYMENT_TYPES.map(t => html`<option key=${t.v} value=${t.v}>${t.l}</option>`)}
          </select>
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            <div>
              <label class="lbl">契約金額（円）</label>
              <input class="inp" type="number" value=${form.contract_amount} onChange=${e=>set("contract_amount", e.target.value)} placeholder="例：480000"/>
            </div>
            ${form.payment_type !== "lump" && html`
              <div>
                <label class="lbl">分割回数</label>
                <input class="inp" type="number" value=${form.installment_count} onChange=${e=>set("installment_count", e.target.value)} placeholder="例：12"/>
              </div>
            `}
          </div>
          <button class="btn" onClick=${save} disabled=${saving}>${saving ? "保存中..." : "保存する"}</button>
          ${savedMsg && html`<span style=${{fontSize:12,color:"var(--green)",marginLeft:10}}>${savedMsg}</span>`}
        </div>

        <div class="card">
          <div class="card-label">💳 Stripe決済状況</div>
          ${p.stripe_synced_at ? html`
            <div style=${{fontSize:26,fontWeight:800,marginBottom:4}}>
              ${Number(p.stripe_total_paid || 0).toLocaleString()}<span style=${{fontSize:13,color:"var(--sub)",fontWeight:600}}> ${(p.stripe_currency||"jpy").toUpperCase()} 支払い済み</span>
            </div>
            <div style=${{fontSize:11,color:"var(--sub)",marginBottom:12}}>最終同期: ${p.stripe_synced_at}</div>
          ` : html`
            <div style=${{fontSize:13,color:"var(--sub)",marginBottom:12}}>まだ同期されていません</div>
          `}
          <button class="btn" onClick=${syncStripe} disabled=${syncingStripe}>${syncingStripe ? "同期中..." : "今すぐ同期"}</button>
          ${stripeMsg && html`<span style=${{fontSize:12,color:"var(--accent)",marginLeft:10}}>${stripeMsg}</span>`}
          <label class="lbl" style=${{marginTop:14}}>Stripe連携用メールアドレス（Stripe側の登録名・メールが違う場合のみ入力）</label>
          <input class="inp" value=${form.stripe_email} onChange=${e=>set("stripe_email", e.target.value)} placeholder="未入力なら生徒のメールアドレスで検索します"/>
        </div>

        <div class="card">
          <div class="card-label">📎 契約書ファイル</div>
          <input class="inp" value=${fileNote} onChange=${e=>setFileNote(e.target.value)} placeholder="ファイルのメモ（任意・例：初回契約書）" style=${{marginBottom:10}}/>
          <input ref=${fileInputRef} type="file" onChange=${onFileChosen} disabled=${uploading} style=${{fontSize:12.5,marginBottom:14}}/>
          ${uploading && html`<div style=${{fontSize:12,color:"var(--sub)"}}>アップロード中...</div>`}
          ${extracting && html`<div style=${{fontSize:12,color:"var(--sub)"}}>🤖 AIが契約書の内容を読み取り中...</div>`}
          ${extractMsg && !extracting && html`<div style=${{fontSize:12,color:"var(--accent)",marginBottom:8}}>${extractMsg}</div>`}
          ${detail.files.length === 0 && html`<div style=${{fontSize:13,color:"var(--sub)"}}>まだファイルがありません</div>`}
          ${detail.files.map((f,i) => html`
            <div key=${f.file_id} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:i<detail.files.length-1?"1px solid var(--border)":"none"}}>
              <div style=${{minWidth:0}}>
                <a href=${f.file_url} target="_blank" style=${{fontSize:13,color:"var(--accent)",fontWeight:600,textDecoration:"none"}}>📄 ${f.file_name}</a>
                <div style=${{fontSize:11,color:"var(--sub)",marginTop:2}}>${f.note ? f.note + " · " : ""}${f.uploaded_at}</div>
              </div>
              <button onClick=${()=>deleteFile(f.file_id)} style=${{background:"none",border:"none",color:"var(--red)",fontSize:11,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>削除</button>
            </div>
          `)}
        </div>
      </div>
    </div>
  `;
}

function App() {
  const [coach, setCoach] = useState(COACH_EMAIL);
  const [students, setStudents] = useState(null);
  const [selected, setSelected] = useState(null);

  const refreshStudents = () => api("coachGetStudents").then(r => { if (r.ok) setStudents(r.data); });

  useEffect(() => {
    if (!COACH_EMAIL) return;
    refreshStudents().then(() => {}).catch(()=>{});
    api("coachGetStudents").then(r => {
      if (r.ok) setStudents(r.data);
      else { localStorage.removeItem("jiroku_coach_email"); COACH_EMAIL = null; setCoach(null); }
    });
  }, []);

  const logout = () => {
    localStorage.removeItem("jiroku_coach_email");
    COACH_EMAIL = null; setCoach(null); setStudents(null); setSelected(null);
  };

  const addClient = async (email, name) => {
    const r = await api("coachAddClient", { email, name });
    if (r.ok) await refreshStudents();
    return r;
  };

  if (!coach) return html`<${LoginScreen} onLogin=${(email, list) => { setCoach(email); setStudents(list); }}/>`;
  if (!students) return html`<div style=${{display:"flex",justifyContent:"center",alignItems:"center",height:"100%"}}><div class="spin"/></div>`;

  return html`
    <div style=${{display:"flex",height:"100%"}}>
      <${Sidebar} students=${students} selectedEmail=${selected?.email} onSelect=${setSelected} onLogout=${logout} coach=${coach} onAddClient=${addClient}/>
      <main style=${{flex:1,overflow:"hidden",background:"var(--bg)"}}>
        ${selected
          ? html`<${StudentMain} key=${selected.email} student=${selected} onNoteSaved=${refreshStudents}/>`
          : html`<div style=${{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"var(--sub)",fontSize:14}}>左の一覧から生徒を選択してください</div>`}
      </main>
    </div>
  `;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
