<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JIROKU COACH</title>
  <meta name="theme-color" content="#FAFAF9" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#101417" media="(prefers-color-scheme: dark)" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/htm/dist/htm.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FAFAF9; --card: #FFFFFF; --border: #E7E5E4;
      --text: #1C1917; --sub: #78716C;
      --accent: #0891B2; --accent-l: #ECFEFF;
      --green: #16A34A; --amber: #D97706; --red: #DC2626;
      --hero1: #0891B2; --hero2: #0e7490;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101417; --card: #1A2025; --border: #2A3138;
        --text: #F2F0EF; --sub: #9CA3AF;
        --accent: #22B8D4; --accent-l: #103240;
        --hero1: #0B4A5A; --hero2: #093642;
      }
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'DM Sans', -apple-system, "Hiragino Sans", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
    .card-label { font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 12px; letter-spacing: .02em; text-transform: uppercase; }
    .btn { display: inline-block; padding: 10px 18px; border: none; border-radius: 10px; background: var(--accent); color: #fff; font-size: 13.5px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn:disabled { opacity: .5; cursor: default; }
    .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .inp, .txa, select.inp { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 9px; background: var(--bg); color: var(--text); font-size: 13.5px; font-family: inherit; outline: none; }
    .inp:focus, .txa:focus { border-color: var(--accent); }
    .txa { resize: vertical; min-height: 70px; line-height: 1.6; }
    .lbl { display: block; font-size: 11.5px; font-weight: 600; color: var(--sub); margin-bottom: 5px; }
    .spin { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tab { padding: 8px 14px; border-radius: 8px; border: none; background: none; color: var(--sub); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .tab.on { background: var(--accent-l); color: var(--accent); }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const html = htm.bind(React.createElement);
const { useState, useEffect, useRef, useMemo } = React;

const GAS_URL = "https://script.google.com/macros/s/AKfycbzJ-QEpPVnmp-LFU5Jxww4VFP1qaseMtwCrzKxAA6ZULr1y3h_UeKzVdhHnl5ze57U/exec";
const GOOGLE_CLIENT_ID = "476804060858-n3afj7ipmc81vq8cq71u0u3jdpolshea.apps.googleusercontent.com";

let COACH_EMAIL = localStorage.getItem("jiroku_coach_email") || null;

async function api(action, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set("action", action);
  url.searchParams.set("coachEmail", COACH_EMAIL || "");
  Object.entries(params).forEach(([k, v]) => { if (v != null) url.searchParams.set(k, String(v)); });
  try { const r = await fetch(url.toString(), { redirect: "follow" }); return await r.json(); }
  catch { return { ok: false, error: "network" }; }
}
// POSTгҒҜгғңгғҮгӮЈгҒҢеӨ§гҒҚгҒҸгҒӘгӮҠеҫ—гӮӢж“ҚдҪңпјҲгғ•гӮЎгӮӨгғ«гӮўгғғгғ—гғӯгғјгғүзӯүпјүз”ЁгҖӮ
// GASжңӘеҜҫеҝңз’°еўғгҒ®иІ иҚ·гӮ’йҒҝгҒ‘гӮӢгҒҹгӮҒtext/plainгҒ§йҖҒгӮӢ
async function apiPost(action, body = {}) {
  try {
    const r = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action, coachEmail: COACH_EMAIL, ...body })
    });
    return await r.json();
  } catch { return { ok: false, error: "network" }; }
}
const fileToBase64 = file => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => resolve(reader.result.split(",")[1]);
  reader.onerror = reject;
  reader.readAsDataURL(file);
});

const fmtDate = d => {
  const dt = new Date(String(d).substring(0,10) + "T00:00:00");
  return isNaN(dt) ? String(d) : dt.toLocaleDateString("ja-JP", { month: "numeric", day: "numeric", weekday: "short" });
};
const daysAgo = d => {
  if (!d) return null;
  return Math.floor((new Date() - new Date(String(d).substring(0,10) + "T00:00:00")) / 86400000);
};

function loginWithGoogle(onEmail, onError) {
  if (!window.google?.accounts?.oauth2) { onError("GoogleгғӯгӮ°гӮӨгғігҒ®иӘӯгҒҝиҫјгҒҝдёӯгҒ§гҒҷгҖӮе°‘гҒ—еҫ…гҒЈгҒҰгҒӢгӮүгӮӮгҒҶдёҖеәҰгҒҠи©ҰгҒ—гҒҸгҒ гҒ•гҒ„"); return; }
  try {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: "openid email profile",
      callback: async (t) => {
        if (t.error || !t.access_token) { onError("гғӯгӮ°гӮӨгғігҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ"); return; }
        try {
          const info = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", { headers: { Authorization: "Bearer " + t.access_token } }).then(r => r.json());
          if (info.email) onEmail(info.email);
          else onError("гғЎгғјгғ«гӮўгғүгғ¬гӮ№гӮ’еҸ–еҫ—гҒ§гҒҚгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹ");
        } catch { onError("гғӯгӮ°гӮӨгғігҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ"); }
      },
      error_callback: () => onError("гғӯгӮ°гӮӨгғігҒҢгӮӯгғЈгғігӮ»гғ«гҒ•гӮҢгҒҫгҒ—гҒҹ"),
    });
    client.requestAccessToken();
  } catch { onError("гғӯгӮ°гӮӨгғігҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ"); }
}

function LoginScreen({ onLogin }) {
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const signIn = () => {
    setLoading(true); setError("");
    loginWithGoogle(async (email) => {
      COACH_EMAIL = email;
      const r = await api("coachGetStudents");
      if (r.ok) {
        localStorage.setItem("jiroku_coach_email", email);
        onLogin(email, r.data);
      } else {
        COACH_EMAIL = null;
        setError(r.error === "not a coach" ? "гҒ“гҒ®гӮўгӮ«гӮҰгғігғҲгҒҜгӮігғјгғҒгҒЁгҒ—гҒҰзҷ»йҢІгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“" : "зўәиӘҚгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹгҖӮгӮӮгҒҶдёҖеәҰгҒҠи©ҰгҒ—гҒҸгҒ гҒ•гҒ„");
      }
      setLoading(false);
    }, (msg) => { setError(msg); setLoading(false); });
  };
  return html`
    <div style=${{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16}}>
      <svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg"><circle cx="36" cy="36" r="36" fill="#0891B2"/><circle cx="36" cy="36" r="25" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4.5"/><path d="M36 11 A25 25 0 1 1 14.5 50" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/><circle cx="36" cy="36" r="15" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/><line x1="36" y1="36" x2="36" y2="25" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><line x1="36" y1="36" x2="43" y2="41" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="36" cy="36" r="2" fill="#fff"/></svg>
      <div style=${{fontSize:24,fontWeight:800,letterSpacing:"-.3px"}}>JIROKU <span style=${{color:"var(--accent)"}}>COACH</span></div>
      <div style=${{fontSize:13,color:"var(--sub)"}}>гӮігғјгғҒе°Ӯз”ЁгҒ®з®ЎзҗҶз”»йқўгҒ§гҒҷ</div>
      ${loading
        ? html`<div class="spin"/>`
        : html`<button onClick=${signIn} style=${{display:"flex",alignItems:"center",gap:10,padding:"10px 20px",borderRadius:8,border:"1px solid #dadce0",background:"#fff",cursor:"pointer",fontSize:15,fontWeight:500,color:"#3c4043",width:280,justifyContent:"center"}}>
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18"/>
            GoogleгҒ§гӮөгӮӨгғігӮӨгғі
          </button>`}
      ${error && html`<div style=${{color:"var(--red)",fontSize:13,textAlign:"center"}}>${error}</div>`}
    </div>
  `;
}

// в”Җв”Җ гӮөгӮӨгғүгғҗгғј: з”ҹеҫ’дёҖиҰ§пјҲжӨңзҙўгғ»иҰҒгғ•гӮ©гғӯгғјй Ҷпјү в”Җв”Җ
function Sidebar({ students, selectedEmail, onSelect, onLogout, coach, onAddClient }) {
  const [q, setQ] = useState("");
  const [adding, setAdding] = useState(false);
  const [newName, setNewName] = useState("");
  const [newEmail, setNewEmail] = useState("");
  const [addMsg, setAddMsg] = useState("");
  const filtered = useMemo(() => {
    const query = q.trim().toLowerCase();
    if (!query) return students;
    return students.filter(s => (s.name||"").toLowerCase().includes(query) || (s.nickname||"").toLowerCase().includes(query) || (s.goal||"").toLowerCase().includes(query));
  }, [students, q]);

  const submitAdd = async () => {
    if (!newName.trim() || !newEmail.trim()) return;
    const r = await onAddClient(newEmail.trim(), newName.trim());
    if (r.ok) {
      setAdding(false); setNewName(""); setNewEmail(""); setAddMsg("");
    } else {
      setAddMsg(r.error || "иҝҪеҠ гҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ");
    }
  };

  return html`
    <aside style=${{width:300,flexShrink:0,borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",height:"100%",background:"var(--card)"}}>
      <div style=${{padding:"18px 16px 14px",borderBottom:"1px solid var(--border)"}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style=${{fontSize:16,fontWeight:800,letterSpacing:"-.2px"}}>JIROKU <span style=${{color:"var(--accent)"}}>COACH</span></div>
          <button onClick=${onLogout} title="гғӯгӮ°гӮўгӮҰгғҲ" style=${{background:"none",border:"none",color:"var(--sub)",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>гғӯгӮ°гӮўгӮҰгғҲ</button>
        </div>
        <div style=${{fontSize:11,color:"var(--sub)",marginBottom:10}}>${coach}</div>
        <input class="inp" placeholder="з”ҹеҫ’еҗҚгғ»зӣ®жЁҷгҒ§жӨңзҙў" value=${q} onInput=${e=>setQ(e.target.value)} style=${{marginBottom:8}}/>
        ${!adding
          ? html`<button class="btn" style=${{width:"100%",fontSize:12.5}} onClick=${()=>setAdding(true)}>пјӢ ж–°гҒ—гҒ„гӮҜгғ©гӮӨгӮўгғігғҲгӮ’иҝҪеҠ </button>`
          : html`
            <div style=${{border:"1px solid var(--border)",borderRadius:10,padding:10}}>
              <input class="inp" placeholder="еҗҚеүҚ" value=${newName} onChange=${e=>setNewName(e.target.value)} style=${{marginBottom:8,fontSize:12.5}}/>
              <input class="inp" placeholder="гғЎгғјгғ«гӮўгғүгғ¬гӮ№" value=${newEmail} onChange=${e=>setNewEmail(e.target.value)} style=${{marginBottom:8,fontSize:12.5}}/>
              ${addMsg && html`<div style=${{fontSize:11,color:"var(--red)",marginBottom:8}}>${addMsg}</div>`}
              <div style=${{display:"flex",gap:6}}>
                <button class="btn" style=${{flex:1,fontSize:12}} onClick=${submitAdd}>иҝҪеҠ </button>
                <button style=${{flex:1,fontSize:12,background:"none",border:"1px solid var(--border)",borderRadius:8,cursor:"pointer",fontFamily:"inherit"}} onClick=${()=>{setAdding(false);setAddMsg("");}}>гӮӯгғЈгғігӮ»гғ«</button>
              </div>
            </div>
          `}
      </div>
      <div style=${{overflowY:"auto",flex:1}}>
        <div style=${{padding:"10px 16px 4px",fontSize:11,color:"var(--sub)",fontWeight:600}}>жӢ…еҪ“з”ҹеҫ’ ${filtered.length}дәә</div>
        ${filtered.map(s => {
          const ago = daysAgo(s.lastLogDate);
          const agoColor = !s.joinedJiroku ? "var(--sub)" : ago === null ? "var(--red)" : ago <= 1 ? "var(--green)" : ago <= 3 ? "var(--amber)" : "var(--red)";
          const agoText = !s.joinedJiroku ? "JIROKUжңӘзҷ»йҢІ" : ago === null ? "иЁҳйҢІгҒӘгҒ—" : ago === 0 ? "д»Ҡж—ҘиЁҳйҢІгҒӮгӮҠ" : ago + "ж—ҘеүҚгҒҢжңҖзөӮ";
          const active = s.email === selectedEmail;
          return html`
            <button key=${s.email} onClick=${() => onSelect(s)}
              style=${{display:"block",width:"100%",padding:"12px 16px",border:"none",borderLeft:active?"3px solid var(--accent)":"3px solid transparent",background:active?"var(--accent-l)":"transparent",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
              <div style=${{display:"flex",alignItems:"center",gap:10}}>
                <div style=${{width:32,height:32,borderRadius:"50%",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>${s.avatar}</div>
                <div style=${{flex:1,minWidth:0}}>
                  <div style=${{fontSize:13.5,fontWeight:700,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${s.nickname||s.name}</div>
                  <div style=${{fontSize:11,fontWeight:600,color:agoColor}}>${agoText}</div>
                </div>
                ${s.contractDaysLeft !== null && s.contractDaysLeft <= 30 && html`
                  <div title="еҘ‘зҙ„зөӮдәҶгҒҫгҒ§ж®ӢгӮҠе°‘гҒӘгҒ„" style=${{fontSize:9,fontWeight:700,color:"#fff",background:"var(--red)",borderRadius:20,padding:"2px 6px",flexShrink:0}}>ж®Ӣ${s.contractDaysLeft}ж—Ҙ</div>
                `}
              </div>
            </button>
          `;
        })}
        ${filtered.length === 0 && html`<div style=${{padding:20,fontSize:12,color:"var(--sub)",textAlign:"center"}}>и©ІеҪ“гҒҷгӮӢз”ҹеҫ’гҒҢгҒ„гҒҫгҒӣгӮ“</div>`}
      </div>
    </aside>
  `;
}

// в”Җв”Җ гғЎгӮӨгғі: йҒёжҠһдёӯгҒ®з”ҹеҫ’гҒ®и©ізҙ°пјҲгӮҝгғ–еҲҮгӮҠжӣҝгҒҲпјү в”Җв”Җ
function StudentMain({ student, onNoteSaved }) {
  const [tab, setTab] = useState("overview"); // overview | history | notes | profile
  const [detail, setDetail] = useState(null);
  const [prep, setPrep] = useState(null);
  const [prepLoading, setPrepLoading] = useState(false);
  const [content, setContent] = useState("");
  const [nextTheme, setNextTheme] = useState("");
  const [promises, setPromises] = useState("");
  const [noteDate, setNoteDate] = useState(() => new Date().toISOString().substring(0,10));
  const [saving, setSaving] = useState(false);
  const [savedMsg, setSavedMsg] = useState("");
  const [sessionMode, setSessionMode] = useState(false);
  const [suggestions, setSuggestions] = useState([]);
  const [suggestLoading, setSuggestLoading] = useState(false);
  const [suggestedOnce, setSuggestedOnce] = useState(false);
  const [importOpen, setImportOpen] = useState(false);
  const [importRows, setImportRows] = useState([{ date: "", content: "", next_theme: "", promises: "" }]);
  const [importing, setImporting] = useState(false);
  const [importMsg, setImportMsg] = useState("");

  const reloadDetail = () => api("coachGetStudentDetail", { targetEmail: student.email }).then(r => { if (r.ok) setDetail(r.data); });

  useEffect(() => {
    setDetail(null); setPrep(null); setTab("overview");
    setSessionMode(false); setSuggestions([]); setSuggestedOnce(false);
    setImportOpen(false); setImportRows([{ date: "", content: "", next_theme: "", promises: "" }]);
    reloadDetail();
  }, [student.email]);

  const loadPrep = () => {
    setPrepLoading(true);
    api("coachPrepSummary", { targetEmail: student.email }).then(r => {
      setPrep(r.ok ? r.data.summary : "з”ҹжҲҗгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹгҖӮгӮӮгҒҶдёҖеәҰгҒҠи©ҰгҒ—гҒҸгҒ гҒ•гҒ„");
      setPrepLoading(false);
    });
  };

  const loadSuggestions = async () => {
    setSuggestLoading(true);
    const r = await apiPost("coachSessionSuggestions", { targetEmail: student.email, draftNotes: content });
    setSuggestions(r.ok ? r.data.suggestions : ["жҸҗжЎҲгҒ®з”ҹжҲҗгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹгҖӮгӮӮгҒҶдёҖеәҰгҒҠи©ҰгҒ—гҒҸгҒ гҒ•гҒ„"]);
    setSuggestedOnce(true);
    setSuggestLoading(false);
  };

  const addImportRow = () => setImportRows(rows => [...rows, { date: "", content: "", next_theme: "", promises: "" }]);
  const removeImportRow = (i) => setImportRows(rows => rows.filter((_, idx) => idx !== i));
  const setImportField = (i, k, v) => setImportRows(rows => rows.map((r, idx) => idx === i ? { ...r, [k]: v } : r));

  const submitImport = async () => {
    const validRows = importRows.filter(r => r.content.trim());
    if (validRows.length === 0) return;
    setImporting(true);
    const r = await apiPost("coachImportNotes", { targetEmail: student.email, notes: validRows });
    if (r.ok) {
      setImportMsg(`${r.data.imported}д»¶гӮ’гӮӨгғігғқгғјгғҲгҒ—гҒҫгҒ—гҒҹ`);
      setImportRows([{ date: "", content: "", next_theme: "", promises: "" }]);
      reloadDetail();
    } else {
      setImportMsg("гӮӨгғігғқгғјгғҲгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ");
    }
    setImporting(false);
    setTimeout(() => setImportMsg(""), 3000);
  };

  const saveNote = async () => {
    if (!content.trim()) return;
    setSaving(true);
    const r = await api("coachSaveNote", { targetEmail: student.email, date: noteDate, content: content.trim(), next_theme: nextTheme.trim(), promises: promises.trim() });
    if (r.ok) {
      setSavedMsg("дҝқеӯҳгҒ—гҒҫгҒ—гҒҹгҖӮAIгӮігғјгғҒгҒ«гӮӮеҸҚжҳ гҒ•гӮҢгҒҫгҒҷ");
      setContent(""); setNextTheme(""); setPromises("");
      api("coachGetStudentDetail", { targetEmail: student.email }).then(rr => { if (rr.ok) setDetail(rr.data); });
      onNoteSaved && onNoteSaved(student.email, noteDate);
      setTimeout(() => setSavedMsg(""), 3000);
    } else {
      setSavedMsg("дҝқеӯҳгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ");
      setTimeout(() => setSavedMsg(""), 3000);
    }
    setSaving(false);
  };

  return html`
    <div style=${{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style=${{padding:"18px 28px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style=${{display:"flex",alignItems:"center",gap:12}}>
          <div style=${{width:40,height:40,borderRadius:"50%",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:21}}>${student.avatar}</div>
          <div>
            <div style=${{fontSize:17,fontWeight:800}}>${student.name}</div>

// в”Җв”Җ гғ—гғӯгғ•гӮЈгғјгғ«гғ»еҘ‘зҙ„гӮҝгғ– в”Җв”Җ
const PAYMENT_TYPES = [{v:"lump",l:"дёҖжӢ¬жү•гҒ„"},{v:"card_installment",l:"гӮҜгғ¬гӮ«еҲҶеүІ"},{v:"transfer_installment",l:"жҢҜиҫјеҲҶеүІ"}];
const GENDER_TYPES = [{v:"",l:"жңӘиЁӯе®ҡ"},{v:"male",l:"з”·жҖ§"},{v:"female",l:"еҘіжҖ§"},{v:"other",l:"гҒқгҒ®д»–"}];

function ProfileTab({ student, detail, onReload }) {
  const p = detail.profile || {};
  const [form, setForm] = useState({
    name: p.name || student.name || "", birthdate: p.birthdate || "", gender: p.gender || "", family: p.family || "",
    address: p.address || "", phone: p.phone || "",
    occupation: p.occupation || "", profile_notes: p.profile_notes || "",
    contract_start: p.contract_start || "", contract_end: p.contract_end || "",
    payment_type: p.payment_type || "lump", contract_amount: p.contract_amount || "",
    installment_count: p.installment_count || "", stripe_email: p.stripe_email || ""
  });
  const [saving, setSaving] = useState(false);
  const [savedMsg, setSavedMsg] = useState("");
  const [uploading, setUploading] = useState(false);
  const [extracting, setExtracting] = useState(false);
  const [extractMsg, setExtractMsg] = useState("");
  const [fileNote, setFileNote] = useState("");
  const [syncingStripe, setSyncingStripe] = useState(false);
  const [stripeMsg, setStripeMsg] = useState("");
  const fileInputRef = useRef(null);

  useEffect(() => {
    setForm({
      name: p.name || student.name || "", birthdate: p.birthdate || "", gender: p.gender || "", family: p.family || "",
      address: p.address || "", phone: p.phone || "",
      occupation: p.occupation || "", profile_notes: p.profile_notes || "",
      contract_start: p.contract_start || "", contract_end: p.contract_end || "",
      payment_type: p.payment_type || "lump", contract_amount: p.contract_amount || "",
      installment_count: p.installment_count || "", stripe_email: p.stripe_email || ""
    });
  }, [student.email]);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const save = async () => {
    setSaving(true);
    const r = await apiPost("coachSaveProfile", { targetEmail: student.email, ...form });
    setSavedMsg(r.ok ? "дҝқеӯҳгҒ—гҒҫгҒ—гҒҹ" : "дҝқеӯҳгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ");
    if (r.ok) onReload();
    setSaving(false);
    setTimeout(() => setSavedMsg(""), 2500);
  };

  const age = form.birthdate ? Math.floor((Date.now() - new Date(form.birthdate)) / (365.25*86400000)) : null;
  const contractDaysLeft = form.contract_end ? Math.ceil((new Date(form.contract_end) - new Date()) / 86400000) : null;

  const onFileChosen = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 15 * 1024 * 1024) { alert("15MBгҒҫгҒ§гҒ®гғ•гӮЎгӮӨгғ«гҒ«еҜҫеҝңгҒ—гҒҰгҒ„гҒҫгҒҷ"); return; }
    setUploading(true);
    try {
      const base64 = await fileToBase64(file);
      const r = await apiPost("coachUploadFile", { targetEmail: student.email, fileName: file.name, mimeType: file.type, fileData: base64, note: fileNote.trim() });
      if (r.ok) {
        setFileNote(""); onReload();
        if (file.type === "application/pdf") {
          setExtracting(true);
          setExtractMsg("");
          const er = await apiPost("coachExtractContractInfo", { targetEmail: student.email, fileData: base64, mimeType: file.type });
          if (er.ok) {
            const ex = er.data;
            setForm(f => ({
              ...f,
              name: ex.name || f.name, birthdate: ex.birthdate || f.birthdate,
              address: ex.address || f.address, phone: ex.phone || f.phone,
              contract_start: ex.contract_start || f.contract_start, contract_end: ex.contract_end || f.contract_end,
              payment_type: ex.payment_type || f.payment_type,
              contract_amount: ex.contract_amount || f.contract_amount,
              installment_count: ex.installment_count || f.installment_count
            }));
            setExtractMsg("AIгҒҢеҘ‘зҙ„жӣёгҒӢгӮүиӘӯгҒҝеҸ–гҒЈгҒҹеҶ…е®№гӮ’гғ•гӮ©гғјгғ гҒ«еҸҚжҳ гҒ—гҒҫгҒ—гҒҹгҖӮеҶ…е®№гӮ’зўәиӘҚгҒ—гҒҰгҒӢгӮүдҝқеӯҳгҒ—гҒҰгҒҸгҒ гҒ•гҒ„");
          } else {
            setExtractMsg("еҘ‘зҙ„жӣёгҒ®иҮӘеӢ•иӘӯгҒҝеҸ–гӮҠгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹпјҲжүӢеӢ•гҒ§е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„пјү");
          }
          setExtracting(false);
        }
      }
      else alert("гӮўгғғгғ—гғӯгғјгғүгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ: " + (r.error || ""));
    } catch (err) { alert("гӮўгғғгғ—гғӯгғјгғүгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ"); }
    setUploading(false);
    if (fileInputRef.current) fileInputRef.current.value = "";
  };

  const deleteFile = async (fileId) => {
    if (!confirm("гҒ“гҒ®гғ•гӮЎгӮӨгғ«гӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ")) return;
    const r = await apiPost("coachDeleteFile", { targetEmail: student.email, file_id: fileId });
    if (r.ok) onReload();
  };

  const syncStripe = async () => {
    setSyncingStripe(true);
    setStripeMsg("");
    const r = await api("coachSyncStripeOne", { targetEmail: student.email });
    setStripeMsg(r.ok ? "жӣҙж–°гҒ—гҒҫгҒ—гҒҹ" : "еҗҢжңҹгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ: " + (r.error || ""));
    if (r.ok) onReload();
    setSyncingStripe(false);
    setTimeout(() => setStripeMsg(""), 3000);
  };

  return html`
    <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,alignItems:"start"}}>
      <div class="card">
        <div class="card-label">рҹ‘Ө гғ—гғӯгғ•гӮЈгғјгғ«</div>
        <label class="lbl">еҗҚеүҚ</label>
        <input class="inp" value=${form.name} onChange=${e=>set("name", e.target.value)} placeholder="дҫӢпјҡеұұз”°еӨӘйғҺ" style=${{marginBottom:12}}/>
        <label class="lbl">з”ҹе№ҙжңҲж—Ҙ${age !== null && html` <span style=${{color:"var(--accent)",fontWeight:700}}>пјҲ${age}жӯіпјү</span>`}</label>
        <input type="date" class="inp" value=${form.birthdate} onChange=${e=>set("birthdate", e.target.value)} style=${{marginBottom:12}}/>
        <label class="lbl">жҖ§еҲҘ</label>
        <select class="inp" value=${form.gender} onChange=${e=>set("gender", e.target.value)} style=${{marginBottom:12}}>
          ${GENDER_TYPES.map(t => html`<option key=${t.v} value=${t.v}>${t.l}</option>`)}
        </select>
        <label class="lbl">е®¶ж—Ҹж§ӢжҲҗ</label>
        <input class="inp" value=${form.family} onChange=${e=>set("family", e.target.value)} placeholder="дҫӢпјҡй…ҚеҒ¶иҖ…гғ»еӯҗ2дәә" style=${{marginBottom:12}}/>
        <label class="lbl">гҒҠдҪҸгҒҫгҒ„</label>
        <input class="inp" value=${form.address} onChange=${e=>set("address", e.target.value)} placeholder="дҫӢпјҡжқұдә¬йғҪгҖҮгҖҮеҢә" style=${{marginBottom:12}}/>
        <label class="lbl">йӣ»и©ұз•ӘеҸ·</label>
        <input class="inp" value=${form.phone} onChange=${e=>set("phone", e.target.value)} placeholder="дҫӢпјҡ090-1234-5678" style=${{marginBottom:12}}/>
        <label class="lbl">иҒ·жҘӯ</label>
        <input class="inp" value=${form.occupation} onChange=${e=>set("occupation", e.target.value)} placeholder="дҫӢпјҡдјҡзӨҫе“ЎгҖҒзөҢе–¶иҖ…гҖҒеӯҰз”ҹгҒӘгҒ©" style=${{marginBottom:12}}/>
        <label class="lbl">гғ—гғӯгғ•гӮЈгғјгғ«гғЎгғўпјҲжҖ§ж јгғ»иғҢжҷҜгҒӘгҒ©иҮӘз”ұиЁҳиҝ°пјү</label>
        <textarea class="txa" value=${form.profile_notes} onChange=${e=>set("profile_notes", e.target.value)} placeholder="гӮігғјгғҒгғігӮ°гҒ«еҪ№з«ӢгҒӨиғҢжҷҜжғ…е ұгӮ’иҮӘз”ұгҒ«" style=${{marginBottom:0}}/>
      </div>

      <div>
        <div class="card">
          <div class="card-label">рҹ“„ еҘ‘зҙ„жғ…е ұ</div>
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <div>
              <label class="lbl">еҘ‘зҙ„й–Ӣе§Ӣж—Ҙ</label>
              <input type="date" class="inp" value=${form.contract_start} onChange=${e=>set("contract_start", e.target.value)}/>
            </div>
            <div>
              <label class="lbl">еҘ‘зҙ„зөӮдәҶж—Ҙ${contractDaysLeft !== null && html`
                <span style=${{color:contractDaysLeft<=30?"var(--red)":contractDaysLeft<=60?"var(--amber)":"var(--sub)",fontWeight:700}}> пјҲж®ӢгӮҠ${contractDaysLeft}ж—Ҙпјү</span>
              `}</label>
              <input type="date" class="inp" value=${form.contract_end} onChange=${e=>set("contract_end", e.target.value)}/>
            </div>
          </div>
          <label class="lbl">ж”Ҝжү•гҒ„ж–№жі•</label>
          <select class="inp" value=${form.payment_type} onChange=${e=>set("payment_type", e.target.value)} style=${{marginBottom:12}}>
            ${PAYMENT_TYPES.map(t => html`<option key=${t.v} value=${t.v}>${t.l}</option>`)}
          </select>
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            <div>
              <label class="lbl">еҘ‘зҙ„йҮ‘йЎҚпјҲеҶҶпјү</label>
              <input class="inp" type="number" value=${form.contract_amount} onChange=${e=>set("contract_amount", e.target.value)} placeholder="дҫӢпјҡ480000"/>
            </div>
            ${form.payment_type !== "lump" && html`
              <div>
                <label class="lbl">еҲҶеүІеӣһж•°</label>
                <input class="inp" type="number" value=${form.installment_count} onChange=${e=>set("installment_count", e.target.value)} placeholder="дҫӢпјҡ12"/>
              </div>
            `}
          </div>
          <button class="btn" onClick=${save} disabled=${saving}>${saving ? "дҝқеӯҳдёӯ..." : "дҝқеӯҳгҒҷгӮӢ"}</button>
          ${savedMsg && html`<span style=${{fontSize:12,color:"var(--green)",marginLeft:10}}>${savedMsg}</span>`}
        </div>

        <div class="card">
          <div class="card-label">рҹ’і StripeжұәжёҲзҠ¶жіҒ</div>
          ${p.stripe_synced_at ? html`
            <div style=${{fontSize:26,fontWeight:800,marginBottom:4}}>
              ${Number(p.stripe_total_paid || 0).toLocaleString()}<span style=${{fontSize:13,color:"var(--sub)",fontWeight:600}}> ${(p.stripe_currency||"jpy").toUpperCase()} ж”Ҝжү•гҒ„жёҲгҒҝ</span>
            </div>
            <div style=${{fontSize:11,color:"var(--sub)",marginBottom:12}}>жңҖзөӮеҗҢжңҹ: ${p.stripe_synced_at}</div>
          ` : html`
            <div style=${{fontSize:13,color:"var(--sub)",marginBottom:12}}>гҒҫгҒ еҗҢжңҹгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“</div>
          `}
          <button class="btn" onClick=${syncStripe} disabled=${syncingStripe}>${syncingStripe ? "еҗҢжңҹдёӯ..." : "д»ҠгҒҷгҒҗеҗҢжңҹ"}</button>
          ${stripeMsg && html`<span style=${{fontSize:12,color:"var(--accent)",marginLeft:10}}>${stripeMsg}</span>`}
          <label class="lbl" style=${{marginTop:14}}>StripeйҖЈжҗәз”ЁгғЎгғјгғ«гӮўгғүгғ¬гӮ№пјҲStripeеҒҙгҒ®зҷ»йҢІеҗҚгғ»гғЎгғјгғ«гҒҢйҒ•гҒҶе ҙеҗҲгҒ®гҒҝе…ҘеҠӣпјү</label>
          <input class="inp" value=${form.stripe_email} onChange=${e=>set("stripe_email", e.target.value)} placeholder="жңӘе…ҘеҠӣгҒӘгӮүз”ҹеҫ’гҒ®гғЎгғјгғ«гӮўгғүгғ¬гӮ№гҒ§жӨңзҙўгҒ—гҒҫгҒҷ"/>
        </div>

        <div class="card">
          <div class="card-label">рҹ“Һ еҘ‘зҙ„жӣёгғ•гӮЎгӮӨгғ«</div>
          <input class="inp" value=${fileNote} onChange=${e=>setFileNote(e.target.value)} placeholder="гғ•гӮЎгӮӨгғ«гҒ®гғЎгғўпјҲд»»ж„Ҹгғ»дҫӢпјҡеҲқеӣһеҘ‘зҙ„жӣёпјү" style=${{marginBottom:10}}/>
          <input ref=${fileInputRef} type="file" onChange=${onFileChosen} disabled=${uploading} style=${{fontSize:12.5,marginBottom:14}}/>
          ${uploading && html`<div style=${{fontSize:12,color:"var(--sub)"}}>гӮўгғғгғ—гғӯгғјгғүдёӯ...</div>`}
          ${extracting && html`<div style=${{fontSize:12,color:"var(--sub)"}}>рҹӨ– AIгҒҢеҘ‘зҙ„жӣёгҒ®еҶ…е®№гӮ’иӘӯгҒҝеҸ–гӮҠдёӯ...</div>`}
          ${extractMsg && !extracting && html`<div style=${{fontSize:12,color:"var(--accent)",marginBottom:8}}>${extractMsg}</div>`}
          ${detail.files.length === 0 && html`<div style=${{fontSize:13,color:"var(--sub)"}}>гҒҫгҒ гғ•гӮЎгӮӨгғ«гҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div>`}
          ${detail.files.map((f,i) => html`
            <div key=${f.file_id} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:i<detail.files.length-1?"1px solid var(--border)":"none"}}>
              <div style=${{minWidth:0}}>
                <a href=${f.file_url} target="_blank" style=${{fontSize:13,color:"var(--accent)",fontWeight:600,textDecoration:"none"}}>рҹ“„ ${f.file_name}</a>
                <div style=${{fontSize:11,color:"var(--sub)",marginTop:2}}>${f.note ? f.note + " В· " : ""}${f.uploaded_at}</div>
              </div>
              <button onClick=${()=>deleteFile(f.file_id)} style=${{background:"none",border:"none",color:"var(--red)",fontSize:11,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>еүҠйҷӨ</button>
            </div>
          `)}
        </div>
      </div>
    </div>
  `;
}

function App() {
  const [coach, setCoach] = useState(COACH_EMAIL);
  const [students, setStudents] = useState(null);
  const [selected, setSelected] = useState(null);

  const refreshStudents = () => api("coachGetStudents").then(r => { if (r.ok) setStudents(r.data); });

  useEffect(() => {
    if (!COACH_EMAIL) return;
    refreshStudents().then(() => {}).catch(()=>{});
    api("coachGetStudents").then(r => {
      if (r.ok) setStudents(r.data);
      else { localStorage.removeItem("jiroku_coach_email"); COACH_EMAIL = null; setCoach(null); }
    });
  }, []);

  const logout = () => {
    localStorage.removeItem("jiroku_coach_email");
    COACH_EMAIL = null; setCoach(null); setStudents(null); setSelected(null);
  };

  const addClient = async (email, name) => {
    const r = await api("coachAddClient", { email, name });
    if (r.ok) await refreshStudents();
    return r;
  };

  if (!coach) return html`<${LoginScreen} onLogin=${(email, list) => { setCoach(email); setStudents(list); }}/>`;
  if (!students) return html`<div style=${{display:"flex",justifyContent:"center",alignItems:"center",height:"100%"}}><div class="spin"/></div>`;

  return html`
    <div style=${{display:"flex",height:"100%"}}>
      <${Sidebar} students=${students} selectedEmail=${selected?.email} onSelect=${setSelected} onLogout=${logout} coach=${coach} onAddClient=${addClient}/>
      <main style=${{flex:1,overflow:"hidden",background:"var(--bg)"}}>
        ${selected
          ? html`<${StudentMain} key=${selected.email} student=${selected} onNoteSaved=${refreshStudents}/>`
          : html`<div style=${{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"var(--sub)",fontSize:14}}>е·ҰгҒ®дёҖиҰ§гҒӢгӮүз”ҹеҫ’гӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„</div>`}
      </main>
    </div>
  `;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
