// ── Chat ──
function TimerScreen({onToast, isActive}) {
  const getPresets = () => JSON.parse(localStorage.getItem("timer_presets")||"[25,45,60]");
  const getBreak   = () => Number(localStorage.getItem("timer_break")||"5");

  const loadTimerState = () => {
    try {
      const s = JSON.parse(localStorage.getItem("jiroku_timer_state")||"null");
      if (!s) return null;
      // 実行中だった場合、経過時間を差し引いて残り時間を計算
      if (s.isRunning && s.savedAt) {
        const elapsed = Math.floor((Date.now() - s.savedAt) / 1000);
        s.timeLeft = Math.max(0, s.timeLeft - elapsed);
      }
      return s;
    } catch(e) { return null; }
  };

  const saved = loadTimerState();
  const defaultMin = getPresets()[0];

  const [breakMin]       = useState(getBreak);
  const [selectedMin, setSelectedMin] = useState(saved?.selectedMin ?? defaultMin);
  const [timeLeft, setTimeLeft]       = useState(saved?.timeLeft ?? defaultMin*60);
  const [isRunning, setIsRunning]     = useState(saved?.isRunning ?? false);
  const [mode, setMode]               = useState(saved?.mode ?? "focus");
  const [sessionCount, setSessionCount] = useState(saved?.sessionCount ?? 0);
  const [task, setTask]               = useState(saved?.task ?? "");
  const [startTime, setStartTime]     = useState(saved?.startTime ? new Date(saved.startTime) : null);
  const [showModal, setShowModal]     = useState(false);
  // タイマー完了後の記録をワンタップで確定できるよう、自己評価は初期値を入れておく
  // （毎回5段階から選び直す手間を減らす。もちろん自由に変更できる）
  const [logFocus, setLogFocus]       = useState("4 — よくできた");
  const [logMemo, setLogMemo]         = useState("");
  const [logGoalRelated, setLogGoalRelated] = useState(()=>localStorage.getItem("jiroku_timer_goal_related")!=="false");
  const [saving, setSaving]           = useState(false);
  // 今回のセッションの実測結果（予定◯分に対して実際◯分集中したか）。
  // 途中で終えた場合も分単位で記録できるよう、モーダルを開く時点で確定させる
  const [sessionResult, setSessionResult] = useState(null); // {planned, actual} | null

  // ホーム画面の「今日のアクション」を、タイマーの集中対象としてもワンタップで選べるようにする
  const [todayActionOptions, setTodayActionOptions] = useState(()=>{
    try {
      const s = JSON.parse(localStorage.getItem("jiroku_today_actions_shared")||"null");
      if (s && s.date === formatDateStr(new Date())) return s.items || [];
    } catch(e){}
    return [];
  });
  useEffect(()=>{
    if (!isActive) return;
    try {
      const s = JSON.parse(localStorage.getItem("jiroku_today_actions_shared")||"null");
      setTodayActionOptions(s && s.date === formatDateStr(new Date()) ? (s.items||[]) : []);
    } catch(e){}
  },[isActive]);

  // 状態をlocalStorageに保存
  useEffect(()=>{
    localStorage.setItem("jiroku_timer_state", JSON.stringify({
      selectedMin, timeLeft, isRunning, mode, sessionCount,
      task, startTime: startTime?.toISOString()||null, savedAt: Date.now()
    }));
  },[selectedMin, timeLeft, isRunning, mode, sessionCount, task, startTime]);

  // タブに戻った時にプリセット設定を再読込
  const [presets, setPresets] = useState(getPresets);
  useEffect(()=>{ if(isActive) setPresets(getPresets()); },[isActive]);

  // スタート/一時停止は短いクリック音、完了は目覚まし時計風の「ピピピ」ビープで区別する
  const clickElRef = useRef(null);
  const getClickEl = () => {
    if(!clickElRef.current) clickElRef.current = new Audio(TIMER_CLICK_SRC);
    return clickElRef.current;
  };
  const primeAudio = () => {
    try {
      const el = getClickEl();
      el.volume = 0.5;
      el.currentTime = 0;
      el.play().catch(()=>{});
    } catch(e){}
    // ユーザー操作のタイミングでAudioContextを再開しておく
    // （タイマー終了時はユーザー操作の外なので、ここで準備しておかないと鳴らせないことがある）
    try {
      const ctx = getSharedAudioCtx();
      if(ctx.state === "suspended") ctx.resume();
    } catch(e){}
    try { navigator.vibrate?.(60); } catch(e){}
  };
  const playBeep = () => {
    try { scheduleAlarmBeeps(getAlarmStyle()); } catch(e){}
    // 音が出せない環境（マナーモード等）でも気づけるよう振動も併用（アラームらしく長めのパターンに）
    try { navigator.vibrate?.([300,150,300,150,300,150,300]); } catch(e){}
  };

  // バックグラウンド復帰時に経過時間を補正する
  const timeLeftRef = useRef(timeLeft);
  const isRunningRef = useRef(isRunning);
  const selectedMinRef = useRef(selectedMin);
  const modeRef = useRef(mode);
  useEffect(()=>{ timeLeftRef.current = timeLeft; },[timeLeft]);
  useEffect(()=>{ isRunningRef.current = isRunning; },[isRunning]);
  useEffect(()=>{ selectedMinRef.current = selectedMin; },[selectedMin]);
  useEffect(()=>{ modeRef.current = mode; },[mode]);

  // アプリが閉じられていても気づけるよう、開始時にLINE通知をGAS側に予約し、
  // 一時停止・リセット・アプリ内で完了を検知できたときは予約を取り消す
  const scheduleEndNotify = (secondsLeft, currentMode) => {
    const endTime = Date.now() + secondsLeft*1000;
    const label = currentMode==="focus" ? "集中セッション" : "休憩";
    gasPost("scheduleTimerEnd", {endTime, label});
  };
  const cancelEndNotify = () => { gasPost("cancelTimerEnd"); };

  useEffect(()=>{
    const onVisible = () => {
      if(document.visibilityState === 'visible' && isRunningRef.current) {
        try {
          const s = JSON.parse(localStorage.getItem("jiroku_timer_state")||"null");
          if(s && s.isRunning && s.savedAt) {
            const elapsed = Math.floor((Date.now() - s.savedAt) / 1000);
            const corrected = Math.max(0, s.timeLeft - elapsed);
            setTimeLeft(corrected);
            if(corrected <= 0) {
              setIsRunning(false);
              playBeep();
              cancelEndNotify(); // アプリ内で気づけたのでLINE通知は不要
              if(modeRef.current === "focus"){ setSessionCount(c=>c+1); setSessionResult({planned:selectedMinRef.current, actual:selectedMinRef.current}); setShowModal(true); }
              else { setMode("focus"); setTimeLeft(selectedMinRef.current*60); }
            }
          }
        } catch(e){}
      }
    };
    document.addEventListener('visibilitychange', onVisible);
    return ()=>document.removeEventListener('visibilitychange', onVisible);
  },[]);

  useEffect(()=>{
    if(!isRunning) return;
    if(timeLeft<=0){
      setIsRunning(false);
      playBeep();
      cancelEndNotify(); // アプリ内で気づけたのでLINE通知は不要
      if(mode==="focus"){ setSessionCount(c=>c+1); setSessionResult({planned:selectedMin, actual:selectedMin}); setShowModal(true); }
      else { setMode("focus"); setTimeLeft(selectedMin*60); }
      return;
    }
    const t = setTimeout(()=>setTimeLeft(s=>s-1), 1000);
    return ()=>clearTimeout(t);
  },[isRunning, timeLeft]);

  const selectPreset = (min) => {
    setSelectedMin(min); setTimeLeft(min*60);
    setIsRunning(false); setStartTime(null); setMode("focus");
    cancelEndNotify();
  };
  const start = () => {
    primeAudio();
    if(!startTime) setStartTime(new Date());
    setIsRunning(true);
    scheduleEndNotify(timeLeft, mode);
  };
  const pause = () => { primeAudio(); setIsRunning(false); cancelEndNotify(); };
  const reset = () => { setIsRunning(false); setTimeLeft(selectedMin*60); setStartTime(null); setMode("focus"); setTask(""); setSessionResult(null); localStorage.removeItem("jiroku_timer_state"); cancelEndNotify(); };

  const saveLog = async () => {
    setSaving(true);
    const st = startTime||new Date();
    const endDt = new Date(st.getTime() + (sessionResult?sessionResult.actual:selectedMin)*60000);
    const fmtHM = d => String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
    // 同じ1時間内に複数回タイマーで測っても記録が上書きされないよう、時間帯キーは
    // 「HH:00-HH:00」の固定枠ではなく、実際の開始〜終了の分単位にする（1回ごとに別の記録として残る）
    const timeBlock = fmtHM(st)+"-"+fmtHM(endDt);
    // 予定に対する実測の集中時間を、メモの末尾に分単位で自動追記する
    // （レポート生成のAIにも渡るため、計画実行力のフィードバック材料になる）
    const timerNote = sessionResult ? `⏱ 集中${sessionResult.actual}分（予定${sessionResult.planned}分）` : "";
    const memoToSave = [logMemo.trim(), timerNote].filter(Boolean).join("\n");
    // メモが長くなるとURLの長さ制限に引っかかる可能性があるため、GETのURL
    // パラメータではなくPOSTのボディで送る（gasPostJson）
    const calTitle = task.trim()||`ポモドーロ${sessionResult?sessionResult.actual:selectedMin}分集中`;
    const res = await gasPostJson("saveLog", {
      time_block: timeBlock,
      task: calTitle,
      focus_level: logFocus,
      memo: memoToSave,
      goal_related: logGoalRelated?"true":"false",
    });
    if(!res.ok){ onToast("記録に失敗しました。もう一度お試しください"); setSaving(false); return; }
    if(res.xp_gained){ const lv=res.level_up?` → Lv.${res.level}！`:""; onToast(`+${res.xp_gained} XP 獲得${lv}`); }
    else onToast(res.updated?"記録を更新しました":"記録しました");
    // タイマー記録は1時間枠ではなく「実際に集中した開始〜終了時刻」でカレンダーに書き戻す
    // （同じ時間帯キーを使うので、手動記録側で作ったイベントがあれば実測時刻に更新される）
    upsertCalendarEvent(formatDateStr(st), timeBlock, st.toISOString(), endDt.toISOString(), calTitle);
    setSaving(false); setShowModal(false); setLogMemo(""); setTask(""); setSessionResult(null);
    setMode("break"); setTimeLeft(breakMin*60); setStartTime(null);
  };
  const skipLog = () => { setShowModal(false); setTask(""); setSessionResult(null); setMode("break"); setTimeLeft(breakMin*60); setStartTime(null); };

  const mins = Math.floor(timeLeft/60);
  const secs = timeLeft%60;
  const totalSec = (mode==="focus"?selectedMin:breakMin)*60;
  const pct = Math.max(0,Math.min(100,((totalSec-timeLeft)/totalSec)*100));
  const r=90, circ=2*Math.PI*r, offset=circ*(1-pct/100);
  const accentColor = mode==="break"?"var(--green)":"var(--accent)";

  return html`<div style=${{paddingBottom:32}}>
    <div class="ph" style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div class="ph-title-accent">ポモドーロタイマー</div>
      <button onClick=${()=>{primeAudio();setTimeout(playBeep,150);}}
        style=${{background:"none",border:"1px solid var(--border)",borderRadius:20,padding:"6px 12px",fontSize:12,color:"var(--sub)",cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>
        🔊 音をテスト
      </button>
    </div>
    <div style=${{padding:"0 16px"}}>

      <div style=${{display:"flex",gap:8,marginBottom:24}}>
        ${presets.map(min=>html`
          <button key=${min} onClick=${()=>!isRunning&&selectPreset(min)}
            style=${{flex:1,padding:"10px 0",borderRadius:10,border:`1.5px solid ${selectedMin===min?"var(--accent)":"var(--border)"}`,
            background:selectedMin===min?"var(--accent-l)":"var(--card)",color:selectedMin===min?"var(--accent)":"var(--sub)",
            fontWeight:600,fontSize:14,cursor:isRunning?"default":"pointer",opacity:isRunning&&selectedMin!==min?0.4:1}}>
            ${min}分
          </button>
        `)}
      </div>

      <div style=${{position:"relative",width:220,height:220,margin:"0 auto",marginBottom:20}}>
        <svg width="220" height="220" viewBox="0 0 220 220" style=${{position:"absolute",top:0,left:0}}>
          <circle cx="110" cy="110" r=${r} fill="none" stroke="var(--border)" stroke-width="10"/>
          <circle cx="110" cy="110" r=${r} fill="none" stroke=${accentColor} stroke-width="10"
            stroke-dasharray=${circ} stroke-dashoffset=${offset}
            stroke-linecap="round" transform="rotate(-90 110 110)"
            style=${{transition:"stroke-dashoffset 1s linear"}}/>
        </svg>
        <div style=${{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style=${{fontSize:46,fontWeight:800,color:"var(--text)",lineHeight:1,fontVariantNumeric:"tabular-nums"}}>
            ${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}
          </div>
          <div style=${{fontSize:13,color:mode==="break"?"var(--green)":"var(--sub)",marginTop:8}}>
            ${mode==="focus"?`集中中 · 第${sessionCount+1}セッション`:`休憩中 · 第${sessionCount}セッション完了`}
          </div>
        </div>
      </div>

      ${mode==="focus"&&html`
        <div class="form-grp" style=${{marginBottom:16}}>
          <label class="form-lbl">何に集中しますか？（任意）</label>
          <input class="inp" placeholder="例：資料作成、家事、勉強など" value=${task}
            onInput=${e=>setTask(e.target.value)} disabled=${isRunning}/>
          ${!isRunning && todayActionOptions.length>0 && html`
            <div style=${{marginTop:12}}>
              <div style=${{fontSize:10.5,fontWeight:700,letterSpacing:".04em",color:"var(--sub)",marginBottom:7}}>目標・今日のアクションから選ぶ</div>
              <div style=${{display:"flex",flexDirection:"column",gap:6}}>
                ${todayActionOptions.map((a,i)=>{
                  const on=task===a;
                  return html`
                    <button key=${i} onClick=${()=>setTask(on?"":a)}
                      style=${{display:"flex",alignItems:"center",gap:8,width:"100%",textAlign:"left",padding:"10px 12px",borderRadius:10,border:`1.5px solid ${on?"var(--accent)":"var(--border)"}`,background:on?"var(--accent-l)":"var(--bg)",cursor:"pointer",fontFamily:"inherit"}}>
                      <span style=${{fontSize:13,flexShrink:0,opacity:on?1:.7}}>🎯</span>
                      <span style=${{flex:1,minWidth:0,fontSize:12.5,fontWeight:on?700:500,color:on?"var(--accent)":"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${a}</span>
                      ${on&&html`<span style=${{flexShrink:0,fontSize:12,color:"var(--accent)"}}>✓</span>`}
                    </button>
                  `;
                })}
              </div>
            </div>
          `}
        </div>
      `}

      <div style=${{display:"flex",gap:10,marginBottom:startTime&&!showModal?8:16}}>
        <button onClick=${isRunning?pause:start}
          style=${{flex:1,padding:"15px",borderRadius:12,border:"none",background:accentColor,
          color:"white",fontSize:17,fontWeight:700,cursor:"pointer"}}>
          ${isRunning?"⏸ 一時停止":"▶ スタート"}
        </button>
        <button onClick=${reset}
          style=${{padding:"15px 18px",borderRadius:12,border:"1.5px solid var(--border)",
          background:"var(--card)",color:"var(--sub)",fontSize:18,cursor:"pointer"}}>↺</button>
      </div>

      ${startTime&&!showModal&&html`
        <button onClick=${()=>{
            pause();
            // 途中終了でも実際に集中した時間を分単位で確定させる（最低1分）。
            // 休憩中に押した場合は、直前の集中セッションは完走済みなので予定＝実測
            const actual = mode==="focus"
              ? Math.max(1, Math.round((selectedMin*60 - timeLeft)/60))
              : selectedMin;
            setSessionResult({planned:selectedMin, actual});
            setShowModal(true);
          }}
          style=${{width:"100%",padding:"11px",borderRadius:12,border:"1.5px solid var(--accent)",
          background:"none",color:"var(--accent)",fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:16}}>
          ✓ タスク完了・途中で記録する
        </button>
      `}

      <div style=${{display:"flex",gap:10,marginBottom:20}}>
        <div style=${{flex:1,background:"var(--card)",borderRadius:14,padding:"14px 0",textAlign:"center",border:"1px solid var(--border)"}}>
          <div style=${{fontSize:26,fontWeight:800,color:"var(--accent)",lineHeight:1}}>${sessionCount}</div>

          <div style=${{background:"var(--card)",borderRadius:14,padding:"18px 16px",border:"1px solid var(--border)",marginBottom:8}}>
            <div style=${{fontSize:11,color:"var(--accent)",fontWeight:700,marginBottom:8,letterSpacing:"0.05em"}}>TODAY'S QUOTE</div>

              ? (sessionResult.actual>=sessionResult.planned
                  ? `${sessionResult.planned}分の集中セッションが完了しました。記録しましょう。`

              : `${selectedMin}分の集中セッションが完了しました。記録しましょう。`}
          </div>
          <div class="form-grp">
            <label class="form-lbl">何をしましたか？</label>

              </div>
              <span style=${{fontSize:12.5,fontWeight:500,color:logGoalRelated?"var(--accent)":"var(--sub)"}}>この時間は目標に関連している</span>
            </button>
          </div>
          <div class="form-grp">
            <label class="form-lbl">自己評価</label>
            <${EvalPicker} value=${logFocus} onChange=${setLogFocus}/>
          </div>
          <div class="form-grp" style=${{marginBottom:20}}>
            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:8}}>
              <label class="form-lbl" style=${{marginBottom:0}}>メモ（必須）</label>
              <span style=${{fontSize:10.5,color:"var(--sub)",whiteSpace:"nowrap"}}>うまくできたか・感じたこと・改善点</span>
            </div>
            <textarea class="txa" style=${{marginTop:6}} placeholder="うまくいった点、感じたこと、次はこうしたい、など" value=${logMemo}
              onInput=${e=>setLogMemo(e.target.value)}/>
          </div>
          <button class="btn" onClick=${saveLog} disabled=${saving||!logMemo.trim()} style=${{marginBottom:10}}>
            ${saving?html`<span class="spin"/>`:html`記録して休憩へ（${breakMin}分）`}
          </button>
          <button onClick=${skipLog} style=${{width:"100%",background:"none",border:"none",color:"var(--sub)",fontSize:13,padding:"8px",cursor:"pointer"}}>
            スキップ（記録しない）
          </button>
          <button onClick=${()=>{setShowModal(false);}} style=${{width:"100%",background:"none",border:"none",color:"var(--sub)",fontSize:12,padding:"4px",cursor:"pointer",marginTop:2}}>
            ← タイマーに戻る
          </button>
        </div>
      </div>
    `}
  </div>`;
}

          <span style=${{fontSize:13.5,fontWeight:700,color:"var(--text)"}}>${c.icon} ${c.cat}<span style=${{fontSize:11,fontWeight:500,color:"var(--sub)",marginLeft:6}}>${c.items.length}</span></span>
          <span style=${{fontSize:14,color:"var(--sub)",flexShrink:0,transform:openCat===ci?"rotate(180deg)":"none",transition:"transform .15s"}}>▾</span>
        </button>
        ${openCat===ci&&html`
          <div style=${{padding:"0 14px 6px"}}>
            ${c.items.map((f,ii)=>{
              const key=ci+"-"+ii;
              return html`
                <div key=${ii} style=${{borderTop:"1px solid var(--border)"}}>
                  <button onClick=${()=>setOpen(open===key?null:key)}
                    style=${{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,width:"100%",background:"none",border:"none",padding:"12px 2px",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
                    <span style=${{fontSize:13,fontWeight:600,color:"var(--text)",lineHeight:1.5}}>${f.q}</span>
                    <span style=${{fontSize:15,color:"var(--sub)",flexShrink:0,transform:open===key?"rotate(45deg)":"none",transition:"transform .15s"}}>＋</span>
                  </button>
                  ${open===key&&html`<div style=${{fontSize:13,color:"var(--sub)",lineHeight:1.8,padding:"0 2px 12px",whiteSpace:"pre-line"}}>${f.a}</div>`}
                </div>
              `;
            })}
          </div>
        `}
      </div>
    `)}
  </div>`;
}

// ── Settings ──
function SettingsScreen({onToast,onLogout,onGoalSaved,profile,onProfileSaved,onCalLinked}) {
  const [nickname,setNickname]=useState(profile?.nickname||CURRENT_USER.name);
  const [avatar,setAvatar]=useState(profile?.avatar||"🦊");
  const [showAllAvatars,setShowAllAvatars]=useState(false);
  // 自分の記録の書き出し（データ所有）。取得した内容をブラウザでファイル化してダウンロード
  const [exporting,setExporting]=useState("");
  const exportData=async(format)=>{
    setExporting(format);
    try{
      const r=await gasApi("exportMyData",{format});
      if(r.ok&&r.content){
        const blob=new Blob([r.content],{type:(r.mime||"text/plain")+";charset=utf-8"});
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");
        a.href=url; a.download=r.filename||("jiroku."+(format==="csv"?"csv":"md"));
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=>URL.revokeObjectURL(url),1000);
        onToast("記録を書き出しました");
      } else onToast(r.error||"書き出しに失敗しました");
    }catch(e){ onToast("書き出しに失敗しました"); }
    setExporting("");
  };
  const saveProfile=async()=>{
    if(!nickname.trim()){ onToast("ニックネームを入力してください"); return; }
    const nn=nickname.trim();
    await gasPost("saveSettings",{nickname:nn,avatar});
    const u={...CURRENT_USER,nickname:nn,avatar};
    CURRENT_USER=u; localStorage.setItem("edventure_user",JSON.stringify(u));
    onProfileSaved({nickname:nn,avatar});
    onToast("プロフィールを保存しました");
  };
  const saved=JSON.parse(localStorage.getItem("notifySettings")||'{"start":7,"end":23,"interval":6}');
  const savedGoals=JSON.parse(localStorage.getItem("jiroku_goals")||'[{"goal":"","deadline":""}]');
  const savedLogHours=getLogHours();
  const [interval,setInterval]=useState(saved.interval||2);
  const [logStart,setLogStart]=useState(savedLogHours.start);
  const [logEnd,setLogEnd]=useState(savedLogHours.end);
  const PRESET_OPTIONS=[5,10,15,20,25,30,45,60,90];
  const [selectedPresets,setSelectedPresets]=useState(()=>JSON.parse(localStorage.getItem("timer_presets")||"[25,45,60]"));
  const [breakMin,setBreakMin]=useState(()=>Number(localStorage.getItem("timer_break")||"5"));
  const [alarmStyle,setAlarmStyle]=useState(()=>localStorage.getItem("timer_alarm_style")||"standard");
  const testAlarmStyle=(key)=>{
    const style=ALARM_STYLES.find(s=>s.key===key)||ALARM_STYLES[1];
    try { scheduleAlarmBeeps(style); } catch(e){}
  };
  const togglePreset=(min)=>{
    if(selectedPresets.includes(min)){
      if(selectedPresets.length<=1){return;} // 最低1つ必須
      setSelectedPresets(selectedPresets.filter(p=>p!==min));
    } else {
      if(selectedPresets.length>=3) return; // 最大3つ
      setSelectedPresets([...selectedPresets,min].sort((a,b)=>a-b));
    }
  };
  const saveTimerSettings=()=>{
    localStorage.setItem("timer_presets",JSON.stringify(selectedPresets));
    localStorage.setItem("timer_break",String(breakMin));
    localStorage.setItem("timer_alarm_style",alarmStyle);
    onToast("タイマー設定を保存しました");
  };
  const [goals,setGoals]=useState(savedGoals.length?savedGoals:[{goal:"",deadline:""}]);
  const updateGoal=(i,field,val)=>{ const g=[...goals]; g[i]={...g[i],[field]:val}; setGoals(g); };
  const addGoal=()=>{ if(goals.length<3) setGoals([...goals,{goal:"",deadline:""}]); };
  const removeGoal=(i)=>{ if(goals.length>1) setGoals(goals.filter((_,j)=>j!==i)); };
  const [calLinked,setCalLinked]=useState(!!localStorage.getItem("cal_linked"));
  const [calWriteGranted,setCalWriteGranted]=useState(!!localStorage.getItem("cal_write_granted"));
  const [calLoading,setCalLoading]=useState(false);
  // 複数カレンダー連携: アカウント内のカレンダー一覧から選択できるようにする
  const [calList,setCalList]=useState(null);
  const [calListLoading,setCalListLoading]=useState(false);
  const [selectedCalIds,setSelectedCalIds]=useState(()=>{
    try{ return JSON.parse(localStorage.getItem("jiroku_cal_ids")||'["primary"]'); }catch(e){ return ["primary"]; }
  });
  const loadCalList=async()=>{
    setCalListLoading(true);
    let token=await getCalendarToken(false);
    if(!token) token=await getCalendarToken(true);
    if(!token){ setCalListLoading(false); onToast("カレンダー一覧の取得に失敗しました"); return; }
    try{
      const r=await fetch("https://www.googleapis.com/calendar/v3/users/me/calendarList?minAccessRole=reader&maxResults=50",
        {headers:{Authorization:"Bearer "+token}}).then(r=>r.json());
      if(r.items){
        // メインを先頭に、次に名前順で並べる
        const list=r.items.map(c=>({id:c.primary?"primary":c.id, summary:c.summaryOverride||c.summary||c.id, primary:!!c.primary}))
          .sort((a,b)=>(b.primary?1:0)-(a.primary?1:0) || String(a.summary).localeCompare(String(b.summary),"ja"));
        setCalList(list);
      } else onToast("カレンダー一覧の取得に失敗しました");
    }catch(e){ onToast("カレンダー一覧の取得に失敗しました"); }
    setCalListLoading(false);
  };
  const toggleCalId=(id)=>{
    const next=selectedCalIds.includes(id)
      ? selectedCalIds.filter(x=>x!==id)
      : [...selectedCalIds,id];
    if(next.length===0) return; // 最低1つは必須
    setSelectedCalIds(next);
    localStorage.setItem("jiroku_cal_ids",JSON.stringify(next));
    clearCalendarCache(); // 選択が変わったら古い予定キャッシュを破棄して取り直す
  };
  const [pushEnabled,setPushEnabled]=useState(!!localStorage.getItem("push_enabled"));
  const [pushLoading,setPushLoading]=useState(false);
  const enablePush=async()=>{
    setPushLoading(true);
    const r=await enablePushNotifications();
    setPushLoading(false);
    if(r.ok) setPushEnabled(true);
    else onToast(r.error||"プッシュ通知の設定に失敗しました");
  };

  const linkCalendar=()=>{
    if(!window.google||!google.accounts) return;
    setCalLoading(true);
    // ポップアップが閉じられた/ブロックされた場合の保険（callbackが来ないと固まるため）
    const safety=setTimeout(()=>setCalLoading(false), 45000);
    const client=google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: "https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events",
      error_callback: ()=>{ clearTimeout(safety); setCalLoading(false); onToast("連携できませんでした。もう一度お試しください"); },
      callback: async(tokenResp)=>{
        clearTimeout(safety);
        if(tokenResp.error){ setCalLoading(false); onToast("カレンダー連携に失敗しました"); return; }
        // トークンを受け取れた時点で、Google側の許可(スコープの同意)自体は成功している。
        // この後のカレンダーID取得・サーバー保存が失敗しても「許可済み」の記録は
        // 別に残しておく（そうしないと、付随処理の失敗のたびに毎回この画面で
        // 許可を求め続けることになってしまうため）
        localStorage.setItem("cal_linked","1");
        localStorage.setItem("cal_write_granted","1");
        setCalLinked(true);
        setCalWriteGranted(true);
        try{
          gcalToken=tokenResp.access_token;
          gcalTokenExp=Date.now()+(Number(tokenResp.expires_in)||3600)*1000;
          const calRes=await fetch("https://www.googleapis.com/calendar/v3/users/me/calendarList/primary",{
            headers:{Authorization:"Bearer "+tokenResp.access_token}
          }).then(r=>r.json());
          const calId=calRes.id||CURRENT_USER.email;
          await gasPost("saveSettings",{google_calendar_id:calId});
          onCalLinked && onCalLinked();
          fetchCalendarEvents(formatDateStr(new Date())); // 今日の予定を先読み
          onToast("カレンダーを連携しました！");
        }catch{ onToast("カレンダー取得に失敗しました"); }
        setCalLoading(false);
      }
    });
    client.requestAccessToken();
  };

  // 休みの曜日（0=日〜6=土）。休みの日はリマインダーなし・XP減衰なし・連続記録も守られる
  const [restDays,setRestDays]=useState(()=>{
    try{ return JSON.parse(localStorage.getItem("jiroku_rest_days")||"[]"); }catch(e){ return []; }
  });
  const toggleRestDay=(d)=>setRestDays(restDays.includes(d)?restDays.filter(x=>x!==d):[...restDays,d].sort());

  // 記録時間帯とLINE通知を同時に保存（両者は常に連動）
  const saveTimeSettings=()=>{
    if(logEnd<=logStart){onToast("終了時間は開始より後にしてください");return;}
    localStorage.setItem("jiroku_log_hours",JSON.stringify({start:logStart,end:logEnd}));
    localStorage.setItem("notifySettings",JSON.stringify({start:logStart,end:logEnd,interval}));
    localStorage.setItem("jiroku_rest_days",JSON.stringify(restDays));
    gasPost("saveSettings",{notify_start:logStart,notify_end:logEnd,notify_interval:interval,rest_days:restDays.join(",")});
    onToast("時間帯と通知設定を保存しました");
  };
  const saveGoal=()=>{
    if(!goals[0]?.goal.trim()){onToast("目標1を入力してください");return;}
    localStorage.setItem("jiroku_goals",JSON.stringify(goals));
    gasPost("saveSettings",{
      goal:goals[0]?.goal.trim()||"", goal_deadline:goals[0]?.deadline||"",
      goal2:goals[1]?.goal.trim()||"", goal_deadline2:goals[1]?.deadline||"",
      goal3:goals[2]?.goal.trim()||"", goal_deadline3:goals[2]?.deadline||"",
    });
    onGoalSaved(goals);
    onToast("目標を保存しました");
  };

  // RANKS定数から生成
  const RANK_RULES = RANKS.map(r => ({
    ...r,
    lv: r.maxLv >= 999 ? `Lv.${r.minLv}+` : r.minLv === r.maxLv ? `Lv.${r.minLv}` : `Lv.${r.minLv}–${r.maxLv}`
  }));

  const SectionHeader = ({icon, title}) => html`
    <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
      <span style=${{fontSize:15}}>${icon}</span>
      <div style=${{fontSize:14,fontWeight:700,color:"var(--text)"}}>${title}</div>
    </div>
  `;
  // 設定をグループに区切る小見出し（アカウント / 目標と記録 / 連携 / データ / 情報）
  const GroupLabel = (t) => html`<div style=${{fontSize:11,fontWeight:700,color:"var(--sub)",letterSpacing:"0.06em",margin:"6px 4px 10px"}}>${t}</div>`;

  // 折りたたみ式セクション。項目名だけ並べ、タップした所だけ開く（設定が長いため見やすく）。
  // 一度に1つだけ開くアコーディオン。sub に「連携済み」等の状態を右に小さく出せる

  const Sec = ({k, icon, title, sub, children}) => html`
    <div class="card" style=${{padding:0,marginBottom:10,overflow:"hidden"}}>
      <button onClick=${()=>setOpenSec(openSec===k?"":k)}
        style=${{display:"flex",alignItems:"center",gap:10,width:"100%",background:"none",border:"none",padding:"15px 16px",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
        <span style=${{fontSize:16,flexShrink:0}}>${icon}</span>
        <span style=${{fontSize:14,fontWeight:700,color:"var(--text)",flex:1}}>${title}</span>
        ${sub&&html`<span style=${{fontSize:11.5,color:"var(--sub)",flexShrink:0}}>${sub}</span>`}
        <span style=${{fontSize:13,color:"var(--sub)",flexShrink:0,transform:openSec===k?"rotate(180deg)":"none",transition:"transform .15s"}}>▾</span>
      </button>
      ${openSec===k&&html`<div style=${{padding:"0 16px 18px"}}>${children}</div>`}
    </div>
  `;

  return html`<div style=${{paddingBottom:48}}>

    <!-- Hero -->
    <div style=${{background:"linear-gradient(135deg, var(--hero1) 0%, var(--hero2) 100%)",padding:"36px 20px 28px",position:"relative",overflow:"hidden"}}>
      <!-- 右下: 大きなロゴマーク装飾 -->
      <svg style=${{position:"absolute",bottom:-30,right:-30,opacity:0.07}} width="140" height="140" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg"><circle cx="36" cy="36" r="36" fill="#fff"/><circle cx="36" cy="36" r="25" fill="none" stroke="#fff" stroke-width="4.5"/><path d="M36 11 A25 25 0 1 1 14.5 50" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/><circle cx="36" cy="36" r="15" fill="none" stroke="#fff" stroke-width="2"/><line x1="36" y1="36" x2="36" y2="25" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><line x1="36" y1="36" x2="43" y2="41" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="36" cy="36" r="2" fill="#fff"/></svg>
      <!-- JIROKUロゴ 右上 -->
      <div style=${{position:"absolute",top:18,right:20,display:"flex",alignItems:"center",gap:6}}>
        <svg width="28" height="28" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg"><circle cx="36" cy="36" r="36" fill="rgba(255,255,255,0.2)"/><circle cx="36" cy="36" r="25" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="4.5"/><path d="M36 11 A25 25 0 1 1 14.5 50" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/><circle cx="36" cy="36" r="15" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"/><line x1="36" y1="36" x2="36" y2="25" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><line x1="36" y1="36" x2="43" y2="41" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="36" cy="36" r="2" fill="#fff"/></svg>
        <span style=${{fontSize:13,fontWeight:800,color:"rgba(255,255,255,0.9)",letterSpacing:"1px"}}>JIROKU</span>
      </div>
      <div style=${{fontSize:12,color:"rgba(255,255,255,0.7)",marginBottom:6,letterSpacing:".05em"}}>ACCOUNT</div>
      <div style=${{display:"flex",alignItems:"center",gap:10,marginBottom:2}}>
        <div style=${{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,flexShrink:0}}>${profile?.avatar||"🦊"}</div>
        <div style=${{fontSize:24,fontWeight:800,color:"#fff"}}>${profile?.nickname||CURRENT_USER.name}</div>
      </div>
      <div style=${{fontSize:13,color:"rgba(255,255,255,0.7)"}}>${CURRENT_USER.email}</div>
    </div>

    <div style=${{padding:"16px 16px 0"}}>

      ${GroupLabel("アカウント")}
      <!-- プロフィール -->
      <${Sec} k="profile" icon="🙂" title="プロフィール">
        <label class="form-lbl" style=${{fontSize:11}}>ニックネーム（他の人に表示される名前）</label>
        <input class="inp" value=${nickname} maxLength=${20} onChange=${e=>setNickname(e.target.value)} style=${{marginBottom:14}}/>
        <div class="form-lbl" style=${{fontSize:11,marginBottom:8}}>アバター</div>
        <div style=${{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:8,marginBottom:8}}>
          ${(showAllAvatars?AVATAR_OPTIONS:AVATAR_OPTIONS.slice(0,8)).map(a=>html`
            <button key=${a} onClick=${()=>setAvatar(a)}
              style=${{fontSize:22,padding:"8px 0",borderRadius:12,border:`2px solid ${avatar===a?"var(--accent)":"var(--border)"}`,background:avatar===a?"var(--accent-bg, rgba(8,145,178,0.1))":"transparent",cursor:"pointer"}}>
              ${a}
            </button>
          `)}
        </div>
        ${!showAllAvatars&&html`

          </button>
        `}
        ${showAllAvatars&&html`<div style=${{marginBottom:14}}/>`}
        <button class="btn" onClick=${saveProfile}>保存する</button>
      <//>

      ${GroupLabel("目標と記録")}

            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style=${{display:"flex",alignItems:"center",gap:6}}>
                <div style=${{width:6,height:6,borderRadius:"50%",background:i===0?"var(--accent)":i===1?"var(--amber)":"var(--green)"}}/>

            <textarea class="txa" placeholder=${i===0?"例：英検2級に合格する":"例：毎月売上100万円達成"} value=${g.goal}

        <button class="btn" onClick=${saveGoal}>保存する</button>

            <button key=${min} onClick=${()=>togglePreset(min)}
              style=${{padding:"5px 12px",borderRadius:16,border:`1.5px solid ${selectedPresets.includes(min)?"var(--accent)":"var(--border)"}`,

              ${min}分

              <button onClick=${()=>setAlarmStyle(s.key)}
                style=${{flex:1,textAlign:"left",padding:"10px 14px",borderRadius:12,border:`1.5px solid ${alarmStyle===s.key?"var(--accent)":"var(--border)"}`,

                color:alarmStyle===s.key?"var(--accent)":"var(--text)",

                ${s.label}

const AVATAR_OPTIONS=["🦊","🐱","🐶","🐻","🐼","🦉","🐧","🦁","🐢","🐰","🐹","🐨","🐵","🐺","🦄","🐴","🐥","🐻‍❄️","🦋","🦭"];

const GOOGLE_CLIENT_ID = "476804060858-n3afj7ipmc81vq8cq71u0u3jdpolshea.apps.googleusercontent.com";

const XP_THRESHOLDS = [0, 500, 1200, 2200, 3500, 5200, 7500, 10000, 13000, 17000, 21000, 25500, 30500, 36000, 42000, 49000];
const getXpLevel = xp => { let lv=1; for(let i=1;i<XP_THRESHOLDS.length;i++){ if(xp>=XP_THRESHOLDS[i]) lv=i+1; else break; } return lv; };
const getXpInLevel = xp => xp - (XP_THRESHOLDS[getXpLevel(xp)-1]||0);
const getXpForNextLevel = xp => { const lv=getXpLevel(xp); return lv<XP_THRESHOLDS.length ? XP_THRESHOLDS[lv]-(XP_THRESHOLDS[lv-1]||0) : null; };

function parseJwt(token) {
  try {
    const base64 = token.split(".")[1].replace(/-/g,"+").replace(/_/g,"/");
    const json = decodeURIComponent(atob(base64).split("").map(c=>"%"+("00"+c.charCodeAt(0).toString(16)).slice(-2)).join(""));
    return JSON.parse(json);
  } catch { return null; }
}

  const addGoal=()=>{ if(goals.length<3) setGoals([...goals,{goal:"",deadline:""}]); };
  const updateGoal=(i,field,val)=>{ const g=[...goals]; g[i]={...g[i],[field]:val}; setGoals(g); };

  useEffect(()=>{
    const hash=new URLSearchParams(location.hash.slice(1));
    const idToken=hash.get("id_token");
    if(idToken){
      history.replaceState(null,"",location.pathname);
      handleGoogleLogin({credential:idToken});
    }
  },[]);

  const handleGoogleSignIn=()=>{
    const nonce=Math.random().toString(36).slice(2);
    const params=new URLSearchParams({
      client_id: GOOGLE_CLIENT_ID,
      redirect_uri: "https://kaisunagawa.github.io/edventure-app/",
      response_type: "id_token",
      scope: "openid email profile",
      nonce,
    });
    window.location.href="https://accounts.google.com/o/oauth2/v2/auth?"+params;
  };

  const handleGoogleLogin=async(res)=>{
    const payload=parseJwt(res.credential);
    if(!payload) { setError("ログインに失敗しました"); return; }
    const email=payload.email;
    const name=payload.name||payload.given_name||"";
    setLoading(true); setError("");
    try{
      // 既存ユーザー確認
      const url=new URL(GAS_URL); url.searchParams.set("action","getUser"); url.searchParams.set("studentEmail",email);
      const r=await fetch(url).then(res=>res.json());

        const u={email,name:r.data.name||name,nickname:r.data.nickname||r.data.name||name,avatar:r.data.avatar||"🦊",coachName:r.data.coachName||"コーチ",coachEmail:r.data.coach_email||""};
        localStorage.setItem("edventure_user",JSON.stringify(u));
        if(!localStorage.getItem("line_prompted")){ setPendingUser(u); setStep("line"); }
        else { CURRENT_USER=u; onLogin(u); }
      } else {
        // 新規ユーザー → プロフィール入力へ
        setPendingUser({email, name});
        setNickname(name);
        setStep("profile");
      }
    }catch{ setError("接続エラーが発生しました"); }
    setLoading(false);
  };

  const confirmProfile=()=>{
    if(!nickname.trim()){ setError("ニックネームを入力してください"); return; }

// 「みんなの頑張り」をアプリを開くたびに賑やかに感じてもらうためのバナー。
// 高スコアレポート等が出た際に自動投稿される達成シェア（getAchievements）のうち、
// まだ見ていない最新の1件だけをホーム上部に表示する。既読管理はlocalStorageのIDで行う
// （プッシュ通知ではなく、アプリを開いた時に気づける「準リアルタイム」通知）
const ACHIEVEMENT_SEEN_KEY = "jiroku_last_seen_achievement";
// achievement_idが無い古いデータ（自己修復前に作られた行）でも「既読」判定できるよう、
// idが無ければnickname・message・dateから代わりのキーを組み立てる
function achievementKey(a) { return a.id || `${a.nickname}|${a.message}|${a.date}`; }
function AchievementBanner({onOpenCommunity}) {
  const [item,setItem]=useState(null);
  useEffect(()=>{
    gasApi("getAchievements").then(r=>{
      if(!r.ok || !r.data || r.data.length===0) return;
      const latest=r.data[0];
      // 「たった今の頑張り」として通知する以上、2日以上前のシェアは古すぎるので対象外にする
      // （これにより既読管理が何らかの理由で効かない端末でも、いつまでも同じ古い通知が
      // 出続けることはなくなる）
      const today=formatDateStr(new Date());
      const cutoff=addDays(today,-1);
      if(latest.date < cutoff) return;
      const lastSeen=localStorage.getItem(ACHIEVEMENT_SEEN_KEY);
      if(achievementKey(latest)===lastSeen) return;
      setItem(latest);
    });
  },[]);
  const dismiss=()=>{
    if(item) localStorage.setItem(ACHIEVEMENT_SEEN_KEY, achievementKey(item));
    setItem(null);
  };
  const open=()=>{ dismiss(); onOpenCommunity(); };
  if(!item) return null;
  return html`
    <div style=${{background:"var(--accent-l)",borderBottom:"1px solid var(--border)",padding:"8px 16px",fontSize:11,color:"var(--text)",position:"relative",zIndex:48}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
        <div style=${{lineHeight:1.5,display:"flex",alignItems:"center",gap:7,minWidth:0}}>
          <span style=${{fontSize:15,flexShrink:0}}>${item.avatar}</span>
          <span style=${{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}><b>${item.nickname}</b>さんが${item.message}</span>
        </div>
        <div style=${{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
          <button onClick=${open} style=${{padding:"5px 10px",borderRadius:7,border:"1px solid var(--accent)",background:"var(--card)",color:"var(--accent)",fontSize:10.5,cursor:"pointer",fontWeight:600}}>見る</button>
          <button onClick=${dismiss} style=${{background:"none",border:"none",color:"var(--sub)",fontSize:14,cursor:"pointer"}}>×</button>
        </div>
      </div>
    </div>
  `;
}

// 初回オンボーディング（自己分析12問・選択式）。回答はAIコーチの文脈と一部の設定に反映される
const ONBOARDING_QUESTIONS = [
  { id:"reason", q:"時間管理をしたい、一番の理由は？", opts:["就活・キャリアのため","仕事で成果を出したい","良い習慣を身につけたい","自分を理解したい","やりたいことを実現したい"] },

  { id:"focus_when", q:"集中できるのはどんな時？", opts:["一人で静かな時","誰かと一緒の時","場所を変えた時","締切が近い時"] },
  { id:"motivation", q:"やる気の源は？", opts:["達成感","成長を感じること","人に認められること","ゲームのような楽しさ","締切のプレッシャー"] },
  { id:"quit_reason", q:"続かなくなるのは、たいてい？", opts:["完璧を求めすぎる","飽きてしまう","忙しくて忘れる","気分が乗らない"] },
  { id:"planning", q:"計画を立てるのは得意？", opts:["計画型（きっちり）","だいたい決める","衝動型（その場で）"] },
  { id:"tone", q:"どんな声かけが響く？", opts:["優しく応援してほしい","厳しめに喝を入れて","データで淡々と","一緒に伴走してほしい"], setting:"tone" },
  { id:"notify", q:"通知はどれくらい欲しい？", opts:["こまめに欲しい","ほどほどで","最小限でいい"], setting:"notify" },
  { id:"hours", q:"1日にどれくらい、目標に時間を使いたい？", opts:["30分","1時間","2時間","3時間以上"], setting:"hours" },
  { id:"future", q:"3ヶ月後、どうなっていたい？", opts:["良い習慣が身についている","目標に向けて成果が出ている","時間の使い方に迷わない","新しいことに挑戦できている"] },
  { id:"selftype", q:"自分を一言でいうと？", opts:["コツコツ型","短距離集中型","気分屋","完璧主義"] },
];
function OnboardingQuiz({onDone}){
  const [step,setStep]=useState(0);       // 0..questions-1, 質問。=length で結果画面
  const [answers,setAnswers]=useState({});
  const [saving,setSaving]=useState(false);
  const total=ONBOARDING_QUESTIONS.length;
  const pick=(qid,opt)=>{
    const next={...answers,[qid]:opt};
    setAnswers(next);
    setTimeout(()=>setStep(s=>s+1),180); // 選んだら少し間を置いて自動で次へ
  };
  const back=()=>setStep(s=>Math.max(0,s-1));

  const finish=async()=>{
    setSaving(true);
    // 読める要約テキストを作ってサーバーへ（AIコーチの文脈に流れる）
    const profileText=ONBOARDING_QUESTIONS.filter(q=>answers[q.id]).map(q=>q.q.replace(/？$/,"")+"："+answers[q.id]).join(" / ");
    const tone=answers.tone||"";
    const notifyMap={"こまめに欲しい":1,"ほどほどで":2,"最小限でいい":6};
    const interval=notifyMap[answers.notify]||2;
    const hoursMap={"30分":0.5,"1時間":1,"2時間":2,"3時間以上":3};
    const goalHours=hoursMap[answers.hours];
    // 設定へ反映（目標時間はローカル、通知間隔はサーバー＋ローカル）
    if(goalHours){ localStorage.setItem("jiroku_daily_goal_hours",String(goalHours)); }
    const savedNotify=JSON.parse(localStorage.getItem("notifySettings")||'{"start":7,"end":23,"interval":2}');
    localStorage.setItem("notifySettings",JSON.stringify({...savedNotify,interval}));
    try{ await gasPostJson("saveOnboarding",{profile_text:profileText,coach_tone:tone,notify_interval:String(interval)}); }catch(e){}
    localStorage.setItem("onboarding_done","1");
    setSaving(false);
    onDone();
  };
  const skip=()=>{ localStorage.setItem("onboarding_done","skip"); onDone(); };

  // 結果画面: 回答に応じた「あなたへの活かし方」を出す
  if(step>=total){
    const lines=[];
    if(answers.motivation==="成長を感じること"||answers.motivation==="達成感") lines.push("毎晩のAIレポートで、あなたの「伸び」を点数と言葉で見える化します。");
    if(answers.struggle==="夜更かし・生活リズム") lines.push("生活リズムの乱れも記録から見えるので、AIコーチが無理なく整える手助けをします。");
    if(answers.struggle==="先延ばししてしまう") lines.push("朝の「今日のフォーカス」で、まず1つに絞って動き出せるようにします。");
    if(answers.tone==="厳しめに喝を入れて") lines.push("あなたの希望どおり、コーチは時にはっきりと喝を入れます。");
    if(answers.tone==="優しく応援してほしい") lines.push("あなたの希望どおり、コーチは優しく応援するトーンで寄り添います。");
    if(lines.length<2) lines.push("記録が溜まるほど、AIがあなたの強み・クセ・時間の使い道を教えてくれます（気づきタブ）。");
    return html`<div style=${{position:"fixed",inset:0,height:"100dvh",background:"var(--bg)",zIndex:400,overflowY:"auto",display:"flex",flexDirection:"column"}}>
      <div style=${{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",padding:"32px 24px",maxWidth:440,margin:"0 auto",width:"100%"}}>
        <div style=${{fontSize:44,textAlign:"center",marginBottom:8}}>🎉</div>
        <div style=${{fontSize:22,fontWeight:800,textAlign:"center",marginBottom:6,color:"var(--text)"}}>ありがとう！準備完了です</div>
        <div style=${{fontSize:13.5,color:"var(--sub)",textAlign:"center",lineHeight:1.7,marginBottom:24}}>あなたのことを踏まえて、JIROKUが今日から伴走します。</div>
        ${lines.map((l,i)=>html`
          <div key=${i} style=${{display:"flex",gap:10,marginBottom:12,background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"13px 14px"}}>
            <span style=${{color:"var(--accent)",fontWeight:800,flexShrink:0}}>✓</span>
            <span style=${{fontSize:13,color:"var(--text)",lineHeight:1.7}}>${l}</span>
          </div>
        `)}
        <button class="btn" style=${{marginTop:14}} disabled=${saving} onClick=${finish}>${saving?"保存中…":"はじめる"}</button>
      </div>
    </div>`;
  }

  const cur=ONBOARDING_QUESTIONS[step];
  return html`<div style=${{position:"fixed",inset:0,height:"100dvh",background:"var(--bg)",zIndex:400,display:"flex",flexDirection:"column"}}>
    <div style=${{padding:"18px 20px 0",maxWidth:440,margin:"0 auto",width:"100%",boxSizing:"border-box"}}>
      <div style=${{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        ${step>0?html`<button onClick=${back} style=${{background:"none",border:"none",fontSize:20,color:"var(--sub)",cursor:"pointer",padding:0}}>‹</button>`:html`<div style=${{width:20}}/>`}
        <div style=${{flex:1,height:6,background:"var(--border)",borderRadius:99,overflow:"hidden"}}>
          <div style=${{height:"100%",width:((step)/total*100)+"%",background:"var(--accent)",borderRadius:99,transition:"width .3s ease"}}/>
        </div>
        <div style=${{fontSize:12,color:"var(--sub)",fontWeight:600,minWidth:38,textAlign:"right"}}>${step+1}/${total}</div>
      </div>
    </div>
    <div style=${{flex:1,overflowY:"auto",padding:"8px 20px 24px",maxWidth:440,margin:"0 auto",width:"100%",boxSizing:"border-box"}}>
      ${step===0&&html`<div style=${{fontSize:12.5,color:"var(--sub)",lineHeight:1.7,marginBottom:16,background:"var(--accent-l)",borderRadius:12,padding:"12px 14px"}}>最初に、あなたのことを少しだけ教えてください。答えに合わせてコーチングをあなた仕様にします（1〜2分・直感でOK）。</div>`}
      <div style=${{fontSize:19,fontWeight:800,color:"var(--text)",lineHeight:1.5,marginBottom:20}}>${cur.q}</div>
      <div style=${{display:"flex",flexDirection:"column",gap:10}}>
        ${cur.opts.map((o,i)=>{
          const on=answers[cur.id]===o;
          return html`<button key=${i} onClick=${()=>pick(cur.id,o)}
            style=${{textAlign:"left",padding:"15px 16px",borderRadius:14,border:`1.5px solid ${on?"var(--accent)":"var(--border)"}`,background:on?"var(--accent-l)":"var(--card)",color:on?"var(--accent)":"var(--text)",fontSize:15,fontWeight:on?700:500,cursor:"pointer",fontFamily:"inherit",transition:"all .12s"}}>
            ${o}
          </button>`;
        })}
      </div>
    </div>
    <div style=${{padding:"0 20px calc(20px + env(safe-area-inset-bottom))",maxWidth:440,margin:"0 auto",width:"100%",boxSizing:"border-box"}}>
      <button onClick=${skip} style=${{width:"100%",background:"none",border:"none",color:"var(--sub)",fontSize:12.5,cursor:"pointer",fontFamily:"inherit",padding:10}}>スキップして始める</button>
    </div>
  </div>`;
}

const UNSUPPORTED_PUSH_ERROR = "このブラウザはプッシュ通知に対応していません";
function TutorialOverlay({onDone}) {
  // ホーム画面から既に開いている場合は「ホーム画面に追加」の案内を飛ばす
  const [steps] = useState(()=>TUTORIAL_STEPS.filter(s=>!s.skipIf || !s.skipIf()));
  const [step,setStep]=useState(0);
  const [pushDone,setPushDone]=useState(()=>!!localStorage.getItem("push_enabled"));
  const [pushLoading,setPushLoading]=useState(false);
  const [pushError,setPushError]=useState("");
  const isLast = step === steps.length - 1;
  const s = steps[step];
  const Mock = s.mock;
  const isPushStep = !!s.pushStep && !pushDone;
  // ブラウザが技術的に非対応な場合だけ、詰まらないようスキップできるようにする
  const isUnsupported = pushError === UNSUPPORTED_PUSH_ERROR;

  const doEnablePush=async()=>{
    setPushLoading(true); setPushError("");
    try{
      const r=await enablePushNotifications();
      if(r.ok){ setPushDone(true); setStep(step+1); }
      else setPushError(r.error||"有効化に失敗しました。もう一度お試しください");
    }catch(e){
      // ここに来ることは無いはずだが、万一例外が漏れても「設定中...」のまま
      // 固まらないようにする
      setPushError(String(e && e.message || e) || "有効化に失敗しました。もう一度お試しください");
    }
    setPushLoading(false);
  };

  return html`
    <div style=${{position:"fixed",inset:0,background:"var(--bg)",zIndex:400,display:"flex",flexDirection:"column"}}>
      <div style=${{display:"flex",justifyContent:"flex-end",padding:"14px 16px"}}>
        ${!isPushStep&&html`<button onClick=${onDone} style=${{background:"none",border:"none",color:"var(--sub)",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>スキップ</button>`}
      </div>
      <div style=${{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 28px",textAlign:"center"}}>
        <div style=${{marginBottom:22}}><${Mock}/></div>
        <div style=${{fontSize:19,fontWeight:800,color:"var(--text)",marginBottom:14}}>${s.title}</div>
        <div style=${{fontSize:14,lineHeight:1.9,color:"var(--sub)",maxWidth:320,whiteSpace:"pre-line"}}>${s.body}</div>
        ${isPushStep&&pushError&&html`<div style=${{marginTop:12,fontSize:12.5,color:"var(--red, #e05555)"}}>${pushError}</div>`}
      </div>
      <div style=${{display:"flex",justifyContent:"center",gap:6,marginBottom:20}}>
        ${steps.map((_,i)=>html`<div key=${i} style=${{width:i===step?18:6,height:6,borderRadius:99,background:i===step?"var(--accent)":"var(--border)",transition:"width .2s"}}/>`)}
      </div>
      <div style=${{padding:"0 24px 32px"}}>
        ${isPushStep
          ? html`<button class="btn" disabled=${pushLoading} onClick=${doEnablePush}>${pushLoading?"設定中...":"プッシュ通知を有効にする"}</button>`
          : html`<button class="btn" onClick=${()=>isLast?onDone():setStep(step+1)}>${isLast?"さっそく記録する":"次へ"}</button>`
        }
        ${isPushStep&&isUnsupported&&html`
          <button onClick=${()=>{setPushError("");setStep(step+1);}}
            style=${{width:"100%",background:"none",border:"none",color:"var(--sub)",fontSize:12.5,padding:"10px",cursor:"pointer",fontFamily:"inherit"}}>
            このブラウザでは使えないので次へ進む
          </button>
        `}
      </div>
    </div>
  `;
}

// 独り言（クイック記録）シート。話す/書くだけで、AIが構造化して即保存する
function QuickLogSheet({onClose,onToast}){
  const [text,setText]=useState("");
  const [saving,setSaving]=useState(false);
  const inputRef=React.useRef(null);
  useEffect(()=>{ setTimeout(()=>{ try{inputRef.current&&inputRef.current.focus();}catch(e){} },200); },[]);
  const save=async()=>{
    const t=text.trim();
    if(!t||saving) return;
    setSaving(true);
    let r;
    try{
      r=await gasPostJson("quickLog",{text:t});
    }catch(e){
      // 通信エラー等でも「保存中…」で固まらないようにし、入力は消さずに残す
      setSaving(false);
      onToast("通信エラーで保存できませんでした。もう一度お試しください");
      return;
    }
    setSaving(false);
    if(r&&r.ok){
      const s=r.saved||{};
      const cnt=r.count||1;
      let msg;
      if(r.fallback){
        // AIで仕分けできなかった場合も、入力はそのまま1件保存されている
        msg="記録しました（内容はそのまま保存しました）";
      } else if(cnt>1){
        msg=`${cnt}件記録しました`;
      } else {
        const focusN=s.focus_level?`（集中${s.focus_level}）`:"";
        msg=`記録しました：${s.task||"記録"}${focusN}`;
      }
      if(r.xp_gained){ msg+=` +${r.xp_gained}XP`; if(r.level_up)msg+=` Lv.${r.level}！`; }
      onToast(msg);
      onClose();
    } else {
      // 失敗時はテキストを消さず、モーダルも閉じないので、そのまま再送信できる
      onToast((r&&r.error)||"うまく記録できませんでした。入力はそのまま残っています");
    }
  };
  return ReactDOM.createPortal(html`
    <div style=${{position:"fixed",inset:0,height:"100dvh",background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:550}}
      onClick=${e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style=${{background:"var(--card)",borderRadius:"20px 20px 0 0",padding:"22px 20px calc(24px + env(safe-area-inset-bottom))",width:"100%",boxSizing:"border-box"}}>
        <div style=${{fontSize:18,fontWeight:800,marginBottom:4,color:"var(--text)"}}>🎙 今なにしてた？</div>
        <div style=${{fontSize:12.5,color:"var(--sub)",marginBottom:14,lineHeight:1.6}}>話すだけ・書くだけでOK。あとはAIが記録に整えます。<br/>1日分をまとめて話しても大丈夫。何時に誰と何をしたか、思い出すままにどうぞ。<br/>（キーボードのマイクを押すと声で入力できます）</div>
        <textarea ref=${inputRef} class="txa" placeholder="例：8時に起きて朝ごはん、10時から友達とカフェで勉強、昼は移動して13時に打ち合わせ…と1日を丸ごと話してもOK" value=${text}
          onInput=${e=>setText(e.target.value)} style=${{minHeight:110,marginBottom:14,fontSize:15}}/>
        <button class="btn" disabled=${!text.trim()||saving} style=${{opacity:text.trim()?1:0.5}} onClick=${save}>
          ${saving?"記録中…":"これを記録する"}
        </button>
        <button onClick=${onClose}
          style=${{display:"block",width:"100%",marginTop:8,background:"none",border:"none",color:"var(--sub)",fontSize:13,cursor:"pointer",fontFamily:"inherit",padding:8}}>閉じる</button>
      </div>
    </div>
  `, document.body);
}

function App() {
  // 起動を速くするため、ログイン済みキャッシュがあれば即アプリを表示する。
  // アカウントの存在確認はバックグラウンドで行い、消えていた場合だけログアウトさせる
  const [user,setUser]=useState(CURRENT_USER);
  const [tab,setTab]=useState("home");
  const [toast,setToast]=useState(null);
  const [bannerDismissed,setBannerDismissed]=useState(false);
  const [calLinked,setCalLinked]=useState(!!localStorage.getItem("cal_linked"));
  const [calBannerDismissed,setCalBannerDismissed]=useState(false);
  const [showTutorial,setShowTutorial]=useState(!localStorage.getItem("tutorial_seen"));
  // 初回オンボーディング（自己分析12問）は、チュートリアル未実施の新規ユーザーにだけ出す。
  // 既存ユーザー（tutorial_seenあり）には出さず、通常運用を邪魔しない
  const [showOnboarding,setShowOnboarding]=useState(!localStorage.getItem("tutorial_seen") && !localStorage.getItem("onboarding_done"));
  // 新機能のお知らせ（アプリを開いた時に1回だけ表示）。IDを変えれば次の告知を出せる。
  // チュートリアル中の新規ユーザーには出さない（既存ユーザーへの告知が目的のため）
  // チュートリアル中は下でreturnするので出ない。それ以外の全員に未読なら表示する
  const ANNOUNCE_ID="update3_2026_07";
  const [showAnnounce,setShowAnnounce]=useState(()=>localStorage.getItem("announce_seen")!==ANNOUNCE_ID);
  const dismissAnnounce=()=>{ localStorage.setItem("announce_seen",ANNOUNCE_ID); setShowAnnounce(false); };
  // チュートリアル終了後は記録タブに着地させる（登録だけして使い始めない人が多いため、
  // 最初の1件を記録するところまで自然に誘導する）。スキップ時も同様に記録タブへ
  const dismissTutorial=()=>{ localStorage.setItem("tutorial_seen","1"); localStorage.setItem("announce_seen","update3_2026_07"); setShowTutorial(false); setTab("log"); };
  const [goalData,setGoalData]=useState(()=>{
    const g=localStorage.getItem("jiroku_goals"); if(g) try{return JSON.parse(g);}catch(e){}
    const old=localStorage.getItem("jiroku_goal"); if(old) try{const p=JSON.parse(old); if(p.goal) return [p];}catch(e){}
    return [];
  });
  const [profile,setProfile]=useState(()=>({nickname:CURRENT_USER?.nickname||CURRENT_USER?.name||"",avatar:CURRENT_USER?.avatar||"🦊"}));
  // 独り言（クイック記録）。通知やアプリのURLに #quick が付いていたら自動で開く
  const [showQuick,setShowQuick]=useState(false);
  // FABの上にふわっと出る、記録したくなる可愛いひとことをランダムに巡回表示
  const QUICK_HINTS=["いま何してた？","ひとりごと、する？","つぶやいてこ〜","1つだけ教えて♪","サボり？ちがう？👀","記録しちゃお","えらいの見せて","今日のわたし、どう？","ちょいメモしよ","話すだけでOK🎙"];
  const [hintIdx,setHintIdx]=useState(()=>Math.floor(Math.random()*10));
  const [hintOn,setHintOn]=useState(false);
  useEffect(()=>{
    // 少し待ってからフワッと出し、一定間隔で文言を差し替える（開いている間は隠す）
    let alive=true;
    const start=setTimeout(()=>{ if(alive) setHintOn(true); },1800);
    const iv=setInterval(()=>{
      setHintOn(false);
      setTimeout(()=>{ if(alive){ setHintIdx(i=>(i+1+Math.floor(Math.random()*(QUICK_HINTS.length-1)))%QUICK_HINTS.length); setHintOn(true); } },380);
    },9000);
    return ()=>{ alive=false; clearTimeout(start); clearInterval(iv); };
  },[]);
  useEffect(()=>{
    const openIfHash=()=>{ if(location.hash.replace("#","").toLowerCase()==="quick"){ setShowQuick(true); history.replaceState(null,"",location.pathname+location.search); } };
    openIfHash();
    window.addEventListener("hashchange",openIfHash);
    return ()=>window.removeEventListener("hashchange",openIfHash);
  },[]);
  const logout=()=>{
    localStorage.removeItem("edventure_user");
    localStorage.removeItem("line_prompted");
    localStorage.removeItem("cal_linked");
    CURRENT_USER=null; setUser(null);
  };

  useEffect(()=>{
    if(!CURRENT_USER) return;
    // バックグラウンドで最新プロフィール取得＋存在確認（起動はブロックしない）
    const url=new URL(GAS_URL);
    url.searchParams.set("action","getUser");
    url.searchParams.set("studentEmail",CURRENT_USER.email);
    fetch(url).then(r=>r.json()).then(r=>{
      if(r.ok&&r.data){
        // lineLinkedがレスポンスに無い場合（GAS未再デプロイ等）は「未連携」と誤判定してバナーを
        // 誤表示しないよう、不明な場合は連携済み扱いにする（安全側に倒す）
        const u={...CURRENT_USER, name:r.data.name||CURRENT_USER.name, nickname:r.data.nickname||CURRENT_USER.name, avatar:r.data.avatar||"🦊", coachName:r.data.coachName||"コーチ", coachEmail:r.data.coach_email||"", lineLinked:r.data.lineLinked===undefined?true:!!r.data.lineLinked, showInCommunity:r.data.showInCommunity===undefined?true:!!r.data.showInCommunity};
        CURRENT_USER=u; localStorage.setItem("edventure_user",JSON.stringify(u)); setUser(u);
        setProfile({nickname:u.nickname,avatar:u.avatar});
      } else if(r.error==="User not found"){
        // スプレッドシートに存在しない → キャッシュ削除してログイン画面へ
        localStorage.removeItem("edventure_user");
        localStorage.removeItem("line_prompted");
        localStorage.removeItem("cal_linked");
        CURRENT_USER=null; setUser(null);
      }
    }).catch(()=>{}); // 通信エラー時はキャッシュのまま続行
  },[]);

  if(!user) return html`<${LoginScreen} onLogin=${setUser}/>`;
  if(showOnboarding) return html`<${OnboardingQuiz} onDone=${()=>setShowOnboarding(false)}/>`;
  if(showTutorial) return html`<${TutorialOverlay} onDone=${dismissTutorial}/>`;
  return html`
    <div style=${{height:"100%",position:"relative",display:"flex",flexDirection:"column"}}>
      ${showAnnounce && html`<${FeatureAnnounce} onClose=${dismissAnnounce} onGo=${()=>{dismissAnnounce();setTab("brain");}}/>`}
      ${user.lineLinked===false && !bannerDismissed && html`<${LineLinkBanner} email=${user.email} onDismiss=${()=>setBannerDismissed(true)}/>`}
      ${!calLinked && !calBannerDismissed && html`<${CalendarLinkBanner} onGoToSettings=${()=>setTab("settings")} onDismiss=${()=>setCalBannerDismissed(true)}/>`}
      <div style=${{position:"relative",flex:1,minHeight:0}}>
        <div class="screen">
          <div style=${{display:tab==="home"?"block":"none"}}><${HomeScreen} goalData=${goalData} onGoalSaved=${setGoalData} profile=${profile} isActive=${tab==="home"} showInCommunity=${user.showInCommunity!==false} onGoTimer=${()=>setTab("timer")}/></div>
          <div style=${{display:tab==="log"?"block":"none"}}><${LogScreen} onToast=${setToast} isActive=${tab==="log"}/></div>
          <div style=${{display:tab==="report"?"block":"none"}}><${ReportScreen}/></div>
          <div style=${{display:tab==="brain"?"block":"none"}}><${SecondBrainScreen} isActive=${tab==="brain"}/></div>
          <div style=${{display:tab==="timer"?"block":"none",height:"100%"}}><${TimerScreen} onToast=${setToast} isActive=${tab==="timer"}/></div>
          <div style=${{display:tab==="settings"?"block":"none"}}><${SettingsScreen} onToast=${setToast} onLogout=${logout} onGoalSaved=${setGoalData} profile=${profile} onProfileSaved=${setProfile} onCalLinked=${()=>setCalLinked(true)}/></div>
        </div>
      </div>
      <!-- 独り言（クイック記録）フローティングボタン。どのタブからでも1タップで話せる -->
      <div style=${{position:"absolute",right:16,bottom:"calc(var(--nav-h) + var(--safe-bottom) + 16px)",zIndex:200}}>
        ${hintOn && !showQuick && html`<div class="quick-hint" key=${hintIdx}>${QUICK_HINTS[hintIdx]}</div>`}
        <button onClick=${()=>setShowQuick(true)} title="独り言で記録"
          style=${{width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg, var(--hero1) 0%, var(--hero2) 100%)",border:"none",boxShadow:"0 6px 18px rgba(8,145,178,0.4)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
        </button>
      </div>
      ${showQuick&&html`<${QuickLogSheet} onClose=${()=>setShowQuick(false)} onToast=${setToast}/>`}
      <nav class="nav">
        ${TABS.map(t=>html`
          <button key=${t.id} class=${"nav-btn"+(tab===t.id?" on":"")} onClick=${()=>setTab(t.id)}>
            <${S} n=${t.n} s=${20}/><span class="nav-lbl">${t.l}</span>
          </button>
        `)}
      </nav>
      ${toast&&html`<${Toast} msg=${toast} onDone=${()=>setToast(null)}/>`}
    </div>
  `;
}
const ERR_STYLE = "padding:20px;font-family:monospace;font-size:12px;color:red;background:#fff;position:fixed;top:0;left:0;right:0;bottom:0;overflow:auto;z-index:9999;white-space:pre-wrap";
class ErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(e){ return {err:e}; }
  componentDidCatch(e,info){ console.error("ErrorBoundary caught:",e,info); }
  render(){
    if(this.state.err) return React.createElement("div",{style:{padding:20,fontFamily:"monospace",fontSize:13,color:"red",background:"#fff",position:"fixed",top:0,left:0,right:0,bottom:0,overflow:"auto",zIndex:9999,whiteSpace:"pre-wrap"}},
      "レンダーエラー（スクショを送ってください）:\n"+this.state.err.message+"\n\n"+this.state.err.stack);
    return this.props.children;
  }
}
try {
  ReactDOM.createRoot(document.getElementById("root")).render(
    React.createElement(ErrorBoundary,null,html`<${App}/>`)
  );
} catch(e) {
  document.getElementById("root").innerHTML = '<div style="'+ERR_STYLE+'">ERROR:\n'+e.message+'\n\n'+e.stack+'</div>';
}
window.onerror = (msg,src,line,col,err) => {
  console.error("JS ERROR:", msg, "Line:"+line, err);
  // アプリが描画済みなら画面は壊さない。起動前のエラーのみ全画面表示
  const rendered = document.querySelector("#root .nav") || document.querySelector("#root .login-wrap");
  if(!rendered) document.getElementById("root").innerHTML = '<div style="'+ERR_STYLE+'">JS ERROR:\n'+msg+'\nLine:'+line+' Col:'+col+'</div>';
};
window.addEventListener("unhandledrejection", e => {
  console.error("Unhandled promise rejection:", e.reason);
});
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
  // 過去バージョンで一時的に別ファイル(firebase-messaging-sw.js)を登録していた
  // 名残や、別スコープに残った古い登録が残っていると、同じプッシュ通知が二重に
  // 表示される原因になり得るため、sw.js以外の登録があれば掃除しておく
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => {
      const url = reg.active?.scriptURL || reg.installing?.scriptURL || reg.waiting?.scriptURL || "";
      if (url && !url.endsWith("/sw.js")) reg.unregister();
    });
  }).catch(()=>{});
  // SPAは一度読み込むと開きっぱなしの間ずっと古いJSを実行し続けるため、
  // デプロイ後も昨日のバージョンのまま動く画面が残り、機能差のある書き込み
  // （カレンダーの✅なし等）が混ざる問題があった。アプリを前面に戻したタイミングで
  // Service Workerの更新を確認し、新バージョンが有効になったら一度だけ再読み込みする。
  // 入力途中の内容は下書き自動保存・タイマー状態もlocalStorageに保存済みなので消えない
  let swReloaded = false;
  // 初回訪問時のSW初回登録(claim)でもcontrollerchangeが発火するため、
  // 「既にSWが制御していた状態からの交代」の時だけ再読み込みする
  const hadController = !!navigator.serviceWorker.controller;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (swReloaded || !hadController) return;
    swReloaded = true;
    if (document.visibilityState === 'visible') location.reload();
  });

  // controllerchangeはsw.js自体が変わった時しか発火しないため、アプリ本体
  // (index.html)だけの更新はこちらで検知する。起動時に自分自身のHTMLを取得して
  // ハッシュを控え、アプリを前面に戻すたび（最短10分間隔）に取り直して比較。
  // 変わっていたら新バージョンが公開されたということなので再読み込みする
  let baselineHtmlHash = null, lastVerCheck = 0;
  async function checkAppUpdate(){
    try{
      const now = Date.now();
      if (now - lastVerCheck < 10*60*1000) return;
      lastVerCheck = now;
      const res = await fetch("index.html", { cache: "no-store" });
      if (!res.ok) return;
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(await res.text()));
      const h = Array.from(new Uint8Array(buf)).join(",");
      if (baselineHtmlHash === null) { baselineHtmlHash = h; return; }
      if (h !== baselineHtmlHash && !swReloaded) { swReloaded = true; location.reload(); }
    }catch(e){}
  }
  checkAppUpdate(); // 起動時に基準ハッシュを取得
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    navigator.serviceWorker.getRegistration().then(reg => { if (reg) reg.update(); });
    checkAppUpdate();
  });
}
