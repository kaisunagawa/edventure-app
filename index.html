<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>JIROKU</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="JIROKU" />
  <meta name="theme-color" content="#FAFAF9" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/htm/dist/htm.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F8F8FA;
      --card:     #FFFFFF;
      --border:   #E5E7EB;
      --text:     #1F2937;
      --sub:      #9CA3AF;
      --accent:   #0891B2;
      --accent-l: #CFFAFE;
      --glow:     rgba(8,145,178,.12);
      --green:    #22C55E;
      --green-l:  #F0FDF4;
      --amber:    #F59E0B;
      --amber-l:  #FFFBEB;
      --red:      #EF4444;
      --red-l:    #FEF2F2;
      --nav-h:    64px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --r:        14px;
    }

    html, body {
      height: 100%; background: var(--bg);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      color: var(--text); -webkit-font-smoothing: antialiased;
    }
    #root { height: 100%; width: 100%; position: relative; background: var(--bg); overflow: hidden; }

    .screen {
      position: absolute; inset: 0;
      bottom: calc(var(--nav-h) + var(--safe-bottom));
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }

    /* ── Nav ── */
    .nav {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + var(--safe-bottom));
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; padding-bottom: var(--safe-bottom);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      border: none; background: none; cursor: pointer;
      color: var(--sub); -webkit-tap-highlight-color: transparent;
      transition: color .15s;
    }
    .nav-btn.on { color: var(--accent); }
    .nav-lbl { font-size: 10px; font-weight: 500; letter-spacing: .1px; }

    /* ── Page header ── */
    .ph { padding: 24px 20px 8px; }
    .ph-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
    .ph-title-accent { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
    .ph-sub { font-size: 13px; color: var(--sub); margin-top: 2px; }
    .ph-label { display: none; }

    /* ── Cards ── */
    .card {
      background: var(--card); border-radius: 12px;
      padding: 16px; margin: 0 16px 8px;
      border: 1px solid var(--border);
    }
    .card-label {
      font-size: 11px; font-weight: 500; color: var(--sub);
      margin-bottom: 12px; letter-spacing: .1px;
    }

    /* ── Stat tiles (unused but kept for compat) ── */
    .stat-row { display: flex; gap: 8px; margin: 0 16px 8px; }
    .stat-tile { flex: 1; background: var(--card); border-radius: 10px; padding: 14px 12px; text-align: center; border: 1px solid var(--border); }
    .stat-v { font-size: 24px; font-weight: 700; line-height: 1; color: var(--text); }
    .stat-l { font-size: 10px; color: var(--sub); margin-top: 4px; font-weight: 500; }
    .streak-tile { }
    .streak-tile .stat-v { color: var(--amber); }
    .level-v { color: var(--accent); }

    /* ── XP bar ── */
    .xp-wrap { margin: 0 16px 12px; }
    .xp-top { display: flex; justify-content: space-between; font-size: 11px; color: var(--sub); font-weight: 500; margin-bottom: 6px; }
    .xp-track { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .xp-fill { height: 4px; border-radius: 99px; background: var(--accent); transition: width .6s cubic-bezier(.4,0,.2,1); }

    /* ── Badge pills ── */
    .badge-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 16px 10px; }
    .badge-pill { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; background: var(--bg); border: 1px solid var(--border); color: var(--sub); }

    /* ── Score ring ── */
    .ring-wrap { display: flex; align-items: center; gap: 16px; }
    .ring { width: 68px; height: 68px; flex-shrink: 0; border-radius: 50%; background: conic-gradient(var(--accent) calc(var(--pct)*1%), var(--border) 0); display: flex; align-items: center; justify-content: center; }
    .ring-inner { width: 52px; height: 52px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .ring-num { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; }
    .ring-unit { font-size: 9px; color: var(--sub); }

    /* ── Schedule ── */
    .sched-row { display: flex; align-items: flex-start; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .sched-row:last-child { border-bottom: none; }
    .sched-time { font-size: 12px; font-weight: 600; color: var(--accent); min-width: 40px; padding-top: 1px; flex-shrink: 0; }
    .sched-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .sched-sub { font-size: 11px; color: var(--sub); margin-top: 2px; }

    /* ── Section header ── */
    .sec-head { padding: 16px 20px 8px; }
    .sec-head h2 { font-size: 17px; font-weight: 700; letter-spacing: -.2px; }

    /* ── Time bar ── */
    .time-bar { display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px; scrollbar-width: none; border-bottom: 1px solid var(--border); }
    .time-bar::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 6px 12px; border-radius: 7px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      border: 1px solid var(--border); background: var(--card);
      color: var(--sub); transition: all .12s; -webkit-tap-highlight-color: transparent;
    }
    .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    .chip.done { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
    .chip.on.done { background: var(--accent); color: #fff; }

    /* ── Form ── */
    .form-wrap { padding: 16px; }
    .form-grp { margin-bottom: 16px; }
    .form-lbl { font-size: 12px; font-weight: 500; color: var(--sub); margin-bottom: 7px; display: block; }
    .inp, .txa {
      width: 100%; padding: 11px 13px; border: 1px solid var(--border);
      border-radius: 9px; font-size: 15px; font-family: inherit;
      background: var(--card); color: var(--text); outline: none; transition: border-color .12s;
      box-sizing: border-box;
    }
    .inp:focus, .txa:focus { border-color: var(--accent); }
    input[type="date"].inp, input[type="date"].login-inp { -webkit-appearance: none; appearance: none; text-align: center; }
    .txa { resize: none; min-height: 84px; line-height: 1.6; overflow: hidden; }

    /* ── Eval buttons ── */
    .eval-btn {
      width: 100%; padding: 11px 14px; margin-bottom: 6px; border-radius: 9px;
      border: 1px solid var(--border); background: var(--card);
      font-size: 14px; font-weight: 500; cursor: pointer; text-align: left;
      color: var(--sub); transition: all .12s; font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .eval-btn:last-child { margin-bottom: 0; }
    .e5 { background: var(--green-l); border-color: #86EFAC; color: #15803D; }
    .e4 { background: var(--accent-l); border-color: #A5B4FC; color: #3730A3; }
    .e3 { background: var(--amber-l); border-color: #FCD34D; color: #92400E; }
    .e2 { background: var(--red-l); border-color: #FCA5A5; color: #991B1B; }
    .e1 { background: var(--red-l); border-color: #FCA5A5; color: #991B1B; }

    /* ── Primary button ── */
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: var(--accent); color: #fff;
      font-size: 15px; font-weight: 600; cursor: pointer;
      font-family: inherit; letter-spacing: .1px;
      transition: opacity .12s, transform .1s; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: .85; transform: scale(.99); }
    .btn:disabled { background: var(--border); color: var(--sub); cursor: default; }

    /* ── Ghost button ── */
    .btn-g {
      width: 100%; padding: 13px; border-radius: 9px;
      border: 1px solid var(--border); background: transparent;
      color: var(--red); font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: inherit;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
      left: 50%; transform: translateX(-50%);
      background: #111827; color: #fff;
      padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
      z-index: 999; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,.2);
      animation: up .2s ease;
    }
    @keyframes up { from { opacity:0; transform: translateX(-50%) translateY(6px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

    /* ── Report ── */
    .report-hero { padding: 28px 20px 16px; text-align: center; }
    .report-date { font-size: 11px; font-weight: 500; color: var(--sub); margin-bottom: 12px; }
    .report-score { font-size: 72px; font-weight: 800; line-height: 1; letter-spacing: -3px; color: var(--text); }
    .report-pts { font-size: 13px; color: var(--sub); margin-top: 4px; }

    /* ── Tag ── */
    .tag { display: inline-block; padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 500; }
    .t-g { background: var(--green-l); color: #15803D; }
    .t-a { background: var(--amber-l); color: #92400E; }

    /* ── Log rows ── */
    .log-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .log-row:last-child { border-bottom: none; }
    .log-time { font-size: 11px; font-weight: 600; color: var(--sub); min-width: 44px; padding-top: 2px; flex-shrink: 0; }
    .log-task { font-size: 14px; font-weight: 500; color: var(--text); }
    .log-meta { font-size: 12px; color: var(--sub); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* ── Chat ── */
    .chat-head { padding: 14px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .chat-av { width: 34px; height: 34px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--text); flex-shrink: 0; }
    .chat-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .chat-status { font-size: 11px; color: var(--sub); }

    .msgs { padding: 16px; display: flex; flex-direction: column; gap: 8px; min-height: 100%; }
    .bubble { max-width: 76%; padding: 10px 14px; font-size: 14px; line-height: 1.6; overflow-wrap: break-word; word-break: break-word; white-space: pre-wrap; border-radius: 14px; min-width: 130px; }
    .b-in { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .b-out { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .btime { font-size: 10px; color: var(--sub); margin-top: 3px; }
    .btime-r { text-align: right; }

    .chat-bar { padding: 10px 14px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; }
    .chat-inp { flex: 1; padding: 10px 13px; border: 1px solid var(--border); border-radius: 9px; font-size: 15px; font-family: inherit; outline: none; resize: none; max-height: 100px; line-height: 1.4; background: var(--bg); color: var(--text); }
    .chat-inp:focus { border-color: var(--accent); }
    .send { width: 38px; height: 38px; border-radius: 9px; background: var(--accent); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    .send:disabled { background: var(--border); color: var(--sub); cursor: default; }

    /* ── Settings ── */
    .s-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .s-row:last-child { border-bottom: none; }
    .s-k { color: var(--sub); font-weight: 400; }
    .s-v { font-weight: 500; color: var(--text); }
    select { width: 100%; padding: 10px 12px; border-radius: 9px; border: 1px solid var(--border); font-size: 14px; background: var(--card); color: var(--text); font-family: inherit; outline: none; }
    select:focus { border-color: var(--accent); }

    /* ── Date nav ── */
    .date-nav { display: flex; align-items: center; gap: 12px; margin-top: 6px; }
    .date-nav button { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--sub); padding: 0 4px; line-height: 1; }
    .date-nav button:disabled { color: var(--border); cursor: default; }
    .date-nav span { font-size: 13px; font-weight: 600; color: var(--text); }

    /* ── Spinner ── */
    .spin { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: rot .6s linear infinite; display: inline-block; }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* ── Empty ── */
    .empty { padding: 48px 24px; text-align: center; }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty-body { font-size: 13px; color: var(--sub); line-height: 1.7; }

    /* ── Login ── */
    .login-wrap { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; background: var(--bg); }
    .login-logo { width: 52px; height: 52px; border-radius: 14px; background: var(--accent); display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; }
    .login-title { font-size: 24px; font-weight: 700; letter-spacing: -.4px; text-align: center; color: var(--text); }
    .login-sub { font-size: 13px; color: var(--sub); text-align: center; margin: 5px 0 32px; line-height: 1.6; }
    .login-box { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 8px; }
    .login-inp { width: 100%; padding: 13px 14px; border-radius: 9px; border: 1px solid var(--border); font-size: 15px; background: var(--card); color: var(--text); outline: none; font-family: inherit; transition: border-color .12s; box-sizing: border-box; }
    .login-inp:focus { border-color: var(--accent); }
    .login-err { font-size: 12px; color: var(--red); font-weight: 500; }
  </style>
</head>
<body>
<div id="root">
  <div id="splash" style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#F8F8FA;gap:16px">
    <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#7B7AE8,#A78BF5);display:flex;align-items:center;justify-content:center">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    </div>
    <div style="font-family:-apple-system,sans-serif;font-size:20px;font-weight:800;color:#1F2937;letter-spacing:-.3px">JIROKU</div>
    <div style="width:24px;height:24px;border:2.5px solid #E5E7EB;border-top-color:#4F46E5;border-radius:50%;animation:sp 0.7s linear infinite"></div>
  </div>
  <style>#splash{animation:none}@keyframes sp{to{transform:rotate(360deg)}}</style>
</div>
<script>
const { useState, useEffect, useRef, useCallback } = React;
const html = htm.bind(React.createElement);

const GAS_URL = "https://script.google.com/macros/s/AKfycbzJ-QEpPVnmp-LFU5Jxww4VFP1qaseMtwCrzKxAA6ZULr1y3h_UeKzVdhHnl5ze57U/exec";
let CURRENT_USER = JSON.parse(localStorage.getItem("edventure_user") || "null");

async function gasApi(action, params = {}) {
  if (!GAS_URL) return mockApi(action, params);
  const url = new URL(GAS_URL);
  url.searchParams.set("action", action);
  url.searchParams.set("studentEmail", CURRENT_USER.email);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
  try { const r = await fetch(url.toString(), { redirect:"follow" }); return await r.json(); }
  catch { return { ok:true, data:[] }; }
}
async function gasPost(action, body = {}) {
  if (!GAS_URL) return mockPost(action, body);
  const url = new URL(GAS_URL);
  url.searchParams.set("action", action);
  url.searchParams.set("studentEmail", CURRENT_USER.email);
  Object.entries(body).forEach(([k,v]) => { if (v != null) url.searchParams.set(k, String(v)); });
  try { await fetch(url.toString(), { mode:"no-cors" }); } catch {}
  return { ok:true };
}

const MOCK_LOGS = [
  { time_block:"07:00", task:"朝の読書", focus_level:"5 — 完璧にできた", memo:"集中できた" },
  { time_block:"09:00", task:"英語リスニング", focus_level:"3 — まあまあだった", memo:"" },
  { time_block:"11:00", task:"プログラミング", focus_level:"5 — 完璧にできた", memo:"楽しかった" },
];
const MOCK_REPORT = { score:82, feedback:"全体的に集中力が高く、午前中のパフォーマンスが際立っています。", action:"明日はポモドーロ技法を試してみましょう。", highlights:"プログラミングへの高い集中", improvement:"休憩時間の管理" };
const MOCK_MESSAGES = [
  { message_id:"1", content:"今日もよく頑張りました！", sender_name:"コーチ", sender_role:"coach", timestamp:"2026-06-27 09:30" },
  { message_id:"2", content:"ありがとうございます！", sender_name:"生徒", sender_role:"student", timestamp:"2026-06-27 10:15" },
];
const MOCK_SCHEDULE = [
  { time:"09:00", title:"朝のホームルーム", sub:"Zoom" },
  { time:"13:00", title:"英語ディスカッション", sub:"グループ" },
];
let mockMsgs=[...MOCK_MESSAGES], mockLogs=[...MOCK_LOGS];
function mockApi(a){ if(a==="getReport") return Promise.resolve({ok:true,data:MOCK_REPORT}); if(a==="getLogs") return Promise.resolve({ok:true,data:mockLogs}); if(a==="getMessages") return Promise.resolve({ok:true,data:mockMsgs}); if(a==="getSchedule") return Promise.resolve({ok:true,data:MOCK_SCHEDULE}); return Promise.resolve({ok:false}); }
function mockPost(a,b){ if(a==="saveLog"){mockLogs=[...mockLogs,{time_block:b.time_block,task:b.task,focus_level:b.focus_level,memo:b.memo}];return Promise.resolve({ok:true});} if(a==="sendMessage"){mockMsgs=[...mockMsgs,{message_id:String(Date.now()),content:b.content,sender_name:CURRENT_USER.name,sender_role:"student",timestamp:new Date().toLocaleString("ja")}];return Promise.resolve({ok:true});}return Promise.resolve({ok:true});}

const S = (p) => { const s={width:p.s||22,height:p.s||22,fill:"none",stroke:"currentColor",strokeWidth:1.8,strokeLinecap:"round",strokeLinejoin:"round"};
  if(p.n==="home")   return html`<svg viewBox="0 0 24 24" style=${s}><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>`;
  if(p.n==="clock")  return html`<svg viewBox="0 0 24 24" style=${s}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>`;
  if(p.n==="chart")  return html`<svg viewBox="0 0 24 24" style=${s}><rect x="3" y="12" width="4" height="9"/><rect x="10" y="7" width="4" height="14"/><rect x="17" y="3" width="4" height="18"/></svg>`;
  if(p.n==="timer")  return html`<svg viewBox="0 0 24 24" style=${s}><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5"/><path d="M9.5 2.5h5M12 2.5V5"/></svg>`;

function Toast({msg, onDone}) {
  useEffect(()=>{ const t=setTimeout(onDone,2500); return ()=>clearTimeout(t); },[]);
  return html`<div class="toast">${msg}</div>`;
}
function formatDateStr(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function addDays(s,n){ const d=new Date(s+"T00:00:00"); d.setDate(d.getDate()+n); return formatDateStr(d); }
function isToday(s){ return s===formatDateStr(new Date()); }

function getRank(level) {
  return RANKS.find(r => level >= r.minLv && level <= r.maxLv) || RANKS[0];
}

// ── Log ──
function LogScreen({onToast}) {
  const nowH = new Date().getHours();
  const todayStr = formatDateStr(new Date());
  const [date, setDate] = useState(todayStr);
  const [logs, setLogs] = useState([]);
  const [saving, setSaving] = useState(false);
  const timeRef = useRef(null);
  const timeBlocks = getTimeBlocks();

  // 現在時刻のブロックを返す（記録済みでもそのまま表示）
  const getDefaultBlock = () => {
    return timeBlocks.find(t => parseInt(t) === nowH) || timeBlocks[timeBlocks.length - 1];
  };

  const [block, setBlock] = useState(()=>{ const b=timeBlocks.find(t=>parseInt(t)===nowH); return b||timeBlocks[timeBlocks.length-1]||"09:00-10:00"; });
  const [task, setTask] = useState("");
  const [focus, setFocus] = useState(EVALS[0].l);
  const [memo, setMemo] = useState("");
  const [goalRelated, setGoalRelated] = useState(false);

  // ブロック切替時に既存ログを読み込んでフォームに反映
  const loadBlockData = (b, currentLogs) => {
    const existing = currentLogs.find(l => l.time_block === b);
    if (existing) {
      setTask(existing.task || "");
      setFocus(existing.focus_level || EVALS[0].l);
      setMemo(existing.memo || "");
      setGoalRelated(existing.goal_related === "true" || existing.goal_related === true);
    } else {
      setTask(""); setFocus(EVALS[0].l); setMemo(""); setGoalRelated(false);
    }
  };

  const handleBlockSelect = (b) => {
    setBlock(b);
    loadBlockData(b, logs);
  };

  useEffect(()=>{
    gasApi("getLogs",{date}).then(r=>{
      const data = r.ok ? r.data : [];
      setLogs(data);
      if (isToday(date)) {
        const def = getDefaultBlock();
        setBlock(def);
        loadBlockData(def, data);
        setTimeout(()=>{ const el=timeRef.current?.querySelector(".chip.on"); if(el) el.scrollIntoView({inline:"center",behavior:"smooth"}); },100);
      }
    });
  },[date]);

  const save = async ()=>{
    if(!task.trim()) return;
    setSaving(true);
    const url=new URL(GAS_URL);
    url.searchParams.set("action","saveLog"); url.searchParams.set("studentEmail",CURRENT_USER.email);
    url.searchParams.set("time_block",block); url.searchParams.set("task",task.trim());
    url.searchParams.set("focus_level",focus); url.searchParams.set("memo",memo.trim());
    url.searchParams.set("goal_related", goalRelated ? "true" : "false");
    const res=await fetch(url).then(r=>r.json()).catch(()=>({}));
    if(res.xp_gained){ const lv=res.level_up?`  →  Lv.${res.level} へ！`:""; onToast(`+${res.xp_gained} XP 獲得${lv}`); }
    else onToast("保存しました");
    const r=await gasApi("getLogs",{date});
    if(r.ok) setLogs(r.data);
    setSaving(false);
  };

  const recorded = new Set(logs.map(l => l.time_block));

  return html`<div>
    <div class="ph">
      <div class="ph-title-accent">記録を入力</div>
      <div class="date-nav">
        <button onClick=${()=>setDate(addDays(date,-1))}>‹</button>
        <span>${isToday(date)?"今日":date}</span>
        <button onClick=${()=>setDate(addDays(date,1))} disabled=${isToday(date)}>›</button>
      </div>
    </div>

    ${!isToday(date)&&logs.length===0&&html`<div class="empty"><div class="empty-title">記録なし</div><div class="empty-body">この日の記録はありません</div></div>`}

    ${isToday(date)&&html`<div>
      <div ref=${timeRef} class="time-bar">
        ${timeBlocks.map(t=>html`<button key=${t}
          class=${"chip"+(block===t?" on":"")+(recorded.has(t)?" done":"")}
          onClick=${()=>handleBlockSelect(t)}>${t}</button>`)}
      </div>
      <div class="form-wrap">
        <div style=${{fontSize:12,color:"var(--sub)",marginBottom:8}}>
          ${recorded.has(block) ? "✏️ 記録済み（編集できます）" : "📝 未記録"}
        </div>
        <div class="form-grp">
          <label class="form-lbl">何をしましたか？</label>
          <input class="inp" placeholder="例：数学の問題演習" value=${task} onInput=${e=>setTask(e.target.value)} />
        </div>
        <div class="form-grp">
          <label class="form-lbl">自己評価</label>
          ${EVALS.map(f=>html`<button key=${f.l} class=${"eval-btn"+(focus===f.l?" "+f.c:"")} onClick=${()=>setFocus(f.l)}>${f.l}</button>`)}
        </div>
        <div class="form-grp">
          <label class="form-lbl">メモ（任意）</label>
          <textarea class="txa" placeholder="気づいたことや振り返り..." value=${memo} onInput=${e=>setMemo(e.target.value)} />
        </div>
        <div class="form-grp">
          <button onClick=${()=>setGoalRelated(!goalRelated)} style=${{display:"flex",alignItems:"center",gap:10,background:"none",border:`1.5px solid ${goalRelated?"var(--accent)":"var(--border)"}`,borderRadius:10,padding:"10px 14px",width:"100%",cursor:"pointer",transition:"all .15s",backgroundColor:goalRelated?"var(--accent-l)":"transparent"}}>
            <div style=${{width:20,height:20,borderRadius:6,border:`2px solid ${goalRelated?"var(--accent)":"var(--border)"}`,background:goalRelated?"var(--accent)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
              ${goalRelated&&html`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`}
            </div>
            <span style=${{fontSize:14,fontWeight:500,color:goalRelated?"var(--accent)":"var(--sub)"}}>この時間は目標に関連している</span>
          </button>
        </div>
        <button class="btn" onClick=${save} disabled=${!task.trim()||saving}>${saving?html`<span class="spin"/>`:recorded.has(block)?"更新する":"保存する"}</button>
      </div>
    </div>`}

    ${logs.length>0&&html`
      <div class="card" style=${{marginBottom:24}}>
        <div class="card-label">${isToday(date)?"本日の記録":date+" の記録"}</div>
        ${logs.map((l,i)=>{
          const num=l.focus_level?.charAt(0);
          return html`<div key=${i} class="log-row" style=${{cursor:isToday(date)?"pointer":"default"}} onClick=${()=>isToday(date)&&handleBlockSelect(l.time_block)}>
            <div class="log-time">${l.time_block}</div>
            <div><div class="log-task">${l.task}</div>
            <div class="log-meta"><span class="dot" style=${{background:DOT[num]||"var(--sub)"}}/>${l.focus_level}${l.memo?` · ${l.memo}`:""}</div></div>
          </div>`;
        })}
      </div>
    `}
  </div>`;
}

    Promise.all([gasApi("getReport",{date}),gasApi("getLogs",{date})]).then(([r,l])=>{
      setReport(r.ok?r.data:null); if(l.ok) setLogs(l.data); setLoading(false);
    });
  },[date]);

  const fmtDate = d => {
    const dateOnly = (d||"").substring(0,10);
    const dt = new Date(dateOnly+"T00:00:00");
    return isNaN(dt)?"--":dt.toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"});
  };

  // ── 一覧表示 ──
  if(!date) return html`<div>
    <div class="ph"><div class="ph-title">レポート</div></div>
    ${listLoading
      ? html`<div style=${{display:"flex",justifyContent:"center",padding:40}}><div class="spin" style=${{borderColor:"var(--border)",borderTopColor:"var(--accent)",width:24,height:24,borderWidth:2}}/></div>`
      : reportList.length === 0
        ? html`<div class="empty">
            <div class="empty-title">レポートはまだありません</div>
            <div class="empty-body">記録を入力すると<br/>毎晩21時にAIがレポートを生成します</div>
          </div>`
        : html`<div class="card" style=${{marginBottom:24}}>
            ${reportList.map((r,i)=>html`
              <button key=${r.date} onClick=${()=>setDate(r.date)}
                style=${{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",background:"none",border:"none",padding:"13px 0",borderBottom:i<reportList.length-1?"1px solid var(--border)":"none",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
                <div>
                  <div style=${{fontSize:14,fontWeight:500,color:"var(--text)"}}>${fmtDate(r.date)}</div>
                  <div style=${{fontSize:11,color:"var(--sub)",marginTop:2}}>${isToday(r.date)?"今日":r.date.substring(0,10)}</div>
                </div>
                <div style=${{display:"flex",alignItems:"center",gap:10}}>
                  <div style=${{fontSize:22,fontWeight:700,color:SCORE_COLOR(r.score)}}>${r.score}</div>
                  <div style=${{color:"var(--sub)",fontSize:16}}>›</div>
                </div>
              </button>
            `)}
          </div>`
    }
  </div>`;

  // ── 詳細表示 ──
  if(loading) return html`<div>
    <div class="ph">
      <button onClick=${()=>setDate(null)} style=${{background:"none",border:"none",color:"var(--accent)",fontSize:14,cursor:"pointer",padding:0,fontFamily:"inherit",marginBottom:4}}>← 一覧に戻る</button>
      <div class="ph-title">${fmtDate(date)}</div>
    </div>
    <div style=${{display:"flex",justifyContent:"center",padding:40}}><div class="spin" style=${{borderColor:"var(--border)",borderTopColor:"var(--accent)",width:24,height:24,borderWidth:2}}/></div>
  </div>`;

  return html`<div>
    <div class="ph">
      <button onClick=${()=>setDate(null)} style=${{background:"none",border:"none",color:"var(--accent)",fontSize:14,cursor:"pointer",padding:0,fontFamily:"inherit",marginBottom:4}}>← 一覧に戻る</button>
      <div class="ph-title">${fmtDate(date)}</div>
    </div>

    ${!report
      ? html`<div class="empty"><div class="empty-title">この日のレポートはありません</div></div>`
      : html`<div>
          <div class="report-hero" style=${{paddingTop:8}}>
            <div class="report-score">${report.score}</div>
            <div class="report-pts">/ 100点</div>
            <div style=${{display:"flex",justifyContent:"center",gap:16,marginTop:12,flexWrap:"wrap"}}>
              <div style=${{fontSize:11,color:"var(--sub)",display:"flex",alignItems:"center",gap:4}}><span style=${{color:"var(--accent)",fontWeight:600}}>記録数</span> 最大40点</div>
              <div style=${{fontSize:11,color:"var(--sub)",display:"flex",alignItems:"center",gap:4}}><span style=${{color:"var(--accent)",fontWeight:600}}>メモの質</span> 最大30点</div>
              <div style=${{fontSize:11,color:"var(--sub)",display:"flex",alignItems:"center",gap:4}}><span style=${{color:"var(--accent)",fontWeight:600}}>集中度の正直さ</span> 最大30点</div>
            </div>
          </div>
          <div class="card">
            <div class="card-label">フィードバック</div>
            <p style=${{fontSize:14,lineHeight:1.8,color:"var(--text)"}}>${report.feedback}</p>
          </div>
          <div class="card">
            ${report.highlights&&html`<div style=${{marginBottom:12}}><span class="tag t-g">良かった点</span><p style=${{fontSize:13,color:"var(--sub)",marginTop:7,lineHeight:1.6}}>${report.highlights}</p></div>`}
            ${report.improvement&&html`<div><span class="tag t-a">改善点</span><p style=${{fontSize:13,color:"var(--sub)",marginTop:7,lineHeight:1.6}}>${report.improvement}</p></div>`}
          </div>
          ${report.action&&html`<div class="card"><div class="card-label">明日のアクション</div><p style=${{fontSize:14,lineHeight:1.8,color:"var(--text)"}}>${report.action}</p></div>`}
          ${logs.length>0&&html`
            <div class="card" style=${{marginBottom:24}}>
              <div class="card-label">時間ログ</div>
              ${logs.map((l,i)=>{
                const num=l.focus_level?.charAt(0);
                return html`<div key=${i} class="log-row">
                  <div class="log-time">${l.time_block}</div>
                  <div><div class="log-task">${l.task}</div><div class="log-meta"><span class="dot" style=${{background:DOT[num]||"var(--sub)"}}/>${l.focus_level}${l.memo?` · ${l.memo}`:""}</div></div>
                </div>`;
              })}
            </div>
          `}
        </div>`
    }
  </div>`;
}

// ── Chat ──
function TimerScreen({onToast, isActive}) {
  const getPresets = () => JSON.parse(localStorage.getItem("timer_presets")||"[25,45,60]");
  const getBreak   = () => Number(localStorage.getItem("timer_break")||"5");

  const loadTimerState = () => {
    try {
      const s = JSON.parse(localStorage.getItem("jiroku_timer_state")||"null");
      if (!s) return null;
      // 実行中だった場合、経過時間を差し引いて残り時間を計算
      if (s.isRunning && s.savedAt) {
        const elapsed = Math.floor((Date.now() - s.savedAt) / 1000);
        s.timeLeft = Math.max(0, s.timeLeft - elapsed);
      }
      return s;
    } catch(e) { return null; }
  };

  const saved = loadTimerState();
  const defaultMin = getPresets()[0];

  const [presets]        = useState(getPresets);
  const [breakMin]       = useState(getBreak);
  const [selectedMin, setSelectedMin] = useState(saved?.selectedMin ?? defaultMin);
  const [timeLeft, setTimeLeft]       = useState(saved?.timeLeft ?? defaultMin*60);
  const [isRunning, setIsRunning]     = useState(saved?.isRunning ?? false);
  const [mode, setMode]               = useState(saved?.mode ?? "focus");
  const [sessionCount, setSessionCount] = useState(saved?.sessionCount ?? 0);
  const [task, setTask]               = useState(saved?.task ?? "");
  const [startTime, setStartTime]     = useState(saved?.startTime ? new Date(saved.startTime) : null);
  const [showModal, setShowModal]     = useState(false);
  const [logFocus, setLogFocus]       = useState(EVALS[0].l);
  const [logMemo, setLogMemo]         = useState("");
  const [saving, setSaving]           = useState(false);

  // 状態をlocalStorageに保存
  useEffect(()=>{
    localStorage.setItem("jiroku_timer_state", JSON.stringify({
      selectedMin, timeLeft, isRunning, mode, sessionCount,
      task, startTime: startTime?.toISOString()||null, savedAt: Date.now()
    }));
  },[selectedMin, timeLeft, isRunning, mode, sessionCount, task, startTime]);

  const playBeep = () => {
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      [0,0.3,0.6].forEach(t=>{
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value=880; g.gain.setValueAtTime(0.25,ctx.currentTime+t);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.25);
        o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.25);
      });
    } catch(e){}
  };

  useEffect(()=>{
    if(!isRunning) return;
    if(timeLeft<=0){
      setIsRunning(false);
      playBeep();
      if(mode==="focus"){ setSessionCount(c=>c+1); setShowModal(true); }
      else { setMode("focus"); setTimeLeft(selectedMin*60); }
      return;
    }
    const t = setTimeout(()=>setTimeLeft(s=>s-1), 1000);
    return ()=>clearTimeout(t);
  },[isRunning, timeLeft]);

  // タブを離れたら自動一時停止
  useEffect(()=>{ if(!isActive && isRunning) setIsRunning(false); },[isActive]);

  const selectPreset = (min) => {
    setSelectedMin(min); setTimeLeft(min*60);
    setIsRunning(false); setStartTime(null); setMode("focus");
  };
  const start = () => { if(!startTime) setStartTime(new Date()); setIsRunning(true); };
  const pause = () => setIsRunning(false);
  const reset = () => { setIsRunning(false); setTimeLeft(selectedMin*60); setStartTime(null); setMode("focus"); localStorage.removeItem("jiroku_timer_state"); };

  const saveLog = async () => {
    setSaving(true);
    const st = startTime||new Date();
    const h  = st.getHours();
    const timeBlock = String(h).padStart(2,"0")+":00";
    const url = new URL(GAS_URL);
    url.searchParams.set("action","saveLog");
    url.searchParams.set("studentEmail",CURRENT_USER.email);
    url.searchParams.set("time_block",timeBlock);
    url.searchParams.set("task",task.trim()||`ポモドーロ${selectedMin}分集中`);
    url.searchParams.set("focus_level",logFocus);
    url.searchParams.set("memo",logMemo.trim());
    url.searchParams.set("goal_related","true");
    const res = await fetch(url).then(r=>r.json()).catch(()=>({}));
    if(res.xp_gained){ const lv=res.level_up?` → Lv.${res.level}！`:""; onToast(`+${res.xp_gained} XP 獲得${lv}`); }
    else onToast("記録しました");
    setSaving(false); setShowModal(false); setLogMemo("");
    setMode("break"); setTimeLeft(breakMin*60); setStartTime(null);
  };
  const skipLog = () => { setShowModal(false); setMode("break"); setTimeLeft(breakMin*60); setStartTime(null); };

  const mins = Math.floor(timeLeft/60);
  const secs = timeLeft%60;
  const totalSec = (mode==="focus"?selectedMin:breakMin)*60;
  const pct = Math.max(0,Math.min(100,((totalSec-timeLeft)/totalSec)*100));
  const r=90, circ=2*Math.PI*r, offset=circ*(1-pct/100);
  const accentColor = mode==="break"?"var(--green)":"var(--accent)";

  return html`<div style=${{paddingBottom:32}}>
    <div class="ph"><div class="ph-title-accent">ポモドーロタイマー</div></div>
    <div style=${{padding:"0 16px"}}>

      <div style=${{display:"flex",gap:8,marginBottom:24}}>
        ${presets.map(min=>html`
          <button key=${min} onClick=${()=>!isRunning&&selectPreset(min)}
            style=${{flex:1,padding:"10px 0",borderRadius:10,border:`1.5px solid ${selectedMin===min?"var(--accent)":"var(--border)"}`,
            background:selectedMin===min?"var(--accent-l)":"var(--card)",color:selectedMin===min?"var(--accent)":"var(--sub)",
            fontWeight:600,fontSize:14,cursor:isRunning?"default":"pointer",opacity:isRunning&&selectedMin!==min?0.4:1}}>
            ${min}分
          </button>
        `)}
      </div>

      <div style=${{position:"relative",width:220,height:220,margin:"0 auto",marginBottom:20}}>
        <svg width="220" height="220" viewBox="0 0 220 220" style=${{position:"absolute",top:0,left:0}}>
          <circle cx="110" cy="110" r=${r} fill="none" stroke="var(--border)" stroke-width="10"/>
          <circle cx="110" cy="110" r=${r} fill="none" stroke=${accentColor} stroke-width="10"
            stroke-dasharray=${circ} stroke-dashoffset=${offset}
            stroke-linecap="round" transform="rotate(-90 110 110)"
            style=${{transition:"stroke-dashoffset 1s linear"}}/>
        </svg>
        <div style=${{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style=${{fontSize:46,fontWeight:800,color:"var(--text)",lineHeight:1,fontVariantNumeric:"tabular-nums"}}>
            ${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}
          </div>
          <div style=${{fontSize:13,color:mode==="break"?"var(--green)":"var(--sub)",marginTop:8}}>
            ${mode==="focus"?`集中中 · 第${sessionCount+1}セッション`:`休憩中 · 第${sessionCount}セッション完了`}
          </div>
        </div>
      </div>

      ${mode==="focus"&&html`
        <div class="form-grp" style=${{marginBottom:16}}>
          <label class="form-lbl">何に集中しますか？（任意）</label>
          <input class="inp" placeholder="例：企画書の作成、架電対応..." value=${task}
            onInput=${e=>setTask(e.target.value)} disabled=${isRunning}/>
        </div>
      `}

      <div style=${{display:"flex",gap:10,marginBottom:startTime&&!showModal?8:16}}>
        <button onClick=${isRunning?pause:start}
          style=${{flex:1,padding:"15px",borderRadius:12,border:"none",background:accentColor,
          color:"white",fontSize:17,fontWeight:700,cursor:"pointer"}}>
          ${isRunning?"⏸ 一時停止":"▶ スタート"}
        </button>
        <button onClick=${reset}
          style=${{padding:"15px 18px",borderRadius:12,border:"1.5px solid var(--border)",
          background:"var(--card)",color:"var(--sub)",fontSize:18,cursor:"pointer"}}>↺</button>
      </div>

      ${startTime&&!showModal&&html`
        <button onClick=${()=>{pause();setShowModal(true);}}
          style=${{width:"100%",padding:"11px",borderRadius:12,border:"1.5px solid var(--accent)",
          background:"none",color:"var(--accent)",fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:16}}>
          ✓ タスク完了・途中で記録する
        </button>
      `}

      <div style=${{display:"flex",gap:10,marginBottom:20}}>
        <div style=${{flex:1,background:"var(--card)",borderRadius:14,padding:"14px 0",textAlign:"center",border:"1px solid var(--border)"}}>
          <div style=${{fontSize:26,fontWeight:800,color:"var(--accent)",lineHeight:1}}>${sessionCount}</div>
          <div style=${{fontSize:11,color:"var(--sub)",marginTop:4}}>セッション完了</div>
        </div>
        <div style=${{flex:1,background:"var(--card)",borderRadius:14,padding:"14px 0",textAlign:"center",border:"1px solid var(--border)"}}>
          <div style=${{fontSize:26,fontWeight:800,color:"var(--accent)",lineHeight:1}}>${sessionCount*selectedMin}</div>
          <div style=${{fontSize:11,color:"var(--sub)",marginTop:4}}>集中した分数</div>
        </div>
      </div>

      ${(()=>{
        const quotes=[
          {text:"成功は最終的なものではなく、失敗は致命的ではない。大切なのは続ける勇気だ。",author:"ウィンストン・チャーチル"},
          {text:"千里の道も一歩から。",author:"老子"},
          {text:"今日できることを明日に延ばすな。",author:"ベンジャミン・フランクリン"},
          {text:"才能とは、毎日同じことを新鮮な気持ちでできる能力のことである。",author:"古賀稔彦"},
          {text:"行動こそが全てを決める。今すぐ動け。",author:"ゲーテ"},
          {text:"どんな小さな進歩も、昨日の自分を超えている。",author:"匿名"},
          {text:"夢を見るだけでは不十分。行動しなければ夢は夢のままだ。",author:"ヴァルター・スコット"},
          {text:"集中力は、成功への最短ルートだ。",author:"ブルース・リー"},
          {text:"できると思えばできる。できないと思えばできない。どちらも正しい。",author:"ヘンリー・フォード"},
          {text:"一度に一つのことに集中すれば、あなたは多くのことを成し遂げられる。",author:"オグ・マンディーノ"},
          {text:"石の上にも三年。",author:"日本のことわざ"},
          {text:"努力は必ず報われる。もし報われない努力があるならば、それはまだ努力と呼べない。",author:"王貞治"},
          {text:"やってみなければ分からない。やってみれば必ず分かる。",author:"本田宗一郎"},
          {text:"小さなことを重ねることが、とんでもないところへ行くただひとつの道。",author:"イチロー"},
          {text:"人生は今日一日の積み重ねである。",author:"伊藤忠兵衛"},
        ];
        const today=new Date(); const idx=(today.getFullYear()*10000+((today.getMonth()+1)*100)+today.getDate())%quotes.length;
        const q=quotes[idx];
        return html`
          <div style=${{background:"var(--card)",borderRadius:14,padding:"18px 16px",border:"1px solid var(--border)",marginBottom:8}}>
            <div style=${{fontSize:11,color:"var(--accent)",fontWeight:700,marginBottom:8,letterSpacing:"0.05em"}}>TODAY'S QUOTE</div>
            <div style=${{fontSize:14,color:"var(--text)",lineHeight:1.7,fontStyle:"italic",marginBottom:10}}>"${q.text}"</div>
            <div style=${{fontSize:12,color:"var(--sub)",textAlign:"right"}}>— ${q.author}</div>
          </div>
        `;
      })()}
    </div>

    ${showModal&&html`
      <div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:200}}
        onClick=${e=>{if(e.target===e.currentTarget)skipLog();}}>
        <div style=${{background:"var(--card)",borderRadius:"20px 20px 0 0",padding:"24px 20px 32px",width:"100%",boxSizing:"border-box"}}>
          <div style=${{fontSize:20,fontWeight:800,marginBottom:4}}>お疲れ様でした！🎉</div>
          <div style=${{fontSize:13,color:"var(--sub)",marginBottom:20}}>${selectedMin}分の集中セッションが完了しました。記録しましょう。</div>
          <div class="form-grp">
            <label class="form-lbl">何をしましたか？</label>
            <input class="inp" value=${task} onInput=${e=>setTask(e.target.value)}
              placeholder="例：企画書の作成"/>
          </div>
          <div class="form-grp">
            <label class="form-lbl">自己評価</label>
            ${EVALS.map(f=>html`<button key=${f.l} class=${"eval-btn"+(logFocus===f.l?" "+f.c:"")} onClick=${()=>setLogFocus(f.l)}>${f.l}</button>`)}
          </div>
          <div class="form-grp" style=${{marginBottom:20}}>
            <label class="form-lbl">メモ（任意）</label>
            <textarea class="txa" placeholder="気づいたことや振り返り..." value=${logMemo}
              onInput=${e=>setLogMemo(e.target.value)}/>
          </div>
          <button class="btn" onClick=${saveLog} disabled=${saving} style=${{marginBottom:10}}>
            ${saving?html`<span class="spin"/>`:html`記録して休憩へ（${breakMin}分）`}
          </button>
          <button onClick=${skipLog} style=${{width:"100%",background:"none",border:"none",color:"var(--sub)",fontSize:13,padding:"8px",cursor:"pointer"}}>
            スキップ（記録しない）
          </button>
        </div>
      </div>
    `}
  </div>`;
}

function SettingsScreen({onToast,onLogout,onGoalSaved}) {
  const saved=JSON.parse(localStorage.getItem("notifySettings")||'{"start":7,"end":23,"interval":1}');
  const savedGoals=JSON.parse(localStorage.getItem("jiroku_goals")||'[{"goal":"","deadline":""}]');
  const savedLogHours=getLogHours();
  const [start,setStart]=useState(saved.start);
  const [end,setEnd]=useState(saved.end);
  const [interval,setInterval]=useState(saved.interval||1);
  const [logStart,setLogStart]=useState(savedLogHours.start);
  const [logEnd,setLogEnd]=useState(savedLogHours.end);
  const [goals,setGoals]=useState(savedGoals.length?savedGoals:[{goal:"",deadline:""}]);
  const updateGoal=(i,field,val)=>{ const g=[...goals]; g[i]={...g[i],[field]:val}; setGoals(g); };
  const addGoal=()=>{ if(goals.length<3) setGoals([...goals,{goal:"",deadline:""}]); };
  const removeGoal=(i)=>{ if(goals.length>1) setGoals(goals.filter((_,j)=>j!==i)); };
  const [calLinked,setCalLinked]=useState(!!localStorage.getItem("cal_linked"));
  const [calLoading,setCalLoading]=useState(false);
  const hours=Array.from({length:24},(_,i)=>i);

  const linkCalendar=()=>{
    if(!window.google||!google.accounts) return;
    setCalLoading(true);
    const client=google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: "https://www.googleapis.com/auth/calendar.readonly",
      callback: async(tokenResp)=>{
        if(tokenResp.error){ setCalLoading(false); onToast("カレンダー連携に失敗しました"); return; }
        try{
          const calRes=await fetch("https://www.googleapis.com/calendar/v3/users/me/calendarList/primary",{
            headers:{Authorization:"Bearer "+tokenResp.access_token}
          }).then(r=>r.json());
          const calId=calRes.id||CURRENT_USER.email;
          await gasPost("saveSettings",{google_calendar_id:calId});
          localStorage.setItem("cal_linked","1");
          setCalLinked(true);
          onToast("カレンダーを連携しました！");
        }catch{ onToast("カレンダー取得に失敗しました"); }
        setCalLoading(false);
      }
    });
    client.requestAccessToken();
  };

  const saveNotify=()=>{
    localStorage.setItem("notifySettings",JSON.stringify({start,end,interval}));
    gasPost("saveSettings",{notify_start:start,notify_end:end,notify_interval:interval});
    onToast("通知設定を保存しました");
  };
  const saveLogHours=()=>{
    if(logEnd<=logStart){onToast("終了時間は開始より後にしてください");return;}
    localStorage.setItem("jiroku_log_hours",JSON.stringify({start:logStart,end:logEnd}));
    onToast("記録時間帯を保存しました");
  };
  const saveGoal=()=>{
    if(!goals[0]?.goal.trim()){onToast("目標1を入力してください");return;}
    localStorage.setItem("jiroku_goals",JSON.stringify(goals));
    gasPost("saveSettings",{
      goal:goals[0]?.goal.trim()||"", goal_deadline:goals[0]?.deadline||"",
      goal2:goals[1]?.goal.trim()||"", goal_deadline2:goals[1]?.deadline||"",
      goal3:goals[2]?.goal.trim()||"", goal_deadline3:goals[2]?.deadline||"",
    });
    onGoalSaved(goals);
    onToast("目標を保存しました");
  };

  // RANKS定数から生成
  const RANK_RULES = RANKS.map(r => ({
    ...r,
    lv: r.maxLv >= 999 ? `Lv.${r.minLv}+` : r.minLv === r.maxLv ? `Lv.${r.minLv}` : `Lv.${r.minLv}–${r.maxLv}`
  }));

  return html`<div>
    <div class="ph"><div class="ph-title-accent">設定</div></div>
    <div style=${{padding:"0 16px"}}>

      <div class="card">

const GOOGLE_CLIENT_ID = "476804060858-n3afj7ipmc81vq8cq71u0u3jdpolshea.apps.googleusercontent.com";

const XP_THRESHOLDS = [0, 500, 1200, 2200, 3500, 5200, 7500, 10000, 13000, 17000, 21000, 25500, 30500, 36000, 42000, 49000];
const getXpLevel = xp => { let lv=1; for(let i=1;i<XP_THRESHOLDS.length;i++){ if(xp>=XP_THRESHOLDS[i]) lv=i+1; else break; } return lv; };
const getXpInLevel = xp => xp - (XP_THRESHOLDS[getXpLevel(xp)-1]||0);
const getXpForNextLevel = xp => { const lv=getXpLevel(xp); return lv<XP_THRESHOLDS.length ? XP_THRESHOLDS[lv]-(XP_THRESHOLDS[lv-1]||0) : null; };

function parseJwt(token) {
  try {
    const base64 = token.split(".")[1].replace(/-/g,"+").replace(/_/g,"/");
    const json = decodeURIComponent(atob(base64).split("").map(c=>"%"+("00"+c.charCodeAt(0).toString(16)).slice(-2)).join(""));
    return JSON.parse(json);
  } catch { return null; }
}

      handleGoogleLogin({credential:idToken});

  const handleGoogleSignIn=()=>{
    const nonce=Math.random().toString(36).slice(2);
    const params=new URLSearchParams({
      client_id: GOOGLE_CLIENT_ID,
      redirect_uri: "https://kaisunagawa.github.io/edventure-app/",
      response_type: "id_token",
      scope: "openid email profile",
      nonce,
    });

  };

  const handleGoogleLogin=async(res)=>{
    const payload=parseJwt(res.credential);

    const email=payload.email;
    const name=payload.name||payload.given_name||"";

    localStorage.removeItem("line_prompted");
    localStorage.removeItem("cal_linked");
    CURRENT_USER=null; setUser(null);
  };

  useEffect(()=>{
    if(!CURRENT_USER){ setChecking(false); return; }
    // キャッシュがあってもGASで存在確認（10秒でタイムアウト→キャッシュで続行）
    const url=new URL(GAS_URL);
    url.searchParams.set("action","getUser");
    url.searchParams.set("studentEmail",CURRENT_USER.email);
    const ctrl=new AbortController();
    const timeout=setTimeout(()=>ctrl.abort(),10000);
    fetch(url,{signal:ctrl.signal}).then(r=>r.json()).then(r=>{
      clearTimeout(timeout);
      if(r.ok&&r.data){
        const u={...CURRENT_USER, name:r.data.name||CURRENT_USER.name, coachName:r.data.coachName||"コーチ", coachEmail:r.data.coach_email||""};
        CURRENT_USER=u; localStorage.setItem("edventure_user",JSON.stringify(u)); setUser(u);
      } else {
        // スプレッドシートに存在しない → キャッシュ削除してログイン画面へ
        localStorage.removeItem("edventure_user");
        localStorage.removeItem("line_prompted");
        localStorage.removeItem("cal_linked");
        CURRENT_USER=null;
      }
    }).catch(()=>{ clearTimeout(timeout); setUser(CURRENT_USER); }) // 通信エラー・タイムアウト時はキャッシュで続行
    .finally(()=>setChecking(false));
  },[]);

  if(checking) return html`<div style=${{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"var(--sub)",fontSize:14}}>読み込み中...</div>`;
  if(!user) return html`<${LoginScreen} onLogin=${setUser}/>`;
  return html`
    <div style=${{height:"100%",position:"relative"}}>
      <div class="screen">
        <div style=${{display:tab==="home"?"block":"none"}}><${HomeScreen} goalData=${goalData} onGoalSaved=${setGoalData}/></div>
        <div style=${{display:tab==="log"?"block":"none"}}><${LogScreen} onToast=${setToast}/></div>
        <div style=${{display:tab==="report"?"block":"none"}}><${ReportScreen}/></div>
        <div style=${{display:tab==="timer"?"block":"none",height:"100%"}}><${TimerScreen} onToast=${setToast} isActive=${tab==="timer"}/></div>
        <div style=${{display:tab==="settings"?"block":"none"}}><${SettingsScreen} onToast=${setToast} onLogout=${logout} onGoalSaved=${setGoalData}/></div>
      </div>
      <nav class="nav">
        ${TABS.map(t=>html`
          <button key=${t.id} class=${"nav-btn"+(tab===t.id?" on":"")} onClick=${()=>setTab(t.id)}>
            <${S} n=${t.n} s=${20}/><span class="nav-lbl">${t.l}</span>
          </button>
        `)}
      </nav>
      ${toast&&html`<${Toast} msg=${toast} onDone=${()=>setToast(null)}/>`}
    </div>
  `;
}
const ERR_STYLE = "padding:20px;font-family:monospace;font-size:12px;color:red;background:#fff;position:fixed;top:0;left:0;right:0;bottom:0;overflow:auto;z-index:9999;white-space:pre-wrap";
class ErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(e){ return {err:e}; }
  componentDidCatch(e,info){ console.error("ErrorBoundary caught:",e,info); }
  render(){
    if(this.state.err) return React.createElement("div",{style:{padding:20,fontFamily:"monospace",fontSize:13,color:"red",background:"#fff",position:"fixed",top:0,left:0,right:0,bottom:0,overflow:"auto",zIndex:9999,whiteSpace:"pre-wrap"}},
      "レンダーエラー（スクショを送ってください）:\n"+this.state.err.message+"\n\n"+this.state.err.stack);
    return this.props.children;
  }
}
try {
  ReactDOM.createRoot(document.getElementById("root")).render(
    React.createElement(ErrorBoundary,null,html`<${App}/>`)
  );
} catch(e) {
  document.getElementById("root").innerHTML = '<div style="'+ERR_STYLE+'">ERROR:\n'+e.message+'\n\n'+e.stack+'</div>';
}
window.onerror = (msg,src,line,col,err) => {
  document.getElementById("root").innerHTML = '<div style="'+ERR_STYLE+'">JS ERROR:\n'+msg+'\nLine:'+line+' Col:'+col+'</div>';
};
window.addEventListener("unhandledrejection", e => {
  console.error("Unhandled promise rejection:", e.reason);
});
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script>
</body>
</html>
