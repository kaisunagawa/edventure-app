<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>JIROKU</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="JIROKU" />
  <meta name="theme-color" content="#FAFAF9" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#101417" media="(prefers-color-scheme: dark)" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/htm/dist/htm.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F8F8FA;
      --card:     #FFFFFF;
      --border:   #E5E7EB;
      --text:     #1F2937;
      --sub:      #9CA3AF;
      --accent:   #0891B2;
      --accent-l: #CFFAFE;
      --glow:     rgba(8,145,178,.12);
      --green:    #22C55E;
      --green-l:  #F0FDF4;
      --amber:    #F59E0B;
      --amber-l:  #FFFBEB;
      --red:      #EF4444;
      --red-l:    #FEF2F2;
      --nav-h:    64px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --r:        14px;
      --hero1:    #0891B2;
      --hero2:    #0e7490;
    }

    html, body {
      height: 100%; background: var(--bg);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      color: var(--text); -webkit-font-smoothing: antialiased;
    }
    #root { height: 100%; width: 100%; position: relative; background: var(--bg); overflow: hidden; }

    .screen {
      position: absolute; inset: 0;
      bottom: calc(var(--nav-h) + var(--safe-bottom));
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }

    /* ── Nav ── */
    .nav {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + var(--safe-bottom));
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; padding-bottom: var(--safe-bottom);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      border: none; background: none; cursor: pointer;
      color: var(--sub); -webkit-tap-highlight-color: transparent;
      transition: color .15s;
    }
    .nav-btn.on { color: var(--accent); }
    .nav-lbl { font-size: 10px; font-weight: 500; letter-spacing: .1px; }

    /* ── Page header ── */
    .ph { padding: 24px 20px 8px; }
    .ph-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
    .ph-title-accent { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
    .ph-sub { font-size: 13px; color: var(--sub); margin-top: 2px; }
    .ph-label { display: none; }

    /* ── Cards ── */
    .card {
      background: var(--card); border-radius: 12px;
      padding: 16px; margin: 0 16px 8px;
      border: 1px solid var(--border);
    }
    .card-label {
      font-size: 11px; font-weight: 500; color: var(--sub);
      margin-bottom: 12px; letter-spacing: .1px;
    }

    /* ── Stat tiles (unused but kept for compat) ── */
    .stat-row { display: flex; gap: 8px; margin: 0 16px 8px; }
    .stat-tile { flex: 1; background: var(--card); border-radius: 10px; padding: 14px 12px; text-align: center; border: 1px solid var(--border); }
    .stat-v { font-size: 24px; font-weight: 700; line-height: 1; color: var(--text); }
    .stat-l { font-size: 10px; color: var(--sub); margin-top: 4px; font-weight: 500; }
    .streak-tile { }
    .streak-tile .stat-v { color: var(--amber); }
    .level-v { color: var(--accent); }

    /* ── XP bar ── */
    .xp-wrap { margin: 0 16px 12px; }
    .xp-top { display: flex; justify-content: space-between; font-size: 11px; color: var(--sub); font-weight: 500; margin-bottom: 6px; }
    .xp-track { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .xp-fill { height: 4px; border-radius: 99px; background: var(--accent); transition: width .6s cubic-bezier(.4,0,.2,1); }

    /* ── Badge pills ── */
    .badge-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 16px 10px; }
    .badge-pill { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; background: var(--bg); border: 1px solid var(--border); color: var(--sub); }

    /* ── Score ring ── */
    .ring-wrap { display: flex; align-items: center; gap: 16px; }
    .ring { width: 68px; height: 68px; flex-shrink: 0; border-radius: 50%; background: conic-gradient(var(--accent) calc(var(--pct)*1%), var(--border) 0); display: flex; align-items: center; justify-content: center; }
    .ring-inner { width: 52px; height: 52px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .ring-num { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; }
    .ring-unit { font-size: 9px; color: var(--sub); }

    /* ── Schedule ── */
    .sched-row { display: flex; align-items: flex-start; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .sched-row:last-child { border-bottom: none; }
    .sched-time { font-size: 12px; font-weight: 600; color: var(--accent); min-width: 40px; padding-top: 1px; flex-shrink: 0; }
    .sched-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .sched-sub { font-size: 11px; color: var(--sub); margin-top: 2px; }

    /* ── Section header ── */
    .sec-head { padding: 16px 20px 8px; }
    .sec-head h2 { font-size: 17px; font-weight: 700; letter-spacing: -.2px; }

    /* ── Time bar ── */
    .time-bar { display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px; scrollbar-width: none; border-bottom: 1px solid var(--border); }
    .time-bar::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 6px 12px; border-radius: 7px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      border: 1px solid var(--border); background: var(--card);
      color: var(--sub); transition: all .12s; -webkit-tap-highlight-color: transparent;
    }
    .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    .chip.done { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
    .chip.on.done { background: var(--accent); color: #fff; }

    /* ── Form ── */
    .form-wrap { padding: 14px 16px 16px; }
    .form-grp { margin-bottom: 13px; }
    .form-lbl { font-size: 12px; font-weight: 500; color: var(--sub); margin-bottom: 6px; display: block; }
    .inp, .txa {
      width: 100%; padding: 11px 13px; border: 1px solid var(--border);
      border-radius: 9px; font-size: 15px; font-family: inherit;
      background: var(--card); color: var(--text); outline: none; transition: border-color .12s;
      box-sizing: border-box;
    }
    .inp:focus, .txa:focus { border-color: var(--accent); }
    input[type="date"].inp, input[type="date"].login-inp { -webkit-appearance: none; appearance: none; text-align: center; }
    .txa { resize: none; min-height: 68px; line-height: 1.6; overflow: hidden; }

    /* ── Eval buttons ── */
    .eval-btn {
      width: 100%; padding: 8px 12px; margin-bottom: 4px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--card);
      font-size: 13.5px; font-weight: 500; cursor: pointer; text-align: left;
      color: var(--sub); transition: all .12s; font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .eval-btn:last-child { margin-bottom: 0; }
    .e5 { background: var(--green-l); border-color: #86EFAC; color: #15803D; }
    .e4 { background: var(--accent-l); border-color: #A5B4FC; color: #3730A3; }
    .e3 { background: var(--amber-l); border-color: #FCD34D; color: #92400E; }
    .e2 { background: var(--red-l); border-color: #FCA5A5; color: #991B1B; }
    .e1 { background: var(--red-l); border-color: #FCA5A5; color: #991B1B; }

    /* ── Primary button ── */
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: var(--accent); color: #fff;
      font-size: 15px; font-weight: 600; cursor: pointer;
      font-family: inherit; letter-spacing: .1px;
      transition: opacity .12s, transform .1s; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: .85; transform: scale(.99); }
    .btn:disabled { background: var(--border); color: var(--sub); cursor: default; }

    /* ── Ghost button ── */
    .btn-g {
      width: 100%; padding: 13px; border-radius: 9px;
      border: 1px solid var(--border); background: transparent;
      color: var(--red); font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: inherit;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
      left: 50%; transform: translateX(-50%);
      background: #111827; color: #fff;
      padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
      z-index: 999; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,.2);
      animation: up .2s ease;
    }
    @keyframes up { from { opacity:0; transform: translateX(-50%) translateY(6px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

    /* ── Report ── */
    .report-hero { padding: 28px 20px 16px; text-align: center; }
    .report-date { font-size: 11px; font-weight: 500; color: var(--sub); margin-bottom: 12px; }
    .report-score { font-size: 72px; font-weight: 800; line-height: 1; letter-spacing: -3px; color: var(--text); }
    .report-pts { font-size: 13px; color: var(--sub); margin-top: 4px; }

    /* ── Tag ── */
    .tag { display: inline-block; padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 500; }
    .t-g { background: var(--green-l); color: #15803D; }
    .t-a { background: var(--amber-l); color: #92400E; }

    /* ── Log rows ── */
    .log-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .log-row:last-child { border-bottom: none; }
    .log-time { font-size: 11px; font-weight: 600; color: var(--sub); min-width: 44px; padding-top: 2px; flex-shrink: 0; }
    .log-task { font-size: 14px; font-weight: 500; color: var(--text); }
    .log-meta { font-size: 12px; color: var(--sub); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* ── Chat ── */
    .chat-head { padding: 14px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .chat-av { width: 34px; height: 34px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--text); flex-shrink: 0; }
    .chat-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .chat-status { font-size: 11px; color: var(--sub); }

    .msgs { padding: 16px; display: flex; flex-direction: column; gap: 8px; min-height: 100%; }
    .bubble { max-width: 76%; padding: 10px 14px; font-size: 14px; line-height: 1.6; overflow-wrap: break-word; word-break: break-word; white-space: pre-wrap; border-radius: 14px; min-width: 130px; }
    .b-in { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .b-out { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .btime { font-size: 10px; color: var(--sub); margin-top: 3px; }
    .btime-r { text-align: right; }

    .chat-bar { padding: 10px 14px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; }
    .chat-inp { flex: 1; padding: 10px 13px; border: 1px solid var(--border); border-radius: 9px; font-size: 15px; font-family: inherit; outline: none; resize: none; max-height: 100px; line-height: 1.4; background: var(--bg); color: var(--text); }
    .chat-inp:focus { border-color: var(--accent); }
    .send { width: 38px; height: 38px; border-radius: 9px; background: var(--accent); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    .send:disabled { background: var(--border); color: var(--sub); cursor: default; }

    /* ── Settings ── */
    .s-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .s-row:last-child { border-bottom: none; }
    .s-k { color: var(--sub); font-weight: 400; }
    .s-v { font-weight: 500; color: var(--text); }
    select { width: 100%; padding: 10px 12px; border-radius: 9px; border: 1px solid var(--border); font-size: 14px; background: var(--card); color: var(--text); font-family: inherit; outline: none; }
    select:focus { border-color: var(--accent); }

    /* ── Date nav ── */
    .date-nav { display: flex; align-items: center; gap: 12px; margin-top: 6px; }
    .date-nav button { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--sub); padding: 0 4px; line-height: 1; }
    .date-nav button:disabled { color: var(--border); cursor: default; }
    .date-nav span { font-size: 13px; font-weight: 600; color: var(--text); }

    /* ── Spinner ── */
    .spin { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: rot .6s linear infinite; display: inline-block; }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* ── Empty ── */
    .empty { padding: 48px 24px; text-align: center; }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty-body { font-size: 13px; color: var(--sub); line-height: 1.7; }

    /* ── Login ── */
    .login-wrap { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; background: var(--bg); }
    .login-logo { width: 72px; height: 72px; margin: 0 auto 18px; }
    .login-title { font-size: 24px; font-weight: 700; letter-spacing: -.4px; text-align: center; color: var(--text); }
    .login-sub { font-size: 13px; color: var(--sub); text-align: center; margin: 5px 0 32px; line-height: 1.6; }
    .login-box { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 8px; }
    .login-inp { width: 100%; padding: 13px 14px; border-radius: 9px; border: 1px solid var(--border); font-size: 15px; background: var(--card); color: var(--text); outline: none; font-family: inherit; transition: border-color .12s; box-sizing: border-box; }
    .login-inp:focus { border-color: var(--accent); }
    .login-err { font-size: 12px; color: var(--red); font-weight: 500; }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:       #101417;
        --card:     #1A2025;
        --border:   #2B333A;
        --text:     #E8ECEF;
        --sub:      #7E8A94;
        --accent:   #22B8D4;
        --accent-l: #123A44;
        --glow:     rgba(34,184,212,.15);
        --green:    #34D399;
        --green-l:  #0E2B21;
        --amber:    #FBBF24;
        --amber-l:  #2E2410;
        --red:      #F87171;
        --red-l:    #331717;
        --hero1:    #0B4A5A;
        --hero2:    #093642;
      }
      .nav { background: rgba(20,25,30,.96); }
      .toast { background: #E8ECEF; color: #111827; }
      .e5 { background: var(--green-l); border-color: #14532D; color: #4ADE80; }
      .e4 { background: var(--accent-l); border-color: #164E63; color: #67E8F9; }
      .e3 { background: var(--amber-l); border-color: #78350F; color: #FCD34D; }
      .e2, .e1 { background: var(--red-l); border-color: #7F1D1D; color: #FCA5A5; }
      .t-g { background: var(--green-l); color: #4ADE80; }
      .t-a { background: var(--amber-l); color: #FCD34D; }
      input[type="date"].inp, input[type="date"].login-inp, select { color-scheme: dark; }
    }
  </style>
</head>
<body>
<div id="root">
  <div id="splash" style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:20px">
    <!-- 案Aロゴ: リングマーク -->
    <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <circle cx="40" cy="40" r="40" fill="#0891B2"/>
      <circle cx="40" cy="40" r="28" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="5"/>
      <path d="M40 12 A28 28 0 1 1 16.4 55.6" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
      <circle cx="40" cy="40" r="17" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
      <line x1="40" y1="40" x2="40" y2="27" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="40" y1="40" x2="49" y2="46" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="40" cy="40" r="2" fill="#fff"/>
    </svg>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="font-family:'DM Sans',-apple-system,sans-serif;font-size:26px;font-weight:800;color:var(--text);letter-spacing:-.3px">JIROKU</div>
      <div style="font-family:'DM Sans',-apple-system,sans-serif;font-size:10px;font-weight:500;color:#9CA3AF;letter-spacing:2px">HABIT DESIGN</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:8px">
      <div style="width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp 0.7s linear infinite"></div>
      <div style="font-family:'DM Sans',-apple-system,sans-serif;font-size:11px;font-weight:500;color:var(--sub);letter-spacing:.5px">読み込み中...</div>
    </div>
  </div>
  <style>#splash{animation:none}@keyframes sp{to{transform:rotate(360deg)}}</style>
</div>
<script>
const { useState, useEffect, useRef, useCallback } = React;
const html = htm.bind(React.createElement);

const GAS_URL = "https://script.google.com/macros/s/AKfycbzJ-QEpPVnmp-LFU5Jxww4VFP1qaseMtwCrzKxAA6ZULr1y3h_UeKzVdhHnl5ze57U/exec";
let CURRENT_USER = JSON.parse(localStorage.getItem("edventure_user") || "null");

async function gasApi(action, params = {}) {
  if (!GAS_URL) return mockApi(action, params);
  const url = new URL(GAS_URL);
  url.searchParams.set("action", action);
  url.searchParams.set("studentEmail", CURRENT_USER.email);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
  try { const r = await fetch(url.toString(), { redirect:"follow" }); return await r.json(); }
  catch { return { ok:false, data:[] }; }
}
async function gasPost(action, body = {}) {
  if (!GAS_URL) return mockPost(action, body);
  const url = new URL(GAS_URL);
  url.searchParams.set("action", action);
  url.searchParams.set("studentEmail", CURRENT_USER.email);
  Object.entries(body).forEach(([k,v]) => { if (v != null) url.searchParams.set(k, String(v)); });
  try { await fetch(url.toString(), { mode:"no-cors" }); } catch {}
  return { ok:true };
}

// ── Googleカレンダー（各ユーザー本人の権限でブラウザから直接読む） ──
// GAS(CalendarApp)はスクリプト所有者のアカウントでしか読めないため、
// 他ユーザーのカレンダーはクライアント側で取得する
let gcalToken=null, gcalTokenExp=0;
// GISスクリプト（async defer読み込み）の準備を最大4秒待つ
function waitForGis(ms=4000){
  return new Promise(resolve=>{
    const t0=Date.now();
    (function check(){
      if(window.google?.accounts?.oauth2) return resolve(true);
      if(Date.now()-t0>ms) return resolve(false);
      setTimeout(check,200);
    })();
  });
}
async function getCalendarToken(interactive){
  if(gcalToken && Date.now() < gcalTokenExp-60000) return gcalToken;
  if(!interactive && !localStorage.getItem("cal_linked")) return null;
  const ready=await waitForGis();
  if(!ready) return null;
  return new Promise((resolve)=>{
    try{
      const client=google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: "https://www.googleapis.com/auth/calendar.readonly",
        callback: (t)=>{
          if(t.error){ resolve(null); return; }
          gcalToken=t.access_token;
          gcalTokenExp=Date.now()+(Number(t.expires_in)||3600)*1000;
          resolve(gcalToken);
        },
        error_callback: ()=>resolve(null),
      });
      client.requestAccessToken({prompt: interactive ? "" : "none"});
    }catch{ resolve(null); }
  });
}
const gcalCache={}, gcalSynced={};
const GCAL_LS="gcal_evs_";
function cleanupGcalLS(){
  try{
    const limit=addDays(formatDateStr(new Date()),-7);
    Object.keys(localStorage).forEach(k=>{
      if(k.startsWith(GCAL_LS) && k.slice(GCAL_LS.length)<limit) localStorage.removeItem(k);
    });
  }catch{}
}
// 取得戦略: メモリ → 端末キャッシュ → 本人認証で取得 → サーバーの共有キャッシュ
// 一度どこかで取得できれば端末とサーバーの両方に残るので、以後は認証なしで自動表示される
async function fetchCalendarEvents(dateStr, interactive=false){
  if(gcalCache[dateStr]) return gcalCache[dateStr];
  if(!interactive){
    try{
      const ls=localStorage.getItem(GCAL_LS+dateStr);
      if(ls){ const evs=JSON.parse(ls); gcalCache[dateStr]=evs; gcalSynced[dateStr]=1; return evs; }
    }catch{}
  }
  const token=await getCalendarToken(interactive);
  if(token){
    try{
      const timeMin=new Date(dateStr+"T00:00:00").toISOString();
      const timeMax=new Date(dateStr+"T23:59:59").toISOString();
      const r=await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events?singleEvents=true&orderBy=startTime&maxResults=50&timeMin="+encodeURIComponent(timeMin)+"&timeMax="+encodeURIComponent(timeMax),
        {headers:{Authorization:"Bearer "+token}}).then(r=>r.json());
      if(r.items){
        const evs=r.items.filter(e=>e.status!=="cancelled").map(e=>{
          const s=e.start?.dateTime?new Date(e.start.dateTime):null;
          const en=e.end?.dateTime?new Date(e.end.dateTime):null;
          return {
            title:e.summary||"(無題)", allDay:!s,
            startHour:s?s.getHours()+s.getMinutes()/60:null,
            endHour:en?en.getHours()+en.getMinutes()/60:null,
            time:s?s.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}):"終日",
            sub:e.location||(e.hangoutLink?"Zoom/Meet":"")
          };
        });
        gcalCache[dateStr]=evs;
        try{ localStorage.setItem(GCAL_LS+dateStr, JSON.stringify(evs)); cleanupGcalLS(); }catch{}
        // サーバーへ同期（コーチのプロンプト用＆次回起動・他端末のフォールバック）
        if(CURRENT_USER && !gcalSynced[dateStr]){
          gcalSynced[dateStr]=1;
          try{ fetch(GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},
            body:JSON.stringify({action:"syncCalendar",studentEmail:CURRENT_USER.email,date:dateStr,events:JSON.stringify(evs).slice(0,6000)})}); }catch{}
        }
        return evs;
      }
    }catch{}
  }
  // 認証できない場合はサーバーの共有キャッシュから復元
  try{
    const r=await gasApi("getCalendar",{date:dateStr});
    if(r.ok && r.data){
      gcalCache[dateStr]=r.data; gcalSynced[dateStr]=1;
      try{ localStorage.setItem(GCAL_LS+dateStr, JSON.stringify(r.data)); }catch{}
      return r.data;
    }
  }catch{}
  return null;
}
// 時間ブロック（例 "10:00-11:00"）に重なる予定タイトル一覧
function eventsForBlock(evs, block){
  if(!evs) return [];
  const h=parseInt(block);
  return evs.filter(e=>!e.allDay && e.startHour!==null && e.startHour<h+1 && e.endHour>h).map(e=>e.title);
}

          style=${{flex:1,minWidth:0,display:"flex",alignItems:"center",gap:7,background:"rgba(255,255,255,0.15)",borderRadius:12,padding:"9px 12px",backdropFilter:"blur(4px)",border:"none",cursor:"pointer",textAlign:"left"}}>
          <span style=${{fontSize:16,flexShrink:0}}>👥</span>
          <span style=${{fontSize:13,color:"#fff",fontWeight:700,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>みんなの頑張り</span>

      <div style=${{margin:"16px 16px 10px",background:"var(--card)",borderRadius:16,border:"1px solid var(--border)",overflow:"hidden"}}>
        <div style=${{padding:"14px 16px 10px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

            const goalMins=todayLogs.filter(l=>l.goal_related==="true"||l.goal_related===true).length*60;

            const hh=Math.floor(goalMins/60),mm=goalMins%60;

              <div style=${{width:48,height:4,background:"var(--border)",borderRadius:99,overflow:"hidden"}}>

        </div>
        ${goalsArr.map((g,i)=>{
          const dl=g.deadline?Math.ceil((new Date(g.deadline)-new Date())/86400000):null;

        <button key=${item} onClick=${()=>toggleCheck(item)}
          style=${{display:"flex",alignItems:"flex-start",gap:12,width:"100%",background:checked[item]?"var(--bg)":"none",border:"none",padding:"13px 16px",cursor:"pointer",borderBottom:i<actionItems.length-1?"1px solid var(--border)":"none",textAlign:"left",fontFamily:"inherit",transition:"background .15s"}}>
          <div style=${{width:20,height:20,borderRadius:6,border:`2px solid ${checked[item]?"var(--accent)":"var(--border)"}`,background:checked[item]?"var(--accent)":"transparent",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>
            ${checked[item]&&html`<svg width="11" height="11" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`}

          ${report?"アクション項目を取得中...":"記録を入力すると毎晩AIがアクションを提案します"}
        </div>
      `}
    </div>

    <!-- Edit Modal -->
    ${editMode&&html`
      <div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:200}}>
        <div style=${{background:"var(--card)",borderRadius:"20px 20px 0 0",padding:"24px 20px 32px",width:"100%",boxSizing:"border-box",maxHeight:"80vh",overflowY:"auto"}}>
          <div style=${{fontSize:17,fontWeight:800,marginBottom:4}}>今日のアクションを編集</div>
          <div style=${{fontSize:12,color:"var(--sub)",marginBottom:20}}>やることを自由に追加・編集・削除できます</div>
          ${editItems.map((item,i)=>html`
            <div key=${i} style=${{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
              <input class="inp" style=${{flex:1,margin:0}} value=${item}
                onInput=${e=>{ const a=[...editItems]; a[i]=e.target.value; setEditItems(a); }}
                placeholder="アクションを入力..."/>
              <button onClick=${()=>setEditItems(editItems.filter((_,j)=>j!==i))}
                style=${{background:"none",border:"none",color:"var(--sub)",fontSize:20,cursor:"pointer",flexShrink:0,padding:"0 4px"}}>×</button>
            </div>
          `)}
          <button onClick=${()=>setEditItems([...editItems,""])}
            style=${{width:"100%",padding:"10px",borderRadius:10,border:"1.5px dashed var(--border)",background:"none",color:"var(--accent)",fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:16}}>
            ＋ アクションを追加
          </button>
          <button class="btn" onClick=${saveEdit} style=${{marginBottom:10}}>保存する</button>
          <button onClick=${()=>setEditMode(false)}
            style=${{width:"100%",background:"none",border:"none",color:"var(--sub)",fontSize:13,padding:"8px",cursor:"pointer"}}>キャンセル</button>
        </div>
      </div>
    `}

    <!-- Schedule -->
    ${schedule.length>0&&html`
      <div style=${{margin:"0 16px 10px",background:"var(--card)",borderRadius:16,border:"1px solid var(--border)",overflow:"hidden"}}>
        <div style=${{padding:"14px 16px",borderBottom:"1px solid var(--border)"}}>
          <div style=${{fontSize:12,fontWeight:700,color:"var(--text)"}}>今日の予定</div>
        </div>
        ${schedule.map((ev,i)=>{
          const hasZoom=isZoom(ev.sub||"");
          return html`<div key=${i} style=${{display:"flex",gap:12,padding:"12px 16px",borderBottom:i<schedule.length-1?"1px solid var(--border)":"none",alignItems:"flex-start"}}>
            <div style=${{fontSize:12,fontWeight:700,color:"var(--accent)",minWidth:42,paddingTop:2,flexShrink:0}}>${ev.time}</div>
            <div style=${{flex:1}}>
              <div style=${{fontSize:14,color:"var(--text)",fontWeight:500}}>${ev.title}</div>
              ${(hasZoom||ev.sub)&&html`<div style=${{fontSize:11,color:"var(--sub)",marginTop:3}}>${hasZoom?"🔗 Zoomリンクあり":ev.sub}</div>`}
            </div>
          </div>`;
        })}
      </div>
    `}
  </div>`;
}

function CommunityOverlay({onClose}) {
  const [list,setList]=useState(null);
  const [achievements,setAchievements]=useState(null);
  const [message,setMessage]=useState("");
  const [sending,setSending]=useState(false);

  const load=()=>{
    gasApi("getCommunity").then(r=>{ if(r.ok) setList(r.data); });
    gasApi("getAchievements").then(r=>{ if(r.ok) setAchievements(r.data); });
  };
  useEffect(()=>{ load(); },[]);

  const share=async()=>{
    const msg=message.trim();
    if(!msg||sending) return;
    setSending(true);
    await gasPost("shareAchievement",{message:msg});
    setMessage("");
    setTimeout(load,800);
    setSending(false);
  };

    <div style=${{position:"fixed",inset:0,background:"var(--bg)",zIndex:300,overflowY:"auto"}}>

      <div style=${{padding:16}}>
        <div style=${{background:"var(--card)",borderRadius:16,border:"1px solid var(--border)",overflow:"hidden",marginBottom:16}}>
          <div style=${{padding:"14px 16px",borderBottom:"1px solid var(--border)",fontSize:12,fontWeight:700,color:"var(--text)"}}>直近7日のランキング</div>
          ${list===null&&html`<div style=${{padding:20,textAlign:"center",color:"var(--sub)",fontSize:13}}>読み込み中...</div>`}
          ${list&&list.map((u,i)=>html`
            <div key=${i} style=${{display:"flex",alignItems:"center",gap:10,padding:"11px 16px",borderBottom:i<list.length-1?"1px solid var(--border)":"none",background:u.isMe?"var(--bg)":"transparent"}}>
              <div style=${{fontSize:13,fontWeight:700,color:"var(--sub)",width:20,textAlign:"center",flexShrink:0}}>${i+1}</div>
              <div style=${{width:32,height:32,borderRadius:"50%",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>${u.avatar}</div>
              <div style=${{flex:1,minWidth:0}}>
                <div style=${{fontSize:14,fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${u.nickname}${u.isMe?" (あなた)":""}</div>
                <div style=${{fontSize:11,color:"var(--sub)"}}>${u.blocks}記録・${u.activeDays}日活動${u.streak>0?` · 🔥${u.streak}日`:""}</div>
              </div>
            </div>
          `)}

        </div>

        <div style=${{background:"var(--card)",borderRadius:16,border:"1px solid var(--border)",padding:16,marginBottom:16}}>
          <div style=${{fontSize:12,fontWeight:700,color:"var(--text)",marginBottom:10}}>頑張りをシェアする（任意）</div>

        </div>

        <div style=${{background:"var(--card)",borderRadius:16,border:"1px solid var(--border)",overflow:"hidden"}}>
          <div style=${{padding:"14px 16px",borderBottom:"1px solid var(--border)",fontSize:12,fontWeight:700,color:"var(--text)"}}>みんなのシェア</div>
          ${achievements&&achievements.map((a,i)=>html`

              <div style=${{flex:1,minWidth:0}}>

// ── Log ──
function LogScreen({onToast, isActive}) {
  const todayStr = formatDateStr(new Date());
  const [date, setDate] = useState(todayStr);
  const [logs, setLogs] = useState([]);
  const [saving, setSaving] = useState(false);
  const timeRef = useRef(null);
  const timeBlocks = getTimeBlocks();

  const getCurrentBlock = () => {
    const h = new Date().getHours();
    return timeBlocks.find(t => parseInt(t) === h) || timeBlocks[timeBlocks.length - 1] || "09:00-10:00";
  };

  const [block, setBlock] = useState(getCurrentBlock);

  // タブを開くたびに現在時刻のブロックに更新してスクロール（今日表示中のみ）
  useEffect(()=>{
    if(isActive && isToday(date)) {
      gasApi("getLogs",{date}).then(r=>{
        const data = r.ok ? r.data : [];
        setLogs(data);
        const cur = getCurrentBlock();
        setBlock(cur);
        loadBlockData(cur, data);
        setTimeout(()=>{ const el=timeRef.current?.querySelector(".chip.on"); if(el) el.scrollIntoView({inline:"center",behavior:"smooth"}); },100);
      });
    }
  },[isActive]);
  const [task, setTask] = useState("");
  const [focus, setFocus] = useState("");
  const [memo, setMemo] = useState("");
  const [goalRelated, setGoalRelated] = useState(false);

  // カレンダー予定の自動入力（ボタン操作なし）。
  // 端末キャッシュ→本人認証→サーバー共有キャッシュの順に自動で試すため、
  // ホーム画面で予定が見えている状態ならここでも必ず取得できる
  const [dayEvents, setDayEvents] = useState(null);
  const autoFillRef = useRef("");
  useEffect(()=>{
    setDayEvents(null);
    fetchCalendarEvents(date).then(evs=>{ if(evs) setDayEvents(evs); });
  },[date]);
  // 未記録ブロックを選んだとき、入力が空なら予定タイトルを自動セット
  useEffect(()=>{
    if(!dayEvents) return;
    if(logs.find(l=>l.time_block===block)) return;
    const titles=eventsForBlock(dayEvents, block);
    if(titles.length===0){
      if(task===autoFillRef.current && task!=="") { setTask(""); autoFillRef.current=""; }
      return;
    }
    const suggestion=titles.join("、");
    if(task==="" || task===autoFillRef.current){ setTask(suggestion); autoFillRef.current=suggestion; }
  },[block, dayEvents, logs]);

  // ブロック切替時に既存ログを読み込んでフォームに反映
  const loadBlockData = (b, currentLogs) => {
    const existing = currentLogs.find(l => l.time_block === b);
    if (existing) {
      setTask(existing.task || "");
      setFocus(existing.focus_level || "");
      setMemo(existing.memo || "");
      setGoalRelated(existing.goal_related === "true" || existing.goal_related === true);
    } else {
      setTask(""); setFocus(""); setMemo(""); setGoalRelated(false);
    }
  };

  const handleBlockSelect = (b) => {
    setBlock(b);
    loadBlockData(b, logs);
  };

  useEffect(()=>{
    gasApi("getLogs",{date}).then(r=>{
      const data = r.ok ? r.data : [];
      setLogs(data);
      const def = isToday(date) ? getCurrentBlock() : (data[0]?.time_block || timeBlocks[0]);
      setBlock(def);
      loadBlockData(def, data);
      setTimeout(()=>{ const el=timeRef.current?.querySelector(".chip.on"); if(el) el.scrollIntoView({inline:"center",behavior:"smooth"}); },100);
    });
  },[date]);

  const save = async ()=>{
    if(!task.trim()) return;
    setSaving(true);
    const url=new URL(GAS_URL);
    url.searchParams.set("action","saveLog"); url.searchParams.set("studentEmail",CURRENT_USER.email);
    url.searchParams.set("date",date);
    url.searchParams.set("time_block",block); url.searchParams.set("task",task.trim());
    url.searchParams.set("focus_level",focus); url.searchParams.set("memo",memo.trim());
    url.searchParams.set("goal_related", goalRelated ? "true" : "false");
    const res=await fetch(url).then(r=>r.json()).catch(()=>({ok:false}));
    if(!res.ok){ onToast("保存に失敗しました。もう一度お試しください"); setSaving(false); return; }
    if(res.xp_gained){ const lv=res.level_up?`  →  Lv.${res.level} へ！`:""; onToast(`+${res.xp_gained} XP 獲得${lv}`); }
    else onToast(res.updated?"記録を上書きしました":"保存しました");
    // 保存内容が分かっているので再取得せず、ローカルの一覧をその場で更新する
    // （サーバーへの往復が倍になり保存が重く感じられるのを防ぐ）
    const saved = {time_block:block, task:task.trim(), focus_level:focus, memo:memo.trim(), goal_related:goalRelated?"true":"false"};
    setLogs(prev=>{
      const exists = prev.some(l=>l.time_block===block);
      return exists ? prev.map(l=>l.time_block===block?{...l,...saved}:l) : [...prev, saved].sort((a,b)=>a.time_block>b.time_block?1:-1);
    });
    setSaving(false);
  };

  const recorded = new Set(logs.map(l => l.time_block));

  return html`<div>
    <div class="ph">
      <div class="ph-title-accent">記録を入力</div>
      <div class="date-nav">
        <button onClick=${()=>setDate(addDays(date,-1))}>‹</button>
        <span>${isToday(date)?"今日":date}</span>
        <button onClick=${()=>setDate(addDays(date,1))} disabled=${isToday(date)}>›</button>
      </div>
    </div>

    <div>
      <div ref=${timeRef} class="time-bar">
        ${timeBlocks.map(t=>html`<button key=${t}
          class=${"chip"+(block===t?" on":"")+(recorded.has(t)?" done":"")}
          onClick=${()=>handleBlockSelect(t)}>${t}</button>`)}
      </div>
      <div class="form-wrap">
        <div style=${{fontSize:12,color:"var(--sub)",marginBottom:8}}>
          ${!isToday(date) ? "🗓 過去の記録を追加・編集できます（XPは付きません）" : recorded.has(block) ? "✏️ 記録済み（編集できます）" : "📝 未記録"}
        </div>
        <div class="form-grp">
          <label class="form-lbl">何をしましたか？</label>
          <input class="inp" placeholder="例：資料作成、家事、勉強など" value=${task} onInput=${e=>setTask(e.target.value)} />

const SCORE_COLOR = s => s >= 80 ? "var(--green)" : s >= 60 ? "var(--amber)" : "var(--red)";

// スコア推移グラフ（直近14日）
function ScoreTrend({list}) {
  if(!list || list.length < 2) return null;
  const pts = [...list].slice(0,14).reverse(); // 古い→新しい
  const W=320, H=96, PX=14, PT=12, PB=20;
  const iw=W-PX*2, ih=H-PT-PB;
  const x=i=>PX+(pts.length===1?iw/2:i*(iw/(pts.length-1)));
  const y=s=>PT+ih-(Math.max(0,Math.min(100,s))/100)*ih;
  const path=pts.map((p,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(p.score).toFixed(1)}`).join(" ");
  const area=`${path} L${x(pts.length-1).toFixed(1)},${PT+ih} L${x(0).toFixed(1)},${PT+ih} Z`;
  const avg=Math.round(pts.reduce((s,p)=>s+p.score,0)/pts.length);
  const diff=pts.length>=2?pts[pts.length-1].score-pts[0].score:0;
  const fmtMD=d=>{const [,m,dd]=(d||"").substring(0,10).split("-");return Number(m)+"/"+Number(dd);};
  return html`
    <div class="card" style=${{marginBottom:8}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
        <div class="card-label" style=${{marginBottom:0}}>レポートスコア推移（直近${pts.length}回）</div>
        <div style=${{fontSize:11,color:"var(--sub)"}}>平均 <b style=${{color:"var(--text)"}}>${avg}</b>点
          <span style=${{marginLeft:8,color:diff>0?"var(--green)":diff<0?"var(--red)":"var(--sub)",fontWeight:600}}>${diff>0?"↑":diff<0?"↓":"→"}${Math.abs(diff)}</span>
        </div>
      </div>
      <svg viewBox=${`0 0 ${W} ${H}`} style=${{width:"100%",height:"auto",display:"block"}}>
        ${[25,50,75].map(g=>html`<line key=${g} x1=${PX} x2=${W-PX} y1=${y(g)} y2=${y(g)} stroke="var(--border)" stroke-width="1" stroke-dasharray="3 4"/>`)}
        <path d=${area} fill="var(--accent)" opacity="0.08"/>
        <path d=${path} fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        ${pts.map((p,i)=>html`<circle key=${i} cx=${x(i)} cy=${y(p.score)} r=${i===pts.length-1?4:2.5} fill=${i===pts.length-1?"var(--accent)":"var(--card)"} stroke="var(--accent)" stroke-width="1.5"/>`)}
        <text x=${x(0)} y=${H-4} font-size="9" fill="var(--sub)" text-anchor="start">${fmtMD(pts[0].date)}</text>
        <text x=${x(pts.length-1)} y=${H-4} font-size="9" fill="var(--sub)" text-anchor="end">${fmtMD(pts[pts.length-1].date)}</text>
      </svg>
    </div>`;
}

function JournalStats({logs}) {
  const goalBlocks=logs.filter(l=>l.goal_related==="true"||l.goal_related===true).length;
  const goalPct=logs.length?Math.round(goalBlocks/logs.length*100):0;
  const focusNums=logs.map(l=>parseInt(l.focus_level)||0).filter(n=>n>0);
  const avgFocus=focusNums.length?(focusNums.reduce((a,b)=>a+b,0)/focusNums.length).toFixed(1):"−";
  const memoCount=logs.filter(l=>l.memo&&l.memo.trim()).length;
  return html`<div class="card">
    <div class="card-label">この日の数値</div>
    <div style=${{display:"flex",gap:8}}>
      ${[["記録",logs.length+"時間"],["目標関連",goalBlocks+"時間 ("+goalPct+"%)"],["平均集中",avgFocus+" / 5"],["メモ",memoCount+"個"]].map(([l,v])=>html`
        <div key=${l} style=${{flex:1,background:"var(--bg)",borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
          <div style=${{fontSize:13,fontWeight:800,color:"var(--accent)",lineHeight:1.3}}>${v}</div>
          <div style=${{fontSize:10,color:"var(--sub)",marginTop:3}}>${l}</div>
        </div>
      `)}
    </div>
  </div>`;
}

function BreakdownRadar({breakdown}) {
  const N = BREAKDOWN_CATS.length;
  const cx = 80, cy = 80, maxR = 54, maxVal = 20;
  const startAngle = -Math.PI/2;
  const angleStep = (Math.PI*2)/N;
  const pt = (i, frac, r) => {
    const a = startAngle + i*angleStep;
    return [cx + Math.cos(a)*r*frac, cy + Math.sin(a)*r*frac];
  };
  const ringFracs = [0.25,0.5,0.75,1];
  const ringPoints = ringFracs.map(f => BREAKDOWN_CATS.map((_,i)=>pt(i,f,maxR).join(",")).join(" "));
  const axisEnds = BREAKDOWN_CATS.map((_,i)=>pt(i,1,maxR));
  const dataPoints = BREAKDOWN_CATS.map(([key],i)=>{
    const v = Math.max(0,Math.min(maxVal,Number(breakdown[key]||0)));
    return pt(i, v/maxVal, maxR);
  });
  const dataPolygon = dataPoints.map(p=>p.join(",")).join(" ");
  const labelPos = BREAKDOWN_CATS.map((_,i)=>pt(i,1,maxR*1.27));
  const gid = "radarGrad";

  return html`
    <svg width="160" height="160" viewBox="0 0 160 160" style=${{flexShrink:0}}>
      <defs>
        <linearGradient id=${gid} x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="var(--hero1)"/>
          <stop offset="100%" stop-color="var(--hero2)"/>
        </linearGradient>
      </defs>
      ${ringPoints.map((pts,i)=>html`<polygon key=${i} points=${pts} fill="none" stroke="var(--border)" stroke-width="1"/>`)}
      ${axisEnds.map((p,i)=>html`<line key=${i} x1=${cx} y1=${cy} x2=${p[0]} y2=${p[1]} stroke="var(--border)" stroke-width="1"/>`)}
      <polygon points=${dataPolygon} fill=${`url(#${gid})`} fill-opacity="0.32" stroke=${`url(#${gid})`} stroke-width="2.5" stroke-linejoin="round"/>
      ${dataPoints.map((p,i)=>html`<circle key=${i} cx=${p[0]} cy=${p[1]} r="3" fill="var(--hero1)"/>`)}
      ${BREAKDOWN_CATS.map(([key],i)=>{
        const [lx,ly] = labelPos[i];
        return html`<text key=${key} x=${lx} y=${ly+3} text-anchor="middle" font-size="10" font-weight="400" fill="var(--sub)" opacity="0.6" style=${{fontFamily:"inherit"}}>${BREAKDOWN_LABELS[key].jp}</text>`;
      })}
    </svg>
  `;
}

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==";

// ── Chat ──
function TimerScreen({onToast, isActive}) {
  const getPresets = () => JSON.parse(localStorage.getItem("timer_presets")||"[25,45,60]");
  const getBreak   = () => Number(localStorage.getItem("timer_break")||"5");

  const loadTimerState = () => {
    try {
      const s = JSON.parse(localStorage.getItem("jiroku_timer_state")||"null");
      if (!s) return null;
      // 実行中だった場合、経過時間を差し引いて残り時間を計算
      if (s.isRunning && s.savedAt) {
        const elapsed = Math.floor((Date.now() - s.savedAt) / 1000);
        s.timeLeft = Math.max(0, s.timeLeft - elapsed);
      }
      return s;
    } catch(e) { return null; }
  };

  const saved = loadTimerState();
  const defaultMin = getPresets()[0];

  const [breakMin]       = useState(getBreak);
  const [selectedMin, setSelectedMin] = useState(saved?.selectedMin ?? defaultMin);
  const [timeLeft, setTimeLeft]       = useState(saved?.timeLeft ?? defaultMin*60);
  const [isRunning, setIsRunning]     = useState(saved?.isRunning ?? false);
  const [mode, setMode]               = useState(saved?.mode ?? "focus");
  const [sessionCount, setSessionCount] = useState(saved?.sessionCount ?? 0);
  const [task, setTask]               = useState(saved?.task ?? "");
  const [startTime, setStartTime]     = useState(saved?.startTime ? new Date(saved.startTime) : null);
  const [showModal, setShowModal]     = useState(false);
  const [logFocus, setLogFocus]       = useState("");
  const [logMemo, setLogMemo]         = useState("");
  const [logGoalRelated, setLogGoalRelated] = useState(true);
  const [saving, setSaving]           = useState(false);

  // 状態をlocalStorageに保存
  useEffect(()=>{
    localStorage.setItem("jiroku_timer_state", JSON.stringify({
      selectedMin, timeLeft, isRunning, mode, sessionCount,
      task, startTime: startTime?.toISOString()||null, savedAt: Date.now()
    }));
  },[selectedMin, timeLeft, isRunning, mode, sessionCount, task, startTime]);

  // タブに戻った時にプリセット設定を再読込
  const [presets, setPresets] = useState(getPresets);
  useEffect(()=>{ if(isActive) setPresets(getPresets()); },[isActive]);

  // スタート/一時停止は短いクリック音、完了は上昇3音チャイムで区別する
  const clickElRef = useRef(null);
  const doneElRef = useRef(null);
  const getClickEl = () => {
    if(!clickElRef.current) clickElRef.current = new Audio(TIMER_CLICK_SRC);
    return clickElRef.current;
  };
  const getDoneEl = () => {
    if(!doneElRef.current) doneElRef.current = new Audio(TIMER_DONE_SRC);
    return doneElRef.current;
  };
  const primeAudio = () => {
    try {
      const el = getClickEl();
      el.volume = 0.5;
      el.currentTime = 0;
      el.play().catch(()=>{});
    } catch(e){}
    // iOSはユーザー操作の外(タイマー完了など)で<audio>を再生できないため、
    // ボタン押下のタイミングで完了チャイム側も無音再生してロック解除しておく
    try {
      const done = getDoneEl();
      if(done.paused){
        done.volume = 0.001;
        done.play().then(()=>{ done.pause(); done.currentTime = 0; done.volume = 1; }).catch(()=>{});
      }
    } catch(e){}
    try { navigator.vibrate?.(60); } catch(e){}
  };
  const playBeep = () => {
    try {
      const el = getDoneEl();
      el.volume = 1;
      el.currentTime = 0;
      el.play().catch(()=>{});
    } catch(e){}
    // 音が出せない環境（マナーモード等）でも気づけるよう振動も併用
    try { navigator.vibrate?.([200,100,200,100,200]); } catch(e){}
  };

  // バックグラウンド復帰時に経過時間を補正する
  const timeLeftRef = useRef(timeLeft);
  const isRunningRef = useRef(isRunning);
  const selectedMinRef = useRef(selectedMin);
  const modeRef = useRef(mode);
  useEffect(()=>{ timeLeftRef.current = timeLeft; },[timeLeft]);
  useEffect(()=>{ isRunningRef.current = isRunning; },[isRunning]);
  useEffect(()=>{ selectedMinRef.current = selectedMin; },[selectedMin]);
  useEffect(()=>{ modeRef.current = mode; },[mode]);

  // アプリが閉じられていても気づけるよう、開始時にLINE通知をGAS側に予約し、
  // 一時停止・リセット・アプリ内で完了を検知できたときは予約を取り消す
  const scheduleEndNotify = (secondsLeft, currentMode) => {
    const endTime = Date.now() + secondsLeft*1000;
    const label = currentMode==="focus" ? "集中セッション" : "休憩";
    gasPost("scheduleTimerEnd", {endTime, label});
  };
  const cancelEndNotify = () => { gasPost("cancelTimerEnd"); };

  useEffect(()=>{
    const onVisible = () => {
      if(document.visibilityState === 'visible' && isRunningRef.current) {
        try {
          const s = JSON.parse(localStorage.getItem("jiroku_timer_state")||"null");
          if(s && s.isRunning && s.savedAt) {
            const elapsed = Math.floor((Date.now() - s.savedAt) / 1000);
            const corrected = Math.max(0, s.timeLeft - elapsed);
            setTimeLeft(corrected);
            if(corrected <= 0) {
              setIsRunning(false);
              playBeep();
              cancelEndNotify(); // アプリ内で気づけたのでLINE通知は不要
              if(modeRef.current === "focus"){ setSessionCount(c=>c+1); setShowModal(true); }
              else { setMode("focus"); setTimeLeft(selectedMinRef.current*60); }
            }
          }
        } catch(e){}
      }
    };
    document.addEventListener('visibilitychange', onVisible);
    return ()=>document.removeEventListener('visibilitychange', onVisible);
  },[]);

  useEffect(()=>{
    if(!isRunning) return;
    if(timeLeft<=0){
      setIsRunning(false);
      playBeep();
      cancelEndNotify(); // アプリ内で気づけたのでLINE通知は不要
      if(mode==="focus"){ setSessionCount(c=>c+1); setShowModal(true); }
      else { setMode("focus"); setTimeLeft(selectedMin*60); }
      return;
    }
    const t = setTimeout(()=>setTimeLeft(s=>s-1), 1000);
    return ()=>clearTimeout(t);
  },[isRunning, timeLeft]);

  const selectPreset = (min) => {
    setSelectedMin(min); setTimeLeft(min*60);
    setIsRunning(false); setStartTime(null); setMode("focus");
    cancelEndNotify();
  };
  const start = () => {
    primeAudio();
    if(!startTime) setStartTime(new Date());
    setIsRunning(true);
    scheduleEndNotify(timeLeft, mode);
  };
  const pause = () => { primeAudio(); setIsRunning(false); cancelEndNotify(); };
  const reset = () => { setIsRunning(false); setTimeLeft(selectedMin*60); setStartTime(null); setMode("focus"); setTask(""); localStorage.removeItem("jiroku_timer_state"); cancelEndNotify(); };

  const saveLog = async () => {
    setSaving(true);
    const st = startTime||new Date();
    const h  = st.getHours();
    const timeBlock = String(h).padStart(2,"0")+":00-"+String(h+1).padStart(2,"0")+":00";
    const url = new URL(GAS_URL);
    url.searchParams.set("action","saveLog");
    url.searchParams.set("studentEmail",CURRENT_USER.email);
    url.searchParams.set("time_block",timeBlock);
    url.searchParams.set("task",task.trim()||`ポモドーロ${selectedMin}分集中`);
    url.searchParams.set("focus_level",logFocus);
    url.searchParams.set("memo",logMemo.trim());
    url.searchParams.set("goal_related",logGoalRelated?"true":"false");
    const res = await fetch(url).then(r=>r.json()).catch(()=>({ok:false}));
    if(!res.ok){ onToast("記録に失敗しました。もう一度お試しください"); setSaving(false); return; }
    if(res.xp_gained){ const lv=res.level_up?` → Lv.${res.level}！`:""; onToast(`+${res.xp_gained} XP 獲得${lv}`); }
    else onToast(res.updated?"記録を更新しました":"記録しました");
    setSaving(false); setShowModal(false); setLogMemo(""); setTask("");
    setMode("break"); setTimeLeft(breakMin*60); setStartTime(null);
  };
  const skipLog = () => { setShowModal(false); setTask(""); setMode("break"); setTimeLeft(breakMin*60); setStartTime(null); };

  const mins = Math.floor(timeLeft/60);
  const secs = timeLeft%60;
  const totalSec = (mode==="focus"?selectedMin:breakMin)*60;
  const pct = Math.max(0,Math.min(100,((totalSec-timeLeft)/totalSec)*100));
  const r=90, circ=2*Math.PI*r, offset=circ*(1-pct/100);

function SettingsScreen({onToast,onLogout,onGoalSaved,profile,onProfileSaved}) {
  const [nickname,setNickname]=useState(profile?.nickname||CURRENT_USER.name);
  const [avatar,setAvatar]=useState(profile?.avatar||"🦊");
  const [showAllAvatars,setShowAllAvatars]=useState(false);
  const saveProfile=async()=>{
    if(!nickname.trim()){ onToast("ニックネームを入力してください"); return; }
    const nn=nickname.trim();
    await gasPost("saveSettings",{nickname:nn,avatar});
    const u={...CURRENT_USER,nickname:nn,avatar};
    CURRENT_USER=u; localStorage.setItem("edventure_user",JSON.stringify(u));
    onProfileSaved({nickname:nn,avatar});
    onToast("プロフィールを保存しました");
  };
  const saved=JSON.parse(localStorage.getItem("notifySettings")||'{"start":7,"end":23,"interval":2}');
  const savedGoals=JSON.parse(localStorage.getItem("jiroku_goals")||'[{"goal":"","deadline":""}]');
  const savedLogHours=getLogHours();
  const [interval,setInterval]=useState(saved.interval||2);
  const [logStart,setLogStart]=useState(savedLogHours.start);
  const [logEnd,setLogEnd]=useState(savedLogHours.end);
  const PRESET_OPTIONS=[15,20,25,30,45,60,90];
  const [selectedPresets,setSelectedPresets]=useState(()=>JSON.parse(localStorage.getItem("timer_presets")||"[25,45,60]"));
  const [breakMin,setBreakMin]=useState(()=>Number(localStorage.getItem("timer_break")||"5"));
  const togglePreset=(min)=>{
    if(selectedPresets.includes(min)){
      if(selectedPresets.length<=1){return;} // 最低1つ必須
      setSelectedPresets(selectedPresets.filter(p=>p!==min));
    } else {
      if(selectedPresets.length>=3) return; // 最大3つ
      setSelectedPresets([...selectedPresets,min].sort((a,b)=>a-b));
    }
  };
  const saveTimerSettings=()=>{
    localStorage.setItem("timer_presets",JSON.stringify(selectedPresets));
    localStorage.setItem("timer_break",String(breakMin));
    onToast("タイマー設定を保存しました");
  };
  const [goals,setGoals]=useState(savedGoals.length?savedGoals:[{goal:"",deadline:""}]);
  const updateGoal=(i,field,val)=>{ const g=[...goals]; g[i]={...g[i],[field]:val}; setGoals(g); };
  const addGoal=()=>{ if(goals.length<3) setGoals([...goals,{goal:"",deadline:""}]); };
  const removeGoal=(i)=>{ if(goals.length>1) setGoals(goals.filter((_,j)=>j!==i)); };
  const [calLinked,setCalLinked]=useState(!!localStorage.getItem("cal_linked"));
  const [calLoading,setCalLoading]=useState(false);

  const linkCalendar=()=>{
    if(!window.google||!google.accounts) return;
    setCalLoading(true);
    // ポップアップが閉じられた/ブロックされた場合の保険（callbackが来ないと固まるため）
    const safety=setTimeout(()=>setCalLoading(false), 45000);
    const client=google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: "https://www.googleapis.com/auth/calendar.readonly",
      error_callback: ()=>{ clearTimeout(safety); setCalLoading(false); onToast("連携できませんでした。もう一度お試しください"); },
      callback: async(tokenResp)=>{
        clearTimeout(safety);
        if(tokenResp.error){ setCalLoading(false); onToast("カレンダー連携に失敗しました"); return; }
        try{
          gcalToken=tokenResp.access_token;
          gcalTokenExp=Date.now()+(Number(tokenResp.expires_in)||3600)*1000;
          const calRes=await fetch("https://www.googleapis.com/calendar/v3/users/me/calendarList/primary",{
            headers:{Authorization:"Bearer "+tokenResp.access_token}
          }).then(r=>r.json());
          const calId=calRes.id||CURRENT_USER.email;
          await gasPost("saveSettings",{google_calendar_id:calId});
          localStorage.setItem("cal_linked","1");
          setCalLinked(true);
          fetchCalendarEvents(formatDateStr(new Date())); // 今日の予定を先読み
          onToast("カレンダーを連携しました！");
        }catch{ onToast("カレンダー取得に失敗しました"); }
        setCalLoading(false);
      }
    });
    client.requestAccessToken();
  };

  // 記録時間帯とLINE通知を同時に保存（両者は常に連動）
  const saveTimeSettings=()=>{
    if(logEnd<=logStart){onToast("終了時間は開始より後にしてください");return;}
    localStorage.setItem("jiroku_log_hours",JSON.stringify({start:logStart,end:logEnd}));
    localStorage.setItem("notifySettings",JSON.stringify({start:logStart,end:logEnd,interval}));
    gasPost("saveSettings",{notify_start:logStart,notify_end:logEnd,notify_interval:interval});
    onToast("時間帯と通知設定を保存しました");
  };
  const saveGoal=()=>{
    if(!goals[0]?.goal.trim()){onToast("目標1を入力してください");return;}
    localStorage.setItem("jiroku_goals",JSON.stringify(goals));
    gasPost("saveSettings",{
      goal:goals[0]?.goal.trim()||"", goal_deadline:goals[0]?.deadline||"",
      goal2:goals[1]?.goal.trim()||"", goal_deadline2:goals[1]?.deadline||"",
      goal3:goals[2]?.goal.trim()||"", goal_deadline3:goals[2]?.deadline||"",
    });
    onGoalSaved(goals);
    onToast("目標を保存しました");
  };

  // RANKS定数から生成
  const RANK_RULES = RANKS.map(r => ({
    ...r,
    lv: r.maxLv >= 999 ? `Lv.${r.minLv}+` : r.minLv === r.maxLv ? `Lv.${r.minLv}` : `Lv.${r.minLv}–${r.maxLv}`
  }));

  const SectionHeader = ({icon, title}) => html`
    <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
      <span style=${{fontSize:15}}>${icon}</span>
      <div style=${{fontSize:14,fontWeight:700,color:"var(--text)"}}>${title}</div>
    </div>
  `;

  return html`<div style=${{paddingBottom:48}}>

    <!-- Hero -->
    <div style=${{background:"linear-gradient(135deg, var(--hero1) 0%, var(--hero2) 100%)",padding:"36px 20px 28px",position:"relative",overflow:"hidden"}}>
      <!-- 右下: 大きなロゴマーク装飾 -->
      <svg style=${{position:"absolute",bottom:-30,right:-30,opacity:0.07}} width="140" height="140" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg"><circle cx="36" cy="36" r="36" fill="#fff"/><circle cx="36" cy="36" r="25" fill="none" stroke="#fff" stroke-width="4.5"/><path d="M36 11 A25 25 0 1 1 14.5 50" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/><circle cx="36" cy="36" r="15" fill="none" stroke="#fff" stroke-width="2"/><line x1="36" y1="36" x2="36" y2="25" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><line x1="36" y1="36" x2="43" y2="41" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="36" cy="36" r="2" fill="#fff"/></svg>

const AVATAR_OPTIONS=["🦊","🐱","🐶","🐻","🐼","🐸","🦉","🐧","🦁","🐢","🐰","🐹","🐨","🐮","🐷","🐵","🐺","🦄","🐴","🦒"];

const GOOGLE_CLIENT_ID = "476804060858-n3afj7ipmc81vq8cq71u0u3jdpolshea.apps.googleusercontent.com";

const XP_THRESHOLDS = [0, 500, 1200, 2200, 3500, 5200, 7500, 10000, 13000, 17000, 21000, 25500, 30500, 36000, 42000, 49000];
const getXpLevel = xp => { let lv=1; for(let i=1;i<XP_THRESHOLDS.length;i++){ if(xp>=XP_THRESHOLDS[i]) lv=i+1; else break; } return lv; };
const getXpInLevel = xp => xp - (XP_THRESHOLDS[getXpLevel(xp)-1]||0);
const getXpForNextLevel = xp => { const lv=getXpLevel(xp); return lv<XP_THRESHOLDS.length ? XP_THRESHOLDS[lv]-(XP_THRESHOLDS[lv-1]||0) : null; };

function parseJwt(token) {
  try {
    const base64 = token.split(".")[1].replace(/-/g,"+").replace(/_/g,"/");
    const json = decodeURIComponent(atob(base64).split("").map(c=>"%"+("00"+c.charCodeAt(0).toString(16)).slice(-2)).join(""));
    return JSON.parse(json);
  } catch { return null; }
}

function LoginScreen({onLogin}) {
  const [step,setStep]=useState("top"); // "top" | "profile" | "goal" | "line"
  const [goals,setGoals]=useState([{goal:"",deadline:""}]);
  const addGoal=()=>{ if(goals.length<3) setGoals([...goals,{goal:"",deadline:""}]); };
  const updateGoal=(i,field,val)=>{ const g=[...goals]; g[i]={...g[i],[field]:val}; setGoals(g); };
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [pendingUser,setPendingUser]=useState(null);
  const [nickname,setNickname]=useState("");
  const [avatar,setAvatar]=useState(AVATAR_OPTIONS[0]);
  const [showAllAvatars,setShowAllAvatars]=useState(false);

  // Googleリダイレクト後のid_tokenを検出
  useEffect(()=>{
    const hash=new URLSearchParams(location.hash.slice(1));
    const idToken=hash.get("id_token");
    if(idToken){
      history.replaceState(null,"",location.pathname);
      handleGoogleLogin({credential:idToken});
    }
  },[]);

  const handleGoogleSignIn=()=>{
    const nonce=Math.random().toString(36).slice(2);
    const params=new URLSearchParams({
      client_id: GOOGLE_CLIENT_ID,
      redirect_uri: "https://kaisunagawa.github.io/edventure-app/",
      response_type: "id_token",
      scope: "openid email profile",
      nonce,
    });
    window.location.href="https://accounts.google.com/o/oauth2/v2/auth?"+params;
  };

  const handleGoogleLogin=async(res)=>{
    const payload=parseJwt(res.credential);
    if(!payload) { setError("ログインに失敗しました"); return; }
    const email=payload.email;
    const name=payload.name||payload.given_name||"";
    setLoading(true); setError("");
    try{
      // 既存ユーザー確認
      const url=new URL(GAS_URL); url.searchParams.set("action","getUser"); url.searchParams.set("studentEmail",email);
      const r=await fetch(url).then(res=>res.json());
      if(r.ok&&r.data){
        // 既存ユーザー → ログイン
        const u={email,name:r.data.name||name,nickname:r.data.nickname||r.data.name||name,avatar:r.data.avatar||"🦊",coachName:r.data.coachName||"コーチ",coachEmail:r.data.coach_email||""};
        localStorage.setItem("edventure_user",JSON.stringify(u));
        if(!localStorage.getItem("line_prompted")){ setPendingUser(u); setStep("line"); }
        else { CURRENT_USER=u; onLogin(u); }
      } else {
        // 新規ユーザー → プロフィール入力へ
        setPendingUser({email, name});
        setNickname(name);
        setStep("profile");
      }
    }catch{ setError("接続エラーが発生しました"); }
    setLoading(false);
  };

  const confirmProfile=()=>{
    if(!nickname.trim()){ setError("ニックネームを入力してください"); return; }
    setError("");
    setStep("goal");
  };

  const register=async()=>{
    setLoading(true); setError("");
    try{
      const {email,name}=pendingUser;
      const url=new URL(GAS_URL);
      url.searchParams.set("action","registerUser");
      url.searchParams.set("studentEmail",email);
      url.searchParams.set("name",name);
      url.searchParams.set("nickname",nickname.trim());
      url.searchParams.set("avatar",avatar);
      url.searchParams.set("goal",goals[0]?.goal.trim()||"");
      url.searchParams.set("goal_deadline",goals[0]?.deadline||"");
      url.searchParams.set("goal2",goals[1]?.goal.trim()||"");
      url.searchParams.set("goal_deadline2",goals[1]?.deadline||"");
      url.searchParams.set("goal3",goals[2]?.goal.trim()||"");
      url.searchParams.set("goal_deadline3",goals[2]?.deadline||"");

        if(validGoals.length) localStorage.setItem("jiroku_goals",JSON.stringify(validGoals));
        localStorage.setItem("edventure_user",JSON.stringify(u));

  if(step==="profile") return html`
    <div class="login-wrap" style=${{justifyContent:"flex-start",paddingTop:48}}>
      <div class="login-logo"><svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg"><circle cx="36" cy="36" r="36" fill="#0891B2"/><circle cx="36" cy="36" r="25" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4.5"/><path d="M36 11 A25 25 0 1 1 14.5 50" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/><circle cx="36" cy="36" r="15" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/><line x1="36" y1="36" x2="36" y2="25" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><line x1="36" y1="36" x2="43" y2="41" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="36" cy="36" r="2" fill="#fff"/></svg></div>
      <div class="login-title">はじめまして 👋</div>
      <div class="login-sub" style=${{marginBottom:24}}>${pendingUser?.name}さん、プロフィールを設定しましょう</div>
      <div class="login-box">
        <div style=${{background:"var(--card)",borderRadius:12,padding:"14px",border:"1px solid var(--border)"}}>
          <div style=${{fontSize:11,color:"var(--sub)",marginBottom:5}}>ニックネーム（他の人にはこちらが表示されます）</div>
          <input class="login-inp" value=${nickname} maxLength=${20} placeholder="例：じろう" onChange=${e=>setNickname(e.target.value)}/>
        </div>
        <div style=${{background:"var(--card)",borderRadius:12,padding:"14px",border:"1px solid var(--border)"}}>
          <div style=${{fontSize:11,color:"var(--sub)",marginBottom:8}}>アバターを選ぶ</div>
          <div style=${{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:8}}>
            ${(showAllAvatars?AVATAR_OPTIONS:AVATAR_OPTIONS.slice(0,8)).map(a=>html`
              <button key=${a} onClick=${()=>setAvatar(a)}
                style=${{fontSize:24,padding:"8px 0",borderRadius:12,border:`2px solid ${avatar===a?"var(--accent)":"var(--border)"}`,background:avatar===a?"var(--accent-bg, rgba(8,145,178,0.1))":"transparent",cursor:"pointer"}}>
                ${a}
              </button>
            `)}
          </div>
          ${!showAllAvatars&&html`
            <button onClick=${()=>setShowAllAvatars(true)}
              style=${{background:"none",border:"none",color:"var(--accent)",fontSize:12.5,fontWeight:600,cursor:"pointer",padding:"8px 0 0",width:"100%",textAlign:"center"}}>
              もっと見る（他${AVATAR_OPTIONS.length-8}種類）
            </button>
          `}
        </div>
        ${error&&html`<div class="login-err">${error}</div>`}
        <button class="btn" onClick=${confirmProfile}>次へ</button>
      </div>
    </div>
  `;

  if(step==="goal") return html`
    <div class="login-wrap" style=${{justifyContent:"flex-start",paddingTop:48}}>
      <div class="login-logo"><svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg"><circle cx="36" cy="36" r="36" fill="#0891B2"/><circle cx="36" cy="36" r="25" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4.5"/><path d="M36 11 A25 25 0 1 1 14.5 50" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/><circle cx="36" cy="36" r="15" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/><line x1="36" y1="36" x2="36" y2="25" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><line x1="36" y1="36" x2="43" y2="41" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="36" cy="36" r="2" fill="#fff"/></svg></div>
      <div class="login-title">はじめまして 👋</div>
      <div class="login-sub" style=${{marginBottom:24}}>${nickname}さん、目標を教えてください（最大3つ）</div>
      <div class="login-box">
        ${goals.map((g,i)=>html`
          <div key=${i} style=${{background:"var(--card)",borderRadius:12,padding:"14px",border:"1px solid var(--border)"}}>
            <div style=${{fontSize:11,color:"var(--sub)",marginBottom:5}}>目標${i+1}${i===0?" （メインの目標）":""}</div>
            <textarea class="txa" placeholder=${i===0?"例：英検2級に合格する":"例：毎月売上100万円達成"} value=${g.goal} onChange=${e=>{updateGoal(i,"goal",e.target.value);e.target.style.height="auto";e.target.style.height=e.target.scrollHeight+"px";}} ref=${el=>{if(el){el.style.height="auto";el.style.height=el.scrollHeight+"px";}}} style=${{minHeight:70,overflow:"hidden",resize:"none",marginBottom:8}}/>
            <div style=${{fontSize:11,color:"var(--sub)",marginBottom:5}}>達成期限（任意）</div>
            <input type="date" class="login-inp" value=${g.deadline} onChange=${e=>updateGoal(i,"deadline",e.target.value)}/>
          </div>
        `)}
        ${goals.length<3&&html`
          <button onClick=${addGoal} style=${{background:"none",border:"1px dashed var(--border)",borderRadius:12,padding:"12px",color:"var(--sub)",fontSize:14,cursor:"pointer",width:"100%"}}>
            ＋ 目標を追加する
          </button>
        `}
        ${error&&html`<div class="login-err">${error}</div>`}
        <button class="btn" onClick=${register} disabled=${loading}>${loading?"登録中...":"JIROKUをはじめる"}</button>
      </div>
    </div>
  `;

  const isLineWebView = /Line\//i.test(navigator.userAgent);
  const isAndroid = /Android/i.test(navigator.userAgent);

  if(isLineWebView){
    if(isAndroid){
      // AndroidはChromeで自動で開く
      window.location.href=`intent://${location.host}${location.pathname}#Intent;scheme=https;action=android.intent.action.VIEW;package=com.android.chrome;end`;
    }
    return html`
      <div class="login-wrap">
        <div class="login-logo"><svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg"><circle cx="36" cy="36" r="36" fill="#0891B2"/><circle cx="36" cy="36" r="25" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4.5"/><path d="M36 11 A25 25 0 1 1 14.5 50" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/><circle cx="36" cy="36" r="15" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/><line x1="36" y1="36" x2="36" y2="25" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><line x1="36" y1="36" x2="43" y2="41" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="36" cy="36" r="2" fill="#fff"/></svg></div>
        <div class="login-title">JIROKU</div>
        <div style=${{textAlign:"center",padding:"0 24px"}}>
          <div style=${{fontSize:48,marginBottom:16}}>🌐</div>
          <div style=${{fontWeight:700,fontSize:17,marginBottom:12,color:"var(--text)"}}>ブラウザで開いてください</div>
          <div style=${{fontSize:14,color:"var(--sub)",lineHeight:1.8,marginBottom:24}}>
            LINEのブラウザではGoogleログインができません。<br/>
            ${isAndroid
              ? html`Chromeが自動で開きます。開かない場合は右上の<b>「…」→「ブラウザで開く」</b>をタップしてください。`
              : html`画面右下の<b>「…」→「ブラウザで開く」</b>をタップして、SafariかChromeで開いてください。`
            }
          </div>
        </div>
      </div>
    `;
  }

  return html`
    <div class="login-wrap">
      <div class="login-logo"><svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg"><circle cx="36" cy="36" r="36" fill="#0891B2"/><circle cx="36" cy="36" r="25" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4.5"/><path d="M36 11 A25 25 0 1 1 14.5 50" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/><circle cx="36" cy="36" r="15" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/><line x1="36" y1="36" x2="36" y2="25" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><line x1="36" y1="36" x2="43" y2="41" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="36" cy="36" r="2" fill="#fff"/></svg></div>
      <div class="login-title">JIROKU</div>
      <div class="login-sub">時間を記録し、目標を達成する</div>
      <div class="login-box" style=${{alignItems:"center"}}>
        ${loading
          ? html`<div style=${{color:"var(--sub)",fontSize:14}}>確認中...</div>`
          : html`<button onClick=${handleGoogleSignIn} style=${{display:"flex",alignItems:"center",gap:10,padding:"10px 20px",borderRadius:8,border:"1px solid #dadce0",background:"#fff",cursor:"pointer",fontSize:15,fontWeight:500,color:"#3c4043",width:280,justifyContent:"center"}}>
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18"/>
              Googleでサインイン
            </button>`
        }
        ${error&&html`<div class="login-err">${error}</div>`}
      </div>
    </div>
  `;
}

function App() {
  // 起動を速くするため、ログイン済みキャッシュがあれば即アプリを表示する。
  // アカウントの存在確認はバックグラウンドで行い、消えていた場合だけログアウトさせる
  const [user,setUser]=useState(CURRENT_USER);
  const [tab,setTab]=useState("home");
  const [toast,setToast]=useState(null);
  const [goalData,setGoalData]=useState(()=>{
    const g=localStorage.getItem("jiroku_goals"); if(g) try{return JSON.parse(g);}catch(e){}
    const old=localStorage.getItem("jiroku_goal"); if(old) try{const p=JSON.parse(old); if(p.goal) return [p];}catch(e){}
    return [];
  });
  const [profile,setProfile]=useState(()=>({nickname:CURRENT_USER?.nickname||CURRENT_USER?.name||"",avatar:CURRENT_USER?.avatar||"🦊"}));
  const logout=()=>{
    localStorage.removeItem("edventure_user");
    localStorage.removeItem("line_prompted");
    localStorage.removeItem("cal_linked");
    CURRENT_USER=null; setUser(null);
  };

  useEffect(()=>{
    if(!CURRENT_USER) return;
    // バックグラウンドで最新プロフィール取得＋存在確認（起動はブロックしない）
    const url=new URL(GAS_URL);
    url.searchParams.set("action","getUser");
    url.searchParams.set("studentEmail",CURRENT_USER.email);
    fetch(url).then(r=>r.json()).then(r=>{
      if(r.ok&&r.data){
        const u={...CURRENT_USER, name:r.data.name||CURRENT_USER.name, nickname:r.data.nickname||CURRENT_USER.name, avatar:r.data.avatar||"🦊", coachName:r.data.coachName||"コーチ", coachEmail:r.data.coach_email||""};
        CURRENT_USER=u; localStorage.setItem("edventure_user",JSON.stringify(u)); setUser(u);
        setProfile({nickname:u.nickname,avatar:u.avatar});
      } else if(r.error==="User not found"){
        // スプレッドシートに存在しない → キャッシュ削除してログイン画面へ
        localStorage.removeItem("edventure_user");
        localStorage.removeItem("line_prompted");
        localStorage.removeItem("cal_linked");
        CURRENT_USER=null; setUser(null);
      }
    }).catch(()=>{}); // 通信エラー時はキャッシュのまま続行
  },[]);

  if(!user) return html`<${LoginScreen} onLogin=${setUser}/>`;
  return html`
    <div style=${{height:"100%",position:"relative"}}>
      <div class="screen">
        <div style=${{display:tab==="home"?"block":"none"}}><${HomeScreen} goalData=${goalData} onGoalSaved=${setGoalData} profile=${profile}/></div>
        <div style=${{display:tab==="log"?"block":"none"}}><${LogScreen} onToast=${setToast} isActive=${tab==="log"}/></div>
        <div style=${{display:tab==="report"?"block":"none"}}><${ReportScreen}/></div>
        <div style=${{display:tab==="timer"?"block":"none",height:"100%"}}><${TimerScreen} onToast=${setToast} isActive=${tab==="timer"}/></div>
        <div style=${{display:tab==="settings"?"block":"none"}}><${SettingsScreen} onToast=${setToast} onLogout=${logout} onGoalSaved=${setGoalData} profile=${profile} onProfileSaved=${setProfile}/></div>
      </div>
      <nav class="nav">
        ${TABS.map(t=>html`
          <button key=${t.id} class=${"nav-btn"+(tab===t.id?" on":"")} onClick=${()=>setTab(t.id)}>
            <${S} n=${t.n} s=${20}/><span class="nav-lbl">${t.l}</span>
          </button>
        `)}
      </nav>
      ${toast&&html`<${Toast} msg=${toast} onDone=${()=>setToast(null)}/>`}
    </div>
  `;
}
const ERR_STYLE = "padding:20px;font-family:monospace;font-size:12px;color:red;background:#fff;position:fixed;top:0;left:0;right:0;bottom:0;overflow:auto;z-index:9999;white-space:pre-wrap";
class ErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(e){ return {err:e}; }
  componentDidCatch(e,info){ console.error("ErrorBoundary caught:",e,info); }
  render(){
    if(this.state.err) return React.createElement("div",{style:{padding:20,fontFamily:"monospace",fontSize:13,color:"red",background:"#fff",position:"fixed",top:0,left:0,right:0,bottom:0,overflow:"auto",zIndex:9999,whiteSpace:"pre-wrap"}},
      "レンダーエラー（スクショを送ってください）:\n"+this.state.err.message+"\n\n"+this.state.err.stack);
    return this.props.children;
  }
}
try {
  ReactDOM.createRoot(document.getElementById("root")).render(
    React.createElement(ErrorBoundary,null,html`<${App}/>`)
  );
} catch(e) {
  document.getElementById("root").innerHTML = '<div style="'+ERR_STYLE+'">ERROR:\n'+e.message+'\n\n'+e.stack+'</div>';
}
window.onerror = (msg,src,line,col,err) => {
  console.error("JS ERROR:", msg, "Line:"+line, err);
  // アプリが描画済みなら画面は壊さない。起動前のエラーのみ全画面表示
  const rendered = document.querySelector("#root .nav") || document.querySelector("#root .login-wrap");
  if(!rendered) document.getElementById("root").innerHTML = '<div style="'+ERR_STYLE+'">JS ERROR:\n'+msg+'\nLine:'+line+' Col:'+col+'</div>';
};
window.addEventListener("unhandledrejection", e => {
  console.error("Unhandled promise rejection:", e.reason);
});
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script>
</body>
</html>
