<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>JIROKU</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="JIROKU" />
  <meta name="theme-color" content="#FAFAF9" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#101417" media="(prefers-color-scheme: dark)" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/htm/dist/htm.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F8F8FA;
      --card:     #FFFFFF;
      --border:   #E5E7EB;
      --text:     #1F2937;
      --sub:      #9CA3AF;
      --accent:   #0891B2;
      --accent-l: #CFFAFE;
      --glow:     rgba(8,145,178,.12);
      --green:    #22C55E;
      --green-l:  #F0FDF4;
      --amber:    #F59E0B;
      --amber-l:  #FFFBEB;
      --red:      #EF4444;
      --red-l:    #FEF2F2;
      --nav-h:    64px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --r:        14px;
      --hero1:    #0891B2;
      --hero2:    #0e7490;
    }

    html, body {
      height: 100%; background: var(--bg);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      color: var(--text); -webkit-font-smoothing: antialiased;
    }
    #root { height: 100%; width: 100%; position: relative; background: var(--bg); overflow: hidden; }

    .screen {
      position: absolute; inset: 0;
      bottom: calc(var(--nav-h) + var(--safe-bottom));
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }

    /* ── Nav ── */
    .nav {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + var(--safe-bottom));
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; padding-bottom: var(--safe-bottom);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      border: none; background: none; cursor: pointer;
      color: var(--sub); -webkit-tap-highlight-color: transparent;
      transition: color .15s;
    }
    .nav-btn.on { color: var(--accent); }
    .nav-lbl { font-size: 10px; font-weight: 500; letter-spacing: .1px; }

    /* ── Page header ── */
    .ph { padding: 24px 20px 8px; }
    .ph-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
    .ph-title-accent { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
    .ph-sub { font-size: 13px; color: var(--sub); margin-top: 2px; }
    .ph-label { display: none; }

    /* ── Cards ── */
    .card {
      background: var(--card); border-radius: 12px;
      padding: 16px; margin: 0 16px 8px;
      border: 1px solid var(--border);
    }
    .card-label {
      font-size: 11px; font-weight: 500; color: var(--sub);
      margin-bottom: 12px; letter-spacing: .1px;
    }

    /* ── Stat tiles (unused but kept for compat) ── */
    .stat-row { display: flex; gap: 8px; margin: 0 16px 8px; }
    .stat-tile { flex: 1; background: var(--card); border-radius: 10px; padding: 14px 12px; text-align: center; border: 1px solid var(--border); }
    .stat-v { font-size: 24px; font-weight: 700; line-height: 1; color: var(--text); }
    .stat-l { font-size: 10px; color: var(--sub); margin-top: 4px; font-weight: 500; }
    .streak-tile { }
    .streak-tile .stat-v { color: var(--amber); }
    .level-v { color: var(--accent); }

    /* ── XP bar ── */
    .xp-wrap { margin: 0 16px 12px; }
    .xp-top { display: flex; justify-content: space-between; font-size: 11px; color: var(--sub); font-weight: 500; margin-bottom: 6px; }
    .xp-track { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .xp-fill { height: 4px; border-radius: 99px; background: var(--accent); transition: width .6s cubic-bezier(.4,0,.2,1); }

    /* ── Badge pills ── */
    .badge-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 16px 10px; }
    .badge-pill { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; background: var(--bg); border: 1px solid var(--border); color: var(--sub); }

    /* ── Score ring ── */
    .ring-wrap { display: flex; align-items: center; gap: 16px; }
    .ring { width: 68px; height: 68px; flex-shrink: 0; border-radius: 50%; background: conic-gradient(var(--accent) calc(var(--pct)*1%), var(--border) 0); display: flex; align-items: center; justify-content: center; }
    .ring-inner { width: 52px; height: 52px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .ring-num { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; }
    .ring-unit { font-size: 9px; color: var(--sub); }

    /* ── Schedule ── */
    .sched-row { display: flex; align-items: flex-start; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .sched-row:last-child { border-bottom: none; }
    .sched-time { font-size: 12px; font-weight: 600; color: var(--accent); min-width: 40px; padding-top: 1px; flex-shrink: 0; }
    .sched-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .sched-sub { font-size: 11px; color: var(--sub); margin-top: 2px; }

    /* ── Section header ── */
    .sec-head { padding: 16px 20px 8px; }
    .sec-head h2 { font-size: 17px; font-weight: 700; letter-spacing: -.2px; }

    /* ── Time bar ── */
    .time-bar { display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px; scrollbar-width: none; border-bottom: 1px solid var(--border); }
    .time-bar::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 6px 12px; border-radius: 7px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      border: 1px solid var(--border); background: var(--card);
      color: var(--sub); transition: all .12s; -webkit-tap-highlight-color: transparent;
    }
    .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    .chip.done { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
    .chip.on.done { background: var(--accent); color: #fff; }

    /* ── Form ── */
    .form-wrap { padding: 14px 16px 16px; }
    .form-grp { margin-bottom: 13px; }
    .form-lbl { font-size: 12px; font-weight: 500; color: var(--sub); margin-bottom: 6px; display: block; }
    .inp, .txa {
      width: 100%; padding: 11px 13px; border: 1px solid var(--border);
      border-radius: 9px; font-size: 15px; font-family: inherit;
      background: var(--card); color: var(--text); outline: none; transition: border-color .12s;
      box-sizing: border-box;
    }
    .inp:focus, .txa:focus { border-color: var(--accent); }
    input[type="date"].inp, input[type="date"].login-inp { -webkit-appearance: none; appearance: none; text-align: center; }
    .txa { resize: none; min-height: 68px; line-height: 1.6; overflow: hidden; }

    /* ── Eval buttons ── */
    .eval-btn {
      width: 100%; padding: 8px 12px; margin-bottom: 4px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--card);
      font-size: 13.5px; font-weight: 500; cursor: pointer; text-align: left;
      color: var(--sub); transition: all .12s; font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .eval-btn:last-child { margin-bottom: 0; }
    .e5 { background: var(--green-l); border-color: #86EFAC; color: #15803D; }
    .e4 { background: var(--accent-l); border-color: #A5B4FC; color: #3730A3; }
    .e3 { background: var(--amber-l); border-color: #FCD34D; color: #92400E; }
    .e2 { background: var(--red-l); border-color: #FCA5A5; color: #991B1B; }
    .e1 { background: var(--red-l); border-color: #FCA5A5; color: #991B1B; }

    /* ── Primary button ── */
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: var(--accent); color: #fff;
      font-size: 15px; font-weight: 600; cursor: pointer;
      font-family: inherit; letter-spacing: .1px;
      transition: opacity .12s, transform .1s; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: .85; transform: scale(.99); }
    .btn:disabled { background: var(--border); color: var(--sub); cursor: default; }

    /* ── Ghost button ── */
    .btn-g {
      width: 100%; padding: 13px; border-radius: 9px;
      border: 1px solid var(--border); background: transparent;
      color: var(--red); font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: inherit;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
      left: 50%; transform: translateX(-50%);
      background: #111827; color: #fff;
      padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
      z-index: 999; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,.2);
      animation: up .2s ease;
    }
    @keyframes up { from { opacity:0; transform: translateX(-50%) translateY(6px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

    /* ── Report ── */
    .report-hero { padding: 28px 20px 16px; text-align: center; }
    .report-date { font-size: 11px; font-weight: 500; color: var(--sub); margin-bottom: 12px; }
    .report-score { font-size: 72px; font-weight: 800; line-height: 1; letter-spacing: -3px; color: var(--text); }
    .report-pts { font-size: 13px; color: var(--sub); margin-top: 4px; }

    /* ── Tag ── */
    .tag { display: inline-block; padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 500; }
    .t-g { background: var(--green-l); color: #15803D; }
    .t-a { background: var(--amber-l); color: #92400E; }

    /* ── Log rows ── */
    .log-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .log-row:last-child { border-bottom: none; }
    .log-time { font-size: 11px; font-weight: 600; color: var(--sub); min-width: 44px; padding-top: 2px; flex-shrink: 0; }
    .log-task { font-size: 14px; font-weight: 500; color: var(--text); }
    .log-meta { font-size: 12px; color: var(--sub); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* ── Chat ── */
    .chat-head { padding: 14px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .chat-av { width: 34px; height: 34px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--text); flex-shrink: 0; }
    .chat-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .chat-status { font-size: 11px; color: var(--sub); }

    .msgs { padding: 16px; display: flex; flex-direction: column; gap: 8px; min-height: 100%; }
    .bubble { max-width: 76%; padding: 10px 14px; font-size: 14px; line-height: 1.6; overflow-wrap: break-word; word-break: break-word; white-space: pre-wrap; border-radius: 14px; min-width: 130px; }
    .b-in { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .b-out { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .btime { font-size: 10px; color: var(--sub); margin-top: 3px; }
    .btime-r { text-align: right; }

    .chat-bar { padding: 10px 14px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; }
    .chat-inp { flex: 1; padding: 10px 13px; border: 1px solid var(--border); border-radius: 9px; font-size: 15px; font-family: inherit; outline: none; resize: none; max-height: 100px; line-height: 1.4; background: var(--bg); color: var(--text); }
    .chat-inp:focus { border-color: var(--accent); }
    .send { width: 38px; height: 38px; border-radius: 9px; background: var(--accent); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    .send:disabled { background: var(--border); color: var(--sub); cursor: default; }

    /* ── Settings ── */
    .s-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .s-row:last-child { border-bottom: none; }
    .s-k { color: var(--sub); font-weight: 400; }
    .s-v { font-weight: 500; color: var(--text); }
    select { width: 100%; padding: 10px 12px; border-radius: 9px; border: 1px solid var(--border); font-size: 14px; background: var(--card); color: var(--text); font-family: inherit; outline: none; }
    select:focus { border-color: var(--accent); }

    /* ── Date nav ── */
    .date-nav { display: flex; align-items: center; gap: 12px; margin-top: 6px; }
    .date-nav button { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--sub); padding: 0 4px; line-height: 1; }
    .date-nav button:disabled { color: var(--border); cursor: default; }
    .date-nav span { font-size: 13px; font-weight: 600; color: var(--text); }

    /* ── Spinner ── */
    .spin { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: rot .6s linear infinite; display: inline-block; }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* ── 独り言FABのふきだしヒント（ふわふわ雲型） ── */
    .quick-hint {
      position: absolute; right: 2px; bottom: 100%; margin-bottom: 20px;
      background: var(--card); color: var(--text);
      font-size: 10px; font-weight: 700; letter-spacing: .02em; white-space: nowrap;
      padding: 8px 16px; border-radius: 999px;
      filter: drop-shadow(0 7px 12px rgba(8,145,178,0.18));
      animation: quickHintIn .5s cubic-bezier(.34,1.56,.64,1), quickHintFloat 3.4s ease-in-out .5s infinite;
      transform-origin: bottom right; pointer-events: none; z-index: 1;
    }
    /* 雲のふくらみ（上ふち＆左右にぽこぽこ） */
    .quick-hint::before {
      content: ""; position: absolute; z-index: -1;
      width: 14px; height: 14px; border-radius: 50%; background: var(--card);
      left: 16px; top: -5px;
      box-shadow:
        16px -3px 0 1px var(--card),
        36px -3px 0 -1px var(--card),
        55px 0px 0 -1px var(--card),
        -7px 7px 0 -1px var(--card),
        69px 9px 0 -2px var(--card);
    }
    /* 思考ふきだしのしっぽ（FAB側に小さな玉がふたつ） */
    .quick-hint::after {
      content: ""; position: absolute; z-index: -1;
      right: 18px; bottom: -6px;
      width: 10px; height: 10px; border-radius: 50%; background: var(--card);
      box-shadow: -8px 6px 0 -3px var(--card);
    }
    @keyframes quickHintIn { from { opacity: 0; transform: translateY(8px) scale(.85); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes quickHintFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

    /* ── Empty ── */
    .empty { padding: 48px 24px; text-align: center; }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty-body { font-size: 13px; color: var(--sub); line-height: 1.7; }

    /* ── Login ── */
    .login-wrap { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; background: var(--bg); }
    .login-logo { width: 72px; height: 72px; margin: 0 auto 18px; }
    .login-title { font-size: 24px; font-weight: 700; letter-spacing: -.4px; text-align: center; color: var(--text); }
    .login-sub { font-size: 13px; color: var(--sub); text-align: center; margin: 5px 0 32px; line-height: 1.6; }
    .login-box { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 8px; }
    .login-inp { width: 100%; padding: 13px 14px; border-radius: 9px; border: 1px solid var(--border); font-size: 15px; background: var(--card); color: var(--text); outline: none; font-family: inherit; transition: border-color .12s; box-sizing: border-box; }
    .login-inp:focus { border-color: var(--accent); }
    .login-err { font-size: 12px; color: var(--red); font-weight: 500; }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:       #101417;
        --card:     #1A2025;
        --border:   #2B333A;
        --text:     #E8ECEF;
        --sub:      #7E8A94;
        --accent:   #22B8D4;
        --accent-l: #123A44;
        --glow:     rgba(34,184,212,.15);
        --green:    #34D399;
        --green-l:  #0E2B21;
        --amber:    #FBBF24;
        --amber-l:  #2E2410;
        --red:      #F87171;
        --red-l:    #331717;
        --hero1:    #0B4A5A;
        --hero2:    #093642;
      }
      .nav { background: rgba(20,25,30,.96); }
      .toast { background: #E8ECEF; color: #111827; }
      .e5 { background: var(--green-l); border-color: #14532D; color: #4ADE80; }
      .e4 { background: var(--accent-l); border-color: #164E63; color: #67E8F9; }
      .e3 { background: var(--amber-l); border-color: #78350F; color: #FCD34D; }
      .e2, .e1 { background: var(--red-l); border-color: #7F1D1D; color: #FCA5A5; }
      .t-g { background: var(--green-l); color: #4ADE80; }
      .t-a { background: var(--amber-l); color: #FCD34D; }
      input[type="date"].inp, input[type="date"].login-inp, select { color-scheme: dark; }
    }
  </style>
</head>
<body>
<div id="root">
  <div id="splash" style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:20px">
    <!-- 案Aロゴ: リングマーク -->
    <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <circle cx="40" cy="40" r="40" fill="#0891B2"/>
      <circle cx="40" cy="40" r="28" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="5"/>
      <path d="M40 12 A28 28 0 1 1 16.4 55.6" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
      <circle cx="40" cy="40" r="17" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
      <line x1="40" y1="40" x2="40" y2="27" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="40" y1="40" x2="49" y2="46" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="40" cy="40" r="2" fill="#fff"/>
    </svg>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="font-family:'DM Sans',-apple-system,sans-serif;font-size:26px;font-weight:800;color:var(--text);letter-spacing:-.3px">JIROKU</div>
      <div style="font-family:'DM Sans',-apple-system,sans-serif;font-size:10px;font-weight:500;color:#9CA3AF;letter-spacing:2px">HABIT DESIGN</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:8px">
      <div style="width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp 0.7s linear infinite"></div>
      <div style="font-family:'DM Sans',-apple-system,sans-serif;font-size:11px;font-weight:500;color:var(--sub);letter-spacing:.5px">読み込み中...</div>
    </div>
  </div>
  <style>#splash{animation:none}@keyframes sp{to{transform:rotate(360deg)}}</style>
</div>
<script>
const { useState, useEffect, useRef, useCallback } = React;
const html = htm.bind(React.createElement);

const GAS_URL = "https://script.google.com/macros/s/AKfycbzJ-QEpPVnmp-LFU5Jxww4VFP1qaseMtwCrzKxAA6ZULr1y3h_UeKzVdhHnl5ze57U/exec";
let CURRENT_USER = JSON.parse(localStorage.getItem("edventure_user") || "null");

// タイマー終了などをバックグラウンド（アプリを閉じている間）でも通知するためのFirebase Cloud Messaging設定。
// ここのapiKey等はWebクライアント向けの公開設定値であり秘密情報ではない（GAS側のサービスアカウント鍵とは別物）。
// sw.js側にも同じ設定を書く必要がある（Service Workerは別スコープで読み込むため共有できない。

function loadFirebaseSdk() {
  if (window.firebase) return Promise.resolve();
  return new Promise((resolve, reject) => {
    const s1 = document.createElement("script");
    s1.src = "https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js";
    s1.onload = () => {
      const s2 = document.createElement("script");
      s2.src = "https://www.gstatic.com/firebasejs/12.15.0/firebase-messaging-compat.js";
      s2.onload = resolve;
      s2.onerror = reject;
      document.head.appendChild(s2);
    };
    s1.onerror = reject;
    document.head.appendChild(s1);
  });
}

// プッシュ通知（バックグラウンド通知）を有効化する。通知許可→Firebase初期化→
// Service Worker登録→FCMトークン取得→サーバーへ登録、の順で行う
// SafariのPushManager.subscribeはapplicationServerKeyの型に厳しく、
// ライブラリ側の変換にバグがあると「must contain a valid P-256 public key」で
// 失敗することがあるため、確実な変換で自前のUint8Arrayを作る
function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; i++) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

async function enablePushNotifications() {
  // requestPermission自体が例外を投げる環境（対応が不完全なブラウザ等）でも
  // 必ず{ok,error}を返すようにする。ここで例外が漏れると、呼び出し元の
  // チュートリアルが「設定中...」のまま固まって進めなくなってしまうため
  try {
    if (!("Notification" in window) || typeof Notification.requestPermission !== "function" || !("serviceWorker" in navigator)) {
      return { ok: false, error: "このブラウザはプッシュ通知に対応していません" };
    }
    const perm = await Notification.requestPermission();
    if (perm !== "granted") return { ok: false, error: "通知が許可されませんでした" };
    await loadFirebaseSdk();
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    const messaging = firebase.messaging();
    // sw.js（キャッシュ用と共通）の登録が終わるのを待って使う。別ファイルとして
    // 登録するとスコープが競合しキャッシュ用sw.jsが上書きされてしまうため
    const reg = await navigator.serviceWorker.ready;
    // FirebaseのgetToken内部変換がSafariで失敗するケースがあるため、
    // 先に自前の変換でpush購読を作っておき、getTokenには既存の購読を使わせる
    const existingSub = await reg.pushManager.getSubscription();
    if (!existingSub) {
      await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(FCM_VAPID_KEY)
      });
    }
    const token = await messaging.getToken({ vapidKey: FCM_VAPID_KEY, serviceWorkerRegistration: reg });
    if (!token) return { ok: false, error: "通知トークンの取得に失敗しました" };
    const res = await gasPost("registerPushToken", { token });
    if (!res.ok) return { ok: false, error: res.error || "サーバーへの登録に失敗しました" };
    localStorage.setItem("push_enabled", "1");
    return { ok: true };
  } catch (e) {
    return { ok: false, error: String(e.message || e) };
  }
}

// ── Googleカレンダー（各ユーザー本人の権限でブラウザから直接読む） ──
// GAS(CalendarApp)はスクリプト所有者のアカウントでしか読めないため、
// 他ユーザーのカレンダーはクライアント側で取得する
let gcalToken=null, gcalTokenExp=0;
// GISスクリプト（async defer読み込み）の準備を最大4秒待つ
function waitForGis(ms=4000){
  return new Promise(resolve=>{
    const t0=Date.now();
    (function check(){
      if(window.google?.accounts?.oauth2) return resolve(true);
      if(Date.now()-t0>ms) return resolve(false);
      setTimeout(check,200);
    })();
  });
}
async function getCalendarToken(interactive){
  if(gcalToken && Date.now() < gcalTokenExp-60000) return gcalToken;
  if(!interactive && !localStorage.getItem("cal_linked")) return null;
  const ready=await waitForGis();
  if(!ready) return null;
  return new Promise((resolve)=>{
    // サイレント認証（prompt:"none"）はサードパーティCookieがブロックされていると
    // コールバックも呼ばれずに固まることがあり、そのままだとフォールバック（サーバーの
    // 共有キャッシュ）にも進めなくなる。タイムアウトで必ず抜けられるようにする
    let done=false;
    const finish=(v)=>{ if(done) return; done=true; resolve(v); };
    const timeout=setTimeout(()=>finish(null), interactive ? 20000 : 4000);
    try{
      const client=google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: "https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events",
        use_fedcm_for_prompt: true,
        callback: (t)=>{
          clearTimeout(timeout);
          if(t.error){ finish(null); return; }
          gcalToken=t.access_token;
          gcalTokenExp=Date.now()+(Number(t.expires_in)||3600)*1000;
          finish(gcalToken);
        },
        error_callback: ()=>{ clearTimeout(timeout); finish(null); },
      });
      client.requestAccessToken({prompt: interactive ? "" : "none"});
    }catch{ clearTimeout(timeout); finish(null); }
  });
}
const gcalCache={}, gcalCacheAt={}, gcalSynced={}, gcalInFlight={};
const GCAL_LS="gcal_evs_";
// 今日の予定は後から追加・変更されることがあるため、キャッシュは10分で期限切れにして
// 再取得する（以前は一度取得したら丸1日使い回していたため、後から入れた予定が
// 記録タブの自動入力に反映されなかった）
const GCAL_TTL_MS = 10*60*1000;
const gcalFresh = dateStr => gcalCache[dateStr] && (Date.now()-(gcalCacheAt[dateStr]||0)) < GCAL_TTL_MS;
// 連携カレンダーの選択を変えた時などに、古い選択で取得済みのキャッシュを全て破棄する
function clearCalendarCache(){
  Object.keys(gcalCache).forEach(k=>delete gcalCache[k]);
  Object.keys(gcalCacheAt).forEach(k=>delete gcalCacheAt[k]);
  Object.keys(gcalSynced).forEach(k=>delete gcalSynced[k]);
  try{ Object.keys(localStorage).forEach(k=>{ if(k.startsWith(GCAL_LS)) localStorage.removeItem(k); }); }catch{}
}
function cleanupGcalLS(){
  try{
    const limit=addDays(formatDateStr(new Date()),-7);
    Object.keys(localStorage).forEach(k=>{
      if(k.startsWith(GCAL_LS) && k.slice(GCAL_LS.length)<limit) localStorage.removeItem(k);
      if(k.startsWith(CAL_EVT_LS) && k.slice(CAL_EVT_LS.length)<limit) localStorage.removeItem(k);
    });
  }catch{}
}
// 記録をGoogleカレンダーへ自動で書き戻す（メインカレンダーのみ）。
// 「日付ごとの {時間帯: eventId} マップ」を端末に持ち、同じ時間帯の再保存では
// イベントを新規作成せず既存イベントを更新する（編集のたびに重複しないように）。
// カレンダー未連携・書き込み権限が未許可（再連携前）の場合は静かに何もしない。
// 記録の保存自体はGAS側で完了済みなので、ここで失敗しても記録には影響しない
const CAL_EVT_LS = "jiroku_cal_evt_";
// 実際にやったこと（JIROKUが書き込む/更新する予定）は色を統一し、予定していただけの
// 予定と見分けられるようにする（8 = Graphite、目立たない灰色。✅マークで判別できるため
// 色自体は主張しすぎないものにする）
const JIROKU_RECORD_COLOR_ID = "8";
// 通信エラーやトークンの一時的な失効で書き込みに失敗すると、以前は何の痕跡も残らず
// 静かに諦めていたため、原因が特定できなかった。1回だけ再試行し、それでも失敗したら
// コンソールにログを残す（ユーザー体験は変えず、次に同じ問題が起きた時に調査できるように）
async function upsertCalendarEvent(dateStr, key, startISO, endISO, title, exactOriginalEventId, isRetry){
  try{
    if(!localStorage.getItem("cal_linked") || !title) return;
    const token = await getCalendarToken(false);
    if(!token) {
      if(!isRetry) console.warn("[JIROKU calendar] token取得失敗、1秒後に再試行", {dateStr, key, title});
      if(!isRetry) return setTimeout(()=>upsertCalendarEvent(dateStr, key, startISO, endISO, title, exactOriginalEventId, true), 1000);
      console.error("[JIROKU calendar] token取得に再試行しても失敗", {dateStr, key, title});
      return;
    }
    let map = {};
    try{ map = JSON.parse(localStorage.getItem(CAL_EVT_LS+dateStr)||"{}"); }catch{}
    const base = "https://www.googleapis.com/calendar/v3/calendars/primary/events";
    const headers = { Authorization:"Bearer "+token, "Content-Type":"application/json" };
    // 色分け(colorId)はGoogleカレンダーの表示上あまり目立たず、見分けがつきにくいという
    // フィードバックがあったため、タイトル自体に「✅ 」を付けて、どの画面・端末でも
    // 文字で確実に「実際にやったこと」と分かるようにする（色は補助的な扱いにする）
    const recordTitle = "✔️ " + title;
    // extendedProperties.private.jirokuRecordで「JIROKUの記録から書き込んだ/更新した予定」と
    // 印を付けておく。カレンダー上は普通の予定として見えるが、アプリ側の「今日の予定」
    // 表示や自動入力では、既に完了したことをまた"予定"として出さないようこの印で除外する
    const body = JSON.stringify({ summary: recordTitle, start:{ dateTime:startISO }, end:{ dateTime:endISO },
      colorId: JIROKU_RECORD_COLOR_ID, extendedProperties:{ private:{ jirokuRecord:"1" } } });

    // 元の予定と記録内容のタイトルが文字通り完全一致する場合だけ、新規に別イベントを
    // 作らずその予定へ✅マークを追加する（内容が同じなので上書きしても情報は失われない）。
    // 一致しない場合にここで上書きすると、元の予定の文言が消えてしまうため、
    // 完全一致以外は必ず別イベントとして作成・更新する
    const alreadyClaimed = Object.values(map).includes(exactOriginalEventId);
    if(exactOriginalEventId && !map[key] && !alreadyClaimed){
      const titleOnlyBody = JSON.stringify({ summary: recordTitle,
        colorId: JIROKU_RECORD_COLOR_ID, extendedProperties:{ private:{ jirokuRecord:"1" } } });
      const r0 = await fetch(base+"/"+encodeURIComponent(exactOriginalEventId), { method:"PATCH", headers, body:titleOnlyBody });
      if(r0.ok){
        map[key] = exactOriginalEventId;
        try{ localStorage.setItem(CAL_EVT_LS+dateStr, JSON.stringify(map)); }catch{}
        return;
      }
      // 更新に失敗した場合は下の通常フローで新規作成にフォールバックする
    }

    if(map[key]){
      const r = await fetch(base+"/"+encodeURIComponent(map[key]), { method:"PATCH", headers, body });
      if(r.ok) return;
      // カレンダー側で手動削除されていた場合(404/410)だけ作り直す。それ以外の失敗は
      // 一時的な通信エラーの可能性があるため、1回だけ再試行してから諦める
      if(r.status!==404 && r.status!==410){
        if(!isRetry){
          console.warn("[JIROKU calendar] 更新失敗、1秒後に再試行", {dateStr, key, title, status:r.status});
          setTimeout(()=>upsertCalendarEvent(dateStr, key, startISO, endISO, title, exactOriginalEventId, true), 1000);
        } else {
          console.error("[JIROKU calendar] 更新に再試行しても失敗", {dateStr, key, title, status:r.status});
        }
        return;
      }
    }
    const r2 = await fetch(base, { method:"POST", headers, body });
    if(r2.ok){
      const ev = await r2.json();
      map[key] = ev.id;
      try{ localStorage.setItem(CAL_EVT_LS+dateStr, JSON.stringify(map)); }catch{}
    } else if(!isRetry){
      console.warn("[JIROKU calendar] 新規作成失敗、1秒後に再試行", {dateStr, key, title, status:r2.status});
      setTimeout(()=>upsertCalendarEvent(dateStr, key, startISO, endISO, title, exactOriginalEventId, true), 1000);
    } else {
      console.error("[JIROKU calendar] 新規作成に再試行しても失敗", {dateStr, key, title, status:r2.status});
    }
  }catch(e){
    if(!isRetry){
      console.warn("[JIROKU calendar] 書き込み中に例外、1秒後に再試行", {dateStr, key, title, error:String(e)});
      setTimeout(()=>upsertCalendarEvent(dateStr, key, startISO, endISO, title, exactOriginalEventId, true), 1000);
    } else {
      console.error("[JIROKU calendar] 再試行しても例外", {dateStr, key, title, error:String(e)});
    }
  }
}
// 取得戦略: メモリ → 端末キャッシュ → 本人認証で取得 → サーバーの共有キャッシュ
// 一度どこかで取得できれば端末とサーバーの両方に残るので、以後は認証なしで自動表示される。
// ホーム・記録・日記など複数画面が同時にマウントされており、同じ日付を
// ほぼ同時に呼び出すと、Googleへのサイレント認証リクエストが競合して
// 片方が失敗することがあったため、同じ日付の取得は1つの実行を共有する
async function fetchCalendarEvents(dateStr, interactive=false){
  if(gcalFresh(dateStr)) return gcalCache[dateStr];
  // interactive(ボタン手動タップ)はユーザー操作なので毎回必ず新規実行し、
  // 裏で動いているサイレント取得の使い回しはしない
  if(!interactive && gcalInFlight[dateStr]) return gcalInFlight[dateStr];
  const p=fetchCalendarEventsUncached(dateStr, interactive);
  if(!interactive) gcalInFlight[dateStr]=p;
  try{ return await p; } finally { if(!interactive) delete gcalInFlight[dateStr]; }
}
async function fetchCalendarEventsUncached(dateStr, interactive=false){
  if(gcalFresh(dateStr)) return gcalCache[dateStr];
  if(!interactive){
    try{
      const ls=localStorage.getItem(GCAL_LS+dateStr);
      if(ls){
        const parsed=JSON.parse(ls);
        // 新形式{t,evs}と旧形式（配列そのまま）の両方を受け付ける
        const evs=Array.isArray(parsed)?parsed:parsed.evs;
        const t=Array.isArray(parsed)?0:(parsed.t||0);
        if(evs && (Date.now()-t) < GCAL_TTL_MS){
          gcalCache[dateStr]=evs; gcalCacheAt[dateStr]=t; gcalSynced[dateStr]=1;
          return evs;
        }
        // 期限切れでも下の再取得が失敗した時のフォールバックとしてメモリには入れておく
        if(evs){ gcalCache[dateStr]=evs; gcalCacheAt[dateStr]=0; }
      }
    }catch{}
  }
  const token=await getCalendarToken(interactive);
  if(token){
    try{
      const timeMin=new Date(dateStr+"T00:00:00").toISOString();
      const timeMax=new Date(dateStr+"T23:59:59").toISOString();
      // 連携するカレンダーは複数選択できる（仕事用＋プライベート用など）。
      // 未設定ならメインカレンダー（primary）のみ
      const calIds=JSON.parse(localStorage.getItem("jiroku_cal_ids")||'["primary"]');
      const responses=await Promise.all(calIds.map(id=>
        fetch("https://www.googleapis.com/calendar/v3/calendars/"+encodeURIComponent(id)+"/events?singleEvents=true&orderBy=startTime&maxResults=50&timeMin="+encodeURIComponent(timeMin)+"&timeMax="+encodeURIComponent(timeMax),
          {headers:{Authorization:"Bearer "+token}}).then(r=>r.json()).catch(()=>null)
      ));
      const items=[];
      responses.forEach(r=>{ if(r&&r.items) items.push(...r.items); });
      if(responses.some(r=>r&&r.items)){
        // JIROKUの記録から自動で書き込んだ予定は、既に完了したことなので
        // 「今日の予定」表示・記録の自動入力からは除外する。判定は3段構え：
        // (1) jirokuRecordの印付き (2) この端末が書き込んだイベントID
        // (3) タイトルが✅/✔️始まり（印が付く前に作られた古い記録や他端末分の保険。
        // マークを✅→✔️に変更した経緯があるため両方を見る）
        let jirokuIds = {};
        try{ jirokuIds = JSON.parse(localStorage.getItem(CAL_EVT_LS+dateStr)||"{}"); }catch{}
        const jirokuIdSet = new Set(Object.values(jirokuIds));
        const evs=items.filter(e=>{
          const summary = String(e.summary||"");
          return e.status!=="cancelled" &&
            !e.extendedProperties?.private?.jirokuRecord &&
            !jirokuIdSet.has(e.id) &&
            !summary.startsWith("✅") && !summary.startsWith("✔️");
        }).map(e=>{
          const s=e.start?.dateTime?new Date(e.start.dateTime):null;
          const en=e.end?.dateTime?new Date(e.end.dateTime):null;
          return {
            id:e.id, title:e.summary||"(無題)", allDay:!s,
            startHour:s?s.getHours()+s.getMinutes()/60:null,
            endHour:en?en.getHours()+en.getMinutes()/60:null,
            time:s?s.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}):"終日",
            sub:e.location||(e.hangoutLink?"Zoom/Meet":"")
          };
        }).sort((a,b)=>(a.startHour??-1)-(b.startHour??-1));
        gcalCache[dateStr]=evs; gcalCacheAt[dateStr]=Date.now();
        try{ localStorage.setItem(GCAL_LS+dateStr, JSON.stringify({t:Date.now(),evs})); cleanupGcalLS(); }catch{}
        // サーバーへ同期（コーチのプロンプト用＆次回起動・他端末のフォールバック）
        if(CURRENT_USER && !gcalSynced[dateStr]){
          gcalSynced[dateStr]=1;
          try{ fetch(GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},
            body:JSON.stringify({action:"syncCalendar",studentEmail:CURRENT_USER.email,date:dateStr,events:JSON.stringify(evs).slice(0,6000)})}); }catch{}
        }
        return evs;
      }
    }catch{}
  }
  // 認証できない場合はサーバーの共有キャッシュから復元
  try{
    const r=await gasApi("getCalendar",{date:dateStr});
    if(r.ok && r.data){
      gcalCache[dateStr]=r.data; gcalCacheAt[dateStr]=Date.now(); gcalSynced[dateStr]=1;
      try{ localStorage.setItem(GCAL_LS+dateStr, JSON.stringify({t:Date.now(),evs:r.data})); }catch{}
      return r.data;
    }
  }catch{}
  // 再取得に失敗した場合は、期限切れでも手元にあるキャッシュを返す（何も出ないよりまし）
  return gcalCache[dateStr]||null;
}
// 時間ブロック（例 "10:00-11:00"）に重なる予定タイトル一覧
function eventsForBlock(evs, block){
  if(!evs) return [];
  const h=parseInt(block);
  return evs.filter(e=>!e.allDay && e.startHour!==null && e.startHour<h+1 && e.endHour>h).map(e=>e.title);
}
// 記録した内容が、その時間帯にあった予定のタイトルと文字通り完全一致する場合だけ、
// 別イベントを作らずその予定に✅マークを追加する（内容が違う場合に上書きして
// 消してしまわないよう、完全一致の時だけの限定的な救済措置）
function exactEventForBlock(evs, block, taskText){
  if(!evs) return null;
  const h=parseInt(block);
  const matches=evs.filter(e=>!e.allDay && e.startHour!==null && e.startHour<h+1 && e.endHour>h && e.id && e.title===taskText);
  return matches.length===1 ? matches[0] : null;
}

function HomeScreen({goalData, onGoalSaved, profile, isActive, showInCommunity, onGoTimer}) {
  const [report, setReport] = useState(null);
  const [schedule, setSchedule] = useState([]);
  const [game, setGame] = useState(null);
  const [ranking, setRanking] = useState(null);
  const [showCommunity, setShowCommunity] = useState(false);
  const [statusSummary, setStatusSummary] = useState(null);
  const [showStatusTip, setShowStatusTip] = useState(false);
  const [todayLogs, setTodayLogs] = useState([]);
  const [checked, setChecked] = useState(()=>JSON.parse(localStorage.getItem("today_actions")||"{}"));
  const todayKey = formatDateStr(new Date());
  const [customActions, setCustomActions] = useState(()=>{
    const s=localStorage.getItem("jiroku_custom_actions_"+formatDateStr(new Date()));
    return s ? JSON.parse(s) : null; // null = use AI actions
  });
  const [editMode, setEditMode] = useState(false);
  const [editItems, setEditItems] = useState([]);
  // 今日いちばんやりたいこと（朝の宣言）。その日の最初の起動でモーダルを出し、
  // 宣言した内容をホームに固定表示して、夜のレポートで達成状況をフォローする
  const [intent, setIntent] = useState(()=>{
    try { const s=JSON.parse(localStorage.getItem("jiroku_intent")||"null"); return s&&s.date===formatDateStr(new Date())?s:null; } catch(e){ return null; }
  });
  const [showIntentModal, setShowIntentModal] = useState(false);
  const [intentInput, setIntentInput] = useState("");
  const [intentHours, setIntentHours] = useState(()=>getDailyGoalHours()); // 宣言時に使う時間目標（初期値=1日の目標時間）
  const [intentSaving, setIntentSaving] = useState(false);
  const saveIntent = async () => {
    const text = intentInput.trim();
    if(!text) return;
    setIntentSaving(true);
    const next = {date:formatDateStr(new Date()), intent:text, done:false, hours:intentHours};
    localStorage.setItem("jiroku_intent", JSON.stringify(next));
    setIntent(next); setShowIntentModal(false); setIntentSaving(false);
    gasPostJson("saveIntent", {intent:text, hours:String(intentHours)});
  };
  const skipIntent = () => {
    localStorage.setItem("jiroku_intent_skip", formatDateStr(new Date()));
    setShowIntentModal(false);
  };
  // 達成⇄未達成のトグル（間違えて押しても、もう一度タップで戻せる）
  const toggleIntentDone = () => {
    if(!intent) return;
    const next = {...intent, done:!intent.done};
    localStorage.setItem("jiroku_intent", JSON.stringify(next));
    setIntent(next);
    gasPostJson("saveIntent", {intent_done: next.done ? "true" : "false"});
  };
  // 週次ふりかえり（月曜に今週のまとめが出たら、ホームで振り返り＋来週の一言を記入）
  const [weekly, setWeekly] = useState(null);
  const [weekReflection, setWeekReflection] = useState("");
  const [weekIntention, setWeekIntention] = useState("");
  const [weekSaving, setWeekSaving] = useState(false);
  const [weekDismissed, setWeekDismissed] = useState(false);
  const saveWeekly = async () => {
    if(!weekly) return;
    setWeekSaving(true);
    const r = await gasPostJson("saveWeeklyReflection", {week_start:weekly.weekStart, reflection:weekReflection.trim(), intention:weekIntention.trim()});
    setWeekSaving(false);
    if(r.ok){ setWeekly({...weekly, reflected:true, reflection:weekReflection.trim(), nextIntention:weekIntention.trim()}); }
  };
  const [showGoalTimeEdit, setShowGoalTimeEdit] = useState(false);
  const [dailyGoalHours, setDailyGoalHours] = useState(getDailyGoalHours);
  // 0.5〜6時間までは選択肢を並べるだけで済んだが、12時間まで広げると
  // 0.5刻みで24個にもなり選びにくいため、+/-で刻むステッパー形式にする
  const [pendingGoalHours, setPendingGoalHours] = useState(dailyGoalHours);
  const onEditDailyGoal = () => { setPendingGoalHours(dailyGoalHours); setShowGoalTimeEdit(true); };
  const pickDailyGoal = (h) => {
    localStorage.setItem("jiroku_daily_goal_hours", String(h));
    setDailyGoalHours(h);
    setShowGoalTimeEdit(false);
  };
  useEffect(()=>{
    if(!isActive) return;
    // キャッシュで即時表示
    const cachedGame = localStorage.getItem("cache_gameStatus");
    const cachedReport = localStorage.getItem("cache_report");
    const cachedRanking = localStorage.getItem("cache_ranking");
    const cachedStatus = localStorage.getItem("cache_status");
    if(cachedGame) { try { const g=JSON.parse(cachedGame); setGame(g); if(g.goals?.length) onGoalSaved(g.goals); } catch(e){} }
    if(cachedReport) { try { setReport(JSON.parse(cachedReport)); } catch(e){} }
    if(cachedRanking) { try { setRanking(JSON.parse(cachedRanking)); } catch(e){} }
    if(cachedStatus) { try { setStatusSummary(JSON.parse(cachedStatus)); } catch(e){} }

    // 週次ふりかえり: 今週のまとめが出ていて未記入なら、ホームに記入カードを出す
    gasApi("getWeeklySummary").then(r=>{
      if(r.ok && r.data){
        setWeekly(r.data);
        if(r.data.reflection) setWeekReflection(r.data.reflection);
        if(r.data.nextIntention) setWeekIntention(r.data.nextIntention);
      }
    });

    // 並列フェッチ
    Promise.all([
      gasApi("getReport"),
      gasApi("getGameStatus"),
      gasApi("getSchedule"),
      gasApi("getLogs"),
      gasApi("getRanking"),
      gasApi("getStatusSummary"),
    ]).then(([rep, game, sched, logs, rank, status])=>{
      if(rep.ok){ setReport(rep.data); localStorage.setItem("cache_report", JSON.stringify(rep.data)); }
      if(game.ok){
        setGame(game.data);
        localStorage.setItem("cache_gameStatus", JSON.stringify(game.data));
        if(game.data.goals?.length){ localStorage.setItem("jiroku_goals",JSON.stringify(game.data.goals)); onGoalSaved(game.data.goals); }
      }
      if(sched.ok) setSchedule(sched.data);
      if(logs.ok) setTodayLogs(logs.data);
      if(rank.ok){
        // 順位変動（trend）はサーバー側で「前回のランキング開催日の順位」と比較して
        // 算出される。以前は端末内で前回閲覧時と比較していたため、ホームを開くたびに
        // 基準が上書きされて常に「変わらず」になる不具合があった
        setRanking(rank.data);
        localStorage.setItem("cache_ranking", JSON.stringify(rank.data));
      }
      if(status.ok && status.data){ setStatusSummary(status.data); localStorage.setItem("cache_status", JSON.stringify(status.data)); }
    });

    // カレンダー連携済みなら本人権限で直接取得（GAS経由はスクリプト所有者しか読めないためのフォールバック）
    if(localStorage.getItem("cal_linked")){
      fetchCalendarEvents(formatDateStr(new Date())).then(evs=>{
        if(evs&&evs.length) setSchedule(evs.map(e=>({time:e.time,title:e.title,sub:e.sub})));
      });
      // 明日の予定もサーバーに同期しておく（夜のレポート・朝のメッセージが「明日は〜」を
      // 実際の予定に基づいて正しく言えるようにするため。fetchはsyncCalendarで裏で保存される）
      fetchCalendarEvents(addDays(formatDateStr(new Date()),1)).catch(()=>{});
    }

    // 日付が変わったらチェック状態リセット
    const today = formatDateStr(new Date());
    const saved = localStorage.getItem("today_actions_date");
    if(saved !== today){ localStorage.removeItem("today_actions"); localStorage.setItem("today_actions_date", today); setChecked({}); }

    // 今日のアクションの端末間同期: 別端末で編集したチェックリスト・チェック状態を取り込む。
    // この端末で今日まだ編集していなければサーバー側を採用し、チェックは両端末の和集合にする
    gasApi("getTodayActions").then(r=>{
      if(!r.ok || !r.data) return;
      if(r.data.actions !== null && localStorage.getItem("jiroku_custom_actions_"+today) === null){
        setCustomActions(r.data.actions);
        localStorage.setItem("jiroku_custom_actions_"+today, JSON.stringify(r.data.actions));
      }
      if(r.data.checked && Object.keys(r.data.checked).length > 0){
        setChecked(prev=>{
          const merged = {...r.data.checked, ...prev};
          localStorage.setItem("today_actions", JSON.stringify(merged));
          return merged;
        });
      }
    });

    // 今日いちばんやりたいこと: まだ宣言も「あとで」もしていなければ、その日の
    // 最初の起動時にモーダルで聞く（別端末で宣言済みならサーバーから同期）
    try {
      const localIntent = JSON.parse(localStorage.getItem("jiroku_intent")||"null");
      const hasToday = localIntent && localIntent.date === today;
      const skipped = localStorage.getItem("jiroku_intent_skip") === today;
      // まずローカルにあれば即表示（体感速度のため）
      if(hasToday){ setIntent(localIntent); }
      // 端末をまたいで必ず同期する。別端末（PC/携帯）で宣言・達成した内容を、
      // この端末でスキップ済みでも取りこぼさないよう、毎回サーバーを正として取り込む
      gasApi("getIntent").then(r=>{
        if(r.ok && r.data && r.data.intent){
          const next = {date:today, intent:r.data.intent, done:r.data.done, hours:r.data.hours};
          localStorage.setItem("jiroku_intent", JSON.stringify(next));
          setIntent(next);
        } else if(!hasToday && !skipped){
          // まだどの端末でも宣言していない時だけモーダルで聞く。
          // 朝6時〜18時の間だけ自動表示（深夜に出てスキップされ朝に出ない取りこぼし防止）
          const h = new Date().getHours();
          if(h >= 6 && h < 18) setShowIntentModal(true);
        }
      });
    } catch(e){}
  },[isActive]);

  const goalsArr = Array.isArray(goalData) ? goalData : (goalData?.goal ? [goalData] : []);
  const mainGoal = goalsArr[0] || null;
  const daysLeft = mainGoal?.deadline
    ? Math.ceil((new Date(mainGoal.deadline) - new Date()) / 86400000)
    : null;

  // actionテキストを行に分割（カスタムがあればそちらを優先）。
  // GAS側でアクションは「1件=1行」の改行区切りとして保存されるため、
  // 分割は改行のみで行う。「・」や「。」で分割すると「企画・撮影・編集」の
  // ような複合語や説明文の途中で1つのタスクが千切れてしまう
  const aiItems = report?.action
    ? report.action.split(/\n+/).map(s=>s.trim().replace(/^[・\-\s]+/,"").replace(/。$/,"")).filter(s=>s.length>2)
    : [];
  const actionItems = customActions !== null ? customActions : aiItems;

// ランキングは全員載せると長くなり見づらいため上位のみに絞る。
// ただし自分の順位は気になるはずなので、上位圏外なら自分の行だけ「…」区切りで下に添える
const RANKING_TOP_N = 5;
function trimRanking(list) {
  if (!list || list.length <= RANKING_TOP_N) return { top: list||[], me: null, meRank: 0 };
  const top = list.slice(0, RANKING_TOP_N);
  const meIdx = list.findIndex(u => u.isMe);
  if (meIdx === -1 || meIdx < RANKING_TOP_N) return { top, me: null, meRank: 0 };
  return { top, me: list[meIdx], meRank: meIdx+1 };
}

  const goalRelatedDefault = () => localStorage.getItem("jiroku_log_goal_related") === "true";
  const [goalRelated, setGoalRelated] = useState(goalRelatedDefault);

  // カレンダー予定の自動入力。端末キャッシュ→本人認証→サーバー共有
  // キャッシュの順にまず自動で試すが、Safari等でサードパーティCookieが
  // ブロックされていると裏側の認証自体が失敗し続けることがあるため、
  // 自動取得できなかった場合だけ手動で読み込むボタンを出す
  const [dayEvents, setDayEvents] = useState(null);
  const [calNeedsTap, setCalNeedsTap] = useState(false);
  const autoFillRef = useRef("");
  useEffect(()=>{
    if(!isActive) return;
    setCalNeedsTap(false);
    fetchCalendarEvents(date).then(evs=>{
      if(evs) setDayEvents(evs);
      else setCalNeedsTap(true);
    });
  },[date, isActive]);
  const loadCalByTap=()=>{
    fetchCalendarEvents(date, true).then(evs=>{
      if(evs){ setDayEvents(evs); setCalNeedsTap(false); onToast("予定を読み込みました"); }
      else onToast("予定の読み込みに失敗しました");
    });
  };
  // 未記録ブロックを選んだとき、入力が空なら予定タイトルを自動セット
  useEffect(()=>{
    if(!dayEvents) return;
    if(logs.find(l=>l.time_block===block)) return;
    const titles=eventsForBlock(dayEvents, block);
    if(titles.length===0){
      if(task===autoFillRef.current && task!=="") { setTask(""); autoFillRef.current=""; }
      return;
    }
    const suggestion=titles.join("、");
    if(task==="" || task===autoFillRef.current){ setTask(suggestion); autoFillRef.current=suggestion; }
  },[block, dayEvents, logs]);

  // ブロック切替時に既存ログを読み込んでフォームに反映。
  // lastLoadedRefには「フォームに最後に流し込んだ値」を控えておき、
  // 裏で取得した最新データを反映してよいか（=ユーザーが編集を始めて
  // いないか）の判定に使う
  const lastLoadedRef = useRef({task:"",focus:"",memo:"",goalRelated:false});
  // 保存ボタンを押す前に他のタブに切り替えて戻ってきても、入力途中の内容が
  // 消えないよう、時間帯ごとに下書きをlocalStorageへ自動保存しておく
  const DRAFT_LS = "jiroku_log_draft_";
  const draftKey = (d, b) => DRAFT_LS + d + "_" + b;
  const loadBlockData = (b, currentLogs) => {
    const existing = currentLogs.find(l => l.time_block === b);
    let v;
    if (existing) {
      v = {task:existing.task||"", focus:existing.focus_level||"", memo:existing.memo||"", goalRelated:existing.goal_related==="true"||existing.goal_related===true};
    } else {
      let draft = null;
      try{ draft = JSON.parse(localStorage.getItem(draftKey(date, b))||"null"); }catch(e){}
      v = draft || {task:"", focus:"", memo:"", goalRelated:goalRelatedDefault()};
    }
    setTask(v.task); setFocus(v.focus); setMemo(v.memo); setGoalRelated(v.goalRelated);
    lastLoadedRef.current = v;
  };

  const handleBlockSelect = (b) => {
    setBlock(b);
    loadBlockData(b, logs);
  };

  // チップタップ: 通常は選択切り替え。まとめて記録モード中は追加選択のON/OFF
  const handleChipTap = (b) => {
    if(!multiMode){ handleBlockSelect(b); return; }
    if(b===block) return; // 基準ブロックは外せない
    setExtraBlocks(prev => prev.includes(b) ? prev.filter(x=>x!==b) : [...prev, b]);
  };
  const toggleMultiMode = () => {
    setMultiMode(v=>{ if(v) setExtraBlocks([]); return !v; });
  };

  // 現在のフォーム値・選択ブロックを非同期コールバックから読むためのミラー
  const formRef = useRef(null);
  formRef.current = {task, focus, memo, goalRelated};
  const curBlockRef = useRef(block);
  curBlockRef.current = block;

  // 入力するたびに下書きを保存しておく（空なら消す）。保存済みログと同じ内容を
  // 保存し直すだけの場合も無害なので、既存ログかどうかは区別せずそのまま保存する
  useEffect(()=>{
    const k = draftKey(date, block);
    if(!task.trim() && !memo.trim()){ localStorage.removeItem(k); return; }
    try{ localStorage.setItem(k, JSON.stringify({task, focus, memo, goalRelated})); }catch(e){}
  },[task, focus, memo, goalRelated, date, block]);
  // 保存のたびに増やすバージョン番号。背景取得（getLogs）が開始した後に保存が
  // 行われた場合、その取得結果は保存前の古いデータなので適用しない判定に使う
  const saveVersionRef = useRef(0);

  // 記録タブの読み込み: まず端末キャッシュで即座に画面を組み立て（体感ゼロ秒）、
  // 最新データはGASから裏で取得して静かに差し替える。以前はGASの応答
  // （数百ms〜数秒）を待ってから画面を作っていたため遅く感じられていた
  const LOGS_LS="jiroku_logs_";
  useEffect(()=>{
    if(!isActive) return;
    let cached=null;
    try{ cached=JSON.parse(localStorage.getItem(LOGS_LS+date)||"null"); }catch(e){}
    const base = cached||[];
    setLogs(base);
    const def = isToday(date) ? getCurrentBlock() : (base[0]?.time_block || timeBlocks[0]);
    setBlock(def);
    setMultiMode(false); setExtraBlocks([]);
    loadBlockData(def, base);
    setTimeout(()=>{ const el=timeRef.current?.querySelector(".chip.on"); if(el) el.scrollIntoView({inline:"center",behavior:"smooth"}); },100);

    const versionAtFetchStart = saveVersionRef.current;
    gasApi("getLogs",{date}).then(r=>{
      if(!r.ok) return;
      // この取得が始まった後に保存が完了していた場合、この結果は保存前の古い
      // スナップショットなので適用しない（保存直後に「済み」マークやチェックが
      // 一瞬消える競合状態を防ぐ。ローカル側は既に保存内容で最新になっている）
      if(saveVersionRef.current !== versionAtFetchStart) return;
      const data = r.data;
      try{
        localStorage.setItem(LOGS_LS+date, JSON.stringify(data));
        const limit=addDays(formatDateStr(new Date()),-7);
        Object.keys(localStorage).forEach(k=>{
          if(k.startsWith(LOGS_LS)&&k.slice(LOGS_LS.length)<limit) localStorage.removeItem(k);
          if(k.startsWith(DRAFT_LS)&&k.slice(DRAFT_LS.length)<limit) localStorage.removeItem(k);
        });
      }catch(e){}
      setLogs(data);
      // ユーザーがまだ入力を始めていない場合だけ、選択中ブロックのフォームも最新化
      const f=formRef.current, l=lastLoadedRef.current;
      if(f.task===l.task && f.focus===l.focus && f.memo===l.memo && f.goalRelated===l.goalRelated){
        loadBlockData(curBlockRef.current, data);
      }
    });
  },[date, isActive]);

  const save = async ()=>{
    if(!task.trim()) return;
    setSaving(true);
    saveVersionRef.current++;
    // まとめて記録: 選択された全ブロックを1回のリクエストで保存する。
    // メモが長くなるとURLの長さ制限に引っかかる可能性があるため、GETのURL
    // パラメータではなくPOSTのボディで送る（gasPostJson）
    const blocks = [block, ...extraBlocks].sort((a,b)=>a>b?1:-1);
    const payload = {
      date,
      task: task.trim(), focus_level: focus, memo: memo.trim(),
      goal_related: goalRelated ? "true" : "false",
    };
    if(blocks.length>1) payload.time_blocks = blocks.join(",");
    else payload.time_block = block;
    const res = await gasPostJson(blocks.length>1 ? "saveLogMulti" : "saveLog", payload);
    if(!res.ok){ onToast("保存に失敗しました。もう一度お試しください"); setSaving(false); return; }
    if(res.xp_gained){ const lv=res.level_up?`  →  Lv.${res.level} へ！`:""; onToast(`+${res.xp_gained} XP 獲得${lv}`); }
    else onToast(res.updated?"記録を上書きしました":(blocks.length>1?blocks.length+"個の時間帯に保存しました":"保存しました"));
    // 保存内容が分かっているので再取得せず、ローカルの一覧をその場で更新する
    // （サーバーへの往復が倍になり保存が重く感じられるのを防ぐ）
    let next = [...logs];
    blocks.forEach(b=>{
      const saved = {time_block:b, task:task.trim(), focus_level:focus, memo:memo.trim(), goal_related:goalRelated?"true":"false"};
      const i = next.findIndex(l=>l.time_block===b);
      if(i>=0) next[i] = {...next[i], ...saved}; else next.push(saved);
    });
    next.sort((a,b)=>a.time_block>b.time_block?1:-1);
    setLogs(next);
    try{ localStorage.setItem(LOGS_LS+date, JSON.stringify(next)); }catch(e){}
    // 保存できたので、対象ブロック分の下書きは不要になった
    blocks.forEach(b=>{ try{ localStorage.removeItem(draftKey(date, b)); }catch(e){} });
    if(blocks.length>1){ setMultiMode(false); setExtraBlocks([]); }
    setSaving(false);
    // Googleカレンダーへ書き戻し（連携済みのときだけ・待たずに裏で実行）。
    // 元の予定とタイトルが完全一致するブロックだけ、新規作成せずその予定に
    // ✅を追加する（内容が違う場合は別イベントとして作成し、予定の文言を守る）
    const taskTrimmed = task.trim();
    blocks.forEach(b=>{
      const stt = new Date(date+"T"+b.slice(0,5)+":00");
      if(isNaN(stt)) return;
      const exactMatch = exactEventForBlock(dayEvents, b, taskTrimmed);
      upsertCalendarEvent(date, b, stt.toISOString(), new Date(stt.getTime()+3600000).toISOString(), taskTrimmed, exactMatch ? exactMatch.id : null);
    });
  };

  // タイマー記録は分単位の時間帯キー(例: 14:05-14:20)で保存されるため、手動記録の
  // 1時間枠チップ(例: 14:00-15:00)と文字列が一致しない。チップの「済み」表示は、
  // その時間帯の開始時が枠の1時間以内に収まっているログがあれば済みとみなす
  const recordedHours = new Set(logs.map(l => String(l.time_block||"").slice(0,2)).filter(Boolean));
  const recorded = { has: t => recordedHours.has(t.slice(0,2)) };
  // 手動記録は「HH:00-HH:00」の1時間枠、タイマー記録は実測の分単位キーで保存されるため、
  // 同じ1時間の中に複数の記録が混在しうる。選択中のブロックと同じ時間の他の記録を
  // 一覧で見せて、上書きではなく別記録として追加される旨も明示する
  const isFullHourBlock = tb => /^\d{2}:00-\d{2}:00$/.test(String(tb||""));
  const hourSiblingLogs = logs.filter(l => l.time_block!==block && String(l.time_block||"").slice(0,2)===block.slice(0,2));

  return html`<div>
    <div class="ph">
      <div class="ph-title-accent">記録を入力</div>
      <div class="date-nav">
        <button onClick=${()=>setDate(addDays(date,-1))}>‹</button>
        <span>${isToday(date)?"今日":date}</span>
        <button onClick=${()=>setDate(addDays(date,1))} disabled=${isToday(date)}>›</button>
      </div>
    </div>

    <div>
      <div ref=${timeRef} class="time-bar">
        ${timeBlocks.map(t=>html`<button key=${t}
          class=${"chip"+((block===t||extraBlocks.includes(t))?" on":"")+(recorded.has(t)?" done":"")}
          onClick=${()=>handleChipTap(t)}>${t}</button>`)}
      </div>
      <div class="form-wrap">
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,gap:8}}>
          <div style=${{fontSize:12,color:"var(--sub)"}}>
            ${multiMode
              ? `⧉ ${1+extraBlocks.length}個の時間帯を選択中（チップをタップで追加）`
              : !isToday(date) ? "🗓 過去の記録を追加・編集できます（XPは付きません）" : recorded.has(block) ? "✏️ 記録済み（編集できます）" : "📝 未記録"}
          </div>
          <button onClick=${toggleMultiMode}
            style=${{flexShrink:0,padding:"4px 10px",borderRadius:20,border:`1.5px solid ${multiMode?"var(--accent)":"var(--border)"}`,background:multiMode?"var(--accent)":"transparent",color:multiMode?"#fff":"var(--sub)",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
            ${multiMode?"選択をやめる":"⧉ まとめて記録"}
          </button>
        </div>
        ${calNeedsTap&&html`
          <button onClick=${loadCalByTap} style=${{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"10px 14px",marginBottom:12,borderRadius:10,border:"1.5px dashed var(--accent)",background:"var(--accent-l)",color:"var(--accent)",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
            📅 タップしてカレンダーの予定を読み込む
          </button>
        `}
        ${hourSiblingLogs.length>0&&html`
          <div style=${{background:"var(--accent-l)",border:"1px solid var(--accent)",borderRadius:10,padding:"10px 12px",marginBottom:12}}>
            <div style=${{fontSize:12,fontWeight:700,color:"var(--accent)",marginBottom:6}}>⏱ この時間帯には他に${hourSiblingLogs.length}件の記録があります</div>
            ${hourSiblingLogs.map(l=>html`
              <div key=${l.time_block} onClick=${()=>handleBlockSelect(l.time_block)}
                style=${{display:"flex",justifyContent:"space-between",gap:8,padding:"4px 0",cursor:"pointer"}}>
                <span style=${{fontSize:11.5,color:"var(--sub)",flexShrink:0}}>${l.time_block}</span>
                <span style=${{fontSize:11.5,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${l.task}</span>
              </div>
            `)}
            <div style=${{fontSize:10.5,color:"var(--sub)",marginTop:4}}>ここで保存すると上書きではなく別の記録として追加されます</div>
          </div>
        `}
        <div class="form-grp">
          <label class="form-lbl">何をしましたか？</label>
          <input class="inp" placeholder="例：資料作成、家事、勉強など" value=${task} onInput=${e=>setTask(e.target.value)} />
          ${task!==""&&task===autoFillRef.current&&html`
            <div style=${{fontSize:11,color:"var(--accent)",marginTop:5,display:"flex",alignItems:"center",gap:4}}>
              📅 カレンダーの予定から自動入力しました（編集できます）
            </div>
          `}
        </div>
        <div class="form-grp">
          <button onClick=${()=>{const v=!goalRelated;setGoalRelated(v);localStorage.setItem("jiroku_log_goal_related",String(v));}} style=${{display:"flex",alignItems:"center",gap:8,background:"none",border:`1.5px solid ${goalRelated?"var(--accent)":"var(--border)"}`,borderRadius:9,padding:"7px 11px",width:"100%",cursor:"pointer",transition:"all .15s",backgroundColor:goalRelated?"var(--accent-l)":"transparent"}}>
            <div style=${{width:16,height:16,borderRadius:5,border:`2px solid ${goalRelated?"var(--accent)":"var(--border)"}`,background:goalRelated?"var(--accent)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
              ${goalRelated&&html`<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`}
            </div>
            <span style=${{fontSize:12.5,fontWeight:500,color:goalRelated?"var(--accent)":"var(--sub)"}}>この時間は目標に関連している</span>
          </button>
        </div>
        <div class="form-grp">
          <label class="form-lbl">自己評価</label>
          <${EvalPicker} value=${focus} onChange=${setFocus}/>
        </div>
        <div class="form-grp">
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:8}}>
            <label class="form-lbl" style=${{marginBottom:0}}>メモ（必須）</label>
            <span style=${{fontSize:10.5,color:"var(--sub)",whiteSpace:"nowrap"}}>うまくできたか・感じたこと・改善点</span>
          </div>
          <textarea class="txa" style=${{marginTop:6}} placeholder="うまくいった点、感じたこと、次はこうしたい、など" value=${memo} onInput=${e=>setMemo(e.target.value)} />
        </div>
        <button class="btn" onClick=${save} disabled=${!task.trim()||!memo.trim()||saving}>${saving?html`<span class="spin"/>`:recorded.has(block)?"更新する":"保存する"}</button>
      </div>
    </div>

    ${logs.length>0&&html`
      <div class="card" style=${{marginBottom:24}}>
        <div class="card-label">${isToday(date)?"本日の記録":date+" の記録"}</div>
        ${logs.map((l,i)=>{
          const num=l.focus_level?.charAt(0);
          const isTimer = !isFullHourBlock(l.time_block);
          return html`<div key=${i} class="log-row" style=${{cursor:"pointer"}} onClick=${()=>{handleBlockSelect(l.time_block);window.scrollTo?.(0,0);}}>
            <div class="log-time">${isTimer?"⏱ ":""}${l.time_block}</div>
            <div><div class="log-task">${l.task}</div>
            <div class="log-meta"><span class="dot" style=${{background:DOT[num]||"var(--sub)"}}/>${l.focus_level}${l.memo?` · ${l.memo}`:""}</div></div>
          </div>`;
        })}
      </div>
    `}
  </div>`;
}

// ── Report ──
const SCORE_COLOR = s => s >= 80 ? "var(--green)" : s >= 60 ? "var(--amber)" : "var(--red)";

// スコア推移グラフ（直近14日）
function ScoreTrend({list}) {
  if(!list || list.length < 2) return null;
  const pts = [...list].slice(0,14).reverse(); // 古い→新しい
  const W=320, H=96, PX=14, PT=12, PB=20;
  const iw=W-PX*2, ih=H-PT-PB;
  const x=i=>PX+(pts.length===1?iw/2:i*(iw/(pts.length-1)));
  const y=s=>PT+ih-(Math.max(0,Math.min(100,s))/100)*ih;
  const path=pts.map((p,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(p.score).toFixed(1)}`).join(" ");
  const area=`${path} L${x(pts.length-1).toFixed(1)},${PT+ih} L${x(0).toFixed(1)},${PT+ih} Z`;
  const avg=Math.round(pts.reduce((s,p)=>s+p.score,0)/pts.length);
  const diff=pts.length>=2?pts[pts.length-1].score-pts[0].score:0;
  const fmtMD=d=>{const [,m,dd]=(d||"").substring(0,10).split("-");return Number(m)+"/"+Number(dd);};
  return html`
    <div class="card" style=${{marginBottom:8}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
        <div class="card-label" style=${{marginBottom:0}}>レポートスコア推移（直近${pts.length}回）</div>
        <div style=${{fontSize:11,color:"var(--sub)"}}>平均 <b style=${{color:"var(--text)"}}>${avg}</b>点
          <span style=${{marginLeft:8,color:diff>0?"var(--green)":diff<0?"var(--red)":"var(--sub)",fontWeight:600}}>${diff>0?"↑":diff<0?"↓":"→"}${Math.abs(diff)}</span>
        </div>
      </div>
      <svg viewBox=${`0 0 ${W} ${H}`} style=${{width:"100%",height:"auto",display:"block"}}>
        ${[25,50,75].map(g=>html`<line key=${g} x1=${PX} x2=${W-PX} y1=${y(g)} y2=${y(g)} stroke="var(--border)" stroke-width="1" stroke-dasharray="3 4"/>`)}
        <path d=${area} fill="var(--accent)" opacity="0.08"/>
        <path d=${path} fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        ${pts.map((p,i)=>html`<circle key=${i} cx=${x(i)} cy=${y(p.score)} r=${i===pts.length-1?4:2.5} fill=${i===pts.length-1?"var(--accent)":"var(--card)"} stroke="var(--accent)" stroke-width="1.5"/>`)}
        <text x=${x(0)} y=${H-4} font-size="9" fill="var(--sub)" text-anchor="start">${fmtMD(pts[0].date)}</text>
        <text x=${x(pts.length-1)} y=${H-4} font-size="9" fill="var(--sub)" text-anchor="end">${fmtMD(pts[pts.length-1].date)}</text>
      </svg>
    </div>`;
}

// 振り返り（数値化＋事実の整理＋自分の日記）
// この日の数値サマリー（レポートのスコアの直下に置く）
function JournalStats({logs}) {
  const goalBlocks=logs.filter(l=>l.goal_related==="true"||l.goal_related===true).length;
  const goalPct=logs.length?Math.round(goalBlocks/logs.length*100):0;
  const focusNums=logs.map(l=>parseInt(l.focus_level)||0).filter(n=>n>0);
  const avgFocus=focusNums.length?(focusNums.reduce((a,b)=>a+b,0)/focusNums.length).toFixed(1):"−";
  const memoCount=logs.filter(l=>l.memo&&l.memo.trim()).length;
  return html`<div class="card">
    <div class="card-label">この日の数値</div>
    <div style=${{display:"flex",gap:8}}>
      ${[["記録",logs.length+"時間"],["目標関連",goalBlocks+"時間 ("+goalPct+"%)"],["平均集中",avgFocus+" / 5"],["メモ",memoCount+"個"]].map(([l,v])=>html`
        <div key=${l} style=${{flex:1,background:"var(--bg)",borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
          <div style=${{fontSize:13,fontWeight:800,color:"var(--accent)",lineHeight:1.3}}>${v}</div>
          <div style=${{fontSize:10,color:"var(--sub)",marginTop:3}}>${l}</div>
        </div>
      `)}
    </div>
  </div>`;
}

function JournalSection({date, logs}) {
  const [diary,setDiary]=useState("");
  const [autoSummary,setAutoSummary]=useState("");
  const [summaryLoading,setSummaryLoading]=useState(true);
  const [loaded,setLoaded]=useState(false);
  const [saving,setSaving]=useState(false);
  const [savedMsg,setSavedMsg]=useState(false);
  const [events,setEvents]=useState(null);
  useEffect(()=>{
    setDiary(""); setAutoSummary(""); setSummaryLoading(true); setLoaded(false); setEvents(null); setSavedMsg(false);
    gasApi("getDiary",{date}).then(r=>{
      if(r.ok&&r.data){ setDiary(r.data.diary||""); setAutoSummary(r.data.autoSummary||""); }
      setLoaded(true); setSummaryLoading(false);
    });
    if(localStorage.getItem("cal_linked")) fetchCalendarEvents(date).then(setEvents);
  },[date]);
  const save=async()=>{
    setSaving(true);
    try{
      await fetch(GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({action:"saveDiary",studentEmail:CURRENT_USER.email,date,diary})});
      setSavedMsg(true); setTimeout(()=>setSavedMsg(false),2500);
    }catch{}
    setSaving(false);
  };

  // 予定と記録の対比: 予定の時間帯と重なる記録があるか（時間の重なり優先、なければタイトル一致で補完）
  const isDone=(ev)=>{
    if(!ev.allDay && ev.startHour!=null){
      const byTime=logs.some(l=>{ const lh=parseInt(l.time_block); return !isNaN(lh) && lh < ev.endHour && (lh+1) > ev.startHour; });
      if(byTime) return true;
    }
    return logs.some(l=>l.task&&(l.task.includes(ev.title)||ev.title.includes(l.task)));
  };

  return html`<div>
    <!-- この日の数値 -->
    ${logs.length>0&&html`<${JournalStats} logs=${logs}/>`}

    <!-- 時間ログ＋カレンダーをもとにAIが事実だけを整理したまとめ -->
    ${logs.length>0&&html`
      <div class="card">
        <div class="card-label">📋 この日の事実まとめ（AI）</div>
        ${summaryLoading
          ? html`<div style=${{display:"flex",justifyContent:"center",padding:16}}><div class="spin" style=${{borderColor:"var(--border)",borderTopColor:"var(--accent)",width:18,height:18,borderWidth:2}}/></div>`
          : autoSummary
            ? html`<p style=${{fontSize:14,lineHeight:1.8,color:"var(--text)"}}>${autoSummary}</p>`
            : html`<div style=${{fontSize:12,color:"var(--sub)"}}>まとめを生成できませんでした</div>`
        }
      </div>
    `}

    <!-- 自分の日記 -->
    <div class="card">
      <div class="card-label" style=${{display:"flex",alignItems:"center",gap:6}}><${S} n="pencil" s=${12}/>日記</div>
      <textarea class="txa" style=${{minHeight:110}} placeholder="この日を自由に振り返って書き残せます"
        value=${diary} onInput=${e=>setDiary(e.target.value)} disabled=${!loaded}/>
      <button class="btn" onClick=${save} disabled=${saving||!loaded} style=${{marginTop:10}}>
        ${saving?html`<span class="spin"/>`:"日記を保存"}
      </button>
      ${savedMsg&&html`<div style=${{fontSize:12,color:"var(--green)",fontWeight:600,textAlign:"center",marginTop:8}}>保存しました ✓</div>`}
    </div>

    <!-- 予定と実績 -->
    ${events&&events.length>0&&html`
      <div class="card">
        <div class="card-label">予定と実績</div>
        <div style=${{fontSize:11,color:"var(--sub)",marginBottom:10,lineHeight:1.6}}>予定の時間帯に記録があれば「記録あり」になります</div>
        ${events.map((ev,i)=>html`
          <div key=${i} style=${{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<events.length-1?"1px solid var(--border)":"none"}}>
            <div style=${{fontSize:11,fontWeight:600,color:"var(--sub)",minWidth:42,flexShrink:0}}>${ev.time}</div>
            <div style=${{flex:1,fontSize:13,color:"var(--text)"}}>${ev.title}</div>
            <div style=${{fontSize:11,fontWeight:600,flexShrink:0,color:isDone(ev)?"var(--green)":"var(--sub)"}}>${isDone(ev)?"✓ 記録あり":"記録なし"}</div>
          </div>
        `)}
      </div>
    `}

    <!-- 時間ログ -->
    ${logs.length>0&&html`
      <div class="card" style=${{marginBottom:24}}>
        <div class="card-label">時間ログ</div>
        ${logs.map((l,i)=>{
          const num=l.focus_level?.charAt(0);
          return html`<div key=${i} class="log-row">
            <div class="log-time">${l.time_block}</div>
            <div><div class="log-task">${l.task}</div><div class="log-meta"><span class="dot" style=${{background:DOT[num]||"var(--sub)"}}/>${l.focus_level}${l.memo?` · ${l.memo}`:""}</div></div>
          </div>`;
        })}
      </div>
    `}
  </div>`;
}

function BreakdownRadar({breakdown}) {
  const N = BREAKDOWN_CATS.length;
  const cx = 80, cy = 80, maxR = 54, maxVal = 20;
  const startAngle = -Math.PI/2;
  const angleStep = (Math.PI*2)/N;
  const pt = (i, frac, r) => {
    const a = startAngle + i*angleStep;
    return [cx + Math.cos(a)*r*frac, cy + Math.sin(a)*r*frac];
  };
  const ringFracs = [0.25,0.5,0.75,1];
  const ringPoints = ringFracs.map(f => BREAKDOWN_CATS.map((_,i)=>pt(i,f,maxR).join(",")).join(" "));
  const axisEnds = BREAKDOWN_CATS.map((_,i)=>pt(i,1,maxR));
  const dataPoints = BREAKDOWN_CATS.map(([key],i)=>{
    const v = Math.max(0,Math.min(maxVal,Number(breakdown[key]||0)));
    return pt(i, v/maxVal, maxR);
  });
  const dataPolygon = dataPoints.map(p=>p.join(",")).join(" ");
  const labelPos = BREAKDOWN_CATS.map((_,i)=>pt(i,1,maxR*1.27));
  const gid = "radarGrad";

  return html`
    <svg width="160" height="160" viewBox="0 0 160 160" style=${{flexShrink:0}}>
      <defs>
        <linearGradient id=${gid} x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="var(--hero1)"/>
          <stop offset="100%" stop-color="var(--hero2)"/>
        </linearGradient>
      </defs>
      ${ringPoints.map((pts,i)=>html`<polygon key=${i} points=${pts} fill="none" stroke="var(--border)" stroke-width="1"/>`)}
      ${axisEnds.map((p,i)=>html`<line key=${i} x1=${cx} y1=${cy} x2=${p[0]} y2=${p[1]} stroke="var(--border)" stroke-width="1"/>`)}
      <polygon points=${dataPolygon} fill=${`url(#${gid})`} fill-opacity="0.32" stroke=${`url(#${gid})`} stroke-width="2.5" stroke-linejoin="round"/>
      ${dataPoints.map((p,i)=>html`<circle key=${i} cx=${p[0]} cy=${p[1]} r="3" fill="var(--hero1)"/>`)}
      ${BREAKDOWN_CATS.map(([key],i)=>{
        const [lx,ly] = labelPos[i];
        return html`<text key=${key} x=${lx} y=${ly+3} text-anchor="middle" font-size="10" font-weight="400" fill="var(--sub)" opacity="0.6" style=${{fontFamily:"inherit"}}>${BREAKDOWN_LABELS[key].jp}</text>`;
      })}
    </svg>
  `;
}

}

// 目覚まし時計のような「ピピピ」という電子音をWeb Audio APIのオシレーターで
// その場で合成する（録音済みサンプルではなく矩形波のビープ音を鳴らす）。
// 1グループ=短いビープを3回（ピピピ）、グループの間に少し間を空けて繰り返す
const ALARM_STYLES = [
  { key:"soft",     label:"ソフト",     freq:1800, beepMs:110, gapMs:110, groups:2, groupGapMs:450, gain:0.45 },
  { key:"standard", label:"スタンダード", freq:2400, beepMs:120, gapMs:120, groups:2, groupGapMs:450, gain:0.6 },
  { key:"strong",   label:"しっかり",   freq:3000, beepMs:130, gapMs:100, groups:2, groupGapMs:350, gain:0.75 },
];
const getAlarmStyle = () => ALARM_STYLES.find(s=>s.key===localStorage.getItem("timer_alarm_style")) || ALARM_STYLES[1];
let sharedAudioCtx = null;
function getSharedAudioCtx() {
  // iOSはバックグラウンドに回るとAudioContextを勝手にclosedにすることがあるため、
  // その場合は作り直す（closedのcontextはresumeできず、音が一切鳴らなくなる）
  if(!sharedAudioCtx || sharedAudioCtx.state === "closed") sharedAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return sharedAudioCtx;
}
// 音が鳴らせなかった時の保険: クリック音サンプルを連打してアラーム代わりにする
// （HTMLAudioはWeb Audioと復帰条件が異なるため、片方が死んでいても鳴る可能性がある）
let fallbackAlarmEl = null;
function playFallbackAlarm() {
  try {
    if(!fallbackAlarmEl) fallbackAlarmEl = new Audio(TIMER_CLICK_SRC);
    fallbackAlarmEl.volume = 1;
    let n = 0;
    const rep = () => { if(n++>=6) return; fallbackAlarmEl.currentTime = 0; fallbackAlarmEl.play().catch(()=>{}); setTimeout(rep, 250); };
    rep();
  } catch(e){}
}
// 指定スタイルで「ピピピ…」を合成して鳴らす。テスト再生・タイマー完了時の両方から呼ばれる
function scheduleAlarmBeeps(style) {
  const ctx = getSharedAudioCtx();
  // iOSでは電話やバックグラウンド遷移後に"interrupted"や"suspended"のまま戻ってくる。
  // resumeは非同期なので、完了を待ってからオシレーターを組み立てる（suspended中に
  // 組み立てると鳴らないことがある）。0.6秒待っても復帰しなければ保険の音に切り替える
  if(ctx.state !== "running") {
    let done = false;
    const p = ctx.resume && ctx.resume();
    if(p && p.then) {
      p.then(()=>{ if(!done){ done = true; buildAlarmBeeps(ctx, style); } }).catch(()=>{ if(!done){ done = true; playFallbackAlarm(); } });
      setTimeout(()=>{ if(!done){ done = true; playFallbackAlarm(); } }, 600);
      return;
    }
  }
  buildAlarmBeeps(ctx, style);
}
function buildAlarmBeeps(ctx, style) {
  const beepsPerGroup = 3;
  const beepSec = style.beepMs/1000, gapSec = style.gapMs/1000;
  const groupDurSec = beepsPerGroup*(beepSec+gapSec);
  let t = ctx.currentTime;
  for(let g=0; g<style.groups; g++){
    for(let b=0; b<beepsPerGroup; b++){
      const start = t + b*(beepSec+gapSec);
      const osc = ctx.createOscillator();
      osc.type = "square";
      osc.frequency.value = style.freq;
      const gain = ctx.createGain();
      // クリックノイズが出ないよう、立ち上がり・立ち下がりを短くフェードする
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(style.gain, start+0.005);
      gain.gain.setValueAtTime(style.gain, start+beepSec-0.01);
      gain.gain.linearRampToValueAtTime(0, start+beepSec);
      osc.connect(gain).connect(ctx.destination);
      osc.start(start);
      osc.stop(start+beepSec+0.02);
    }
    t += groupDurSec + style.groupGapMs/1000;
  }
}
