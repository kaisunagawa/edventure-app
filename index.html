<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>JIROKU</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="JIROKU" />
  <meta name="theme-color" content="#FAFAF9" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #FAFAF9;
      --card:     #FFFFFF;
      --border:   #EFEFEF;
      --text:     #1A1825;
      --sub:      #A8A4B8;
      --accent:   #7B6FE8;
      --accent-l: #EDE9FF;
      --glow:     rgba(123,111,232,.18);
      --green:    #46C98B;
      --green-l:  #E6F9F1;
      --amber:    #F5A84B;
      --amber-l:  #FEF3E2;
      --red:      #EF7070;
      --red-l:    #FEF0F0;
      --nav-h:    64px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --r:        14px;
    }

    html, body {
      height: 100%; background: var(--bg);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      color: var(--text); -webkit-font-smoothing: antialiased;
    }
    #root { height: 100%; width: 100%; position: relative; background: var(--bg); overflow: hidden; }

    .screen {
      position: absolute; inset: 0;
      bottom: calc(var(--nav-h) + var(--safe-bottom));
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }

    /* ── Nav ── */
    .nav {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + var(--safe-bottom));
      background: rgba(250,250,249,.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex; padding-bottom: var(--safe-bottom);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      border: none; background: none; cursor: pointer;
      color: var(--sub); -webkit-tap-highlight-color: transparent;
      transition: color .2s;
    }
    .nav-btn.on { color: var(--accent); }
    .nav-lbl { font-size: 10px; font-weight: 600; letter-spacing: .2px; }

    /* ── Page header ── */
    .ph {
      padding: 24px 20px 16px; background: var(--bg);
    }
    .ph-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--sub); margin-bottom: 4px; }
    .ph-title { font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -.4px; }
    .ph-title-accent {
      font-size: 24px; font-weight: 800; letter-spacing: -.4px;
      background: linear-gradient(135deg, var(--accent) 0%, #B8A9F5 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .ph-sub { font-size: 13px; color: var(--sub); margin-top: 2px; }
    .ph-label {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--accent-l); color: var(--accent);
      font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
      letter-spacing: .1px; margin-bottom: 8px;
    }
    .ph-label-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

    /* ── Cards ── */
    .card {
      background: var(--card); border-radius: var(--r);
      padding: 18px; margin: 0 16px 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
    }
    .card-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--sub); margin-bottom: 14px;
    }

    /* ── Stat tiles ── */
    .stat-row { display: flex; gap: 10px; margin: 0 16px 12px; }
    .stat-tile {
      flex: 1; background: var(--card); border-radius: 12px;
      padding: 14px 12px; text-align: center;
      box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
    }
    .stat-v { font-size: 26px; font-weight: 800; line-height: 1; color: var(--text); }
    .stat-l { font-size: 10px; color: var(--sub); margin-top: 4px; font-weight: 600; letter-spacing: .3px; }
    .streak-tile { background: linear-gradient(135deg, #FFF8EE, #FFF3E0); }
    .streak-tile .stat-v { color: var(--amber); }
    .level-v {
      background: linear-gradient(135deg, var(--accent), #B8A9F5);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* ── XP bar ── */
    .xp-wrap { margin: 0 16px 16px; }
    .xp-top { display: flex; justify-content: space-between; font-size: 11px; color: var(--sub); font-weight: 600; margin-bottom: 6px; }
    .xp-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .xp-fill {
      height: 6px; border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), #B8A9F5);
      transition: width .7s cubic-bezier(.4,0,.2,1);
    }

    /* ── Badge pills ── */
    .badge-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 16px 14px; }
    .badge-pill {
      font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px;
      background: var(--accent-l); color: var(--accent); letter-spacing: .1px;
    }

    /* ── Score ring ── */
    .ring-wrap { display: flex; align-items: center; gap: 16px; }
    .ring {
      width: 72px; height: 72px; flex-shrink: 0; border-radius: 50%;
      background: conic-gradient(var(--accent) calc(var(--pct)*1%), var(--border) 0);
      display: flex; align-items: center; justify-content: center;
    }
    .ring-inner { width: 56px; height: 56px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .ring-num { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1; }
    .ring-unit { font-size: 9px; color: var(--sub); }

    /* ── Schedule ── */
    .sched-row { display: flex; align-items: flex-start; gap: 14px; padding: 11px 0; border-bottom: 1px solid var(--border); }
    .sched-row:last-child { border-bottom: none; }
    .sched-time { font-size: 11px; font-weight: 700; color: var(--accent); min-width: 40px; padding-top: 1px; }
    .sched-title { font-size: 14px; font-weight: 500; }
    .sched-sub { font-size: 11px; color: var(--sub); margin-top: 2px; }

    /* ── Section header (page inner) ── */
    .sec-head { padding: 18px 20px 8px; }
    .sec-head h2 { font-size: 18px; font-weight: 800; letter-spacing: -.3px; }

    /* ── Time bar ── */
    .time-bar {
      display: flex; gap: 6px; overflow-x: auto; padding: 12px 16px 10px;
      scrollbar-width: none; border-bottom: 1px solid var(--border);
    }
    .time-bar::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 7px 12px; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1.5px solid var(--border); background: var(--card);
      color: var(--sub); transition: all .15s; -webkit-tap-highlight-color: transparent;
      letter-spacing: .1px;
    }
    .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 4px 12px var(--glow); }

    /* ── Form ── */
    .form-wrap { padding: 18px 16px; }
    .form-grp { margin-bottom: 18px; }
    .form-lbl { font-size: 11px; font-weight: 700; color: var(--sub); letter-spacing: .8px; text-transform: uppercase; margin-bottom: 8px; display: block; }
    .inp, .txa {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 15px; font-family: inherit;
      background: var(--card); color: var(--text); outline: none; transition: border-color .15s;
    }
    .inp:focus, .txa:focus { border-color: var(--accent); }
    .txa { resize: none; height: 84px; line-height: 1.6; }

    /* ── Eval buttons ── */
    .eval-btn {
      width: 100%; padding: 12px 14px; margin-bottom: 7px; border-radius: 10px;
      border: 1.5px solid var(--border); background: var(--card);
      font-size: 14px; font-weight: 500; cursor: pointer; text-align: left;
      color: var(--sub); transition: all .15s; font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .eval-btn:last-child { margin-bottom: 0; }
    .e5 { background: var(--green-l); border-color: var(--green); color: #1D6B4A; }
    .e4 { background: var(--accent-l); border-color: var(--accent); color: #4035A8; }
    .e3 { background: var(--amber-l); border-color: var(--amber); color: #914F0A; }
    .e2 { background: var(--red-l); border-color: var(--red); color: #9B2C2C; }
    .e1 { background: var(--red-l); border-color: var(--red); color: #9B2C2C; }

    /* ── Primary button ── */
    .btn {
      width: 100%; padding: 15px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent) 0%, #B8A9F5 100%);
      color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: inherit; letter-spacing: .2px;
      box-shadow: 0 6px 20px var(--glow);
      transition: opacity .15s, transform .1s; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: .88; transform: scale(.98); }
    .btn:disabled { background: var(--border); color: var(--sub); box-shadow: none; cursor: default; }

    /* ── Ghost button ── */
    .btn-g {
      width: 100%; padding: 13px; border-radius: 10px;
      border: 1.5px solid var(--border); background: transparent;
      color: var(--red); font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
      left: 50%; transform: translateX(-50%);
      background: var(--text); color: #fff;
      padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600;
      z-index: 999; white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,.18);
      animation: up .25s ease;
    }
    @keyframes up { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

    /* ── Report ── */
    .report-hero { padding: 28px 20px 20px; text-align: center; background: var(--bg); }
    .report-date { font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--sub); margin-bottom: 10px; }
    .report-score {
      font-size: 80px; font-weight: 900; line-height: 1; letter-spacing: -4px;
      background: linear-gradient(135deg, var(--text) 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .report-pts { font-size: 13px; color: var(--sub); margin-top: 4px; font-weight: 500; }

    /* ── Tag ── */
    .tag { display: inline-block; padding: 3px 9px; border-radius: 6px; font-size: 11px; font-weight: 700; }
    .t-g { background: var(--green-l); color: #1D6B4A; }
    .t-a { background: var(--amber-l); color: #914F0A; }

    /* ── Log rows ── */
    .log-row { display: flex; align-items: flex-start; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); }
    .log-row:last-child { border-bottom: none; }
    .log-time { font-size: 11px; font-weight: 700; color: var(--sub); min-width: 44px; padding-top: 2px; }
    .log-task { font-size: 14px; font-weight: 600; color: var(--text); }
    .log-meta { font-size: 12px; color: var(--sub); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* ── Chat ── */
    .chat-head { padding: 14px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .chat-av { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-l); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: var(--accent); flex-shrink: 0; }
    .chat-name { font-size: 14px; font-weight: 700; }
    .chat-status { font-size: 11px; color: var(--sub); }

    .msgs { padding: 16px; display: flex; flex-direction: column; gap: 10px; min-height: 100%; }
    .bubble { max-width: 74%; padding: 10px 14px; font-size: 14px; line-height: 1.55; word-break: break-word; white-space: pre-wrap; border-radius: 16px; }
    .b-in { background: var(--card); box-shadow: 0 1px 4px rgba(0,0,0,.06); border-bottom-left-radius: 4px; align-self: flex-start; }
    .b-out { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; }
    .btime { font-size: 10px; color: var(--sub); margin-top: 3px; }
    .btime-r { text-align: right; color: rgba(255,255,255,.65); }

    .chat-bar { padding: 10px 14px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; }
    .chat-inp { flex: 1; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; font-family: inherit; outline: none; resize: none; max-height: 100px; line-height: 1.4; background: var(--bg); color: var(--text); }
    .chat-inp:focus { border-color: var(--accent); }
    .send { width: 40px; height: 40px; border-radius: 10px; background: var(--accent); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; box-shadow: 0 4px 12px var(--glow); }
    .send:disabled { background: var(--border); color: var(--sub); box-shadow: none; cursor: default; }

    /* ── Settings ── */
    .s-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .s-row:last-child { border-bottom: none; }
    .s-k { color: var(--sub); font-weight: 500; }
    .s-v { font-weight: 600; color: var(--text); }
    select { width: 100%; padding: 11px 12px; border-radius: 10px; border: 1.5px solid var(--border); font-size: 14px; background: var(--card); color: var(--text); font-family: inherit; outline: none; }
    select:focus { border-color: var(--accent); }

    /* ── Date nav ── */
    .date-nav { display: flex; align-items: center; gap: 14px; margin-top: 6px; }
    .date-nav button { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--sub); padding: 0 4px; line-height: 1; }
    .date-nav button:disabled { color: var(--border); cursor: default; }
    .date-nav span { font-size: 13px; font-weight: 700; color: var(--text); }

    /* ── Spinner ── */
    .spin { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: rot .6s linear infinite; display: inline-block; }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* ── Empty ── */
    .empty { padding: 48px 24px; text-align: center; }
    .empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-body { font-size: 13px; color: var(--sub); line-height: 1.7; }

    /* ── Login ── */
    .login-wrap { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; background: var(--bg); }
    .login-logo { width: 60px; height: 60px; border-radius: 18px; background: linear-gradient(135deg, var(--accent), #B8A9F5); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 8px 28px var(--glow); }
    .login-title { font-size: 28px; font-weight: 900; letter-spacing: -.6px; text-align: center; }
    .login-sub { font-size: 13px; color: var(--sub); text-align: center; margin: 6px 0 36px; }
    .login-box { width: 100%; max-width: 320px; }
    .login-inp { width: 100%; padding: 13px 15px; border-radius: 10px; border: 1.5px solid var(--border); font-size: 15px; background: var(--card); color: var(--text); margin-bottom: 10px; outline: none; font-family: inherit; transition: border-color .15s; }
    .login-inp:focus { border-color: var(--accent); }
    .login-err { font-size: 12px; color: var(--red); margin-bottom: 10px; font-weight: 500; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const GAS_URL = "https://script.google.com/macros/s/AKfycbzJ-QEpPVnmp-LFU5Jxww4VFP1qaseMtwCrzKxAA6ZULr1y3h_UeKzVdhHnl5ze57U/exec";
let CURRENT_USER = JSON.parse(localStorage.getItem("edventure_user") || "null");

async function gasApi(action, params = {}) {
  if (!GAS_URL) return mockApi(action, params);
  const url = new URL(GAS_URL);
  url.searchParams.set("action", action);
  url.searchParams.set("studentEmail", CURRENT_USER.email);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
  try { const r = await fetch(url.toString(), { redirect:"follow" }); return await r.json(); }
  catch { return { ok:true, data:[] }; }
}
async function gasPost(action, body = {}) {
  if (!GAS_URL) return mockPost(action, body);
  const url = new URL(GAS_URL);
  url.searchParams.set("action", action);
  url.searchParams.set("studentEmail", CURRENT_USER.email);
  Object.entries(body).forEach(([k,v]) => { if (v != null) url.searchParams.set(k, String(v)); });
  try { await fetch(url.toString(), { mode:"no-cors" }); } catch {}
  return { ok:true };
}

const MOCK_LOGS = [
  { time_block:"07:00", task:"朝の読書", focus_level:"5 — 完璧にできた", memo:"集中できた" },
  { time_block:"09:00", task:"英語リスニング", focus_level:"3 — まあまあだった", memo:"" },
  { time_block:"11:00", task:"プログラミング", focus_level:"5 — 完璧にできた", memo:"楽しかった" },
];
const MOCK_REPORT = { score:82, feedback:"全体的に集中力が高く、午前中のパフォーマンスが際立っています。", action:"明日はポモドーロ技法を試してみましょう。", highlights:"プログラミングへの高い集中", improvement:"休憩時間の管理" };
const MOCK_MESSAGES = [
  { message_id:"1", content:"今日もよく頑張りました！", sender_name:"コーチ", sender_role:"coach", timestamp:"2026-06-27 09:30" },
  { message_id:"2", content:"ありがとうございます！", sender_name:"生徒", sender_role:"student", timestamp:"2026-06-27 10:15" },
];
const MOCK_SCHEDULE = [
  { time:"09:00", title:"朝のホームルーム", sub:"Zoom" },
  { time:"13:00", title:"英語ディスカッション", sub:"グループ" },
];
let mockMsgs=[...MOCK_MESSAGES], mockLogs=[...MOCK_LOGS];
function mockApi(a){ if(a==="getReport") return Promise.resolve({ok:true,data:MOCK_REPORT}); if(a==="getLogs") return Promise.resolve({ok:true,data:mockLogs}); if(a==="getMessages") return Promise.resolve({ok:true,data:mockMsgs}); if(a==="getSchedule") return Promise.resolve({ok:true,data:MOCK_SCHEDULE}); return Promise.resolve({ok:false}); }
function mockPost(a,b){ if(a==="saveLog"){mockLogs=[...mockLogs,{time_block:b.time_block,task:b.task,focus_level:b.focus_level,memo:b.memo}];return Promise.resolve({ok:true});} if(a==="sendMessage"){mockMsgs=[...mockMsgs,{message_id:String(Date.now()),content:b.content,sender_name:CURRENT_USER.name,sender_role:"student",timestamp:new Date().toLocaleString("ja")}];return Promise.resolve({ok:true});}return Promise.resolve({ok:true});}

const S = (p) => { const s={width:p.s||22,height:p.s||22,fill:"none",stroke:"currentColor",strokeWidth:1.8,strokeLinecap:"round",strokeLinejoin:"round"};
  if(p.n==="home")   return <svg viewBox="0 0 24 24" style={s}><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>;
  if(p.n==="clock")  return <svg viewBox="0 0 24 24" style={s}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>;
  if(p.n==="chart")  return <svg viewBox="0 0 24 24" style={s}><rect x="3" y="12" width="4" height="9"/><rect x="10" y="7" width="4" height="14"/><rect x="17" y="3" width="4" height="18"/></svg>;
  if(p.n==="chat")   return <svg viewBox="0 0 24 24" style={s}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>;

function Toast({msg, onDone}) {
  useEffect(()=>{ const t=setTimeout(onDone,2500); return ()=>clearTimeout(t); },[]);
  return <div className="toast">{msg}</div>;
}
function formatDateStr(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function addDays(s,n){ const d=new Date(s+"T00:00:00"); d.setDate(d.getDate()+n); return formatDateStr(d); }
function isToday(s){ return s===formatDateStr(new Date()); }

function getRank(level) {
  return RANKS.find(r => level >= r.minLv && level <= r.maxLv) || RANKS[0];
}

  const rank = getRank(level);
  return rank.icon(size);
}

// ── Log ──
function LogScreen({onToast}) {
  const nowH = new Date().getHours();
  const defBlock = TIME_BLOCKS.find(t=>parseInt(t)===nowH)||"09:00-10:00";
  const todayStr = formatDateStr(new Date());
  const [date, setDate] = useState(todayStr);
  const [block, setBlock] = useState(defBlock);
  const [task, setTask] = useState("");
  const [focus, setFocus] = useState(EVALS[0].l);
  const [memo, setMemo] = useState("");
  const [saving, setSaving] = useState(false);
  const [logs, setLogs] = useState([]);
  const timeRef = useRef(null);

  useEffect(()=>{
    gasApi("getLogs",{date}).then(r=>r.ok&&setLogs(r.data));
    if(isToday(date)) setTimeout(()=>{ const el=timeRef.current?.querySelector(".chip.on"); if(el) el.scrollIntoView({inline:"center",behavior:"smooth"}); },100);
  },[date]);

  const save = async ()=>{
    if(!task.trim()) return;
    setSaving(true);
    const url=new URL(GAS_URL);
    url.searchParams.set("action","saveLog"); url.searchParams.set("studentEmail",CURRENT_USER.email);
    url.searchParams.set("time_block",block); url.searchParams.set("task",task.trim());
    url.searchParams.set("focus_level",focus); url.searchParams.set("memo",memo.trim());
    const res=await fetch(url).then(r=>r.json()).catch(()=>({}));
    setTask(""); setMemo("");
    if(res.xp_gained){ const lv=res.level_up?`  →  Lv.${res.level} へ！`:""; onToast(`+${res.xp_gained} XP 獲得${lv}`); }
    else onToast("保存しました");
    const r=await gasApi("getLogs",{date}); if(r.ok) setLogs(r.data);
    setSaving(false);
  };

  return (
    <div>
      <div className="ph">
        <div className="ph-label"><span className="ph-label-dot"/>{isToday(date)?"今日の記録":date}</div>
        <div className="ph-title-accent">記録を入力</div>
        <div className="date-nav">
          <button onClick={()=>setDate(addDays(date,-1))}>‹</button>
          <span>{isToday(date)?"今日":date}</span>
          <button onClick={()=>setDate(addDays(date,1))} disabled={isToday(date)}>›</button>
        </div>
      </div>

      {!isToday(date)&&logs.length===0&&<div className="empty"><div className="empty-title">記録なし</div><div className="empty-body">この日の記録はありません</div></div>}

      {isToday(date)&&<>
        <div ref={timeRef} className="time-bar">
          {TIME_BLOCKS.map(t=><button key={t} className={"chip"+(block===t?" on":"")} onClick={()=>setBlock(t)}>{t}</button>)}
        </div>
        <div className="form-wrap">
          <div className="form-grp">
            <label className="form-lbl">何をしましたか？</label>
            <input className="inp" placeholder="例：数学の問題演習" value={task} onChange={e=>setTask(e.target.value)} />
          </div>
          <div className="form-grp">
            <label className="form-lbl">自己評価</label>
            {EVALS.map(f=><button key={f.l} className={"eval-btn"+(focus===f.l?" "+f.c:"")} onClick={()=>setFocus(f.l)}>{f.l}</button>)}
          </div>
          <div className="form-grp">
            <label className="form-lbl">メモ（任意）</label>
            <textarea className="txa" placeholder="気づいたことや振り返り..." value={memo} onChange={e=>setMemo(e.target.value)} />
          </div>
          <button className="btn" onClick={save} disabled={!task.trim()||saving}>{saving?<span className="spin"/>:"保存する"}</button>
        </div>
      </>}

      {logs.length>0&&(
        <div className="card" style={{marginBottom:24}}>
          <div className="card-label">{isToday(date)?"本日の記録":date+" の記録"}</div>
          {logs.map((l,i)=>{
            const num=l.focus_level?.charAt(0);
            return <div key={i} className="log-row">
              <div className="log-time">{l.time_block}</div>
              <div><div className="log-task">{l.task}</div>
              <div className="log-meta"><span className="dot" style={{background:DOT[num]||"var(--sub)"}}/>{l.focus_level}{l.memo?` · ${l.memo}`:""}</div></div>
            </div>;
          })}
        </div>
      )}
    </div>
  );
}

// ── Chat ──
function ChatScreen({onToast}) {
  const [msgs, setMsgs]=useState([]);
  const [input, setInput]=useState("");
  const [sending, setSending]=useState(false);
  const bottomRef=useRef(null);
  const inputRef=useRef(null);
  const compRef=useRef(false);
  const load=useCallback(async()=>{ const r=await gasApi("getMessages"); if(r.ok) setMsgs(r.data); },[]);
  useEffect(()=>{ load(); },[]);
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs]);
  const send=async()=>{
    const content=input.trim(); if(!content||sending) return;
    setSending(true); setInput("");
    const temp={message_id:"t"+Date.now(),content,sender_role:"student",sender_name:CURRENT_USER.name,timestamp:new Date().toLocaleString("ja-JP")};
    setMsgs(p=>[...p,temp]);
    gasPost("sendMessage",{content,sender_role:"student",sender_name:CURRENT_USER.name});
    setSending(false); inputRef.current?.focus(); setTimeout(load,3000);
  };
  const onKey=e=>{ if(e.key==="Enter"&&!e.shiftKey&&!compRef.current){e.preventDefault();send();} };
  const fmtT=ts=>{ try{const d=new Date(ts.replace(" ","T"));return isNaN(d)?ts:d.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});}catch{return ts;} };
  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div className="chat-head">
        <div className="chat-av">{(CURRENT_USER.coachName||"?").charAt(0)}</div>
        <div><div className="chat-name">{CURRENT_USER.coachName}</div><div className="chat-status">コーチ</div></div>
      </div>
      <div className="msgs" style={{flex:1,overflowY:"auto"}}>
        {msgs.length===0&&<div style={{textAlign:"center",color:"var(--sub)",fontSize:13,marginTop:40}}>メッセージはまだありません</div>}
        {msgs.map(m=>{
          const me=m.sender_role==="student";
          return <div key={m.message_id} style={{alignSelf:me?"flex-end":"flex-start",maxWidth:"75%",display:"flex",flexDirection:"column",alignItems:me?"flex-end":"flex-start"}}>
            {!me&&<div style={{fontSize:11,color:"var(--sub)",marginBottom:3,paddingLeft:2}}>{m.sender_name}</div>}
            <div className={"bubble "+(me?"b-out":"b-in")}>{m.content}</div>
            <div className={"btime"+(me?" btime-r":"")}>{fmtT(m.timestamp)}</div>
          </div>;
        })}
        <div ref={bottomRef}/>
      </div>
      <div className="chat-bar">
        <textarea ref={inputRef} className="chat-inp" placeholder="メッセージを入力..." rows={1} value={input}
          onChange={e=>setInput(e.target.value)}
          onCompositionStart={()=>{compRef.current=true;}}
          onCompositionEnd={()=>{compRef.current=false;}}
          onKeyDown={onKey}/>
        <button className="send" onClick={send} disabled={!input.trim()||sending}>
          {sending?<span className="spin" style={{width:14,height:14,borderWidth:2}}/>:<S n="up" s={17}/>}
        </button>
      </div>
    </div>
  );
}

// ── Settings ──
function SettingsScreen({onToast,onLogout,onGoalSaved}) {
  const saved=JSON.parse(localStorage.getItem("notifySettings")||'{"start":7,"end":23}');
  const savedGoal=JSON.parse(localStorage.getItem("jiroku_goal")||'{"goal":"","deadline":""}');
  const [start,setStart]=useState(saved.start);
  const [end,setEnd]=useState(saved.end);
  const [goal,setGoal]=useState(savedGoal.goal);
  const [deadline,setDeadline]=useState(savedGoal.deadline);
  const hours=Array.from({length:24},(_,i)=>i);

  const saveNotify=()=>{
    localStorage.setItem("notifySettings",JSON.stringify({start,end}));
    gasPost("saveSettings",{notify_start:start,notify_end:end});
    onToast("通知設定を保存しました");
  };
  const saveGoal=()=>{
    if(!goal.trim()){onToast("目標を入力してください");return;}
    localStorage.setItem("jiroku_goal",JSON.stringify({goal:goal.trim(),deadline}));
    gasPost("saveSettings",{goal:goal.trim(),goal_deadline:deadline});
    onGoalSaved({goal:goal.trim(),deadline});
    onToast("目標を保存しました");
  };

  const RANK_RULES=[
    {rank:"芽吹き",lv:"Lv.1",color:"#52C987"},
    {rank:"成長",lv:"Lv.2–3",color:"#3BAF6E"},
    {rank:"開花",lv:"Lv.4–6",color:"#E0609A"},
    {rank:"輝き",lv:"Lv.7–10",color:"#E09A2A"},
    {rank:"飛翔",lv:"Lv.11–15",color:"#6B58E8"},
    {rank:"覚醒",lv:"Lv.16+",color:"#C044E0"},
  ];

  return (
    <div>
      <div className="ph"><div className="ph-title-accent">設定</div></div>
      <div style={{padding:"0 16px"}}>

        {/* 目標設定 */}
        <div className="card">
          <div className="card-label">目標・期限</div>
          <div className="form-grp" style={{marginBottom:12}}>
            <label className="form-lbl">目標</label>
            <textarea className="txa" placeholder="例：英検2級に合格する" value={goal} onChange={e=>setGoal(e.target.value)} style={{height:72}}/>
          </div>
          <div className="form-grp" style={{marginBottom:14}}>
            <label className="form-lbl">達成期限</label>
            <input type="date" className="inp" value={deadline} onChange={e=>setDeadline(e.target.value)}/>
          </div>
          <button className="btn" onClick={saveGoal}>目標を保存する</button>
        </div>

        {/* 階級・XPルール */}
        <div className="card" style={{marginTop:12}}>
          <div className="card-label">階級システム</div>
          <p style={{fontSize:12,color:"var(--sub)",lineHeight:1.7,marginBottom:14}}>
            記録を積み重ねるとXPが貯まりレベルアップ。<br/>
            記録した日は <b style={{color:"var(--accent)"}}>+10〜25 XP</b>、メモを書くと +5 XP 追加。<br/>
            <b style={{color:"var(--red)"}}>記録なしの日は −15 XP</b>、2日連続で −30 XP。<br/>
            ストリーク（連続記録）で XP 増加ボーナスあり。
          </p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {RANK_RULES.map(r=>(
              <div key={r.rank} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 10px",borderRadius:8,background:r.color+"18",border:`1px solid ${r.color}30`}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:r.color,flexShrink:0}}/>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:r.color}}>{r.rank}</div>
                  <div style={{fontSize:10,color:"var(--sub)"}}>{r.lv}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* LINE通知 */}
        <div className="card" style={{marginTop:12}}>
          <div className="card-label">LINE通知時間</div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
            <div style={{flex:1}}><div style={{fontSize:11,color:"var(--sub)",marginBottom:6,fontWeight:600}}>開始</div><select value={start} onChange={e=>setStart(Number(e.target.value))}>{hours.map(h=><option key={h} value={h}>{String(h).padStart(2,"0")}:00</option>)}</select></div>
            <div style={{color:"var(--sub)",marginTop:18,fontSize:14}}>〜</div>
            <div style={{flex:1}}><div style={{fontSize:11,color:"var(--sub)",marginBottom:6,fontWeight:600}}>終了</div><select value={end} onChange={e=>setEnd(Number(e.target.value))}>{hours.map(h=><option key={h} value={h}>{String(h).padStart(2,"0")}:00</option>)}</select></div>
          </div>
          <div style={{fontSize:11,color:"var(--sub)",marginBottom:14,lineHeight:1.7}}>設定した時間帯に毎時リマインドが届きます</div>
          <button className="btn" onClick={saveNotify}>保存する</button>
        </div>

        {/* アカウント */}
        <div className="card" style={{marginTop:12}}>
          <div className="card-label">アカウント</div>
          <div className="s-row"><span className="s-k">名前</span><span className="s-v">{CURRENT_USER.name}</span></div>
          <div className="s-row"><span className="s-k">メール</span><span style={{fontSize:12,color:"var(--sub)"}}>{CURRENT_USER.email}</span></div>
        </div>
        <div style={{marginTop:12,marginBottom:32}}><button className="btn-g" onClick={onLogout}>ログアウト</button></div>
      </div>
    </div>
  );
}

const TABS=[{id:"home",l:"ホーム",n:"home"},{id:"log",l:"記録",n:"clock"},{id:"report",l:"レポート",n:"chart"},{id:"chat",l:"チャット",n:"chat"},{id:"settings",l:"設定",n:"gear"}];

function LoginScreen({onLogin}) {
  const [email,setEmail]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const login=async()=>{
    const e=email.trim().toLowerCase();
    if(!e||!e.includes("@")){setError("正しいメールアドレスを入力してください");return;}
    setLoading(true);setError("");
    const url=new URL(GAS_URL); url.searchParams.set("action","getUser"); url.searchParams.set("studentEmail",e);
    try{
      const r=await fetch(url).then(res=>res.json());
      if(r.ok&&r.data){const u={email:e,name:r.data.name,coachName:r.data.coachName||"コーチ",coachEmail:r.data.coach_email||""}; localStorage.setItem("edventure_user",JSON.stringify(u)); CURRENT_USER=u; onLogin(u);}
      else setError("このメールアドレスは登録されていません");
    }catch{setError("接続エラーが発生しました");}
    setLoading(false);
  };
  return (
    <div className="login-wrap">
      <div className="login-logo"><S n="clock" s={26}/></div>
      <div className="login-title">JIROKU</div>
      <div className="login-sub">時間を記録し、目標を達成する</div>
      <div className="login-box">
        <input type="email" className="login-inp" placeholder="メールアドレス" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/>
        {error&&<div className="login-err">{error}</div>}
        <button className="btn" onClick={login} disabled={loading}>{loading?"確認中...":"ログイン"}</button>
      </div>
    </div>
  );
}

function App() {
  const [user,setUser]=useState(CURRENT_USER);
  const [tab,setTab]=useState("home");
  const [toast,setToast]=useState(null);
  const [goalData,setGoalData]=useState(()=>JSON.parse(localStorage.getItem("jiroku_goal")||'{"goal":"","deadline":""}'));
  const logout=()=>{localStorage.removeItem("edventure_user");CURRENT_USER=null;setUser(null);};
  if(!user) return <LoginScreen onLogin={setUser}/>;
  return (
    <div style={{height:"100%",position:"relative"}}>
      <div className="screen">
        {tab==="home"&&<HomeScreen goalData={goalData} onGoalSaved={setGoalData}/>}
        {tab==="log"&&<LogScreen onToast={setToast}/>}
        {tab==="report"&&<ReportScreen/>}
        {tab==="chat"&&<ChatScreen onToast={setToast}/>}
        {tab==="settings"&&<SettingsScreen onToast={setToast} onLogout={logout} onGoalSaved={setGoalData}/>}
      </div>
      <nav className="nav">
        {TABS.map(t=>(
          <button key={t.id} className={"nav-btn"+(tab===t.id?" on":"")} onClick={()=>setTab(t.id)}>
            <S n={t.n} s={20}/><span className="nav-lbl">{t.l}</span>
          </button>
        ))}
      </nav>
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script>
</body>
