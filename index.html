<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>JIROKU</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JIROKU" />
  <meta name="theme-color" content="#0C0C0F" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0C0C0F;
      --bg-card:   #16161D;
      --bg-raised: #1E1E28;
      --border:    #2A2A38;
      --text:      #F0F0F5;
      --text-sub:  #6B6B80;
      --accent:    #7C6FF7;
      --accent2:   #A78BFA;
      --glow:      rgba(124,111,247,.25);
      --green:     #34D399;
      --amber:     #FBBF24;
      --red:       #F87171;
      --nav-h:     60px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    #root {
      height: 100%;
      width: 100%;
      position: relative;
      background: var(--bg);
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      bottom: calc(var(--nav-h) + var(--safe-bottom));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Nav ── */
    .nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + var(--safe-bottom));
      background: rgba(12,12,15,.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px; cursor: pointer; border: none; background: none;
      color: var(--text-sub);
      -webkit-tap-highlight-color: transparent;
      transition: color .2s;
    }
    .nav-item.active { color: var(--accent); }
    .nav-label { font-size: 10px; font-weight: 500; letter-spacing: .3px; }

    /* ── Header ── */
    .header {
      padding: 20px 20px 16px;
      background: var(--bg);
    }
    .header-title { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -.3px; }
    .header-sub { font-size: 12px; color: var(--text-sub); margin-top: 3px; }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 16px;
      margin: 0 16px 12px;
      border: 1px solid var(--border);
    }
    .card-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--text-sub);
      margin-bottom: 12px;
    }

    /* ── Stat row ── */
    .stat-row { display: flex; gap: 10px; margin: 0 16px 12px; }
    .stat-box {
      flex: 1; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 12px; text-align: center;
    }
    .stat-val { font-size: 24px; font-weight: 800; color: var(--text); line-height: 1; }
    .stat-lbl { font-size: 10px; color: var(--text-sub); margin-top: 4px; letter-spacing: .3px; }

    /* ── Streak glow ── */
    .streak-box {
      background: linear-gradient(135deg, #1a1000, #221500);
      border-color: #3D2D00;
    }
    .streak-box .stat-val { color: var(--amber); }

    /* ── XP bar ── */
    .xp-track {
      height: 4px; background: var(--border); border-radius: 99px;
      overflow: hidden; margin-top: 10px;
    }
    .xp-fill {
      height: 4px; border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }

    /* ── Schedule ── */
    .sched-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .sched-row:last-child { border-bottom: none; }
    .sched-time { font-size: 11px; font-weight: 700; color: var(--accent2); min-width: 40px; padding-top: 1px; }
    .sched-title { font-size: 14px; font-weight: 500; }
    .sched-sub { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

    /* ── Score ring ── */
    .ring-wrap { display: flex; align-items: center; gap: 16px; }
    .ring {
      width: 68px; height: 68px; flex-shrink: 0;
      border-radius: 50%;
      background: conic-gradient(var(--accent) calc(var(--pct)*1%), var(--border) 0);
      display: flex; align-items: center; justify-content: center;
    }
    .ring-inner {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--bg-card);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
    }
    .ring-num { font-size: 18px; font-weight: 800; color: var(--text); line-height: 1; }
    .ring-unit { font-size: 9px; color: var(--text-sub); }

    /* ── Section sub-header ── */
    .section-top {
      padding: 20px 20px 8px;
      background: var(--bg);
    }
    .section-top h2 { font-size: 17px; font-weight: 700; color: var(--text); }

    /* ── Time chips ── */
    .time-bar {
      display: flex; gap: 6px; overflow-x: auto; padding: 12px 16px;
      scrollbar-width: none; background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .time-bar::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 6px 11px; border-radius: 8px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text-sub); transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .chip.sel {
      background: var(--accent); border-color: var(--accent); color: #fff;
      box-shadow: 0 0 12px var(--glow);
    }

    /* ── Form ── */
    .form-wrap { padding: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-lbl { font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 8px; display: block; }
    .input, .textarea {
      width: 100%; padding: 12px 14px;
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 15px; font-family: inherit;
      background: var(--bg-raised); color: var(--text); outline: none;
      transition: border-color .15s;
    }
    .input:focus, .textarea:focus { border-color: var(--accent); }
    .textarea { resize: none; height: 80px; line-height: 1.5; }

    /* ── Focus buttons ── */
    .eval-btn {
      width: 100%; padding: 12px 14px; margin-bottom: 6px;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg-raised); font-size: 14px; font-weight: 400;
      cursor: pointer; text-align: left; color: var(--text-sub);
      transition: all .15s; font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .eval-btn:last-child { margin-bottom: 0; }
    .eval-btn.sel-5 { background: rgba(52,211,153,.12); border-color: var(--green); color: var(--green); }
    .eval-btn.sel-4 { background: rgba(124,111,247,.12); border-color: var(--accent); color: var(--accent2); }
    .eval-btn.sel-3 { background: rgba(251,191,36,.08); border-color: var(--amber); color: var(--amber); }
    .eval-btn.sel-2 { background: rgba(248,113,113,.08); border-color: var(--red); color: var(--red); }
    .eval-btn.sel-1 { background: rgba(248,113,113,.12); border-color: var(--red); color: var(--red); }

    /* ── CTA Button ── */
    .btn {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: inherit; letter-spacing: .2px;
      box-shadow: 0 4px 20px var(--glow);
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: .85; transform: scale(.98); }
    .btn:disabled { background: var(--bg-raised); color: var(--text-sub); box-shadow: none; cursor: default; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
      left: 50%; transform: translateX(-50%);
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px; border-radius: 10px;
      font-size: 13px; font-weight: 600; z-index: 999;
      white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,.4);
      animation: fadeUp .25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── Report ── */
    .report-hero {
      padding: 28px 20px 20px;
      text-align: center;
      background: var(--bg);
    }
    .report-date { font-size: 12px; color: var(--text-sub); margin-bottom: 10px; letter-spacing: .5px; }
    .report-score { font-size: 72px; font-weight: 900; line-height: 1; letter-spacing: -3px;
      background: linear-gradient(135deg, var(--text) 40%, var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .report-pts { font-size: 14px; color: var(--text-sub); margin-top: 4px; }

    /* ── Tag ── */
    .tag {
      display: inline-block; padding: 3px 8px; border-radius: 5px;
      font-size: 11px; font-weight: 700; letter-spacing: .3px;
    }
    .tag-pos { background: rgba(52,211,153,.12); color: var(--green); }
    .tag-neg { background: rgba(251,191,36,.1); color: var(--amber); }

    /* ── Log rows ── */
    .log-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .log-row:last-child { border-bottom: none; }
    .log-time { font-size: 11px; font-weight: 700; color: var(--text-sub); min-width: 44px; padding-top: 2px; }
    .log-task { font-size: 14px; font-weight: 500; color: var(--text); }
    .log-meta { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

    /* ── Chat ── */
    .chat-head {
      padding: 14px 20px; background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .chat-av {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--bg-raised); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: var(--text-sub); flex-shrink: 0;
    }
    .chat-name { font-size: 14px; font-weight: 700; }
    .chat-status { font-size: 11px; color: var(--text-sub); }

    .msgs { padding: 16px; display: flex; flex-direction: column; gap: 10px; min-height: 100%; }
    .bubble {
      max-width: 74%; padding: 10px 13px; font-size: 14px;
      line-height: 1.5; word-break: break-word; white-space: pre-wrap; border-radius: 14px;
    }
    .bubble-in {
      background: var(--bg-card); border: 1px solid var(--border);
      border-bottom-left-radius: 4px; align-self: flex-start;
    }
    .bubble-out {
      background: var(--accent); color: #fff;
      border-bottom-right-radius: 4px; align-self: flex-end;
    }
    .btime { font-size: 10px; color: var(--text-sub); margin-top: 3px; }
    .btime-r { text-align: right; color: rgba(255,255,255,.6); }

    .chat-bar {
      padding: 10px 16px; background: var(--bg-card);
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
    }
    .chat-inp {
      flex: 1; padding: 10px 13px; border: 1px solid var(--border);
      border-radius: 10px; font-size: 15px; font-family: inherit;
      outline: none; resize: none; max-height: 100px; line-height: 1.4;
      background: var(--bg-raised); color: var(--text);
    }
    .chat-inp:focus { border-color: var(--accent); }
    .send {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--accent); border: none; color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 12px var(--glow); transition: opacity .15s;
    }
    .send:disabled { background: var(--bg-raised); color: var(--text-sub); box-shadow: none; cursor: default; }

    /* ── Settings ── */
    .settings-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-key { color: var(--text-sub); }
    .settings-val { font-weight: 500; color: var(--text); }

    select {
      width: 100%; padding: 10px 12px; border-radius: 10px;
      border: 1px solid var(--border); font-size: 14px;
      background: var(--bg-raised); color: var(--text); font-family: inherit; outline: none;
    }
    select:focus { border-color: var(--accent); }

    .btn-ghost {
      width: 100%; padding: 13px; border-radius: 10px;
      border: 1px solid var(--border); background: transparent;
      color: var(--red); font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: inherit; transition: background .15s;
    }
    .btn-ghost:active { background: rgba(248,113,113,.08); }

    /* ── Spinner ── */
    .spin {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.2); border-top-color: #fff;
      border-radius: 50%; animation: rot .6s linear infinite; display: inline-block;
    }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty { padding: 48px 20px; text-align: center; color: var(--text-sub); }
    .empty-icon { font-size: 36px; opacity: .3; margin-bottom: 12px; }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty-body { font-size: 13px; line-height: 1.6; }

    /* ── Date nav ── */
    .date-nav {
      display: flex; align-items: center; gap: 16px; margin-top: 8px;
    }
    .date-nav button {
      background: none; border: none; font-size: 20px; cursor: pointer;
      color: var(--text-sub); padding: 2px 6px; line-height: 1;
      transition: color .15s;
    }
    .date-nav button:disabled { color: var(--border); cursor: default; }
    .date-nav span { font-size: 13px; font-weight: 600; color: var(--text); }

    /* ── Login ── */
    .login-wrap {
      height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 32px 24px;
      background: var(--bg);
    }
    .login-logo {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 32px var(--glow);
    }
    .login-title { font-size: 26px; font-weight: 900; letter-spacing: -.5px; margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: var(--text-sub); margin-bottom: 40px; }
    .login-box { width: 100%; max-width: 320px; }
    .login-input {
      width: 100%; padding: 13px 15px; border-radius: 10px;
      border: 1px solid var(--border); font-size: 15px;
      background: var(--bg-card); color: var(--text);
      margin-bottom: 10px; outline: none; font-family: inherit;
      transition: border-color .15s;
    }
    .login-input:focus { border-color: var(--accent); }
    .login-err { font-size: 12px; color: var(--red); margin-bottom: 10px; }

    /* ── Badge pills ── */
    .badge-pill {
      display: inline-block; padding: 3px 9px; border-radius: 6px; font-size: 11px;
      font-weight: 600; background: var(--bg-raised); border: 1px solid var(--border);
      color: var(--text-sub);
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const GAS_URL = "https://script.google.com/macros/s/AKfycbzJ-QEpPVnmp-LFU5Jxww4VFP1qaseMtwCrzKxAA6ZULr1y3h_UeKzVdhHnl5ze57U/exec";
let CURRENT_USER = JSON.parse(localStorage.getItem("edventure_user") || "null");

async function gasApi(action, params = {}) {
  if (!GAS_URL) return mockApi(action, params);
  const url = new URL(GAS_URL);
  url.searchParams.set("action", action);
  url.searchParams.set("studentEmail", CURRENT_USER.email);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  try { const res = await fetch(url.toString(), { redirect: "follow" }); return await res.json(); }
  catch { return { ok: true, data: [] }; }
}

async function gasPost(action, body = {}) {
  if (!GAS_URL) return mockPost(action, body);
  const url = new URL(GAS_URL);
  url.searchParams.set("action", action);
  url.searchParams.set("studentEmail", CURRENT_USER.email);
  Object.entries(body).forEach(([k, v]) => { if (v !== undefined && v !== null) url.searchParams.set(k, String(v)); });
  try { await fetch(url.toString(), { mode: "no-cors" }); } catch {}
  return { ok: true };
}

// Mock data
const MOCK_LOGS = [
  { time_block: "07:00", task: "朝の読書", focus_level: "5 — 完璧にできた", memo: "集中できた" },
  { time_block: "09:00", task: "英語リスニング", focus_level: "3 — まあまあだった", memo: "" },
  { time_block: "11:00", task: "プログラミング学習", focus_level: "5 — 完璧にできた", memo: "楽しかった" },
];
const MOCK_REPORT = { score: 82, feedback: "全体的に集中力が高く、午前中のパフォーマンスが際立っています。", action: "明日はポモドーロ技法を試してみましょう。", highlights: "プログラミングへの高い集中", improvement: "休憩時間の管理" };
const MOCK_MESSAGES = [
  { message_id: "1", content: "今日もよく頑張りました！", sender_name: "コーチ", sender_role: "coach", timestamp: "2026-06-27 09:30" },
  { message_id: "2", content: "ありがとうございます！", sender_name: "生徒", sender_role: "student", timestamp: "2026-06-27 10:15" },
];
const MOCK_SCHEDULE = [
  { time: "09:00", title: "朝のホームルーム", sub: "Zoom" },
  { time: "13:00", title: "英語ディスカッション", sub: "グループ" },
];
let mockMsgs = [...MOCK_MESSAGES];
let mockLogs = [...MOCK_LOGS];
function mockApi(action) {
  if (action === "getReport") return Promise.resolve({ ok: true, data: MOCK_REPORT });
  if (action === "getLogs") return Promise.resolve({ ok: true, data: mockLogs });
  if (action === "getMessages") return Promise.resolve({ ok: true, data: mockMsgs });
  if (action === "getSchedule") return Promise.resolve({ ok: true, data: MOCK_SCHEDULE });
  return Promise.resolve({ ok: false });
}
function mockPost(action, body) {
  if (action === "saveLog") { mockLogs = [...mockLogs, { time_block: body.time_block, task: body.task, focus_level: body.focus_level, memo: body.memo }]; return Promise.resolve({ ok: true }); }
  if (action === "sendMessage") { mockMsgs = [...mockMsgs, { message_id: String(Date.now()), content: body.content, sender_name: CURRENT_USER.name, sender_role: "student", timestamp: new Date().toLocaleString("ja") }]; return Promise.resolve({ ok: true }); }
  return Promise.resolve({ ok: true });
}

// SVG Icons
const Icon = ({ name, size = 22 }) => {
  const s = { width: size, height: size, fill: "none", stroke: "currentColor", strokeWidth: 1.8, strokeLinecap: "round", strokeLinejoin: "round" };
  if (name === "home")   return <svg viewBox="0 0 24 24" style={s}><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>;
  if (name === "clock")  return <svg viewBox="0 0 24 24" style={s}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>;
  if (name === "chart")  return <svg viewBox="0 0 24 24" style={s}><rect x="3" y="12" width="4" height="9"/><rect x="10" y="7" width="4" height="14"/><rect x="17" y="3" width="4" height="18"/></svg>;
  if (name === "chat")   return <svg viewBox="0 0 24 24" style={s}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>;
  if (name === "gear")   return <svg viewBox="0 0 24 24" style={s}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>;
  if (name === "up")     return <svg viewBox="0 0 24 24" style={s}><path d="M12 19V5M5 12l7-7 7 7"/></svg>;
  return null;
};

function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

function formatDateStr(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return formatDateStr(d);
}
function isToday(dateStr) { return dateStr === formatDateStr(new Date()); }

  const [selectedDate, setSelectedDate] = useState(todayStr);

  const [logs, setLogs] = useState([]);
  const timeRef = useRef(null);

  useEffect(() => {
    gasApi("getLogs", { date: selectedDate }).then(r => r.ok && setLogs(r.data));
    if (isToday(selectedDate)) {
      setTimeout(() => {
        const el = timeRef.current?.querySelector(".chip.sel");
        if (el) el.scrollIntoView({ inline: "center", behavior: "smooth" });
      }, 100);
    }
  }, [selectedDate]);

  const save = async () => {
    if (!task.trim()) return;
    setSaving(true);

    url.searchParams.set("action", "saveLog");
    url.searchParams.set("studentEmail", CURRENT_USER.email);
    url.searchParams.set("time_block", block);
    url.searchParams.set("task", task.trim());
    url.searchParams.set("focus_level", focus);
    url.searchParams.set("memo", memo.trim());

    setTask(""); setMemo("");

      const lvUp = result.level_up ? `  →  Lv.${result.level} へ！` : "";
      onToast(`+${result.xp_gained} XP 獲得${lvUp}`);
    } else {
      onToast("保存しました");
    }
    const r = await gasApi("getLogs", { date: selectedDate });
    if (r.ok) setLogs(r.data);

  return (
    <div>
      <div className="header">
        <div className="header-title">記録を入力</div>

          <button onClick={() => setSelectedDate(addDays(selectedDate,-1))}>‹</button>

              <label className="form-lbl">何をしましたか？</label>

              <label className="form-lbl">自己評価</label>
              {FOCUS_OPTS.map(f => (
                <button key={f.label} className={"eval-btn" + (focus === f.label ? " " + f.cls : "")} onClick={() => setFocus(f.label)}>{f.label}</button>
              ))}

            <div className="form-group">

            <button className="btn" onClick={save} disabled={!task.trim() || saving}>

      {logs.length > 0 && (
        <div className="card" style={{marginBottom:24}}>

// ─── チャット ───
function ChatScreen({ onToast }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [sending, setSending] = useState(false);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);
  const composingRef = useRef(false);

  const load = useCallback(async () => {
    const r = await gasApi("getMessages");
    if (r.ok) setMessages(r.data);
  }, []);

  useEffect(() => { load(); }, []);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const send = async () => {
    const content = input.trim();
    if (!content || sending) return;
    setSending(true);
    setInput("");
    const temp = { message_id: "t" + Date.now(), content, sender_role: "student", sender_name: CURRENT_USER.name, timestamp: new Date().toLocaleString("ja-JP") };
    setMessages(prev => [...prev, temp]);
    gasPost("sendMessage", { content, sender_role: "student", sender_name: CURRENT_USER.name });
    setSending(false);
    inputRef.current?.focus();
    setTimeout(load, 3000);
  };

  const onKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey && !composingRef.current) { e.preventDefault(); send(); }
  };

  const fmtTime = (ts) => {
    try { const d = new Date(ts.replace(" ","T")); return isNaN(d) ? ts : d.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}); } catch { return ts; }
  };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div className="chat-head">
        <div className="chat-av">{(CURRENT_USER.coachName||"?").charAt(0)}</div>
        <div>
          <div className="chat-name">{CURRENT_USER.coachName}</div>
          <div className="chat-status">コーチ</div>
        </div>
      </div>
      <div className="msgs" style={{flex:1,overflowY:"auto"}}>
        {messages.length === 0 && <div style={{textAlign:"center",color:"var(--text-sub)",fontSize:13,marginTop:40}}>メッセージはまだありません</div>}
        {messages.map(m => {
          const isMe = m.sender_role === "student";
          return (
            <div key={m.message_id} style={{alignSelf: isMe ? "flex-end" : "flex-start", maxWidth:"75%", display:"flex", flexDirection:"column", alignItems: isMe ? "flex-end" : "flex-start"}}>
              {!isMe && <div style={{fontSize:11,color:"var(--text-sub)",marginBottom:3,paddingLeft:2}}>{m.sender_name}</div>}
              <div className={"bubble " + (isMe ? "bubble-out" : "bubble-in")}>{m.content}</div>
              <div className={"btime" + (isMe ? " btime-r" : "")}>{fmtTime(m.timestamp)}</div>
            </div>
          );
        })}
        <div ref={bottomRef} />
      </div>
      <div className="chat-bar">
        <textarea ref={inputRef} className="chat-inp" placeholder="メッセージを入力..." rows={1} value={input} onChange={e => setInput(e.target.value)}
          onCompositionStart={() => { composingRef.current = true; }}
          onCompositionEnd={() => { composingRef.current = false; }}
          onKeyDown={onKey} />
        <button className="send" onClick={send} disabled={!input.trim() || sending}>
          {sending ? <span className="spin" style={{width:14,height:14,borderWidth:2}} /> : <Icon name="up" size={17} />}
        </button>
      </div>
    </div>
  );
}

function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const login = async () => {
    const e = email.trim().toLowerCase();
    if (!e || !e.includes("@")) { setError("正しいメールアドレスを入力してください"); return; }
    setLoading(true); setError("");
    const url = new URL(GAS_URL);
    url.searchParams.set("action", "getUser");
    url.searchParams.set("studentEmail", e);
    try {
      const r = await fetch(url).then(res => res.json());
      if (r.ok && r.data) {
        const user = { email: e, name: r.data.name, coachName: r.data.coachName || "コーチ", coachEmail: r.data.coach_email || "" };
        localStorage.setItem("edventure_user", JSON.stringify(user));
        CURRENT_USER = user;
        onLogin(user);
      } else {
        setError("このメールアドレスは登録されていません");
      }
    } catch { setError("接続エラーが発生しました"); }
    setLoading(false);
  };

  return (
    <div className="login-wrap">
      <div style={{textAlign:"center",marginBottom:0}}>
        <div className="login-logo">
          <Icon name="clock" size={26} />
        </div>
        <div className="login-title">JIROKU</div>
        <div className="login-sub">時間を記録し、目標を達成する</div>
      </div>
      <div className="login-box">
        <input type="email" className="login-input" placeholder="メールアドレス"
          value={email} onChange={e => setEmail(e.target.value)}
          onKeyDown={e => e.key === "Enter" && login()} />
        {error && <div className="login-err">{error}</div>}
        <button className="btn" onClick={login} disabled={loading}>
          {loading ? "確認中..." : "ログイン"}
        </button>
      </div>
    </div>
  );
}

// ─── App ───
function App() {
  const [user, setUser] = useState(CURRENT_USER);
  const [tab, setTab] = useState("home");
  const [toast, setToast] = useState(null);

  const logout = () => { localStorage.removeItem("edventure_user"); CURRENT_USER = null; setUser(null); };

  if (!user) return <LoginScreen onLogin={setUser} />;

  return (
    <div style={{height:"100%",position:"relative"}}>
      <div className="screen">
        {tab === "home"     && <HomeScreen />}
        {tab === "log"      && <LogScreen onToast={setToast} />}
        {tab === "report"   && <ReportScreen />}
        {tab === "chat"     && <ChatScreen onToast={setToast} />}
        {tab === "settings" && <SettingsScreen onToast={setToast} onLogout={logout} />}
      </div>
      <nav className="nav">
        {TABS.map(t => (
          <button key={t.id} className={"nav-item" + (tab === t.id ? " active" : "")} onClick={() => setTab(t.id)}>
            <Icon name={t.icon} size={20} />
            <span className="nav-label">{t.label}</span>
          </button>
        ))}
      </nav>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>
</body>
</html>
