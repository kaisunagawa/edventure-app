<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>JIROKU</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="JIROKU" />
  <meta name="theme-color" content="#111827" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1A56DB;
      --primary-dark: #1245B5;
      --bg: #F3F4F6;
      --bg-card: #FFFFFF;
      --text: #111827;
      --text-sub: #6B7280;
      --border: #E5E7EB;
      --success: #059669;
      --warning: #D97706;
      --danger: #DC2626;
      --nav-h: 60px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    #root {
      height: 100%;
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      position: relative;
      background: var(--bg);
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      bottom: calc(var(--nav-h) + var(--safe-bottom));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ─── Nav ─── */
    .nav {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: calc(var(--nav-h) + var(--safe-bottom));
      background: #fff;
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      border: none;
      background: none;
      padding: 8px 0 4px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity .15s;
      color: var(--text-sub);
    }
    .nav-item:active { opacity: .6; }
    .nav-item.active { color: var(--primary); }
    .nav-label { font-size: 10px; font-weight: 500; }

    /* ─── Header ─── */
    .header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title { font-size: 17px; font-weight: 700; color: var(--text); }
    .header-sub { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

    /* ─── Cards ─── */
    .card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 16px;
      margin: 12px 16px 0;
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 12px;
    }

    /* ─── Score Circle ─── */
    .score-wrap { display: flex; align-items: center; gap: 16px; }
    .score-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: conic-gradient(var(--primary) calc(var(--pct) * 1%), var(--border) 0);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .score-inner {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
    }
    .score-num { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1; }
    .score-unit { font-size: 9px; color: var(--text-sub); }
    .score-text { flex: 1; }
    .score-label { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .score-comment { font-size: 13px; color: var(--text-sub); line-height: 1.5; }

    /* ─── Schedule list ─── */
    .schedule-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .schedule-item:last-child { border-bottom: none; }
    .schedule-time { font-size: 12px; font-weight: 600; color: var(--primary); min-width: 44px; padding-top: 1px; }
    .schedule-ev { font-size: 14px; font-weight: 500; }
    .schedule-ev-sub { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

    /* ─── Log Form ─── */
    .form-header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
    }
    .form-header h2 { font-size: 17px; font-weight: 700; color: var(--text); }
    .form-header p { font-size: 12px; color: var(--text-sub); margin-top: 4px; }

    .time-selector {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 16px 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .time-selector::-webkit-scrollbar { display: none; }
    .time-chip {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text-sub);
      transition: all .12s;
      -webkit-tap-highlight-color: transparent;
    }
    .time-chip.selected {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .form-body { padding: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-label {
      font-size: 12px; font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 6px;
      display: block;
    }
    .form-input, .form-textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color .12s;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--primary); }
    .form-textarea { resize: none; height: 80px; line-height: 1.5; }

    .focus-btn {
      width: 100%;
      padding: 11px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      transition: all .12s;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 6px;
      font-family: inherit;
    }
    .focus-btn:last-child { margin-bottom: 0; }
    .focus-btn.selected { background: var(--primary); border-color: var(--primary); color: #fff; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background .12s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: .2px;
    }
    .btn-primary:active { background: var(--primary-dark); }
    .btn-primary:disabled { background: #9BB0E8; cursor: default; }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
      left: 50%; transform: translateX(-50%);
      background: var(--text);
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      white-space: nowrap;
      animation: fadeUp .25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(6px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ─── Report ─── */
    .report-header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 20px;
      text-align: center;
    }
    .report-date { font-size: 12px; color: var(--text-sub); margin-bottom: 8px; }
    .report-score-big { font-size: 56px; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 2px; }
    .report-score-label { font-size: 13px; color: var(--text-sub); }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .2px;
    }
    .tag-success { background: #D1FAE5; color: #065F46; }
    .tag-warn { background: #FEF3C7; color: #92400E; }

    .log-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .log-item:last-child { border-bottom: none; }
    .log-time { font-size: 11px; font-weight: 700; color: var(--text-sub); min-width: 44px; padding-top: 2px; }
    .log-task { font-size: 14px; font-weight: 500; }
    .log-meta { font-size: 12px; color: var(--text-sub); margin-top: 3px; }

    /* ─── Chat ─── */
    .chat-header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-sub);
      flex-shrink: 0;
    }
    .chat-name { font-size: 15px; font-weight: 700; }
    .chat-status { font-size: 11px; color: var(--text-sub); }

    .messages {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 100%;
    }
    .msg {
      max-width: 72%;
      padding: 10px 13px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg-in {
      background: #fff;
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .msg-out {
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }
    .msg-time { font-size: 10px; color: var(--text-sub); margin-top: 3px; }
    .msg-time-right { text-align: right; color: rgba(255,255,255,.65); }

    .chat-input-bar {
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-input {
      flex: 1;
      padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
    }
    .chat-input:focus { border-color: var(--primary); }
    .send-btn {
      width: 40px; height: 40px;
      border-radius: 8px;
      background: var(--primary);
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      font-weight: 700;
    }
    .send-btn:disabled { background: #9BB0E8; cursor: default; }

    /* ─── Spinner ─── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .section-header {
      padding: 16px 16px 4px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    /* ─── Metric strip ─── */
    .metric-strip {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .metric-cell {
      flex: 1;
      background: #fff;
      padding: 10px 8px;
      text-align: center;
    }
    .metric-val { font-size: 18px; font-weight: 800; color: var(--text); }
    .metric-lbl { font-size: 10px; color: var(--text-sub); margin-top: 2px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const GAS_URL = "https://script.google.com/macros/s/AKfycbzJ-QEpPVnmp-LFU5Jxww4VFP1qaseMtwCrzKxAA6ZULr1y3h_UeKzVdhHnl5ze57U/exec";
let CURRENT_USER = JSON.parse(localStorage.getItem("edventure_user") || "null");

async function gasApi(action, params = {}) {
  if (!GAS_URL) return mockApi(action, params);
  const url = new URL(GAS_URL);
  url.searchParams.set("action", action);
  url.searchParams.set("studentEmail", CURRENT_USER.email);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  try {
    const res = await fetch(url.toString(), { redirect: "follow" });
    return await res.json();
  } catch (e) {
    return { ok: true, data: [] };
  }
}

async function gasPost(action, body = {}) {
  if (!GAS_URL) return mockPost(action, body);
  const url = new URL(GAS_URL);
  url.searchParams.set("action", action);
  url.searchParams.set("studentEmail", CURRENT_USER.email);
  Object.entries(body).forEach(([k, v]) => {
    if (v !== undefined && v !== null) url.searchParams.set(k, String(v));
  });
  try {
    await fetch(url.toString(), { mode: "no-cors" });
  } catch (e) {}
  return { ok: true };
}

// ━━━━━━━ モックデータ ━━━━━━━
const MOCK_LOGS = [
  { time_block: "07:00", task: "朝の読書", focus_level: "高", memo: "集中できた" },
  { time_block: "08:00", task: "数学の演習", focus_level: "高", memo: "難しい問題に挑戦" },
  { time_block: "09:00", task: "英語リスニング", focus_level: "中", memo: "" },
  { time_block: "10:00", task: "休憩・SNS", focus_level: "低", memo: "長くなりすぎた" },
  { time_block: "11:00", task: "プログラミング学習", focus_level: "高", memo: "React楽しい！" },
];

const MOCK_REPORT = {
  score: 82,
  feedback: "今日は全体的に集中力が高く、特に午前中のパフォーマンスが素晴らしかった。",
  action: "明日は休憩にタイマーをセットし、25分勉強→5分休憩のリズムを試してみよう。",
  highlights: "数学・プログラミングへの高集中",
  improvement: "SNS・娯楽時間の管理",
};

const MOCK_MESSAGES = [
  { message_id: "1", content: "今日のレポートを確認しました。数学の演習、よく頑張りましたね！", sender_name: "コーチ", sender_role: "coach", timestamp: "2026-06-27 09:30" },
  { message_id: "2", content: "ありがとうございます！難しかったですが最後まで解けました。", sender_name: "生徒", sender_role: "student", timestamp: "2026-06-27 10:15" },
];

const MOCK_SCHEDULE = [
  { time: "09:00", title: "朝のホームルーム", sub: "Zoom" },
  { time: "10:00", title: "数学 演習", sub: "自主学習" },
  { time: "13:00", title: "英語ディスカッション", sub: "グループ" },
];

let mockMsgs = [...MOCK_MESSAGES];
let mockLogs = [...MOCK_LOGS];

function mockApi(action) {
  if (action === "getReport") return Promise.resolve({ ok: true, data: MOCK_REPORT });
  if (action === "getLogs") return Promise.resolve({ ok: true, data: mockLogs });
  if (action === "getMessages") return Promise.resolve({ ok: true, data: mockMsgs });
  if (action === "getSchedule") return Promise.resolve({ ok: true, data: MOCK_SCHEDULE });
  return Promise.resolve({ ok: false });
}

function mockPost(action, body) {
  if (action === "saveLog") {
    mockLogs = [...mockLogs, { time_block: body.time_block, task: body.task, focus_level: body.focus_level, memo: body.memo }];
    return Promise.resolve({ ok: true });
  }
  if (action === "sendMessage") {
    mockMsgs = [...mockMsgs, { message_id: String(Date.now()), content: body.content, sender_name: CURRENT_USER.name, sender_role: "student", timestamp: new Date().toLocaleString("ja") }];
    return Promise.resolve({ ok: true });
  }
  return Promise.resolve({ ok: true });
}

// ━━━━━━━ SVGアイコン ━━━━━━━
const Icon = ({ name, size = 22 }) => {
  const s = { width: size, height: size, fill: "none", stroke: "currentColor", strokeWidth: 1.8, strokeLinecap: "round", strokeLinejoin: "round" };
  if (name === "home") return <svg viewBox="0 0 24 24" style={s}><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>;
  if (name === "clock") return <svg viewBox="0 0 24 24" style={s}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>;
  if (name === "chart") return <svg viewBox="0 0 24 24" style={s}><rect x="3" y="12" width="4" height="9"/><rect x="10" y="7" width="4" height="14"/><rect x="17" y="3" width="4" height="18"/></svg>;
  if (name === "chat") return <svg viewBox="0 0 24 24" style={s}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>;
  if (name === "settings") return <svg viewBox="0 0 24 24" style={s}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>;
  if (name === "arrow-up") return <svg viewBox="0 0 24 24" style={s}><path d="M12 19V5M5 12l7-7 7 7"/></svg>;
  return null;
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// COMPONENTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function Toast({ msg, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 2500);
    return () => clearTimeout(t);
  }, []);
  return <div className="toast">{msg}</div>;
}

// ─── ホーム画面 ───
function HomeScreen() {
  const [report, setReport] = useState(null);
  const [schedule, setSchedule] = useState([]);
  const [game, setGame] = useState(null);

  useEffect(() => {
    gasApi("getReport").then(r => r.ok && setReport(r.data));
    gasApi("getSchedule").then(r => r.ok && setSchedule(r.data));
    gasApi("getGameStatus").then(r => r.ok && setGame(r.data));
  }, []);

  const today = new Date().toLocaleDateString("ja-JP", { year: "numeric", month: "long", day: "numeric", weekday: "short" });

  return (
    <div>
      <div className="header">
        <div>
          <div className="header-title">{CURRENT_USER.name}</div>
          <div className="header-sub">{today}</div>
        </div>
      </div>

      {/* 活動サマリー */}
      {game && (
        <div className="card">
          <div className="card-title">活動サマリー</div>
          <div className="metric-strip">
            <div className="metric-cell">
              <div className="metric-val">Lv.{game.level}</div>
              <div className="metric-lbl">レベル</div>
            </div>
            <div className="metric-cell">
              <div className="metric-val">{game.xp}</div>
              <div className="metric-lbl">XP</div>
            </div>
            <div className="metric-cell">
              <div className="metric-val">{game.streak}</div>
              <div className="metric-lbl">連続日数</div>
            </div>
          </div>
          <div style={{background:"var(--border)",borderRadius:99,height:4}}>
            <div style={{background:"var(--primary)",borderRadius:99,height:4,width:game.xpInLevel+"%",transition:"width .4s"}} />
          </div>
          <div style={{fontSize:11,color:"var(--text-sub)",marginTop:4}}>次のレベルまで {100 - game.xpInLevel} XP</div>
          {game.badges.length > 0 && (
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:10}}>
              {game.badges.map(b => (

const TIME_BLOCKS = [
  "06:00-07:00","07:00-08:00","08:00-09:00","09:00-10:00","10:00-11:00","11:00-12:00",
  "12:00-13:00","13:00-14:00","14:00-15:00","15:00-16:00","16:00-17:00","17:00-18:00",
  "18:00-19:00","19:00-20:00","20:00-21:00","21:00-22:00","22:00-23:00","23:00-24:00",
];
const FOCUS_OPTS = ["5 — 完璧にできた", "4 — よくできた", "3 — まあまあだった", "2 — もう少しだった", "1 — 全然だめだった"];

function formatDateStr(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return formatDateStr(d);
}
function isToday(dateStr) { return dateStr === formatDateStr(new Date()); }

function LogScreen({ onToast }) {
  const nowH = new Date().getHours();
  const defaultBlock = TIME_BLOCKS.find(t => parseInt(t) === nowH) || "09:00-10:00";
  const todayStr = formatDateStr(new Date());

  const [selectedDate, setSelectedDate] = useState(todayStr);
  const [block, setBlock] = useState(defaultBlock);
  const [task, setTask] = useState("");
  const [focus, setFocus] = useState(FOCUS_OPTS[0]);
  const [memo, setMemo] = useState("");
  const [saving, setSaving] = useState(false);
  const [logs, setLogs] = useState([]);
  const timeRef = useRef(null);

  useEffect(() => {
    gasApi("getLogs", { date: selectedDate }).then(r => r.ok && setLogs(r.data));
    if (isToday(selectedDate)) {
      setTimeout(() => {
        const el = timeRef.current?.querySelector(".time-chip.selected");
        if (el) el.scrollIntoView({ inline: "center", behavior: "smooth" });
      }, 100);
    }
  }, [selectedDate]);

  const save = async () => {
    if (!task.trim()) return;
    setSaving(true);
    const url = new URL(GAS_URL);
    url.searchParams.set("action", "saveLog");
    url.searchParams.set("studentEmail", CURRENT_USER.email);
    url.searchParams.set("time_block", block);
    url.searchParams.set("task", task.trim());
    url.searchParams.set("focus_level", focus);
    url.searchParams.set("memo", memo.trim());
    const result = await fetch(url).then(r => r.json()).catch(() => ({}));
    setTask(""); setMemo("");
    if (result.xp_gained) {
      const levelUpMsg = result.level_up ? `  レベルアップ Lv.${result.level}` : "";
      onToast(`保存しました  +${result.xp_gained} XP${levelUpMsg}`);
    } else {
      onToast("保存しました");
    }
    const r = await gasApi("getLogs", { date: selectedDate });
    if (r.ok) setLogs(r.data);
    setSaving(false);
  };

  return (
    <div>
      <div className="form-header">
        <h2>記録を入力</h2>
        <div style={{display:"flex",alignItems:"center",gap:16,marginTop:8}}>
          <button onClick={() => setSelectedDate(addDays(selectedDate,-1))} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"var(--text-sub)",padding:"2px 6px"}}>‹</button>
          <span style={{fontSize:13,color:"var(--text)",fontWeight:600}}>
            {isToday(selectedDate) ? "今日" : selectedDate}
          </span>
          <button onClick={() => setSelectedDate(addDays(selectedDate,1))} disabled={isToday(selectedDate)} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color: isToday(selectedDate) ? "var(--border)" : "var(--text-sub)",padding:"2px 6px"}}>›</button>
        </div>
      </div>

      {!isToday(selectedDate) && logs.length === 0 && (
        <div style={{textAlign:"center",color:"var(--text-sub)",padding:40,fontSize:13}}>この日の記録はありません</div>
      )}

      {isToday(selectedDate) && <>
      <div ref={timeRef} className="time-selector">
        {TIME_BLOCKS.map(t => (
          <button key={t} className={"time-chip" + (block === t ? " selected" : "")} onClick={() => setBlock(t)}>
            {t}
          </button>
        ))}
      </div>
      <div className="form-body">
        <div className="form-group">
          <label className="form-label">何をしましたか？</label>
          <input
            className="form-input"
            placeholder="例：数学の問題演習"
            value={task}
            onChange={e => setTask(e.target.value)}
          />
        </div>

        <div className="form-group">
          <label className="form-label">自己評価</label>
          <div>
            {FOCUS_OPTS.map(f => (
              <button key={f} className={"focus-btn" + (focus === f ? " selected" : "")} onClick={() => setFocus(f)}>
                {f}
              </button>
            ))}
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">メモ（任意）</label>
          <textarea
            className="form-textarea"
            placeholder="気づいたことや振り返り..."
            value={memo}
            onChange={e => setMemo(e.target.value)}
          />
        </div>

        <button className="btn-primary" onClick={save} disabled={!task.trim() || saving}>
          {saving ? <span className="spinner" /> : "保存する"}
        </button>
      </div>
      </>}

      {logs.length > 0 && (
        <div className="card" style={{marginBottom:24}}>
          <div className="card-title">{isToday(selectedDate) ? "本日の記録" : selectedDate + " の記録"}</div>
          {logs.map((l, i) => (
            <div key={i} className="log-item">
              <div className="log-time">{l.time_block}</div>
              <div>
                <div className="log-task">{l.task}</div>
                <div className="log-meta">
                  {l.focus_level}
                  {l.memo ? `  ·  ${l.memo}` : ""}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── チャット ───
function ChatScreen({ onToast }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [sending, setSending] = useState(false);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);
  const composingRef = useRef(false);

  const loadMessages = useCallback(async () => {
    const r = await gasApi("getMessages");
    if (r.ok) setMessages(r.data);
  }, []);

  useEffect(() => { loadMessages(); }, []);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const send = async () => {
    const content = input.trim();
    if (!content || sending) return;
    setSending(true);
    setInput("");
    const tempMsg = { message_id: "temp_" + Date.now(), content, sender_role: "student", sender_name: CURRENT_USER.name, timestamp: new Date().toLocaleString("ja-JP", { timeZone: "Asia/Tokyo" }) };
    setMessages(prev => [...prev, tempMsg]);
    gasPost("sendMessage", { content, sender_role: "student", sender_name: CURRENT_USER.name });
    setSending(false);
    inputRef.current?.focus();
    setTimeout(() => loadMessages(), 3000);
  };

  const onKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey && !composingRef.current) {
      e.preventDefault();
      send();
    }
  };

  const formatTime = (ts) => {
    try {
      const d = new Date(ts.replace(" ", "T"));
      return isNaN(d) ? ts : d.toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" });
    } catch { return ts; }
  };

  const initials = (name) => name ? name.charAt(0) : "?";

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div className="chat-header">
        <div className="chat-avatar">{initials(CURRENT_USER.coachName)}</div>
        <div>
          <div className="chat-name">{CURRENT_USER.coachName}</div>
          <div className="chat-status">コーチ</div>
        </div>
      </div>

      <div className="messages" style={{flex:1,overflowY:"auto"}}>
        {messages.length === 0 && (
          <div style={{textAlign:"center",color:"var(--text-sub)",fontSize:13,marginTop:40}}>メッセージはまだありません</div>
        )}
        {messages.map((m) => {
          const isMe = m.sender_role === "student";
          return (
            <div key={m.message_id} style={{alignSelf: isMe ? "flex-end" : "flex-start", maxWidth:"75%", display:"flex", flexDirection:"column", alignItems: isMe ? "flex-end" : "flex-start"}}>
              {!isMe && <div style={{fontSize:11,color:"var(--text-sub)",marginBottom:3,paddingLeft:2}}>{m.sender_name}</div>}
              <div className={"msg " + (isMe ? "msg-out" : "msg-in")}>{m.content}</div>
              <div className={"msg-time" + (isMe ? " msg-time-right" : "")}>{formatTime(m.timestamp)}</div>
            </div>
          );
        })}
        <div ref={bottomRef} />
      </div>

      <div className="chat-input-bar">
        <textarea
          ref={inputRef}
          className="chat-input"
          placeholder="メッセージを入力..."
          rows={1}
          value={input}
          onChange={e => setInput(e.target.value)}
          onCompositionStart={() => { composingRef.current = true; }}
          onCompositionEnd={() => { composingRef.current = false; }}
          onKeyDown={onKey}
        />
        <button className="send-btn" onClick={send} disabled={!input.trim() || sending}>
          {sending ? <span className="spinner" style={{width:14,height:14,borderWidth:2}} /> : <Icon name="arrow-up" size={18} />}
        </button>
      </div>
    </div>
  );
}

// ─── ログイン ───
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const login = async () => {
    const e = email.trim().toLowerCase();
    if (!e || !e.includes("@")) { setError("正しいメールアドレスを入力してください"); return; }
    setLoading(true);
    setError("");
    const url = new URL(GAS_URL);
    url.searchParams.set("action", "getUser");
    url.searchParams.set("studentEmail", e);
    try {
      const r = await fetch(url).then(res => res.json());
      if (r.ok && r.data) {
        const user = { email: e, name: r.data.name, coachName: r.data.coachName || "コーチ", coachEmail: r.data.coach_email || "" };
        localStorage.setItem("edventure_user", JSON.stringify(user));
        CURRENT_USER = user;
        onLogin(user);
      } else {
        setError("このメールアドレスは登録されていません");
      }
    } catch {
      setError("接続エラーが発生しました");
    }
    setLoading(false);
  };

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px",background:"#fff"}}>
      <div style={{marginBottom:32,textAlign:"center"}}>

          <svg width="24" height="24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        </div>
        <h1 style={{fontSize:22,fontWeight:800,color:"var(--text)",letterSpacing:".5px"}}>JIROKU</h1>
        <p style={{color:"var(--text-sub)",fontSize:13,marginTop:6}}>時間を記録し、目標を達成する</p>
      </div>
      <div style={{width:"100%",maxWidth:320}}>
        <input
          type="email"
          placeholder="メールアドレス"
          value={email}
          onChange={e => setEmail(e.target.value)}
          onKeyDown={e => e.key === "Enter" && login()}
          style={{width:"100%",padding:"12px 14px",borderRadius:8,border:"1px solid var(--border)",fontSize:15,background:"#fff",marginBottom:10,outline:"none",fontFamily:"inherit"}}
        />
        {error && <p style={{color:"var(--danger)",fontSize:12,marginBottom:10}}>{error}</p>}
        <button className="btn-primary" onClick={login} disabled={loading}>
          {loading ? "確認中..." : "ログイン"}
        </button>
      </div>
    </div>
  );
}

        {TABS.map(t => (
          <button key={t.id} className={"nav-item" + (tab === t.id ? " active" : "")} onClick={() => setTab(t.id)}>
            <Icon name={t.icon} size={20} />
            <span className="nav-label">{t.label}</span>
          </button>
        ))}
      </nav>

      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
